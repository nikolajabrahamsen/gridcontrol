function getAge(dob){if(!dob)return null;const t=new Date(),b=new Date(dob);let a=t.getFullYear()-b.getFullYear();if(t.getMonth()<b.getMonth()||(t.getMonth()===b.getMonth()&&t.getDate()<b.getDate()))a--;return a;}
function eligibleClasses(dob,cr){const age=getAge(dob);if(!age)return Object.keys(cr);return Object.entries(cr).filter(([,r])=>age>=r.min&&age<=r.max).map(([c])=>c);}
// Kartnummer-register hjælpere
function kartRange(reg,cls){return reg?.ranges?.[cls]||null;}
function kartOwner(reg,cls,num){return reg?.numbers?.[cls]?.[num]||null;}
function myKartInClass(reg,cls,userId){
  const nums=reg?.numbers?.[cls]||{};
  const found=Object.entries(nums).find(([,info])=>info.ownerId===userId);
  return found?parseInt(found[0]):null;
}
function renewWindowOpen(reg){
  const today=new Date().toISOString().slice(0,10);
  const open=reg?.renewOpenDate,close=reg?.releaseDate;
  if(!open||!close)return false;
  return today>=open&&today<=close;
}
function classLimitFor(ev,cls){return ev?.classLimits?.[cls]?.max||ev?.maxParticipants||null;}
function classCount(ev,cls){return (ev?.registrations||[]).filter(r=>r.class===cls).length;}
function classFull(ev,cls){const m=classLimitFor(ev,cls);return m?classCount(ev,cls)>=m:false;}

// Fletter Auth-profiler + importerede (login-løse) brugere til én liste
function mergeUsers(profiles,imported){return [...(profiles||[]),...(imported||[])];}

// ── REDUCER ──────────────────────────────────────────────────────
function reducer(state,action){
  switch(action.type){
    case "HYDRATE":{
      // action.payload = app_state-dokumentet (uden Auth-profiler)
      const merged={...initialState,...action.payload,lang:state.lang};
      const profiles=state.authProfiles||[];
      merged.authProfiles=profiles;
      merged.importedUsers=action.payload.importedUsers||[];
      merged.users=mergeUsers(profiles,merged.importedUsers);
      const cu=state.currentUser;
      merged.currentUser=cu?(merged.users.find(x=>x.id===cu.id)||cu):null;
      return merged;
    }
    case "SET_PROFILES":{
      const profiles=action.payload||[];
      const users=mergeUsers(profiles,state.importedUsers);
      const cu=state.currentUser;
      return{...state,authProfiles:profiles,users,currentUser:cu?(users.find(x=>x.id===cu.id)||cu):null};
    }
    case "SET_LANG":return{...state,lang:action.payload};
    case "LOGIN":return{...state,currentUser:action.payload};
    case "LOGOUT":return{...state,currentUser:null};
    case "UPDATE_USER":{
      const profiles=(state.authProfiles||[]).map(u=>u.id===action.payload.id?{...u,...action.payload}:u);
      const imported=(state.importedUsers||[]).map(u=>u.id===action.payload.id?{...u,...action.payload}:u);
      const users=mergeUsers(profiles,imported);
      return{...state,authProfiles:profiles,importedUsers:imported,users,currentUser:state.currentUser?.id===action.payload.id?{...state.currentUser,...action.payload}:state.currentUser};
    }
    case "ADD_CHILD":{
      const childId=action.childId||("child-"+Date.now());
      const child={id:childId,type:"driver",source:"child",parentId:action.parentId,isOfficial:false,approvedEvents:[],licenseValid:null,...action.payload};
      const imported=[...(state.importedUsers||[]),child];
      const profiles=(state.authProfiles||[]).map(u=>u.id===action.parentId?{...u,childIds:[...(u.childIds||[]),child.id]}:u);
      const users=mergeUsers(profiles,imported);
      const cu=state.currentUser?.id===action.parentId?users.find(x=>x.id===action.parentId):state.currentUser;
      return{...state,authProfiles:profiles,importedUsers:imported,users,currentUser:cu};
    }
    case "RELEASE_CHILD":{
      // barnet får en rigtig Auth-konto (id opdateres til auth-uid) og løsnes fra forælderen
      const oldId=action.childId;const newId=action.newId;
      const released=(state.importedUsers||[]).find(x=>x.id===oldId);
      if(!released)return state;
      const releasedUser={...released,id:newId,parentId:null,source:"auth",email:action.email};
      // fjern barnet fra importedUsers, læg over i authProfiles
      const imported=(state.importedUsers||[]).filter(x=>x.id!==oldId);
      const profiles=[...(state.authProfiles||[]).map(u=>u.id===action.parentId?{...u,childIds:(u.childIds||[]).filter(cid=>cid!==oldId)}:u),releasedUser];
      // opdater tilmeldinger der pegede på det gamle id
      const events=state.events.map(ev=>({...ev,registrations:(ev.registrations||[]).map(r=>r.userId===oldId?{...r,userId:newId}:r)}));
      const users=mergeUsers(profiles,imported);
      const cu=state.currentUser?.id===action.parentId?users.find(x=>x.id===action.parentId):state.currentUser;
      return{...state,authProfiles:profiles,importedUsers:imported,events,users,currentUser:cu};
    }
    case "REGISTER":return{...state,events:state.events.map(ev=>ev.id===action.eventId?{...ev,registrations:[...ev.registrations,{...action.payload}]}:ev)};
    case "ADD_EVENT":return{...state,events:[...state.events,{...action.payload,id:Date.now(),sessions:[],penalties:[],inspections:[],weightInspections:[],readySignals:[],registrations:[],classLimits:{}}]};
    case "UPDATE_EVENT":return{...state,events:state.events.map(ev=>ev.id===action.payload.id?{...ev,...action.payload}:ev)};
    case "ADD_SERIES":return{...state,raceSeries:[...state.raceSeries,{id:Date.now(),name:action.payload?.name||action.payload,logo:action.payload?.logo||null}]};
    case "UPDATE_SERIES":return{...state,raceSeries:state.raceSeries.map(s=>s.id===action.id?{...s,...action.payload}:s)};
    case "DELETE_SERIES":return{...state,raceSeries:state.raceSeries.filter(s=>s.id!==action.id)};
    case "DELETE_EVENT":return{...state,events:state.events.filter(ev=>ev.id!==action.id)};
    case "UPDATE_PENALTY":return{...state,events:state.events.map(ev=>ev.id===action.eventId?{...ev,penalties:ev.penalties.map((p,i)=>i===action.penaltyIdx?{...action.payload}:p)}:ev)};
    case "DELETE_PENALTY":return{...state,events:state.events.map(ev=>ev.id===action.eventId?{...ev,penalties:ev.penalties.filter((_,i)=>i!==action.penaltyIdx)}:ev)};
    case "ADD_PENALTY_TYPE":return{...state,penaltyTypes:[...(state.penaltyTypes||[]),{...action.payload,id:Date.now()}]};
    case "UPDATE_PENALTY_TYPE":return{...state,penaltyTypes:(state.penaltyTypes||[]).map(pt=>pt.id===action.id?{...pt,...action.payload}:pt)};
    case "DELETE_PENALTY_TYPE":return{...state,penaltyTypes:(state.penaltyTypes||[]).filter(pt=>pt.id!==action.id)};
    case "ADD_REASON_TEXT":return{...state,reasonTexts:[...(state.reasonTexts||[]),{...action.payload,id:Date.now()}]};
    case "UPDATE_REASON_TEXT":return{...state,reasonTexts:(state.reasonTexts||[]).map(rt=>rt.id===action.id?{...rt,...action.payload}:rt)};
    case "DELETE_REASON_TEXT":return{...state,reasonTexts:(state.reasonTexts||[]).filter(rt=>rt.id!==action.id)};
    case "SET_CHAMP_PDF":return{...state,champPdfs:{...(state.champPdfs||{}),[action.seriesId]:action.payload}};
    case "REMOVE_CHAMP_PDF":{const cp={...(state.champPdfs||{})};delete cp[action.seriesId];return{...state,champPdfs:cp};}
    case "SET_KART_RANGE":{
      const reg=state.kartRegister||{ranges:{},numbers:{}};
      return{...state,kartRegister:{...reg,ranges:{...reg.ranges,[action.className]:{start:action.start,end:action.end}}}};
    }
    case "SET_KART_DATES":{
      const reg=state.kartRegister||{ranges:{},numbers:{}};
      return{...state,kartRegister:{...reg,releaseDate:action.releaseDate??reg.releaseDate,renewOpenDate:action.renewOpenDate??reg.renewOpenDate}};
    }
    case "CLAIM_KART":{
      const reg=state.kartRegister||{ranges:{},numbers:{}};
      const cls={...(reg.numbers[action.className]||{})};
      cls[action.number]={ownerId:action.ownerId,ownerName:action.ownerName,ownerLicense:action.ownerLicense||"",renewed:false,claimed:new Date().toISOString()};
      return{...state,kartRegister:{...reg,numbers:{...reg.numbers,[action.className]:cls}}};
    }
    case "RELEASE_KART":{
      const reg=state.kartRegister||{ranges:{},numbers:{}};
      const cls={...(reg.numbers[action.className]||{})};
      delete cls[action.number];
      return{...state,kartRegister:{...reg,numbers:{...reg.numbers,[action.className]:cls}}};
    }
    case "RENEW_KART":{
      // Kører fornyer sit nuværende nummer i klassen (kun i vinduet)
      const reg=state.kartRegister||{ranges:{},numbers:{}};
      const cls={...(reg.numbers[action.className]||{})};
      if(cls[action.number]&&cls[action.number].ownerId===action.ownerId){
        cls[action.number]={...cls[action.number],renewed:true,renewedAt:new Date().toISOString()};
      }
      return{...state,kartRegister:{...reg,numbers:{...reg.numbers,[action.className]:cls}}};
    }
    case "RUN_ANNUAL_RELEASE":{
      // Frigiver alle numre der IKKE er fornyet. Fornyede numre nulstilles til "ikke fornyet" til næste år.
      const reg=state.kartRegister||{ranges:{},numbers:{}};
      const numbers={};
      Object.entries(reg.numbers||{}).forEach(([cls,nums])=>{
        const kept={};
        Object.entries(nums).forEach(([num,info])=>{
          if(info.renewed)kept[num]={...info,renewed:false,renewedAt:null};
        });
        numbers[cls]=kept;
      });
      return{...state,kartRegister:{...reg,numbers}};
    }
    case "IMPORT_KART_NUMBERS":{
      const reg=state.kartRegister||{ranges:{},numbers:{}};
      const numbers={...reg.numbers};
      (action.entries||[]).forEach(e=>{
        if(!e.className||!e.number)return;
        const cls={...(numbers[e.className]||{})};
        cls[e.number]={ownerId:e.ownerId||null,ownerName:e.ownerName||"",ownerLicense:e.ownerLicense||"",renewed:false,claimed:new Date().toISOString(),imported:true};
        numbers[e.className]=cls;
      });
      return{...state,kartRegister:{...reg,numbers}};
    }
    case "SET_CHAMP_STANDINGS":{
      const cur={...(state.champStandings||{})};
      const forSeries={...(cur[action.seriesId]||{})};
      (action.classes||[]).forEach(c=>{forSeries[c.name]=c.data;});
      cur[action.seriesId]={...forSeries,_updated:new Date().toLocaleString("da-DK")};
      return{...state,champStandings:cur};
    }
    case "REMOVE_CHAMP_STANDINGS":{const cs={...(state.champStandings||{})};delete cs[action.seriesId];return{...state,champStandings:cs};}
    case "REMOVE_CHAMP_STANDINGS_CLASS":{
      const cs={...(state.champStandings||{})};
      if(cs[action.seriesId]){const s={...cs[action.seriesId]};delete s[action.className];cs[action.seriesId]=s;}
      return{...state,champStandings:cs};
    }
    case "IMPORT_PARTICIPANTS":{
      const imported=[...(state.importedUsers||[])];
      const all=[...(state.authProfiles||[]),...imported];
      const regs=[];
      action.rows.forEach((r,idx)=>{
        let usr=all.find(x=>(r.license&&String(x.license)===String(r.license))||(r.email&&x.email&&x.email.toLowerCase()===r.email.toLowerCase()));
        if(!usr){
          usr={id:"imp-"+(Date.now()+idx),type:"driver",name:r.name,email:r.email||"",license:r.license||"",licenseValid:r.licenseOk?true:null,licenseImg:null,transponder:r.transponder||"",class:r.class,kartNumber:r.kartNo||undefined,dob:r.dob||"",phone:r.phone||"",parentId:null,club:r.club||"",guardianName:r.guardian||"",isOfficial:false,approvedEvents:[],importBatch:action.batchId,source:"csv-import"};
          imported.push(usr);all.push(usr);
        }
        regs.push({userId:usr.id,class:r.class,paddockSpace:"",slicks:[],slickReserve:"",wets:[],wetReserve:"",paid:!!r.paid,imported:true,importBatch:action.batchId});
      });
      return{...state,importedUsers:imported,users:mergeUsers(state.authProfiles,imported),events:state.events.map(ev=>ev.id===action.eventId?{...ev,registrations:[...ev.registrations.filter(x=>!regs.some(nr=>nr.userId===x.userId)),...regs]}:ev)};
    }
    case "REMOVE_IMPORT_BATCH":{
      const imported=(state.importedUsers||[]).filter(u=>u.importBatch!==action.batchId);
      return{...state,importedUsers:imported,users:mergeUsers(state.authProfiles,imported),
        events:state.events.map(ev=>({...ev,registrations:(ev.registrations||[]).filter(r=>r.importBatch!==action.batchId)}))};
    }
    case "ADD_NOTIFICATION":return{...state,notifications:[{...action.payload,id:Date.now()},...state.notifications]};
    case "ADD_DOCUMENT":return{...state,documents:[{...action.payload,id:Date.now()},...state.documents]};
    case "ADD_EVENT_DOCUMENT":return{...state,events:state.events.map(ev=>ev.id===action.eventId?{...ev,documents:[action.payload,...(ev.documents||[])]}:ev)};
    case "REMOVE_EVENT_DOCUMENT":return{...state,events:state.events.map(ev=>ev.id===action.eventId?{...ev,documents:(ev.documents||[]).filter(d=>d.id!==action.docId)}:ev)};
    case "ADD_PENALTY":return{...state,events:state.events.map(ev=>ev.id===action.eventId?{...ev,penalties:[...ev.penalties,{...action.payload,id:Date.now()}]}:ev)};
    case "ADD_INSPECTION":return{...state,events:state.events.map(ev=>ev.id===action.eventId?{...ev,inspections:[...(ev.inspections||[]),{...action.payload,id:Date.now()}]}:ev)};
    case "SET_READY_SIGNAL":return{...state,events:state.events.map(ev=>ev.id===action.eventId?{...ev,readySignals:[...(ev.readySignals||[]).filter(s=>!(s.class===action.cls&&s.session===action.session&&s.stype===action.stype)),{class:action.cls,session:action.session,stype:action.stype,time:new Date().toLocaleString("da-DK"),by:action.by}]}:ev)};
    case "UPDATE_OFFICIAL_EVENTS":{
      const profiles=(state.authProfiles||[]).map(u=>u.id===action.userId?{...u,approvedEvents:action.events}:u);
      const imported=(state.importedUsers||[]).map(u=>u.id===action.userId?{...u,approvedEvents:action.events}:u);
      return{...state,authProfiles:profiles,importedUsers:imported,users:mergeUsers(profiles,imported)};
    }
    case "SET_LICENSE_CHECK":return{...state,events:state.events.map(ev=>ev.id===action.eventId?{...ev,licenseChecks:{...(ev.licenseChecks||{}),[(action.userId+"_"+action.field)]:action.value}}:ev)};
    case "SET_FRIDAY_PAID":return{...state,events:state.events.map(ev=>ev.id===action.eventId?{...ev,fridayPaid:{...(ev.fridayPaid||{}),[(action.userId)]:action.value}}:ev)};
    case "ADD_OFFICIAL":return{...state,users:[...state.users,{...action.payload,id:Date.now(),isOfficial:true,approvedEvents:[]}]};
    case "ADD_CLASS":return{...state,classRules:{...state.classRules,[action.name]:{min:action.min,max:action.max,color:action.color||C.red,seriesIds:action.seriesIds||[]}}};
    case "UPDATE_CLASS":{const{[action.oldName]:_,...rest}=state.classRules;return{...state,classRules:{...rest,[action.name]:{min:action.min,max:action.max,color:action.color||C.red,seriesIds:action.seriesIds||[]}}};}
    case "DELETE_CLASS":{const{[action.name]:_,...rest}=state.classRules;return{...state,classRules:rest};}
    default:return state;
  }
}

function exportCSV(rows,headers,filename){
  const csv=[headers,...rows.map(r=>headers.map(h=>r[h]||""))].map(r=>r.map(c=>`"${String(c||"").replace(/"/g,'""')}"`).join(",")).join("\n");
  const b=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"});
  const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=filename+".csv";a.click();URL.revokeObjectURL(u);
}

        </div>

              <div style={{display:"flex",gap:8}}>

      </div>}

    setErr("");
    if(!f.name.trim()){setErr("Skriv barnets navn");return;}
    const payload={name:f.name.trim(),dob:f.dob,license:f.license,transponder:f.transponder,class:f.class,kartNumber:parseInt(f.kartNumber)||undefined,club:f.club,phone:f.phone,email:f.email.trim()};
    if(mode==="add"){
      const childId="child-"+Date.now();
      dispatch({type:"ADD_CHILD",parentId:u.id,childId,payload:payload,_newChildIds:[...(u.childIds||[]),childId]});
    }
    else{dispatch({type:"UPDATE_USER",payload:{id:mode,...payload}});}
    setMode(null);
  };

  const doRelease=async(child)=>{
    setErr("");
    if(!rel.email.trim()){setErr("Barnet skal have en e-mail for at kunne frigives");return;}
    if(rel.email.trim().toLowerCase()===(u.email||"").toLowerCase()){setErr("E-mailen må ikke være forælderens egen e-mail");return;}
    if(rel.pw.length<6){setErr("Midlertidig adgangskode skal være mindst 6 tegn");return;}
    if(rel.pw!==rel.pw2){setErr("Adgangskoderne er ikke ens");return;}
    if(!sb){setErr("Supabase er ikke konfigureret");return;}
    setBusy(true);
    try{
      // Opret Auth-bruger til barnet. NB: dette logger barnet ind i den aktuelle session,
      // så vi gemmer forælderens session og genopretter den bagefter.
      const {data:parentSession}=await sb.auth.getSession();
      const {data,error}=await sb.auth.signUp({email:rel.email.trim(),password:rel.pw});
      if(error){setErr(error.message);setBusy(false);return;}
      const newId=data.user?.id;
      if(!newId){setErr("Kunne ikke oprette login – prøv igen");setBusy(false);return;}
      // Opret barnets profil-række
      const row=userToRow({...child,id:newId,parentId:null,email:rel.email.trim(),isAdmin:false});
      const {error:pErr}=await sb.from("profiles").upsert(row);
      if(pErr){setErr("Login oprettet, men profil fejlede: "+pErr.message);setBusy(false);return;}
      // Fjern barnet fra forælderens childIds i forælderens profil-række
      await sb.from("profiles").update({child_ids:(u.childIds||[]).filter(cid=>cid!==child.id)}).eq("id",u.id);
      // Genopret forælderens session (signUp skiftede den til barnet)
      if(parentSession?.session){
        await sb.auth.setSession({access_token:parentSession.session.access_token,refresh_token:parentSession.session.refresh_token});
      }
      dispatch({type:"RELEASE_CHILD",parentId:u.id,childId:child.id,newId,email:rel.email.trim()});
      setMsg(`${child.name} er frigivet. Barnet kan nu logge ind med sin e-mail og den midlertidige kode – og bør skifte kode via "Glemt adgangskode".`);
      setReleaseId(null);setRel({email:"",pw:"",pw2:""});
    }catch(e){setErr(String(e.message||e));}
    setBusy(false);
  };

  return <Card style={{borderLeft:`3px solid ${C.blue}`}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
      <div style={{color:C.textMuted,fontSize:10,letterSpacing:2}}>MINE KØRERE</div>
      {!mode&&<Btn small onClick={startAdd}>+ Tilføj kører</Btn>}
    </div>
    {msg&&<div style={{background:`${C.green}22`,border:`1px solid ${C.green}44`,borderRadius:8,padding:10,marginBottom:10,color:C.green,fontSize:12,fontWeight:600}}>✅ {msg}</div>}

    {mode&&<div style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:12,marginBottom:10}}>
      <div style={{fontWeight:700,color:C.text,fontSize:13,marginBottom:8}}>{mode==="add"?"Ny kører":"Rediger kører"}</div>
      <Input label="Navn *" value={f.name} onChange={v=>set("name",v)} placeholder="Barnets navn"/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <Input label="Fødselsdato" value={f.dob} onChange={v=>set("dob",v)} placeholder="2014-05-12"/>
        <Sel label="Klasse" value={f.class} onChange={v=>set("class",v)} options={[{value:"",label:"Vælg..."},...CLASSES.map(c=>({value:c,label:c}))]}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <Input label="Licensnummer" value={f.license} onChange={v=>set("license",v)} placeholder="DK-2026-XXXX"/>
        <Input label="Kart #" value={String(f.kartNumber||"")} onChange={v=>set("kartNumber",v)} placeholder="98" type="number"/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <Input label="Transponder" value={f.transponder} onChange={v=>set("transponder",v)} placeholder="T-XXXX"/>
        <Input label="Klub" value={f.club} onChange={v=>set("club",v)} placeholder="Klubnavn"/>
      </div>
      <Input label="Telefon" value={f.phone} onChange={v=>set("phone",v)} placeholder="Mobilnummer"/>
      <Input label="E-mail (valgfri)" value={f.email} onChange={v=>set("email",v)} placeholder="barnets@email.dk – kræves for frigivelse" type="email"/>
      {err&&<div style={{color:C.red,fontSize:12,marginBottom:8}}>{err}</div>}
      <div style={{display:"flex",gap:8}}>
        <Btn small onClick={save}>Gem</Btn>
        <Btn small variant="ghost" onClick={()=>setMode(null)}>Annuller</Btn>
      </div>

    {children.length===0&&!mode&&<div style={{color:C.textDim,fontSize:12}}>Ingen kørere tilføjet endnu.</div>}
    {children.map(c=>{
      const canRelease=c.email&&c.email.toLowerCase()!==(u.email||"").toLowerCase();
      const isReleasing=releaseId===c.id;
      return <div key={c.id} style={{padding:"10px 0",borderBottom:`1px solid ${C.border}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <div style={{fontWeight:700,color:C.text,fontSize:13}}>{c.name}</div>
            <div style={{color:C.textMuted,fontSize:11}}>{[c.class,c.kartNumber?"#"+c.kartNumber:"",c.license].filter(Boolean).join(" · ")||"Ingen data"}</div>

    setChecking(true);setLicMsg("Analyserer...");
    const reader=new FileReader();

      const b64=e.target.result.split(",")[1];
      try{
        const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:200,messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:file.type,data:b64}},{type:"text",text:'Er dette et gyldigt DASU karting kørerlicens 2026? Svar KUN JSON: {"valid":true/false,"year":"årstal","reason":"kort forklaring"}'}]}]})});
        const data=await res.json();const txt=data.content?.[0]?.text||"{}";

function CalendarScreen({state,dispatch}){
  const t=useT();
  const u=state.currentUser;
  const [sel,setSel]=useState(null);
  const [step,setStep]=useState(0);
  const [showOverview,setShowOverview]=useState(false);
  const [regFor,setRegFor]=useState("self");
  const [selClass,setSelClass]=useState("");
  const [paddock,setPaddock]=useState("");const [paddockNote,setPaddockNote]=useState("");
  const [slicks,setSlicks]=useState([]);const [slickRes,setSlickRes]=useState("");
  const [wets,setWets]=useState([]);const [wetRes,setWetRes]=useState("");
  const [tyreMode,setTyreMode]=useState(false);

  const children=state.users.filter(x=>(u?.childIds||[]).includes(x.id));
  const regUser=regFor==="self"?u:state.users.find(x=>x.id===regFor)||u;
  const isReg=ev=>ev.registrations.some(r=>r.userId===regUser?.id);
  const myEligible=[...eligibleClasses(regUser?.dob,state.classRules),...(regUser?.dispensations||[])].filter((v,i,a)=>a.indexOf(v)===i);

  const scanTyre=(list,setList,max=4)=>()=>{if(list.length<max)setList(l=>[...l,`EAN-${String(Math.floor(Math.random()*9000)+1000)}`]);};

  const kartCheck=(cls)=>{
    // Returnerer {ok, msg}. Nummeret på profilen skal stemme med registeret for klassen.
    const reg=state.kartRegister||{ranges:{},numbers:{}};
    const regNum=myKartInClass(reg,cls,regUser?.id);
    const profNum=regUser?.kartNumber;
    if(!kartRange(reg,cls))return{ok:true,msg:""}; // register ikke i brug for klassen → ingen blokering
    if(!regNum)return{ok:false,msg:`${regUser?.name} har ikke valgt et kartnummer i ${cls}. Vælg nummer under "Kartnummer" før tilmelding.`};
    if(profNum&&parseInt(profNum)!==regNum)return{ok:false,msg:`Kartnummeret på profilen (#${profNum}) stemmer ikke med registeret (#${regNum}) i ${cls}. Ret det før tilmelding.`};
    return{ok:true,msg:""};
  };

  const finishReg=()=>{
    const cls=selClass||(sel?.classes.filter(c=>myEligible.includes(c))[0])||"";
    if(classFull(sel,cls))return;
    if(!kartCheck(cls).ok)return;
    dispatch({type:"REGISTER",eventId:sel.id,payload:{userId:regUser.id,class:cls,paddockSpace:paddock,slicks,slickReserve:slickRes,wets,wetReserve:wetRes,paid:true}});
    setStep(0);setSel(null);setPaddock("");setSlicks([]);setSlickRes("");setWets([]);setWetRes("");setRegFor("self");setTyreMode(false);
  };

  if(sel&&step>0){

    const evClasses=sel.classes.filter(c=>myEligible.includes(c));

      {step===1&&<div>
        {children.length>0&&<Card style={{marginBottom:10}}>
          <div style={{color:C.textMuted,fontSize:10,letterSpacing:2,marginBottom:8}}>TILMELD HVEM?</div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            <button onClick={()=>setRegFor("self")} style={{background:regFor==="self"?`${C.red}22`:C.surface2,border:`1px solid ${regFor==="self"?C.red:C.border}`,borderRadius:6,padding:"8px 12px",color:regFor==="self"?C.red:C.textMuted,cursor:"pointer",fontFamily:"inherit",textAlign:"left",fontSize:13,fontWeight:700}}>{t.registerSelf} – {u.name}</button>
            {children.map(c=><button key={c.id} onClick={()=>setRegFor(c.id)} style={{background:regFor===c.id?`${C.blue}22`:C.surface2,border:`1px solid ${regFor===c.id?C.blue:C.border}`,borderRadius:6,padding:"8px 12px",color:regFor===c.id?C.blue:C.textMuted,cursor:"pointer",fontFamily:"inherit",textAlign:"left",fontSize:13,fontWeight:700}}>{t.registerChild}: {c.name} – {c.class}</button>)}
          </div>
        </Card>}
        <Card>
          <div style={{color:C.textMuted,fontSize:10,letterSpacing:2,marginBottom:8}}>OPLYSNINGER</div>
          {[["Navn",regUser?.name],["Licens",regUser?.license],["Transponder",regUser?.transponder],["Kart #",regUser?.kartNumber]].map(([k,v])=><div key={k} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:`1px solid ${C.border}`}}><span style={{color:C.textMuted,fontSize:12}}>{k}</span><span style={{color:C.text,fontWeight:600,fontSize:12}}>{v}</span></div>)}
          <div style={{marginTop:8,padding:8,background:regUser?.licenseValid?`${C.green}11`:`${C.orange}11`,borderRadius:6,display:"flex",gap:8,alignItems:"center"}}>
            <span>{regUser?.licenseValid?"✅":"⚠️"}</span>
            <span style={{color:regUser?.licenseValid?C.green:C.orange,fontSize:12,fontWeight:700}}>{regUser?.licenseValid?"Licens godkendt":"Licens ikke verificeret"}</span>
          </div>
        </Card>
        {evClasses.length>0&&<Sel label="Klasse (aldersgodkendt)" value={selClass||evClasses[0]} onChange={setSelClass} options={evClasses.map(c=>{const m=classLimitFor(sel,c);const n=classCount(sel,c);return{value:c,label:c+(m?` (${n}/${m}${n>=m?" – FULD":""})`:"")};})}/>}
        {classFull(sel,selClass||evClasses[0])&&<div style={{background:`${C.red}11`,border:`1px solid ${C.red}44`,borderRadius:6,padding:10,marginBottom:10,color:C.red,fontSize:12,fontWeight:700}}>⚠️ Klassen er fuld – vælg en anden klasse hvis muligt</div>}
        <div style={{marginBottom:10}}>
          <div style={{color:C.textMuted,fontSize:10,letterSpacing:1,marginBottom:6,textTransform:"uppercase"}}>Ryttergård mål</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:6}}>
            <Input label="Front / Længde (m)" value={paddock} onChange={setPaddock} placeholder="f.eks. 6"/>
            <Input label="Side / Dybde (m)" value={paddockNote} onChange={setPaddockNote} placeholder="f.eks. 4"/>
          </div>
          <input value={paddockNote.length>1?"":""} style={{display:"none"}}/>
        </div>
        <Btn onClick={()=>setStep(2)} style={{width:"100%"}}>FORTSÆT →</Btn>
      </div>}
      {step===2&&<div>
        <div style={{marginBottom:10,display:"flex",gap:8,alignItems:"center"}}>
          <div style={{color:C.textMuted,fontSize:12}}>Dæk-registrering er valgfrit</div>
          <button onClick={()=>setTyreMode(!tyreMode)} style={{background:tyreMode?`${C.green}22`:C.surface2,border:`1px solid ${tyreMode?C.green:C.border}`,borderRadius:20,padding:"4px 12px",color:tyreMode?C.green:C.textMuted,cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>{tyreMode?"✓ Tilvalgt":"+ Tilføj dæk"}</button>
        </div>
        {tyreMode&&<div>
          <Card>
            <div style={{color:C.textMuted,fontSize:10,letterSpacing:2,marginBottom:8}}>SLICKS ({slicks.length}/4)</div>
            {slicks.map((s,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:`1px solid ${C.border}`}}><span style={{color:C.textMuted,fontSize:11}}>Slick {i+1}</span><span style={{color:C.text,fontFamily:"monospace",fontSize:12}}>{s}</span></div>)}
            {slicks.length<4&&<div onClick={scanTyre(slicks,setSlicks,4)} style={{textAlign:"center",padding:"10px",background:C.bg,borderRadius:6,border:`2px dashed ${C.border}`,cursor:"pointer",marginTop:6}}><div style={{fontSize:18}}>📷</div><div style={{color:C.text,fontSize:12,fontWeight:700}}>Scan slick</div></div>}
            <Input label="Reserve slick (valgfrit)" value={slickRes} onChange={setSlickRes} placeholder="EAN-XXXX" style={{marginTop:8}}/>
          </Card>
          <Card>
            <div style={{color:C.textMuted,fontSize:10,letterSpacing:2,marginBottom:8}}>WET ({wets.length}/4)</div>
            {wets.map((w,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:`1px solid ${C.border}`}}><span style={{color:C.textMuted,fontSize:11}}>Wet {i+1}</span><span style={{color:C.text,fontFamily:"monospace",fontSize:12}}>{w}</span></div>)}
            {wets.length<4&&<div onClick={scanTyre(wets,setWets,4)} style={{textAlign:"center",padding:"10px",background:C.bg,borderRadius:6,border:`2px dashed ${C.border}`,cursor:"pointer",marginTop:6}}><div style={{fontSize:18}}>📷</div><div style={{color:C.text,fontSize:12,fontWeight:700}}>Scan wet</div></div>}
            <Input label="Reserve wet (valgfrit)" value={wetRes} onChange={setWetRes} placeholder="EAN-XXXX" style={{marginTop:8}}/>
          </Card>
        </div>}
        <Btn onClick={()=>setStep(3)} style={{width:"100%"}}>FORTSÆT →</Btn>
      </div>}
      {step===3&&<div>
        <Card>
          <div style={{color:C.textMuted,fontSize:10,letterSpacing:2,marginBottom:10}}>ORDREOVERSIGT</div>
          {[["Gebyr",`${sel.fee} kr.`],["Klasse",selClass||sel.classes.filter(c=>myEligible.includes(c))[0]||""],["Ryttergård",(paddock&&paddockNote)?`${paddock}m × ${paddockNote}m`:paddock||"—"],["Slicks",slicks.length+" stk"],["Wets",wets.length+" stk"]].map(([k,v])=><div key={k} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:`1px solid ${C.border}`}}><span style={{color:C.textMuted,fontSize:12}}>{k}</span><span style={{color:C.text,fontWeight:600,fontSize:12}}>{v}</span></div>)}
          <div style={{display:"flex",justifyContent:"space-between",marginTop:8}}><span style={{fontWeight:700,color:C.text}}>TOTAL</span><span style={{fontWeight:900,color:C.red,fontSize:18}}>{sel.fee} kr.</span></div>
          <div style={{marginTop:8,padding:8,background:C.surface2,borderRadius:6,fontSize:11,color:C.textMuted}}>Betaling: <strong style={{color:C.text}}>{pm.type==="mobilepay"?`MobilePay #${pm.number}`:"Betalingskort (Stripe)"}</strong></div>
        </Card>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
          <div style={{background:C.surface2,border:`1px solid ${C.border}`,borderRadius:8,padding:12,textAlign:"center",cursor:"pointer"}}><div style={{fontSize:22}}>📱</div><div style={{fontWeight:700,fontSize:12,color:C.text}}>MobilePay</div></div>
          <div style={{background:C.surface2,border:`1px solid ${C.border}`,borderRadius:8,padding:12,textAlign:"center",cursor:"pointer"}}><div style={{fontSize:22}}>💳</div><div style={{fontWeight:700,fontSize:12,color:C.text}}>Kort</div></div>
        </div>
        {(()=>{
          const cls=selClass||sel.classes.filter(c=>myEligible.includes(c))[0]||"";
          if(classFull(sel,cls))return <div style={{background:`${C.red}11`,border:`1px solid ${C.red}44`,borderRadius:8,padding:12,textAlign:"center",color:C.red,fontWeight:700,fontSize:13}}>⚠️ Klassen er fuld – tilmelding ikke mulig</div>;
          const kc=kartCheck(cls);
          if(!kc.ok)return <div style={{background:`${C.red}11`,border:`1px solid ${C.red}44`,borderRadius:8,padding:12,textAlign:"center",color:C.red,fontWeight:700,fontSize:12}}>⚠️ {kc.msg}</div>;
          return <Btn onClick={finishReg} style={{width:"100%",background:"#006633"}}>✓ BEKRÆFT & BETAL</Btn>;
        })()}
      </div>}
    </div>;
  }

  if(sel&&showOverview){
    return <div style={{padding:16,overflowY:"auto",height:"100%"}}>
      <Btn small variant="ghost" onClick={()=>setShowOverview(false)} style={{marginBottom:12}}>{t.back}</Btn>
      <EventOverview ev={sel} state={state}/>
    </div>;
  }

  if(sel){
    const evClasses=sel.classes.filter(c=>eligibleClasses(u?.dob,state.classRules).includes(c));
    return <div style={{padding:16,overflowY:"auto",height:"100%"}}>
      <Btn small variant="ghost" onClick={()=>setSel(null)} style={{marginBottom:12}}>{t.back}</Btn>
      <div style={{background:`linear-gradient(135deg,${C.redDark},#1a0003)`,borderRadius:10,padding:18,marginBottom:14}}>
        <div style={{color:"rgba(255,255,255,0.5)",fontSize:11}}>{sel.date}{sel.endDate&&sel.endDate!==sel.date?" – "+sel.endDate:""}</div>
        <div style={{fontSize:20,fontWeight:900,color:"#fff",fontFamily:"'Barlow Condensed',sans-serif"}}>{sel.name}</div>
        <div style={{color:"rgba(255,255,255,0.6)",fontSize:12}}>📍 {sel.location}</div>
        {!sel.registrationOpen&&<Badge color={C.orange} style={{marginTop:8}}>TILMELDING ÅBNER SENERE</Badge>}
      </div>
      {sel.eventPdf&&<Card style={{cursor:"pointer",display:"flex",gap:12,alignItems:"center"}}><div style={{fontSize:22}}>📋</div><div><div style={{fontWeight:700,color:C.text,fontSize:13}}>Tillægsregler – {sel.name}</div><div style={{color:C.textMuted,fontSize:11}}>Tryk for at åbne PDF</div></div><div style={{color:C.red,marginLeft:"auto",fontSize:18}}>↓</div></Card>}
      <Card>{[["Tilmeldingsfrist",sel.deadline],["Gebyr",`${sel.fee} kr.`],["Tilmeldte",`${sel.registrations.length}`]].map(([k,v])=><div key={k} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:`1px solid ${C.border}`}}><span style={{color:C.textMuted,fontSize:12}}>{k}</span><span style={{color:C.text,fontWeight:600,fontSize:12}}>{v}</span></div>)}</Card>
      <div style={{marginBottom:12}}><div style={{color:C.textMuted,fontSize:10,letterSpacing:2,marginBottom:6}}>KLASSER (aldersgodkendt)</div><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{evClasses.map(c=>{const m=classLimitFor(sel,c);const n=classCount(sel,c);const full=m&&n>=m;return <Badge key={c} color={full?C.textDim:state.classRules[c]?.color||C.red}>{c}{m?` ${n}/${m}`:""}{full?" · FULD":""}</Badge>;})}</div></div>
      {isReg(sel)?<div style={{background:"#00331a",border:"1px solid #00CC6644",borderRadius:8,padding:14,textAlign:"center",color:C.green,fontWeight:700}}>✓ Du er tilmeldt</div>:sel.registrationOpen?<Btn onClick={()=>setStep(1)} style={{width:"100%"}}>TILMELD →</Btn>:<div style={{background:`${C.orange}11`,border:`1px solid ${C.orange}44`,borderRadius:8,padding:12,textAlign:"center",color:C.orange,fontSize:13}}>Tilmelding åbner senere</div>}
      <div style={{height:12}}/>
      <Btn variant="secondary" onClick={()=>setShowOverview(true)} style={{width:"100%"}}>📋 Løbsoversigt (dokumenter, straffe, notifikationer)</Btn>
    </div>;
  }

  return <div style={{padding:16,overflowY:"auto",height:"100%"}}>
    <SH title="Løbskalender" sub="Rotax Danmark 2026"/>
    {state.events.map(ev=>{const evSer=state.raceSeries.find(s=>s.id===ev.seriesId);return <Card key={ev.id} onClick={()=>setSel(ev)} style={{borderLeft:`3px solid ${ev.registrations.some(r=>r.userId===u?.id)?C.green:ev.registrationOpen?C.red:C.textDim}`}}>
      <div style={{display:"flex",justifyContent:"space-between"}}>
        <div>
          {evSer&&evSer.logo&&<img src={evSer.logo} style={{height:16,maxWidth:55,objectFit:"contain",marginBottom:3,display:"block",opacity:0.85}} alt=""/>}
          <div style={{fontWeight:700,color:C.text,fontSize:14}}>{ev.name}</div>
          <div style={{color:C.textMuted,fontSize:11}}>📍 {ev.location} · 📅 {ev.date}</div>
          <div style={{color:C.textDim,fontSize:10}}>Serie: {state.raceSeries.find(s=>s.id===ev.seriesId)?.name||"—"}</div>
        </div>
        <div style={{textAlign:"right"}}>
          {ev.registrations.some(r=>r.userId===u?.id)?<Badge color={C.green} style={{fontSize:10}}>TILMELDT</Badge>:ev.registrationOpen?<Badge color={C.red} style={{fontSize:10}}>ÅBEN</Badge>:<Badge color={C.textDim} style={{fontSize:10}}>KOMMENDE</Badge>}
          <div style={{color:C.textDim,fontSize:10,marginTop:4}}>{ev.registrations.length} tilm.</div>
        </div>
      </div>
    </Card>;})}
  </div>;
}

// ── STANDINGS ────────────────────────────────────────────────────
function StandingsScreen({state}){
  const series=state.raceSeries||[];
  const [serId,setSerId]=useState(series[0]?.id);
  const standings=(state.champStandings||{})[serId];
  const classNames=(standings?Object.keys(standings).filter(k=>k!=="_updated"):[]).slice().sort((a,b)=>{
    const ma=state.classRules[a]?.min??999,mb=state.classRules[b]?.min??999;
    return ma!==mb?ma-mb:a.localeCompare(b,"da");
  });
  const pdf=(state.champPdfs||{})[serId];
  const [ac,setAc]=useState(classNames[0]);
  const activeClass=classNames.includes(ac)?ac:classNames[0];
  const cls=activeClass?standings[activeClass]:null;
  const rounds=cls?.rounds||[];
  const rows=cls?.rows||[];
  const hasDrop=cls?.hasDrop;
  const SEGS=[["kval","Kval"],["heats","Heats"],["pre","Pre"],["finale","Fin"]];

  return <div style={{padding:16,overflowY:"auto",height:"100%"}}>
    <SH title="Mesterskab"/>
    {series.length===0
      ?<div style={{color:C.textMuted,textAlign:"center",padding:30,fontSize:13}}>Ingen løbsserier oprettet endnu</div>
      :<Sel label="Løbsserie" value={String(serId)} onChange={v=>{const n=Number(v);setSerId(n);const st=(state.champStandings||{})[n];setAc(st?Object.keys(st).filter(k=>k!=="_updated")[0]:undefined);}} options={series.map(s=>({value:String(s.id),label:s.name}))}/>}

    {classNames.length>0?<div>
      {standings._updated&&<div style={{color:C.textDim,fontSize:10,marginBottom:8}}>Opdateret: {standings._updated}</div>}
      <div style={{display:"flex",gap:6,overflowX:"auto",marginBottom:12,paddingBottom:4}}>
        {classNames.map(c=><button key={c} onClick={()=>setAc(c)} style={{background:activeClass===c?state.classRules[c]?.color||C.red:C.surface2,color:activeClass===c?"#fff":C.textMuted,border:`1px solid ${activeClass===c?state.classRules[c]?.color||C.red:C.border}`,borderRadius:20,padding:"5px 14px",fontSize:12,cursor:"pointer",whiteSpace:"nowrap",fontFamily:"inherit",fontWeight:activeClass===c?700:400}}>{c}</button>)}
      </div>
      <Card style={{padding:0,overflow:"hidden"}}>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <thead>
              <tr style={{background:C.surface2}}>
                <th rowSpan={2} style={{padding:"6px 8px",color:C.textMuted,fontWeight:700,textAlign:"left",fontSize:10,position:"sticky",left:0,background:C.surface2}}>#</th>
                <th rowSpan={2} style={{padding:"6px 6px",color:C.textMuted,fontWeight:600,textAlign:"left",fontSize:10}}>Nr</th>
                <th rowSpan={2} style={{padding:"6px 8px",color:C.textMuted,fontWeight:600,textAlign:"left",fontSize:10,whiteSpace:"nowrap"}}>Navn</th>
                {rounds.map(rn=><th key={rn} colSpan={4} style={{padding:"5px 6px",color:C.textMuted,fontWeight:700,textAlign:"center",fontSize:9,letterSpacing:1,borderLeft:`1px solid ${C.border}`}}>AFD. {rn}</th>)}
                <th rowSpan={2} style={{padding:"6px 8px",color:C.textMuted,fontWeight:700,textAlign:"right",fontSize:10,borderLeft:`1px solid ${C.border}`}}>Total</th>
                {hasDrop&&<th rowSpan={2} style={{padding:"6px 8px",color:C.red,fontWeight:700,textAlign:"right",fontSize:10}}>M. fratræk</th>}
              </tr>
              <tr style={{background:C.surface2}}>
                {rounds.map(rn=>SEGS.map(([k,lbl])=><th key={rn+k} style={{padding:"3px 5px",color:C.textDim,fontWeight:500,textAlign:"center",fontSize:8,borderLeft:k==="kval"?`1px solid ${C.border}`:"none"}}>{lbl}</th>))}
              </tr>
            </thead>
            <tbody>{rows.map((r,i)=><tr key={i} style={{borderBottom:`1px solid ${C.border}`,background:r.pos===1?"rgba(255,215,0,0.05)":"transparent"}}>
              <td style={{padding:"8px",fontWeight:900,color:r.pos===1?C.gold:r.pos===2?"#C0C0C0":r.pos===3?"#CD7F32":C.textMuted,fontSize:14,position:"sticky",left:0,background:r.pos===1?"#1a1608":C.surface}}>{r.pos}</td>
              <td style={{padding:"8px 6px",color:C.textMuted,fontFamily:"monospace",fontSize:11}}>{r.nr}</td>
              <td style={{padding:"8px",fontWeight:700,color:C.text,whiteSpace:"nowrap"}}>{r.name}</td>
              {rounds.map(rn=>SEGS.map(([k])=>{
                const v=r.segs[rn]?.[k];
                return <td key={rn+k} style={{padding:"8px 5px",color:v?C.textMuted:C.textDim,textAlign:"center",fontSize:11,borderLeft:k==="kval"?`1px solid ${C.border}`:"none"}}>{v||"–"}</td>;
              }))}
              <td style={{padding:"8px",fontWeight:700,color:C.text,textAlign:"right",borderLeft:`1px solid ${C.border}`}}>{r.total}</td>
              {hasDrop&&<td style={{padding:"8px",fontWeight:900,color:C.red,textAlign:"right",fontSize:13}}>{r.drop}</td>}
            </tr>)}</tbody>
          </table>
        </div>
      </Card>
      <div style={{color:C.textDim,fontSize:10,marginTop:8,textAlign:"center"}}>Træk til siden for at se alle afdelinger →</div>
    </div>:pdf?<div>
      <Card style={{borderLeft:`3px solid ${C.red}`,padding:"12px 14px"}}>
        <div style={{display:"flex",gap:10,alignItems:"center"}}>
          <div style={{fontSize:22}}>🏆</div>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,color:C.text,fontSize:13}}>{pdf.name||"Mesterskabsstilling"}</div>
            <div style={{color:C.textMuted,fontSize:11}}>Opdateret: {pdf.updated}</div>
          </div>
          <a href={pdf.dataUrl} target="_blank" rel="noreferrer" style={{background:C.red,color:"#fff",fontSize:12,fontWeight:700,textDecoration:"none",borderRadius:6,padding:"7px 14px"}}>Åbn PDF ↗</a>
        </div>
      </Card>
    </div>:<div style={{color:C.textMuted,textAlign:"center",padding:30,fontSize:13}}>Ingen mesterskabsstilling for denne serie endnu.<br/><span style={{fontSize:11,color:C.textDim}}>Importér CSV under Admin → Mskb.</span></div>}
  </div>;
}

// ── DOCUMENTS ────────────────────────────────────────────────────
function DocumentsScreen({state}){
  const [cf,setCf]=useState("Alle");const [tf,setTf]=useState("Alle");
  // Saml dokumenter fra alle løb + evt. gamle globale dokumenter
  const allDocs=[
    ...state.events.flatMap(ev=>(ev.documents||[]).map(d=>({...d,eventName:ev.name,eventDate:ev.date}))),
    ...(state.documents||[]),
  ];
  const classes=["Alle",...new Set(allDocs.map(d=>d.class).filter(Boolean))];
  const types=["Alle","Startgrid","Resultat","Opslagstavle"];
  const SL={kval:"Kval",heat:"Heat",prefinale:"Prefinale",finale:"Finale"};
  const filtered=allDocs.filter(d=>(cf==="Alle"||d.class===cf)&&(tf==="Alle"||d.type===tf));
  return <div style={{padding:16,overflowY:"auto",height:"100%"}}>
    <SH title="Dokumenter"/>
    <div style={{display:"flex",gap:6,overflowX:"auto",marginBottom:6,paddingBottom:2}}>{classes.map(c=><button key={c} onClick={()=>setCf(c)} style={{background:cf===c?C.red:C.surface2,color:cf===c?"#fff":C.textMuted,border:`1px solid ${cf===c?C.red:C.border}`,borderRadius:20,padding:"4px 10px",fontSize:10,cursor:"pointer",whiteSpace:"nowrap",fontFamily:"inherit"}}>{c}</button>)}</div>
    <div style={{display:"flex",gap:6,overflowX:"auto",marginBottom:12,paddingBottom:2}}>{types.map(t=><button key={t} onClick={()=>setTf(t)} style={{background:tf===t?C.blue:C.surface2,color:tf===t?"#fff":C.textMuted,border:`1px solid ${tf===t?C.blue:C.border}`,borderRadius:20,padding:"4px 10px",fontSize:10,cursor:"pointer",whiteSpace:"nowrap",fontFamily:"inherit"}}>{t}</button>)}</div>
    {filtered.length===0&&<div style={{color:C.textDim,fontSize:12,textAlign:"center",padding:20}}>Ingen dokumenter</div>}
    {filtered.map((d,i)=>{
      const inner=<div style={{display:"flex",gap:10,alignItems:"center"}}>
        <div style={{fontSize:22}}>{d.type==="Startgrid"?"🏁":d.type==="Resultat"?"🏆":"📋"}</div>
        <div style={{flex:1}}>

function OfficialNoseScreen({state,dispatch}){
  const t=useT();

  const evList=myEvents.length>0?myEvents:state.events;

  const ev=state.events.find(e=>e.id===selEv)||state.events[0];
  const classes=ev?.classes||[];
  const regDrivers=(ev?.registrations||[]).filter(r=>!selClass||r.class===selClass).map(r=>state.users.find(x=>x.id===r.userId)).filter(Boolean);
  const [flags,setFlags]=useState({}); // {uid:{nose:true, photo:dataUrl|null, file:File|null}}
  const [done,setDone]=useState(false);
  const [busy,setBusy]=useState(false);
  const [msg,setMsg]=useState("");
  const camRefs=useRef({});

  // Markér snude → åbn kamera. Afmarkér → fjern billede.
  const toggle=(uid)=>{
    setFlags(f=>{
      const cur=f[uid]||{};
      if(cur.nose)return {...f,[uid]:{nose:false,photo:null,file:null}};
      // slå til og åbn kamera
      setTimeout(()=>camRefs.current[uid]?.click(),50);
      return {...f,[uid]:{nose:true,photo:null,file:null}};
    });
  };
  const onPhoto=(uid,file)=>{
    if(!file)return;
    const reader=new FileReader();
    reader.onload=()=>setFlags(f=>({...f,[uid]:{...f[uid],nose:true,photo:reader.result,file}}));
    reader.readAsDataURL(file);
  };

  const submitAll=async()=>{
    setMsg("");
    const flagged=Object.entries(flags).filter(([,fl])=>fl.nose);
    // kræv billede på alle markerede
    const missing=flagged.filter(([,fl])=>!fl.file);
    if(missing.length){setMsg("Tag et billede af snuden på alle markerede kørere før du sender.");return;}

        const usr=state.users.find(x=>x.id===parseInt(uid))||state.users.find(x=>String(x.id)===uid);

          const {error:upErr}=await sb.storage.from("documents").upload(photoPath,fl.file,{cacheControl:"3600",upsert:false});
          if(upErr){setMsg("Upload af billede fejlede: "+upErr.message);setBusy(false);return;}
          const {data:pub}=sb.storage.from("documents").getPublicUrl(photoPath);
          photoUrl=pub.publicUrl;

        const noseType=selSession.toLowerCase().includes("kval")||selSession.toLowerCase().includes("qual")?"Hurtigste tid fjernes":"Tidsstraf";

      }
      dispatch({type:"SET_READY_SIGNAL",eventId:selEv,cls:selClass,session:selSession,stype:"nose",by:u?.name});

    </div>
    {msg&&<div style={{background:`${C.red}11`,border:`1px solid ${C.red}44`,borderRadius:6,padding:8,marginBottom:10,color:C.red,fontSize:12,fontWeight:600}}>{msg}</div>}
    <Sel label="Løb" value={String(selEv)} onChange={v=>{setSelEv(Number(v));setSelClass("");}} options={evList.map(e=>({value:String(e.id),label:e.name}))}/>

  const [done,setDone]=useState(false);

  const penaltyTypes=state.penaltyTypes||[{id:1,label:"Tidsstraf +3 sek",type:"Tidsstraf",seconds:3},{id:2,label:"Tidsstraf +5 sek",type:"Tidsstraf",seconds:5},{id:3,label:"Tidsstraf +10 sek",type:"Tidsstraf",seconds:10},{id:4,label:"Advarsel",type:"Advarsel",seconds:0},{id:5,label:"Sortflag",type:"Sortflag",seconds:0},{id:6,label:"Diskvalifikation",type:"Diskvalifikation",seconds:0},{id:7,label:"Placering sidst",type:"Placering sidst",seconds:0}];
  const reasonTexts=state.reasonTexts||[];

  const addPending=()=>{
    if(!pForm.kartNo||!pForm.penaltyId)return;
    const pt=penaltyTypes.find(p=>String(p.id)===String(pForm.penaltyId));
    const rt=reasonTexts.find(r=>String(r.id)===String(pForm.reasonId));
    const combinedReason=[rt?.text,pForm.customReason.trim()].filter(Boolean).join(" – ");
    setPending(prev=>[...prev,{kartNo:pForm.kartNo,reason:combinedReason,label:pt?.label||"",type:pt?.type||"",seconds:pt?.seconds||0,id:Date.now()}]);
    setPForm({kartNo:"",reasonId:"",customReason:"",penaltyId:""});
  };

  const finish=()=>{
    pending.forEach(p=>{
      dispatch({type:"ADD_PENALTY",eventId:selEv,payload:{kartNo:parseInt(p.kartNo)||0,driverName:"",class:form.class,session:form.session,type:p.type,seconds:p.seconds,reason:p.reason,time:new Date().toLocaleString("da-DK"),source:"inspection_official",approved:false}});
    });
    dispatch({type:"ADD_INSPECTION",eventId:selEv,payload:{...form,by:u?.name,time:new Date().toLocaleString("da-DK")}});
    dispatch({type:"SET_READY_SIGNAL",eventId:selEv,cls:form.class,session:form.session,stype:"inspection",by:u?.name});
    setPending([]);setDone(true);setTimeout(()=>setDone(false),3000);
    setForm(f=>({...f,videoOk:null,trackOk:null,techOk:null,notes:""}));
  };

  if(done)return <div style={{padding:24,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",gap:16}}>
    <div style={{fontSize:60}}>✅</div>
    <div style={{fontWeight:700,color:C.green,fontSize:18,textAlign:"center"}}>Klar-signal sendt!<br/>{pending.length>0&&`${pending.length} straffe til godkendelse`}</div>
    <Btn onClick={()=>setDone(false)}>Nyt heat</Btn>
  </div>;

  return <div style={{padding:16,overflowY:"auto",height:"100%"}}>
    <SH title="Indrapportering" sub="Video, Bane & Teknik"/>
    <div style={{background:"#1a001a",border:"1px solid #9B59B644",borderRadius:6,padding:8,marginBottom:12,display:"flex",gap:6,alignItems:"center"}}>
      <span>🔒</span><span style={{color:C.purple,fontSize:11,fontWeight:700}}>Kun synlig for officials & admin</span>
    </div>
    <Sel label="Løb" value={String(selEv)} onChange={v=>setSelEv(Number(v))} options={useEvList.map(e=>({value:String(e.id),label:e.name}))}/>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
      <Sel label="Klasse" value={form.class} onChange={v=>setForm(f=>({...f,class:v}))} options={state.events.find(e=>e.id===selEv)?.classes||Object.keys(state.classRules)}/>
      <Sel label="Session" value={form.session} onChange={v=>setForm(f=>({...f,session:v}))} options={SESSION_OPTS}/>
    </div>

    {/* Straf-tilføj sektion */}
    <Card style={{borderLeft:`3px solid ${C.orange}`}}>
      <div style={{color:C.textMuted,fontSize:10,letterSpacing:2,marginBottom:8}}>TILFØJ STRAF (afventer admin-godkendelse)</div>
      <Input label="Kart # *" value={pForm.kartNo} onChange={v=>setPForm(f=>({...f,kartNo:v}))} placeholder="98"/>
      <Sel label="Årsag" value={pForm.reasonId} onChange={v=>setPForm(f=>({...f,reasonId:v}))} options={[{value:"",label:"Vælg årsag..."},...reasonTexts.map(r=>({value:String(r.id),label:r.text}))]}/>
      <Input label="Uddybende tekst (valgfrit)" value={pForm.customReason} onChange={v=>setPForm(f=>({...f,customReason:v}))} placeholder="Tilføj yderligere detaljer..."/>
      <div style={{marginBottom:10}}>
        <div style={{color:C.textMuted,fontSize:10,letterSpacing:1,marginBottom:6,textTransform:"uppercase"}}>Straftype</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
          {penaltyTypes.map(pt=><button key={pt.id} onClick={()=>setPForm(f=>({...f,penaltyId:String(pt.id)}))} style={{background:pForm.penaltyId===String(pt.id)?`${C.orange}33`:C.surface2,border:`1px solid ${pForm.penaltyId===String(pt.id)?C.orange:C.border}`,borderRadius:20,padding:"5px 12px",fontSize:11,cursor:"pointer",color:pForm.penaltyId===String(pt.id)?C.orange:C.textMuted,fontWeight:pForm.penaltyId===String(pt.id)?700:400,fontFamily:"inherit"}}>{pt.label}</button>)}
        </div>
      </div>
      <Btn onClick={addPending} variant="secondary" style={{width:"100%"}} disabled={!pForm.kartNo||!pForm.penaltyId}>+ TILFØJ TIL LISTE</Btn>
    </Card>

    {/* Ventende straffe */}
    {pending.length>0&&<Card style={{borderLeft:`3px solid ${C.red}`,marginBottom:12}}>
      <div style={{color:C.red,fontSize:10,letterSpacing:2,marginBottom:8}}>STRAFFE KLAR ({pending.length})</div>
      {pending.map((p,i)=><div key={p.id} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 0",borderBottom:i<pending.length-1?`1px solid ${C.border}`:"none"}}>
        <div style={{width:40,height:32,background:`${C.red}22`,border:`1px solid ${C.red}44`,borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
          <span style={{color:C.red,fontWeight:900,fontSize:13}}>#{p.kartNo}</span>
        </div>
        <div style={{flex:1}}>
          <div style={{color:C.text,fontSize:12,fontWeight:600}}>{p.label}</div>
          {p.reason&&<div style={{color:C.textMuted,fontSize:11}}>{p.reason}</div>}
        </div>
        <button onClick={()=>setPending(prev=>prev.filter(x=>x.id!==p.id))} style={{background:"none",border:"none",color:C.textDim,cursor:"pointer",fontSize:16,padding:4}}>✕</button>
      </div>)}
    </Card>}

    {/* Tjekliste */}
    <Card style={{borderLeft:`3px solid ${C.purple}`}}>
      <div style={{color:C.textMuted,fontSize:10,letterSpacing:2,marginBottom:10}}>TJEKLISTE</div>
      {checks.map(([key,label])=><div key={key} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:`1px solid ${C.border}`}}>
        <span style={{color:C.text,fontSize:13}}>{label}</span>
        <div style={{display:"flex",gap:6}}>
          <button onClick={()=>setForm(f=>({...f,[key]:true}))} style={{background:form[key]===true?`${C.green}33`:C.surface2,border:`1px solid ${form[key]===true?C.green:C.border}`,borderRadius:5,padding:"5px 12px",color:form[key]===true?C.green:C.textMuted,cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>✓ OK</button>
          <button onClick={()=>setForm(f=>({...f,[key]:false}))} style={{background:form[key]===false?`${C.red}33`:C.surface2,border:`1px solid ${form[key]===false?C.red:C.border}`,borderRadius:5,padding:"5px 12px",color:form[key]===false?C.red:C.textMuted,cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>✗ Fejl</button>
        </div>
      </div>)}
      <textarea value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} rows={2} placeholder="Kommentarer..." style={{width:"100%",background:C.surface2,border:`1px solid ${C.border}`,borderRadius:6,padding:"8px 12px",color:C.text,fontSize:12,boxSizing:"border-box",resize:"vertical",fontFamily:"inherit",marginTop:10}}/>
    </Card>

    <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:14,marginBottom:16}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <div style={{color:C.text,fontSize:13,fontWeight:700}}>{form.class} · {form.session}</div>
        {pending.length>0&&<Badge color={C.red} style={{fontSize:10}}>{pending.length} straf{pending.length>1?"fe":""}</Badge>}
      </div>
      <Btn onClick={finish} style={{width:"100%",background:C.green,color:"#000",fontWeight:900,fontSize:14}}>AFSLUT HEAT OG SEND KLAR-SIGNAL</Btn>
    </div>
  </div>;
}

function OfficialNotifScreen({state,dispatch}){
  const u=state.currentUser;
  const [form,setForm]=useState({title:"",body:"",targetClass:"Alle",eventId:String(state.events[0]?.id),officialsOnly:false});
  const [sent,setSent]=useState(false);

  const setClass=(cls)=>{
    setForm(f=>{
      const oldPrefix=f.targetClass!=="Alle"?f.targetClass+": ":"";
      const stripped=f.title.startsWith(oldPrefix)?f.title.slice(oldPrefix.length):f.title;
      const newPrefix=cls!=="Alle"?cls+": ":"";
      return{...f,targetClass:cls,title:newPrefix+stripped};
    });
  };

  const send=()=>{
    if(!form.title)return;
    dispatch({type:"ADD_NOTIFICATION",payload:{...form,eventId:parseInt(form.eventId),time:new Date().toLocaleString("da-DK"),by:u?.name}});
    setSent(true);setTimeout(()=>setSent(false),2000);
    setForm(f=>({...f,title:"",body:""}));
  };

  return <div style={{padding:16,overflowY:"auto",height:"100%"}}>
    <SH title="Send notifikation"/>
    <div style={{background:"#1a001a",border:"1px solid #9B59B644",borderRadius:6,padding:8,marginBottom:12,display:"flex",gap:6,alignItems:"center"}}>
      <span>🔒</span><span style={{color:C.purple,fontSize:11,fontWeight:700}}>Kun officials med tilladelse</span>
    </div>
    <Card style={{borderLeft:`3px solid ${C.red}`}}>
      <Sel label="Løb" value={form.eventId} onChange={v=>setForm(f=>({...f,eventId:v}))} options={state.events.map(e=>({value:String(e.id),label:e.name}))}/>
      <Sel label="Klasse" value={form.targetClass} onChange={setClass} options={["Alle",...Object.keys(state.classRules)]}/>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
        <span style={{color:C.textMuted,fontSize:11}}>Kun officials</span>
        <button onClick={()=>setForm(f=>({...f,officialsOnly:!f.officialsOnly}))} style={{background:form.officialsOnly?`${C.purple}33`:C.surface2,border:`1px solid ${form.officialsOnly?C.purple:C.border}`,borderRadius:20,padding:"3px 12px",color:form.officialsOnly?C.purple:C.textMuted,cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>{form.officialsOnly?"✓ KUN OFFICIALS":"ALLE"}</button>
      </div>
      <div style={{marginBottom:8}}>
        <div style={{color:C.textMuted,fontSize:10,letterSpacing:1,marginBottom:4,textTransform:"uppercase"}}>Overskrift</div>
        <input value={form.targetClass!=="Alle"?form.title.replace(new RegExp("^"+form.targetClass+": "),""):form.title} onChange={e=>{const prefix=form.targetClass!=="Alle"?form.targetClass+": ":"";setForm(f=>({...f,title:prefix+e.target.value}));}} placeholder="Skriv overskrift..." style={{width:"100%",background:C.surface2,border:`1px solid ${C.border}`,borderRadius:6,padding:"8px 12px",color:C.text,fontSize:13,boxSizing:"border-box",fontFamily:"inherit"}}/>
        {form.targetClass!=="Alle"&&<div style={{fontSize:10,color:C.textMuted,marginTop:3}}>Vises som: <strong style={{color:C.text}}>{form.title||form.targetClass+": ..."}</strong></div>}
      </div>
      <div style={{marginBottom:10}}>
        <div style={{color:C.textMuted,fontSize:10,letterSpacing:1,marginBottom:4,textTransform:"uppercase"}}>Besked</div>
        <textarea value={form.body} onChange={e=>setForm(f=>({...f,body:e.target.value}))} rows={2} placeholder="Beskedtekst..." style={{width:"100%",background:C.surface2,border:`1px solid ${C.border}`,borderRadius:6,padding:"8px 12px",color:C.text,fontSize:12,boxSizing:"border-box",resize:"vertical",fontFamily:"inherit"}}/>
      </div>
      {sent?<div style={{background:`${C.green}22`,border:`1px solid ${C.green}44`,borderRadius:8,padding:12,textAlign:"center",color:C.green,fontWeight:700}}>✅ Sendt!</div>:<Btn onClick={send} style={{width:"100%"}} disabled={!form.title}>📣 SEND NOTIFIKATION</Btn>}
    </Card>
  </div>;
}

function UserApp({state,dispatch}){
  const t=useT();
  const [tab,setTab]=useState("calendar");
  const [menuOpen,setMenuOpen]=useState(false);

  const isOff=u?.isOfficial||u?.type==="official";
  if(!u)return <LoginScreen state={state} dispatch={dispatch}/>;

  const isGuest=u?.type==="guest";

  const tabs=isGuest?[
    {id:"docs",icon:"📄",label:t.docs,group:"main"},
    {id:"standings",icon:"🏆",label:"Mesterskab",group:"main"},
    {id:"timing",icon:"⏱️",label:"Livetiming",group:"main"},
  ]:[
    {id:"calendar",icon:"📅",label:t.calendar,group:"main"},
    {id:"docs",icon:"📄",label:t.docs,group:"main"},
    {id:"standings",icon:"🏆",label:"Mesterskab",group:"main"},
    {id:"timing",icon:"⏱️",label:"Livetiming",group:"main"},
    {id:"penalties",icon:"⚠️",label:"Straffe",group:"main"},
    {id:"regs",icon:"📋",label:"Reglementer",group:"main"},
    {id:"notif",icon:"🔔",label:"Notifikationer",group:"main"},
    {id:"profile",icon:"👤",label:"Profil",group:"main"},
    {id:"kartreg",icon:"🔢",label:"Kartnummer",group:"main"},
    ...(isOff?[
      {id:"weight",icon:"⚖️",label:"Vægt",group:"official"},
      {id:"nose",icon:"🔧",label:"Snude",group:"official"},
      {id:"reporting",icon:"🔍",label:"Indrapportering",group:"official"},
      {id:"licensecheck",icon:"🪪",label:"Licenskontrol",group:"official"},
      {id:"driverlist",icon:"👥",label:"Kørerliste",group:"official"},
      ...(u?.canSendNotif?[{id:"sendnotif",icon:"📣",label:"Send notif.",group:"official"}]:[]),
    ]:[]),
  ];

  const activeTab=tabs.find(tb=>tb.id===tab);

  const navigate=(id)=>{setTab(id);setMenuOpen(false);};

  return <div style={{display:"flex",flexDirection:"column",height:"100%",background:C.bg,position:"relative"}}>

    {isGuest&&<div style={{background:"#1a1400",borderBottom:`1px solid ${C.orange}44`,padding:"7px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0,zIndex:10}}>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <span>👁</span>
        <span style={{color:C.orange,fontSize:12,fontWeight:700}}>GÆSTEADGANG</span>
        <span style={{color:C.textDim,fontSize:11}}>· Kun Docs & Livetiming</span>
      </div>
      <button onClick={()=>dispatch({type:"LOGOUT"})} style={{background:"transparent",border:`1px solid ${C.orange}44`,borderRadius:6,padding:"4px 10px",color:C.orange,fontSize:11,cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>LOG IND</button>
    </div>}
    {/* Top bar */}
    <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:"8px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0,zIndex:10}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <Logo size={18}/>
        {activeTab&&<div style={{display:"flex",alignItems:"center",gap:6}}>
          <span style={{color:C.textDim,fontSize:13}}>·</span>
          <span style={{fontSize:14}}>{activeTab.icon}</span>
          <span style={{color:C.text,fontSize:13,fontWeight:600,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:1,textTransform:"uppercase"}}>{activeTab.label}</span>
        </div>}
      </div>
      <div style={{display:"flex",gap:8,alignItems:"center"}}>
        <LangBar state={state} dispatch={dispatch}/>
        {/* Hamburger menu button */}
        <button onClick={()=>setMenuOpen(o=>!o)} style={{background:menuOpen?C.red:C.surface2,border:`1px solid ${menuOpen?C.red:C.border}`,borderRadius:8,width:38,height:38,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4,flexShrink:0,transition:"all 0.2s"}}>
          {menuOpen
            ? <span style={{fontSize:18,color:"#fff",lineHeight:1}}>✕</span>
            : <>{[0,1,2].map(i=><div key={i} style={{width:18,height:2,background:C.text,borderRadius:1}}/>)}</>
          }
        </button>
      </div>

        {/* Panel header */}
        <div style={{padding:"14px 18px",borderBottom:`2px solid ${C.red}`,display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>

        </div>

        {/* Menu items */}
        <div style={{flex:1,overflowY:"auto",padding:"8px 0"}}>
          {/* Main section */}

              <span style={{fontSize:22,flexShrink:0}}>{tb.icon}</span>
              <div>
                <div style={{color:tab===tb.id?C.red:C.text,fontWeight:tab===tb.id?700:500,fontSize:15,fontFamily:"'Barlow',sans-serif"}}>{tb.label}</div>
              </div>
              {tab===tb.id&&<div style={{marginLeft:"auto",width:6,height:6,borderRadius:"50%",background:C.red,flexShrink:0}}/>}
            </button>
          ))}

          {/* Official section */}
          {isOff&&<>
            <div style={{padding:"14px 18px 4px",color:C.purple,fontSize:10,letterSpacing:2,textTransform:"uppercase",display:"flex",alignItems:"center",gap:6}}>
              <span>🔒</span> OFFICIAL
            </div>
            {tabs.filter(tb=>tb.group==="official").map(tb=>(
              <button key={tb.id} onClick={()=>navigate(tb.id)} style={{width:"100%",background:tab===tb.id?`${C.purple}18`:"transparent",border:"none",borderLeft:tab===tb.id?`3px solid ${C.purple}`:"3px solid transparent",cursor:"pointer",padding:"13px 18px",display:"flex",alignItems:"center",gap:14,textAlign:"left",transition:"all 0.15s"}}>
                <span style={{fontSize:22,flexShrink:0}}>{tb.icon}</span>
                <div>
                  <div style={{color:tab===tb.id?C.purple:C.text,fontWeight:tab===tb.id?700:500,fontSize:15,fontFamily:"'Barlow',sans-serif"}}>{tb.label}</div>
                </div>
                {tab===tb.id&&<div style={{marginLeft:"auto",width:6,height:6,borderRadius:"50%",background:C.purple,flexShrink:0}}/>}
              </button>
            ))}
          </>}
        </div>

        {/* Footer */}
        <div style={{padding:"12px 18px",borderTop:`1px solid ${C.border}`,display:"flex",flexDirection:"column",gap:8,flexShrink:0}}>
          <LangBar state={state} dispatch={dispatch}/>
          <Btn variant="danger" onClick={()=>dispatch({type:"LOGOUT"})} style={{width:"100%"}}>{t.logOut}</Btn>
        </div>
      </div>
    </div>}
  </div>;
}

function AdminDashboard({state}){
  const totalRegs=state.events.reduce((s,e)=>s+e.registrations.length,0);
  const totalPenalties=state.events.reduce((s,e)=>s+(e.penalties||[]).length,0);
  const readyCount=state.events.reduce((s,e)=>s+(e.readySignals||[]).length,0);
  return <div>
    <SH title="Dashboard"/>
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:16}}>
      {[[state.users.filter(u=>u.type==="driver").length,"KØRERE",C.red],[state.users.filter(u=>u.type==="parent").length,"FORÆLDRE",C.blue],[totalRegs,"TILMELD.",C.green],[state.events.length,"LØB",C.orange],[totalPenalties,"STRAFFE",C.orange],[readyCount,"KLAR-SIGN.",C.cyan]].map(([v,l,c])=><div key={l} style={{background:C.surface,border:`1px solid ${C.border}`,borderLeft:`3px solid ${c}`,borderRadius:6,padding:"10px 12px"}}><div style={{color:C.textMuted,fontSize:9,letterSpacing:1}}>{l}</div><div style={{fontWeight:900,fontSize:22,color:c,fontFamily:"'Barlow Condensed',sans-serif"}}>{v}</div></div>)}
    </div>
    <SH title="Løbs-status"/>

              <span style={{color:C.text,fontSize:11,fontWeight:700}}>{cls}</span>
              <div style={{display:"flex",gap:3}}>
                {stypes.map(st=>{
                  const done=signals.some(s=>s.stype===st);
                  const icons={weight:"⚖️",nose:"🔧",inspection:"🔍"};
                  return <span key={st} style={{fontSize:11,opacity:done?1:0.2}}>{icons[st]}</span>;
                })}
              </div>
            </div>;
          })}
        </div>:null;
      })()}
      <div style={{background:C.bg,borderRadius:4,height:5,overflow:"hidden"}}><div style={{width:`${Math.min(100,(ev.registrations.length/120)*100)}%`,height:"100%",background:C.red,borderRadius:4}}/></div>

    </Card>)}
  </div>;
}

function AdminRegistrations({state}){
  const [selEv,setSelEv]=useState(String(state.events[0]?.id));
  const [selClass,setSelClass]=useState("Alle");
  const [csvFields,setCsvFields]=useState(["Navn","E-mail","Klasse","Kart","Transponder","Licens"]);
  const [showCsvPicker,setShowCsvPicker]=useState(false);
  const ev=state.events.find(e=>e.id===parseInt(selEv))||state.events[0];

  const ALL_FIELDS=["Navn","E-mail","Klasse","Kart","Transponder","Licens","Klub","Telefon","Ryttergård-L","Ryttergård-D","Slicks","Wets","Betalt","LicensOK"];

  const regs=(ev?.registrations||[]).filter(r=>selClass==="Alle"||r.class===selClass);
  const classes=["Alle",...(ev?.classes||[])];

  const doExport=()=>{
    const rows=regs.map(r=>{
      const u=state.users.find(u=>u.id===r.userId)||{};
      const paddockParts=(r.paddockSpace||"").split("×").map(s=>s.trim().replace("m",""));
      return {
        "Navn":u.name||"","E-mail":u.email||"","Klasse":r.class||"",
        "Kart":String(u.kartNumber||""),"Transponder":u.transponder||"",
        "Licens":u.license||"","Klub":u.club||"","Telefon":u.phone||"",
        "Ryttergård-L":paddockParts[0]||"","Ryttergård-D":paddockParts[1]||"",
        "Slicks":(r.slicks||[]).join(";"),"Wets":(r.wets||[]).join(";"),
        "Betalt":r.paid?"Ja":"Nej","LicensOK":u.licenseValid===true?"Ja":u.licenseValid===false?"Nej":"?"
      };
    });
    exportCSV(rows,csvFields,`tilmeldinger_${ev?.name||""}`);
  };

  const doMyLapsExport=()=>{
    const rows=regs.map(r=>{
      const u=state.users.find(u=>u.id===r.userId)||{};
      return {"Kart":String(u.kartNumber||""),"Transponder":u.transponder||"","Navn":u.name||"","Klasse":r.class||""};
    });
    exportCSV(rows,MYLAPS_FIELDS,`mylaps_${ev?.name||""}`);
  };

  const toggleField=f=>setCsvFields(prev=>prev.includes(f)?prev.filter(x=>x!==f):[...prev,f]);

    <div style={{display:"flex",gap:6,overflowX:"auto",marginBottom:10,paddingBottom:2}}>
      {classes.map(cls=><button key={cls} onClick={()=>setSelClass(cls)} style={{background:selClass===cls?state.classRules[cls]?.color||C.red:C.surface2,color:selClass===cls?"#fff":C.textMuted,border:`1px solid ${selClass===cls?state.classRules[cls]?.color||C.red:C.border}`,borderRadius:20,padding:"4px 10px",fontSize:10,cursor:"pointer",whiteSpace:"nowrap",fontFamily:"inherit"}}>{cls}</button>)}
    </div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
      <span style={{color:C.textMuted,fontSize:11}}>{regs.length} tilmeldte</span>
      <div style={{display:"flex",gap:6}}>
        <button onClick={()=>setShowCsvPicker(!showCsvPicker)} style={{background:C.surface2,border:`1px solid ${C.border}`,borderRadius:6,padding:"5px 10px",color:C.textMuted,fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>⚙️ Felter</button>
        <Btn small variant="secondary" onClick={doExport}>CSV</Btn>
        <Btn small onClick={doMyLapsExport} style={{background:C.purple}}>MyLaps Orbit 5</Btn>
      </div>
    </div>
    {showCsvPicker&&<Card style={{borderLeft:`3px solid ${C.blue}`,marginBottom:10}}>
      <div style={{color:C.textMuted,fontSize:10,letterSpacing:2,marginBottom:8}}>VÆLG FELTER I CSV</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>
        {ALL_FIELDS.map(f=><button key={f} onClick={()=>toggleField(f)} style={{background:csvFields.includes(f)?`${C.blue}33`:C.surface2,border:`1px solid ${csvFields.includes(f)?C.blue:C.border}`,borderRadius:20,padding:"4px 10px",fontSize:10,cursor:"pointer",color:csvFields.includes(f)?C.blue:C.textMuted,fontFamily:"inherit"}}>{f}</button>)}
      </div>
      <div style={{fontSize:10,color:C.textMuted}}>MyLaps Orbit 5 knappen eksporterer altid: Kart, Transponder, Navn, Klasse</div>
    </Card>}
    {regs.map((r,i)=>{const u=state.users.find(u=>u.id===r.userId)||{};return <Card key={i} style={{padding:"10px 14px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div>
          <div style={{fontWeight:700,color:C.text,fontSize:13}}>{u.name}</div>
          <div style={{color:C.textMuted,fontSize:11}}>{r.class} · #{u.kartNumber} · T:{u.transponder||"—"}</div>
          <div style={{color:C.textDim,fontSize:10}}>{r.paddockSpace||"Ingen ryttergård"}</div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:4,alignItems:"flex-end"}}>
          <Badge color={r.paid?C.green:C.red} style={{fontSize:10}}>{r.paid?"BETALT":"UBETALT"}</Badge>
          <Badge color={u.licenseValid===true?C.green:C.orange} style={{fontSize:9}}>{u.licenseValid===true?"LIC ✓":"LIC ?"}</Badge>
        </div>
      </div>
    </Card>;})}
  </div>;
}

    if(!form.name)return;
    dispatch({type:"ADD_CLASS",name:form.name,min:parseInt(form.min)||0,max:parseInt(form.max)||99,color:form.color,seriesIds:form.seriesIds});
    setForm({name:"",min:"7",max:"99",color:C.red,seriesIds:[]});
