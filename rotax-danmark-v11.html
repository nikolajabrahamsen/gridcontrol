  };

  const toggleSeries=(id,form,setF)=>{
    const arr=form.seriesIds||[];
    setF(f=>({...f,seriesIds:arr.includes(id)?arr.filter(x=>x!==id):[...arr,id]}));
  };

  const filtered=Object.entries(state.classRules).filter(([name,rule])=>{
    if(filterSeries==="Alle")return true;
    return (rule.seriesIds||[]).includes(parseInt(filterSeries));
  });

  return <div>
    <SH title="Klasser"/>
    <Card style={{borderLeft:`3px solid ${C.red}`,marginBottom:12}}>
      <Input label="Klassenavn" value={form.name} onChange={v=>setForm(f=>({...f,name:v}))} placeholder="f.eks. Rotax E20"/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <Input label="Min alder" value={form.min} onChange={v=>setForm(f=>({...f,min:v}))} placeholder="13" type="number"/>
        <Input label="Maks alder" value={form.max} onChange={v=>setForm(f=>({...f,max:v}))} placeholder="17" type="number"/>
      </div>
      <div style={{marginBottom:10}}>
        <div style={{color:C.textMuted,fontSize:10,letterSpacing:1,marginBottom:6,textTransform:"uppercase"}}>Farve</div>
        <div style={{display:"flex",gap:6}}>
          {COLORS.map(col=><button key={col} onClick={()=>setForm(f=>({...f,color:col}))} style={{width:28,height:28,borderRadius:"50%",background:col,border:`3px solid ${form.color===col?"white":"transparent"}`,cursor:"pointer",flexShrink:0}}/>)}
        </div>
      </div>
      <div style={{marginBottom:10}}>
        <div style={{color:C.textMuted,fontSize:10,letterSpacing:1,marginBottom:6,textTransform:"uppercase"}}>Deltager i løbsserier</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
          {state.raceSeries.map(s=>{
            const active=(form.seriesIds||[]).includes(s.id);
            return <button key={s.id} onClick={()=>toggleSeries(s.id,form,setForm)} style={{background:active?`${C.blue}33`:C.surface2,border:`1px solid ${active?C.blue:C.border}`,borderRadius:20,padding:"4px 10px",color:active?C.blue:C.textMuted,cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>{active?"✓ ":""}{s.name}</button>;
          })}
        </div>
      </div>
      <Btn small onClick={create} disabled={!form.name} style={{width:"100%"}}>+ Opret klasse</Btn>
    </Card>
    <div style={{display:"flex",gap:6,overflowX:"auto",marginBottom:10,paddingBottom:2}}>
      <button onClick={()=>setFilterSeries("Alle")} style={{background:filterSeries==="Alle"?C.red:C.surface2,color:filterSeries==="Alle"?"#fff":C.textMuted,border:`1px solid ${filterSeries==="Alle"?C.red:C.border}`,borderRadius:20,padding:"4px 10px",fontSize:10,cursor:"pointer",whiteSpace:"nowrap",fontFamily:"inherit"}}>Alle serier</button>
      {state.raceSeries.map(s=><button key={s.id} onClick={()=>setFilterSeries(String(s.id))} style={{background:filterSeries===String(s.id)?C.blue:C.surface2,color:filterSeries===String(s.id)?"#fff":C.textMuted,border:`1px solid ${filterSeries===String(s.id)?C.blue:C.border}`,borderRadius:20,padding:"4px 10px",fontSize:10,cursor:"pointer",whiteSpace:"nowrap",fontFamily:"inherit"}}>{s.name}</button>)}
    </div>
    {filtered.map(([name,rule])=>{
      const isEdit=editName===name;
      return <Card key={name} style={{padding:"11px 14px",borderLeft:`3px solid ${rule.color||C.red}`}}>
        {isEdit?<div>
          <Input label="Navn" value={editForm.name} onChange={v=>setEditForm(f=>({...f,name:v}))} placeholder="Klassenavn"/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <Input label="Min alder" value={editForm.min} onChange={v=>setEditForm(f=>({...f,min:v}))} type="number"/>
            <Input label="Maks alder" value={editForm.max} onChange={v=>setEditForm(f=>({...f,max:v}))} type="number"/>
          </div>
          <div style={{marginBottom:10}}>
            <div style={{color:C.textMuted,fontSize:10,marginBottom:4}}>FARVE</div>
            <div style={{display:"flex",gap:6}}>{COLORS.map(col=><button key={col} onClick={()=>setEditForm(f=>({...f,color:col}))} style={{width:24,height:24,borderRadius:"50%",background:col,border:`3px solid ${editForm.color===col?"white":"transparent"}`,cursor:"pointer"}}/>)}</div>
          </div>
          <div style={{marginBottom:10}}>
            <div style={{color:C.textMuted,fontSize:10,marginBottom:4}}>SERIER</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {state.raceSeries.map(s=>{const active=(editForm.seriesIds||[]).includes(s.id);return <button key={s.id} onClick={()=>toggleSeries(s.id,editForm,setEditForm)} style={{background:active?`${C.blue}33`:C.surface2,border:`1px solid ${active?C.blue:C.border}`,borderRadius:20,padding:"3px 8px",color:active?C.blue:C.textMuted,cursor:"pointer",fontSize:10,fontFamily:"inherit"}}>{s.name}</button>;})}
            </div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <Btn small onClick={saveEdit}>Gem</Btn>
            <Btn small variant="ghost" onClick={()=>setEditName(null)}>Annuller</Btn>
            <Btn small variant="danger" onClick={()=>dispatch({type:"DELETE_CLASS",name})}>Slet</Btn>
          </div>
        </div>:<div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontWeight:700,color:C.text,fontSize:13}}>{name}</div>
            <div style={{color:C.textMuted,fontSize:11}}>{rule.min}–{rule.max>=99?"∞":rule.max+" år"}</div>
            {(rule.seriesIds||[]).length>0&&<div style={{display:"flex",gap:4,marginTop:3,flexWrap:"wrap"}}>
              {(rule.seriesIds||[]).map(sid=>{const s=state.raceSeries.find(s=>s.id===sid);return s?<Badge key={sid} color={C.blue} style={{fontSize:9}}>{s.name}</Badge>:null;})}
            </div>}
          </div>
          <Btn small variant="ghost" onClick={()=>openEdit(name)}>Ret</Btn>
        </div>}
      </Card>;
    })}
  </div>;
}

function AdminSeries({state,dispatch}){
  const [form,setForm]=useState({name:"",logo:null});
  const [editId,setEditId]=useState(null);
  const [editForm,setEditForm]=useState({name:"",logo:null});
  const logoRef=useRef();
  const editLogoRef=useRef();

  const readImg=(file,cb)=>{const r=new FileReader();r.onload=e=>cb(e.target.result);r.readAsDataURL(file);};

  const create=()=>{
    if(!form.name)return;
    dispatch({type:"ADD_SERIES",payload:{name:form.name,logo:form.logo}});
    setForm({name:"",logo:null});
  };

  const saveEdit=()=>{
    dispatch({type:"UPDATE_SERIES",id:editId,payload:{name:editForm.name,logo:editForm.logo}});
    setEditId(null);
  };

  return <div>
    <SH title="Løbsserier"/>
    <input ref={logoRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>e.target.files[0]&&readImg(e.target.files[0],v=>setForm(f=>({...f,logo:v})))}/>
    <input ref={editLogoRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>e.target.files[0]&&readImg(e.target.files[0],v=>setEditForm(f=>({...f,logo:v})))}/>
    <Card style={{borderLeft:`3px solid ${C.red}`}}>
      <Input label="Serienavn" value={form.name} onChange={v=>setForm(f=>({...f,name:v}))} placeholder="f.eks. Rotax Vinter Cup 2026"/>
      <div style={{marginBottom:10}}>
        <div style={{color:C.textMuted,fontSize:10,letterSpacing:1,marginBottom:6}}>LOGO (VALGFRIT)</div>
        {form.logo
          ?<div style={{display:"flex",gap:8,alignItems:"center"}}>
            <img src={form.logo} style={{width:60,height:40,objectFit:"contain",borderRadius:4,border:`1px solid ${C.border}`,background:"#fff"}} alt="Logo"/>
            <button onClick={()=>setForm(f=>({...f,logo:null}))} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:6,padding:"4px 10px",color:C.textMuted,cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>Fjern</button>
          </div>
          :<div onClick={()=>logoRef.current.click()} style={{border:`2px dashed ${C.border}`,borderRadius:8,padding:"12px",textAlign:"center",cursor:"pointer"}}>
            <div style={{color:C.textMuted,fontSize:12}}>+ Upload logo (PNG/JPG)</div>
          </div>
        }
      </div>
      <Btn small onClick={create} style={{width:"100%"}} disabled={!form.name}>+ Opret serie</Btn>
    </Card>
    {state.raceSeries.map(s=>{
      const isEdit=editId===s.id;
      return <Card key={s.id} style={{padding:"12px 14px",borderLeft:`3px solid ${C.red}`}}>
        {isEdit?<div>
          <Input label="Serienavn" value={editForm.name} onChange={v=>setEditForm(f=>({...f,name:v}))} placeholder="Serienavn"/>
          <div style={{marginBottom:10}}>
            {editForm.logo
              ?<div style={{display:"flex",gap:8,alignItems:"center"}}>
                <img src={editForm.logo} style={{width:60,height:40,objectFit:"contain",borderRadius:4,border:`1px solid ${C.border}`,background:"#fff"}} alt="Logo"/>
                <button onClick={()=>setEditForm(f=>({...f,logo:null}))} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:6,padding:"4px 10px",color:C.textMuted,cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>Fjern</button>
              </div>
              :<div onClick={()=>editLogoRef.current.click()} style={{border:`2px dashed ${C.border}`,borderRadius:8,padding:"10px",textAlign:"center",cursor:"pointer"}}>
                <div style={{color:C.textMuted,fontSize:11}}>+ Upload logo</div>
              </div>
            }
          </div>
          <div style={{display:"flex",gap:8}}>
            <Btn small onClick={saveEdit}>Gem</Btn>
            <Btn small variant="ghost" onClick={()=>setEditId(null)}>Annuller</Btn>
            <Btn small variant="danger" onClick={()=>dispatch({type:"DELETE_SERIES",id:s.id})}>Slet</Btn>
          </div>
        </div>:<div style={{display:"flex",gap:12,alignItems:"center"}}>
          {s.logo&&<img src={s.logo} style={{width:48,height:32,objectFit:"contain",borderRadius:4,border:`1px solid ${C.border}`,background:"#fff",flexShrink:0}} alt="Logo"/>}
          <div style={{flex:1}}>
            <div style={{fontWeight:700,color:C.text,fontSize:13}}>{s.name}</div>
            <div style={{color:C.textMuted,fontSize:11}}>Løb: {state.events.filter(e=>e.seriesId===s.id).length}</div>
          </div>
          <Btn small variant="ghost" onClick={()=>{setEditId(s.id);setEditForm({name:s.name,logo:s.logo||null});}}>Ret</Btn>
        </div>}
      </Card>;
    })}
  </div>;
}

function AdminUsers({state,dispatch}){

      <Card style={{borderLeft:`3px solid ${C.blue}`}}>
        <div style={{color:C.textMuted,fontSize:10,letterSpacing:2,marginBottom:10}}>BRUGERTYPE</div>

            <button key={val} onClick={()=>setEditForm(f=>({...f,type:val}))} style={{flex:1,background:editForm.type===val?col+"22":C.surface2,border:`2px solid ${editForm.type===val?col:C.border}`,borderRadius:8,padding:"8px",cursor:"pointer",textAlign:"center",fontFamily:"inherit"}}>

function AdminOfficials({state,dispatch}){
  const officials=state.users.filter(u=>u.isOfficial||u.type==="official").slice().sort((a,b)=>(a.name||"").localeCompare(b.name||"","da"));
  const toggleEvent=(uid,evId)=>{
    const u=state.users.find(u=>u.id===uid);
    const approved=u?.approvedEvents||[];
    dispatch({type:"UPDATE_USER",payload:{id:uid,approvedEvents:approved.includes(evId)?approved.filter(id=>id!==evId):[...approved,evId]}});
  };
  const toggleNotif=(uid)=>{
    const u=state.users.find(u=>u.id===uid);
    dispatch({type:"UPDATE_USER",payload:{id:uid,canSendNotif:!u?.canSendNotif}});
  };
  return <div>
    <SH title="Officials" sub="Godkend officials og rettigheder"/>
    {officials.length===0&&<div style={{color:C.textMuted,textAlign:"center",padding:20}}>Ingen officials endnu</div>}
    {officials.map(u=><Card key={u.id} style={{borderLeft:`3px solid ${C.purple}`}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
        <div>
          <div style={{fontWeight:700,color:C.text,fontSize:13}}>{u.name}</div>
          <div style={{color:C.textMuted,fontSize:11}}>{u.email}</div>
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <Badge color={C.purple} style={{fontSize:10}}>OFFICIAL</Badge>
        </div>
      </div>
      {/* Notification permission */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderTop:`1px solid ${C.border}`,borderBottom:`1px solid ${C.border}`,marginBottom:8}}>
        <div>
          <div style={{fontWeight:600,color:C.text,fontSize:12}}>🔔 Må sende notifikationer</div>
          <div style={{color:C.textMuted,fontSize:10}}>Official kan sende notifikationer til kørere</div>
        </div>
        <button onClick={()=>toggleNotif(u.id)} style={{background:u.canSendNotif?`${C.green}33`:C.surface2,border:`1px solid ${u.canSendNotif?C.green:C.border}`,borderRadius:20,padding:"4px 12px",color:u.canSendNotif?C.green:C.textMuted,cursor:"pointer",fontSize:11,fontFamily:"inherit",fontWeight:700}}>{u.canSendNotif?"✓ TILLADT":"NÆGTET"}</button>
      </div>
      {/* Event access */}

function AdminNotifications({state,dispatch}){
  const [form,setForm]=useState({title:"",body:"",targetClass:"Alle",eventId:String(state.events[0]?.id),officialsOnly:false});
  const [sent,setSent]=useState(false);

  // Auto-prefix class in title
  const setTitle=(v)=>{
    setForm(f=>{
      const prefix=f.targetClass!=="Alle"?f.targetClass+": ":"";
      // Only auto-prefix if title is empty or starts with the old prefix
      const oldPrefix=f.targetClass!=="Alle"?f.targetClass+": ":"";
      const strippedOld=f.title.startsWith(oldPrefix)?f.title.slice(oldPrefix.length):f.title;
      return {...f,title:prefix+v};
    });
  };
  const setClass=(cls)=>{
    setForm(f=>{
      const oldPrefix=f.targetClass!=="Alle"?f.targetClass+": ":"";
      const stripped=f.title.startsWith(oldPrefix)?f.title.slice(oldPrefix.length):f.title;
      const newPrefix=cls!=="Alle"?cls+": ":"";
      return {...f,targetClass:cls,title:newPrefix+stripped};
    });
  };

  const send=()=>{
    if(!form.title)return;
    dispatch({type:"ADD_NOTIFICATION",payload:{...form,eventId:parseInt(form.eventId),time:new Date().toLocaleString("da-DK"),by:"Admin"}});
    setSent(true);setTimeout(()=>setSent(false),2000);
    setForm(f=>({...f,title:"",body:""}));
  };
  const notifs=state.notifications||[];
  return <div>
    <SH title="Notifikationer"/>
    <Card style={{borderLeft:`3px solid ${C.red}`}}>
      <Sel label="Løb" value={form.eventId} onChange={v=>setForm(f=>({...f,eventId:v}))} options={state.events.map(e=>({value:String(e.id),label:e.name}))}/>
      <Sel label="Klasse" value={form.targetClass} onChange={setClass} options={["Alle",...Object.keys(state.classRules)]}/>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>

      </div>
      <div style={{marginBottom:4}}>
        <div style={{color:C.textMuted,fontSize:10,letterSpacing:1,marginBottom:4,textTransform:"uppercase"}}>Overskrift</div>
        <input value={form.title.startsWith(form.targetClass+": ")?form.title.slice(form.targetClass.length+2):form.targetClass==="Alle"?form.title:form.title.replace(new RegExp("^"+form.targetClass+": "),"") } onChange={e=>setTitle(e.target.value)} placeholder="Skriv overskrift..." style={{width:"100%",background:C.surface2,border:`1px solid ${C.border}`,borderRadius:6,padding:"8px 12px",color:C.text,fontSize:13,boxSizing:"border-box",fontFamily:"inherit"}}/>
        {form.targetClass!=="Alle"&&<div style={{fontSize:10,color:C.textMuted,marginTop:3}}>Vises som: <strong style={{color:C.text}}>{form.title||form.targetClass+": ..."}</strong></div>}
      </div>
      <div style={{marginBottom:10,marginTop:8}}>
        <div style={{color:C.textMuted,fontSize:10,letterSpacing:1,marginBottom:4,textTransform:"uppercase"}}>Besked</div>
        <textarea value={form.body} onChange={e=>setForm(f=>({...f,body:e.target.value}))} rows={2} placeholder="Beskedtekst..." style={{width:"100%",background:C.surface2,border:`1px solid ${C.border}`,borderRadius:6,padding:"8px 12px",color:C.text,fontSize:12,boxSizing:"border-box",resize:"vertical",fontFamily:"inherit"}}/>
      </div>
      {sent?<div style={{background:`${C.green}22`,border:`1px solid ${C.green}44`,borderRadius:8,padding:12,textAlign:"center",color:C.green,fontWeight:700}}>✅ Sendt!</div>:<Btn onClick={send} style={{width:"100%"}} disabled={!form.title}>📣 SEND NOTIFIKATION</Btn>}
    </Card>

      <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>

          {n.targetClass!=="Alle"&&<Badge style={{fontSize:9}}>{n.targetClass}</Badge>}

      <div style={{color:C.textDim,fontSize:10,marginTop:3}}>{n.time} · {n.by}</div>

function AdminDocuments({state,dispatch}){
  const [form,setForm]=useState({title:"",type:"Startgrid",sessionType:"kval",class:"Rotax Junior",eventId:String(state.events[0]?.id)});
  const [file,setFile]=useState(null);
  const [busy,setBusy]=useState(false);
  const [msg,setMsg]=useState("");
  const fileRef=useRef();

  const upload=async()=>{
    setMsg("");
    if(!form.title){setMsg("Skriv en titel");return;}
    if(!form.eventId){setMsg("Vælg et løb");return;}
    if(!sb){setMsg("Supabase er ikke konfigureret");return;}
    setBusy(true);
    try{
      let url="#";
      if(file){
        const ext=file.name.split(".").pop();
        const path=`event-${form.eventId}/${Date.now()}-${Math.random().toString(36).slice(2,7)}.${ext}`;
        const {error:upErr}=await sb.storage.from("documents").upload(path,file,{cacheControl:"3600",upsert:false});
        if(upErr){setMsg("Upload fejlede: "+upErr.message);setBusy(false);return;}
        const {data:pub}=sb.storage.from("documents").getPublicUrl(path);
        url=pub.publicUrl;
      }
      dispatch({type:"ADD_EVENT_DOCUMENT",eventId:parseInt(form.eventId),payload:{id:Date.now(),title:form.title,type:form.type,sessionType:form.sessionType,class:form.class,time:new Date().toLocaleString("da-DK"),url}});
      setMsg("Dokument uploadet");
      setForm(f=>({...f,title:""}));setFile(null);
    }catch(e){setMsg(String(e.message||e));}
    setBusy(false);
  };

  const ev=state.events.find(e=>String(e.id)===String(form.eventId));
  const docs=ev?.documents||[];

  return <div>
    <SH title="Dokumenter" sub="Upload til Supabase – synligt under løbet"/>
    {msg&&<div style={{background:`${C.green}22`,border:`1px solid ${C.green}44`,borderRadius:8,padding:10,marginBottom:10,color:C.green,fontSize:12,fontWeight:600}}>{msg}</div>}
    <Card style={{borderLeft:`3px solid ${C.red}`}}>
      <Sel label="Løb" value={form.eventId} onChange={v=>setForm(f=>({...f,eventId:v}))} options={state.events.map(e=>({value:String(e.id),label:e.name}))}/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <Sel label="Type" value={form.type} onChange={v=>setForm(f=>({...f,type:v}))} options={["Startgrid","Resultat","Opslagstavle"]}/>
        <Sel label="Session" value={form.sessionType} onChange={v=>setForm(f=>({...f,sessionType:v}))} options={SESSION_TYPES}/>
      </div>
      <Sel label="Klasse" value={form.class} onChange={v=>setForm(f=>({...f,class:v}))} options={["Alle",...Object.keys(state.classRules)]}/>
      <Input label="Titel" value={form.title} onChange={v=>setForm(f=>({...f,title:v}))} placeholder="f.eks. Startgrid – Junior Kval."/>
      <input ref={fileRef} type="file" accept="application/pdf,.pdf,image/*" style={{display:"none"}} onChange={e=>setFile(e.target.files[0]||null)}/>
      <div onClick={()=>fileRef.current?.click()} style={{border:`2px dashed ${file?C.green:C.border}`,borderRadius:6,padding:12,textAlign:"center",marginBottom:10,cursor:"pointer"}}>
        <div style={{fontSize:20}}>📎</div>
        <div style={{color:file?C.green:C.textMuted,fontSize:12,fontWeight:file?700:400}}>{file?file.name:"Vælg PDF eller billede"}</div>
      </div>
      <Btn onClick={upload} disabled={busy} style={{width:"100%"}}>{busy?"Uploader...":"⬆ UPLOAD"}</Btn>
    </Card>
    <div style={{color:C.textMuted,fontSize:10,letterSpacing:2,margin:"4px 0 8px"}}>DOKUMENTER PÅ {ev?.name?.toUpperCase()||"LØB"} ({docs.length})</div>
    {docs.length===0&&<div style={{color:C.textDim,fontSize:12}}>Ingen dokumenter på dette løb endnu</div>}
    {docs.map(d=><Card key={d.id} style={{padding:"10px 14px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><div style={{fontWeight:700,color:C.text,fontSize:12}}>{d.title}</div><div style={{display:"flex",gap:4,marginTop:3}}><Badge color={d.type==="Startgrid"?C.blue:d.type==="Resultat"?C.gold:C.textMuted} style={{fontSize:9}}>{d.type}</Badge>{d.sessionType&&<Badge color={C.orange} style={{fontSize:9}}>{SESSION_TYPES.find(s=>s.value===d.sessionType)?.label||d.sessionType}</Badge>}<Badge style={{fontSize:9}}>{d.class}</Badge></div></div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          {d.url&&d.url!=="#"&&<a href={d.url} target="_blank" rel="noreferrer" style={{color:C.blue,fontSize:11,fontWeight:700}}>Åbn ↗</a>}
          <button onClick={()=>dispatch({type:"REMOVE_EVENT_DOCUMENT",eventId:ev.id,docId:d.id})} style={{background:"none",border:"none",color:C.red,cursor:"pointer",fontSize:16,fontFamily:"inherit"}}>×</button>
        </div>
      </div>
    </Card>)}
  </div>;
}

function AdminPenalties({state,dispatch}){
  const [selEv,setSelEv]=useState(String(state.events[0]?.id));
  const [cf,setCf]=useState("Alle");const [sf,setSf]=useState("Alle");
  const [showApproved,setShowApproved]=useState(false);
  const [form,setForm]=useState({kartNo:"",driverName:"",class:"Rotax Junior",session:"Heat 1",type:"Tidsstraf",seconds:"5",reason:""});
  const [editP,setEditP]=useState(null);
  const [editForm,setEditForm]=useState({});
  const [prevCount,setPrevCount]=useState(0);
  const [newAlert,setNewAlert]=useState(false);
  const ev=state.events.find(e=>e.id===parseInt(selEv));
  const allP=ev?.penalties||[];
  const pending=allP.filter(p=>!p.approved);
  const approved=allP.filter(p=>p.approved);
  const shown=showApproved?approved:pending;
  const classes=["Alle",...new Set(allP.map(p=>p.class))];
  const sessions=["Alle",...new Set(allP.map(p=>p.session).filter(Boolean))];
  const filtered=shown.filter(p=>(cf==="Alle"||p.class===cf)&&(sf==="Alle"||p.session===sf));

  useEffect(()=>{if(allP.length>prevCount&&prevCount>0){setNewAlert(true);setTimeout(()=>setNewAlert(false),5000);}setPrevCount(allP.length);},[allP.length]);

  const add=()=>{
    if(!form.kartNo)return;
    dispatch({type:"ADD_PENALTY",eventId:parseInt(selEv),payload:{...form,kartNo:parseInt(form.kartNo)||0,seconds:parseInt(form.seconds)||0,time:new Date().toLocaleString("da-DK"),source:"manual",approved:true}});
    setForm(f=>({...f,driverName:"",kartNo:"",reason:""}));
  };

  const approvePenalty=p=>dispatch({type:"UPDATE_PENALTY",eventId:parseInt(selEv),penaltyIdx:allP.indexOf(p),payload:{...p,approved:true}});
  const deletePenalty=p=>dispatch({type:"DELETE_PENALTY",eventId:parseInt(selEv),penaltyIdx:allP.indexOf(p)});
  const openEdit=p=>{setEditP(p);setEditForm({kartNo:p.kartNo,driverName:p.driverName||"",class:p.class,session:p.session,type:p.type,seconds:String(p.seconds||0),reason:p.reason||""});};
  const saveEdit=()=>{dispatch({type:"UPDATE_PENALTY",eventId:parseInt(selEv),penaltyIdx:allP.indexOf(editP),payload:{...editP,...editForm,kartNo:parseInt(editForm.kartNo)||0,seconds:parseInt(editForm.seconds)||0}});setEditP(null);};

  const doExport=()=>exportCSV(
    filtered.map(p=>({"Kart #":p.kartNo||"","Kører":p.driverName||"","Klasse":p.class||"","Session":p.session||"","Type":p.type||"","Sekunder":p.seconds||0,"Årsag":p.reason||"","Godkendt":p.approved?"Ja":"Nej"})),
    ["Kart #","Kører","Klasse","Session","Type","Sekunder","Årsag","Godkendt"],
    "straffe"
  );

      <div style={{display:"grid",gridTemplateColumns:"80px 1fr",gap:8}}>
        <Input label="Kart # *" value={String(editForm.kartNo||"")} onChange={v=>setEditForm(f=>({...f,kartNo:v}))} placeholder="98"/>
        <Input label="Kørernavn" value={editForm.driverName} onChange={v=>setEditForm(f=>({...f,driverName:v}))} placeholder="Valgfrit"/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <Sel label="Klasse" value={editForm.class} onChange={v=>setEditForm(f=>({...f,class:v}))} options={Object.keys(state.classRules)}/>
        <Sel label="Session" value={editForm.session} onChange={v=>setEditForm(f=>({...f,session:v}))} options={SESSION_OPTS}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <Sel label="Straftype" value={editForm.type} onChange={v=>setEditForm(f=>({...f,type:v}))} options={["Tidsstraf","Advarsel","Sortflag","Diskvalifikation","Placering sidst","Hurtigste tid fjernes"]}/>
        {editForm.type==="Tidsstraf"&&<Input label="Sekunder" value={editForm.seconds} onChange={v=>setEditForm(f=>({...f,seconds:v}))} placeholder="5"/>}
      </div>

      </div>

  return <div>
    <SH title="Straffe"/>
    {newAlert&&<div style={{background:`${C.orange}22`,border:`1px solid ${C.orange}`,borderRadius:8,padding:"10px 14px",marginBottom:10,display:"flex",gap:8,alignItems:"center"}}>
      <div style={{position:"relative",width:14,height:14,flexShrink:0}}>
        <div style={{position:"absolute",inset:0,borderRadius:"50%",background:C.orange,animation:"ping 1s infinite"}}/>

    <Card style={{borderLeft:`3px solid ${C.orange}`}}>

  return <div>
    <SH title="Indrapportering" sub="Video, Bane & Teknik"/>

          <button onClick={()=>setForm(f=>({...f,[key]:false}))} style={{background:form[key]===false?`${C.red}33`:C.surface2,border:`1px solid ${form[key]===false?C.red:C.border}`,borderRadius:5,padding:"4px 10px",color:form[key]===false?C.red:C.textMuted,cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>✗ Fejl</button>
        </div>
      </div>)}
      <textarea value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} rows={2} placeholder="Kommentarer..." style={{width:"100%",background:C.surface2,border:`1px solid ${C.border}`,borderRadius:6,padding:"8px 12px",color:C.text,fontSize:12,boxSizing:"border-box",resize:"vertical",fontFamily:"inherit",marginTop:8,marginBottom:8}}/>
      <Btn onClick={submit} style={{width:"100%"}}>REGISTRER</Btn>
    </Card>
    {(ev?.inspections||[]).map((ins,i)=><Card key={i} style={{padding:"10px 14px"}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontWeight:700,color:C.text,fontSize:12}}>{ins.driverName} #{ins.kartNo}</span><span style={{color:C.textMuted,fontSize:10}}>{ins.session}</span></div>
      <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{checks.map(([k,l])=><Badge key={k} color={ins[k]===true?C.green:ins[k]===false?C.red:C.textMuted} style={{fontSize:9}}>{l.split(" ")[1]}: {ins[k]===true?"OK":ins[k]===false?"FEJL":"—"}</Badge>)}</div>
      {ins.notes&&<div style={{color:C.textMuted,fontSize:11,marginTop:3}}>{ins.notes}</div>}
    </Card>)}
  </div>;
}

function AdminPenaltyTypes({state,dispatch}){
  const [tab,setTab]=useState("types");
  const pts=state.penaltyTypes||[];
  const [showAdd,setShowAdd]=useState(false);
  const [form,setForm]=useState({label:"",type:"Tidsstraf",seconds:"0"});
  const [editId,setEditId]=useState(null);
  const [editForm,setEditForm]=useState({});
  const TYPES=["Tidsstraf","Advarsel","Sortflag","Diskvalifikation","Placering sidst","Hurtigste tid fjernes","Andet"];

  const add=()=>{
    if(!form.label)return;
    dispatch({type:"ADD_PENALTY_TYPE",payload:{label:form.label,type:form.type,seconds:parseInt(form.seconds)||0}});
    setForm({label:"",type:"Tidsstraf",seconds:"0"});setShowAdd(false);
  };
  const saveEdit=()=>{
    dispatch({type:"UPDATE_PENALTY_TYPE",id:editId,payload:{label:editForm.label,type:editForm.type,seconds:parseInt(editForm.seconds)||0}});
    setEditId(null);
  };

  const rts=state.reasonTexts||[];
  const [showAddReason,setShowAddReason]=useState(false);
  const [reasonForm,setReasonForm]=useState({text:""});
  const [editReasonId,setEditReasonId]=useState(null);

    if(!reasonForm.text)return;
    dispatch({type:"ADD_REASON_TEXT",payload:{text:reasonForm.text}});
    setReasonForm({text:""});setShowAddReason(false);

        <div style={{color:tab==="types"?C.orange:C.textMuted,fontWeight:700,fontSize:12,letterSpacing:1}}>STRAFTYPER</div>
      </button>
      <button onClick={()=>setTab("reasons")} style={{background:tab==="reasons"?`${C.blue}22`:C.surface2,border:`2px solid ${tab==="reasons"?C.blue:C.border}`,borderRadius:8,padding:"10px",cursor:"pointer",textAlign:"center",fontFamily:"inherit"}}>
        <div style={{color:tab==="reasons"?C.blue:C.textMuted,fontWeight:700,fontSize:12,letterSpacing:1}}>ÅRSAGER</div>
      </button>
    </div>

    {tab==="types"&&<div>
      <div style={{display:"flex",justifyContent:"flex-end",marginBottom:10}}>
        <Btn small onClick={()=>setShowAdd(!showAdd)}>+ Ny straf</Btn>
      </div>
      <div style={{background:`${C.blue}11`,border:`1px solid ${C.blue}44`,borderRadius:6,padding:8,marginBottom:10,fontSize:11,color:C.blue}}>
        Disse straftyper vises i officials indrapporteringsskærm. Admin-tilføjede straffe godkendes automatisk.
      </div>
      {showAdd&&<Card style={{borderLeft:`3px solid ${C.red}`,marginBottom:10}}>
        <Input label="Navn på straf" value={form.label} onChange={v=>setForm(f=>({...f,label:v}))} placeholder="f.eks. Tidsstraf +8 sek"/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <Sel label="Type" value={form.type} onChange={v=>setForm(f=>({...f,type:v}))} options={TYPES}/>
          <Input label="Sekunder" value={form.seconds} onChange={v=>setForm(f=>({...f,seconds:v}))} placeholder="0" type="number"/>
        </div>
        <div style={{display:"flex",gap:8}}>
          <Btn small onClick={add} disabled={!form.label}>Opret</Btn>
          <Btn small variant="ghost" onClick={()=>setShowAdd(false)}>Annuller</Btn>
        </div>
      </Card>}
      {pts.map(pt=>{
        const isEdit=editId===pt.id;
        return <Card key={pt.id} style={{padding:"11px 14px",borderLeft:`3px solid ${C.orange}`}}>
          {isEdit?<div>
            <Input label="Navn" value={editForm.label} onChange={v=>setEditForm(f=>({...f,label:v}))} placeholder="Navn"/>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              <Sel label="Type" value={editForm.type} onChange={v=>setEditForm(f=>({...f,type:v}))} options={TYPES}/>

              <Btn small onClick={saveEdit}>Gem</Btn>
              <Btn small variant="ghost" onClick={()=>setEditId(null)}>Annuller</Btn>

            </div>

          </div>}

    {tab==="reasons"&&<div>
      <div style={{display:"flex",justifyContent:"flex-end",marginBottom:10}}>
        <Btn small onClick={()=>setShowAddReason(!showAddReason)}>+ Ny årsag</Btn>

        Disse årsagstekster vises som en dropdown, når officials indrapporterer en straf. Der er desuden et fritekstfelt, som automatisk tilføjes efter den valgte årsag.
      </div>
      {showAddReason&&<Card style={{borderLeft:`3px solid ${C.blue}`,marginBottom:10}}>
        <Input label="Årsagstekst" value={reasonForm.text} onChange={v=>setReasonForm(f=>({...f,text:v}))} placeholder="f.eks. Skub i sving"/>
        <div style={{display:"flex",gap:8}}>
          <Btn small onClick={addReason} disabled={!reasonForm.text}>Opret</Btn>
          <Btn small variant="ghost" onClick={()=>setShowAddReason(false)}>Annuller</Btn>
        </div>
      </Card>}
      {rts.length===0&&<div style={{color:C.textMuted,textAlign:"center",padding:20}}>Ingen årsager oprettet endnu</div>}
      {rts.map(rt=>{
        const isEdit=editReasonId===rt.id;
        return <Card key={rt.id} style={{padding:"11px 14px",borderLeft:`3px solid ${C.blue}`}}>
          {isEdit?<div>
            <Input label="Årsagstekst" value={editReasonForm.text} onChange={v=>setEditReasonForm(f=>({...f,text:v}))} placeholder="Årsagstekst"/>
            <div style={{display:"flex",gap:8}}>
              <Btn small onClick={saveReasonEdit}>Gem</Btn>
              <Btn small variant="ghost" onClick={()=>setEditReasonId(null)}>Annuller</Btn>
              <Btn small variant="danger" onClick={()=>dispatch({type:"DELETE_REASON_TEXT",id:rt.id})}>Slet</Btn>
            </div>
          </div>:<div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{fontWeight:700,color:C.text,fontSize:13}}>{rt.text}</div>
            <Btn small variant="ghost" onClick={()=>{setEditReasonId(rt.id);setEditReasonForm({text:rt.text});}}>Ret</Btn>
          </div>}
        </Card>;
      })}

}

// ── ADMIN: KARTNUMMER-REGISTER ────────────────────────────────────
function AdminKartRegister({state,dispatch}){
  const reg=state.kartRegister||{ranges:{},numbers:{}};
  const classes=Object.keys(state.classRules||{});
  const [cls,setCls]=useState(classes[0]||"");
  const activeCls=classes.includes(cls)?cls:classes[0]||"";
  const range=kartRange(reg,activeCls);
  const [rStart,setRStart]=useState(range?.start||"");
  const [rEnd,setREnd]=useState(range?.end||"");
  const [sel,setSel]=useState(null); // valgt nummer {num,owner}
  const [reassignId,setReassignId]=useState("");
  const [relDate,setRelDate]=useState(reg.releaseDate||"");
  const [renewDate,setRenewDate]=useState(reg.renewOpenDate||"");
  const [msg,setMsg]=useState("");
  const csvRef=useRef();

  // Opdater interval-felter når klasse skifter
  useEffect(()=>{const r=kartRange(reg,activeCls);setRStart(r?.start||"");setREnd(r?.end||"");setSel(null);},[activeCls]);

  const saveRange=()=>{
    const s=parseInt(rStart),e=parseInt(rEnd);
    if(!s||!e||s>e){setMsg("Ugyldigt interval");return;}
    dispatch({type:"SET_KART_RANGE",className:activeCls,start:s,end:e});
    setMsg(`Interval for ${activeCls}: ${s}–${e}`);
  };
  const saveDates=()=>{
    dispatch({type:"SET_KART_DATES",releaseDate:relDate||"",renewOpenDate:renewDate||""});
    setMsg("Datoer gemt");
  };

  const release=(num)=>{dispatch({type:"RELEASE_KART",className:activeCls,number:num});setSel(null);};
  const reassign=(num)=>{
    if(!reassignId)return;
    const usr=state.users.find(x=>String(x.id)===String(reassignId));
    if(!usr)return;
    dispatch({type:"CLAIM_KART",className:activeCls,number:num,ownerId:usr.id,ownerName:usr.name,ownerLicense:usr.license||""});
    setReassignId("");setSel(null);setMsg(`#${num} tildelt ${usr.name}`);
  };
  const toggleRenew=(num,owner)=>{
    // admin kan manuelt markere/afmarkere fornyelse
    if(owner.renewed)dispatch({type:"CLAIM_KART",className:activeCls,number:num,ownerId:owner.ownerId,ownerName:owner.ownerName,ownerLicense:owner.ownerLicense});
    else dispatch({type:"RENEW_KART",className:activeCls,number:num,ownerId:owner.ownerId});
    setSel(null);
  };

  const runAnnual=()=>{
    const cnt=Object.values(reg.numbers||{}).reduce((a,nums)=>a+Object.values(nums).filter(i=>!i.renewed).length,0);
    const renewed=Object.values(reg.numbers||{}).reduce((a,nums)=>a+Object.values(nums).filter(i=>i.renewed).length,0);
    if(!window.confirm(`Kør årlig frigivelse?\n\nDette frigiver ${cnt} ikke-fornyet nummer(e). ${renewed} fornyet nummer(e) beholdes (og nulstilles til næste sæson).\n\nHandlingen kan ikke fortrydes.`))return;
    dispatch({type:"RUN_ANNUAL_RELEASE"});
    setMsg(`Årlig frigivelse kørt – ${cnt} frigivet, ${renewed} beholdt`);
  };

  // ── CSV import (ID-nummer + kartnummer) ──
  const onCsv=(file)=>{
    if(!file)return;
    const reader=new FileReader();
    reader.onload=()=>{
      const buf=new Uint8Array(reader.result);
      let text;
      if(buf[0]===0xFF&&buf[1]===0xFE)text=new TextDecoder("utf-16le").decode(buf);
      else if(buf[0]===0xFE&&buf[1]===0xFF)text=new TextDecoder("utf-16be").decode(buf);
      else text=new TextDecoder("utf-8").decode(buf);
      text=text.replace(/^\uFEFF/,"");
      const split=(l)=>l.includes(";")?l.split(";"):l.split(",");
      const lines=text.split(/\r?\n/).filter(l=>l.trim());
      if(lines.length<2){setMsg("Tom CSV");return;}
      const head=split(lines[0]).map(h=>h.trim().toLowerCase());
      // Kart-kolonne først (mere specifik), så ID-kolonne
      let ki=head.findIndex(h=>h.includes("kart"));
      if(ki<0)ki=head.findIndex(h=>h==="nr"||h==="nr."||h==="nummer");
      let idi=head.findIndex((h,i)=>i!==ki&&(h.includes("id")||h.includes("licens")));
      if(idi<0||ki<0){setMsg("Kunne ikke finde ID- og kartnummer-kolonner");return;}
      const entries=[];
      lines.slice(1).forEach(l=>{
        const f=split(l);
        const id=(f[idi]||"").trim();
        const num=parseInt((f[ki]||"").replace(/\D/g,""));
        if(!id||!num)return;
        // find matchende profil via licens/ID
        const usr=state.users.find(x=>x.license&&String(x.license).replace(/\D/g,"")===id.replace(/\D/g,""));
        entries.push({className:activeCls,number:num,ownerId:usr?.id||null,ownerName:usr?.name||("ID "+id),ownerLicense:id});
      });
      dispatch({type:"IMPORT_KART_NUMBERS",entries});
      setMsg(`${entries.length} kartnumre importeret til ${activeCls}`);
    };
    reader.readAsArrayBuffer(file);
  };

  const exportCsv=()=>{
    let csv="\uFEFFKlasse;Kartnummer;Ejer;Licens/ID;Frigives\n";
    Object.entries(reg.numbers||{}).forEach(([c,nums])=>{
      Object.entries(nums).sort((a,b)=>a[0]-b[0]).forEach(([num,info])=>{
        csv+=`${c};${num};"${info.ownerName||""}";${info.ownerLicense||""};${info.releaseDate||""}\n`;
      });
    });
    const a=document.createElement("a");
    a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8"}));
    a.download="kartnummer_register_"+new Date().toISOString().slice(0,10)+".csv";
    a.click();
  };

  const nums=reg.numbers?.[activeCls]||{};
  const takenCount=Object.keys(nums).length;
  const total=range?(range.end-range.start+1):0;

  return <div>
    <SH title="Kartnummer-register" sub="Intervaller, tildeling og frigivelse pr. klasse"/>
    {msg&&<div style={{background:`${C.green}22`,border:`1px solid ${C.green}44`,borderRadius:8,padding:10,marginBottom:10,color:C.green,fontSize:12,fontWeight:600}}>{msg}</div>}

    <div style={{display:"flex",gap:6,overflowX:"auto",marginBottom:12,paddingBottom:4}}>
      {classes.map(c=><button key={c} onClick={()=>setCls(c)} style={{background:activeCls===c?state.classRules[c]?.color||C.red:C.surface2,color:activeCls===c?"#fff":C.textMuted,border:`1px solid ${activeCls===c?state.classRules[c]?.color||C.red:C.border}`,borderRadius:20,padding:"5px 14px",fontSize:12,cursor:"pointer",whiteSpace:"nowrap",fontFamily:"inherit",fontWeight:activeCls===c?700:400}}>{c}</button>)}
    </div>

    {/* Globale datoer */}
    <Card style={{borderLeft:`3px solid ${C.orange}`}}>
      <div style={{color:C.textMuted,fontSize:10,letterSpacing:2,marginBottom:8}}>ÅRLIGE DATOER (gælder alle klasser)</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <Input label="Fornyelse åbner" value={renewDate} onChange={setRenewDate} placeholder="2026-12-18"/>
        <Input label="Frigivelsesdato" value={relDate} onChange={setRelDate} placeholder="2027-01-01"/>
      </div>
      <Btn small onClick={saveDates}>Gem datoer</Btn>
      <div style={{color:C.textDim,fontSize:10,marginTop:6}}>Fra "fornyelse åbner" til "frigivelsesdato" kan kørere forny deres nuværende nummer (samme klasse) til et år mere. Ved den årlige frigivelse fjernes alle ikke-fornyede numre.</div>
    </Card>

    {/* Interval */}
    <Card style={{borderLeft:`3px solid ${C.red}`}}>
      <div style={{color:C.textMuted,fontSize:10,letterSpacing:2,marginBottom:8}}>NUMMERINTERVAL – {activeCls}</div>
      <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
        <Input label="Fra" value={String(rStart)} onChange={setRStart} placeholder="1" type="number"/>
        <Input label="Til" value={String(rEnd)} onChange={setREnd} placeholder="99" type="number"/>
        <Btn small onClick={saveRange} style={{marginBottom:10}}>Gem interval</Btn>
      </div>
      {range&&<div style={{color:C.textDim,fontSize:11}}>{takenCount} af {total} numre i brug</div>}
    </Card>

    {/* CSV + årlig frigivelse */}
    <Card>
      <div style={{color:C.textMuted,fontSize:10,letterSpacing:2,marginBottom:8}}>VÆRKTØJER</div>
      <input type="file" accept=".csv,text/csv" style={{display:"none"}} ref={csvRef} onChange={e=>{onCsv(e.target.files[0]);e.target.value="";}}/>
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        <Btn small variant="secondary" onClick={()=>csvRef.current?.click()}>📥 Importér CSV (til {activeCls})</Btn>
        <Btn small variant="secondary" onClick={exportCsv}>💾 Eksportér backup (CSV)</Btn>
        <Btn small variant="danger" onClick={runAnnual}>🗓 Kør årlig frigivelse</Btn>
      </div>
      <div style={{color:C.textDim,fontSize:10,marginTop:6}}>CSV-import parrer kartnummer med kørere via ID-/licensnummer. Årlig frigivelse fjerner alle ikke-fornyede numre.</div>
    </Card>

    {/* Oversigt */}
    <Card style={{borderLeft:`3px solid ${C.blue}`}}>
      <div style={{color:C.textMuted,fontSize:10,letterSpacing:2,marginBottom:8}}>NUMRE – {activeCls} (klik for detaljer)</div>
      <div style={{display:"flex",gap:12,marginBottom:8,fontSize:11}}><span style={{color:C.green}}>■ Ledig</span><span style={{color:C.textDim}}>■ Optaget</span></div>
      <KartNumberGrid cls={activeCls} reg={reg} selectedNum={sel?.num} onPick={(num,owner)=>{setSel({num,owner});setReassignId("");}}/>
    </Card>

    {/* Detalje/handlinger for valgt nummer */}
    {sel&&<Card style={{borderLeft:`3px solid ${sel.owner?C.orange:C.green}`}}>
      <div style={{fontWeight:700,color:C.text,fontSize:15,marginBottom:6}}>#{sel.num} · {activeCls}</div>
      {sel.owner?<div>
        <div style={{color:C.textMuted,fontSize:12,marginBottom:2}}>Ejer: <strong style={{color:C.text}}>{sel.owner.ownerName}</strong>{sel.owner.ownerLicense?" ("+sel.owner.ownerLicense+")":""}</div>
        <div style={{color:sel.owner.renewed?C.green:C.textDim,fontSize:11,marginBottom:2}}>{sel.owner.renewed?"✓ Fornyet – beholdes ved frigivelse":"Ikke fornyet – frigives ved årlig frigivelse"}</div>
        {!sel.owner.ownerId&&<div style={{color:C.textDim,fontSize:10,marginBottom:6}}>Importeret – ikke koblet til en profil endnu</div>}
        <div style={{margin:"10px 0"}}>
          <Btn small variant="ghost" onClick={()=>toggleRenew(sel.num,sel.owner)}>{sel.owner.renewed?"Fjern fornyelse":"Markér som fornyet"}</Btn>
        </div>
        <div style={{margin:"10px 0",display:"flex",gap:8,alignItems:"flex-end"}}>

// ── CSV IMPORT (MESTERSKABSSTILLING) ──────────────────────────────
// Parser CSV eksporteret fra RMC beregnings-værktøjet.
// Format: Pl.,Nr.,Navn, [Afd.N Kval,Afd.N Heats,Afd.N Pre,Afd.N Finale]... ,Total[,Med fratræk]
function parseStandingsCsv(arrayBuffer,fileName){
  const buf=new Uint8Array(arrayBuffer);
  let text;
  if(buf[0]===0xFF&&buf[1]===0xFE)text=new TextDecoder("utf-16le").decode(buf);
  else if(buf[0]===0xFE&&buf[1]===0xFF)text=new TextDecoder("utf-16be").decode(buf);
  else text=new TextDecoder("utf-8").decode(buf);
  text=text.replace(/^\uFEFF/,"");
  const splitLine=(line)=>{
    const out=[];let cur="";let inQ=false;
    for(let i=0;i<line.length;i++){
      const ch=line[i];
      if(ch==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
      else if(ch===","&&!inQ){out.push(cur);cur="";}
      else cur+=ch;
    }
    out.push(cur);return out;
  };
  const lines=text.split(/\r?\n/).filter(l=>l.trim().length>0);
  if(lines.length<2)return{error:"Filen indeholder ingen datarækker"};
  const header=splitLine(lines[0]).map(h=>h.trim());
  // Find afdelinger ud fra "Afd.N Kval"-kolonner
  const rounds=[];
  header.forEach(h=>{const m=h.match(/^Afd\.(\d+)\s+Kval$/i);if(m)rounds.push(parseInt(m[1]));});
  if(header[0].toLowerCase().indexOf("pl")!==0||!rounds.length)
    return{error:"Ukendt format – forventede en mesterskabs-CSV fra beregningsværktøjet (Pl., Nr., Navn, Afd.1 Kval ...)"};
  const hasDrop=header[header.length-1].toLowerCase().includes("fratræk")||header[header.length-1].toLowerCase().includes("fratraek");
  // Klassenavn: udled fra filnavnet (RMC_DK_2026_Rotax_Junior.csv → "Rotax Junior")
  let className=(fileName||"").replace(/\.csv$/i,"");
  className=className.replace(/^RMC[_ ]?DK[_ ]?\d{0,4}[_ ]?/i,"");
  className=className.replace(/plus/gi,"+").replace(/_/g," ").trim();
  if(!className)className="Ukendt klasse";
  const rows=lines.slice(1).map(line=>{
    const f=splitLine(line);
    const segs={};
    rounds.forEach((rn,ri)=>{
      const base=3+ri*4;
      segs[rn]={kval:f[base]||"",heats:f[base+1]||"",pre:f[base+2]||"",finale:f[base+3]||""};
    });
    const totalIdx=3+rounds.length*4;
    return{
      pos:parseInt(f[0])||null,
      nr:(f[1]||"").trim(),
      name:(f[2]||"").trim(),
      segs,
      total:(f[totalIdx]||"").trim(),
      drop:hasDrop?(f[totalIdx+1]||"").trim():null,
    };
  }).filter(r=>r.name);
  return{error:null,className,rounds,hasDrop,rows};
}


function parseDasuCsv(arrayBuffer){
  const buf=new Uint8Array(arrayBuffer);
  let text;
  if(buf[0]===0xFF&&buf[1]===0xFE)text=new TextDecoder("utf-16le").decode(buf);
  else if(buf[0]===0xFE&&buf[1]===0xFF)text=new TextDecoder("utf-16be").decode(buf);
  else text=new TextDecoder("utf-8").decode(buf);
  text=text.replace(/^\uFEFF/,"");
  const splitLine=(line)=>{
    if(!line.includes('"'))return line.split(";");
    const out=[];let cur="";let inQ=false;
    for(let i=0;i<line.length;i++){
      const ch=line[i];
      if(ch==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
      else if(ch===";"&&!inQ){out.push(cur);cur="";}
      else cur+=ch;
    }
    out.push(cur);return out;
  };
  const lines=text.split(/\r?\n/).filter(l=>l.trim().length>0);
  if(lines.length<2)return{error:"Filen indeholder ingen datarækker",rows:[]};
  const headers=splitLine(lines[0]).map(h=>h.trim().toLowerCase());
  const col=(names)=>{for(const n of names){const i=headers.indexOf(n.toLowerCase());if(i>=0)return i;}return -1;};
  const ci={
    name:col(["Navn"]),license:col(["ID-nummer","ID nummer","Licensnummer"]),dob:col(["Fødselsdag","Foedselsdag"]),
    club:col(["Klubnavn"]),phone:col(["Telefon"]),email:col(["E-mailadresse","Email","E-mail"]),
    cls:col(["Klasse"]),licenseType:col(["Licenstype"]),licenseOk:col(["Licens OK"]),
    transponder:col(["Transponder"]),kartNo:col(["KartNr","Kart Nr","Kartnummer"]),
    guardian:col(["Værges navn","Vaerges navn"]),paid:col(["Betaling modtaget"]),
  };
  if(ci.name<0||ci.cls<0)return{error:"Kunne ikke finde kolonnerne 'Navn' og 'Klasse' – er det en DASU-deltagerliste?",rows:[]};
  const normClass=(c)=>{
    const x=c.replace(/\s*\(.*\)\s*/g,"").trim();
    const map={"rotax micro":"Rotax Micro","rotax mini":"Rotax Mini","rotax junior":"Rotax Junior","rotax senior":"Rotax Senior","rotax dd2":"Rotax DD2","rotax dd2 master":"DD2 Master","dd2 master":"DD2 Master","rotax dd2 master+":"DD2 Master+","dd2 master+":"DD2 Master+"};
    return map[x.toLowerCase()]||x;
  };
  const normDate=(d)=>{const m=(d||"").trim().match(/^(\d{2})-(\d{2})-(\d{4})$/);return m?`${m[3]}-${m[2]}-${m[1]}`:(d||"").trim();};
  const g=(f,i)=>ci[i]>=0?(f[ci[i]]||"").trim():"";
  const rows=lines.slice(1).map(line=>{
    const f=splitLine(line);
    const rawClass=g(f,"cls");
    const onsite=/betal tilmeldingsgebyret/i.test(rawClass);
    return{
      name:g(f,"name"),license:g(f,"license"),dob:normDate(g(f,"dob")),club:g(f,"club"),
      phone:g(f,"phone"),email:g(f,"email"),class:normClass(rawClass),licenseType:g(f,"licenseType"),
      licenseOk:g(f,"licenseOk").toLowerCase()==="ja",transponder:g(f,"transponder"),
      kartNo:parseInt(g(f,"kartNo"))||null,guardian:g(f,"guardian"),
      paid:g(f,"paid").toUpperCase()==="ACCEPTED",onsite,
    };
  }).filter(r=>r.name);
  return{error:null,rows};
}

function AdminImport({state,dispatch}){
  const [selEv,setSelEv]=useState(String(state.events[0]?.id));
  const [parsed,setParsed]=useState(null);
  const [fileName,setFileName]=useState("");
  const [importedMsg,setImportedMsg]=useState("");
  const fileRef=useRef();
  const ev=state.events.find(e=>e.id===parseInt(selEv));

  const onFile=(file)=>{
    if(!file)return;
    setFileName(file.name);setImportedMsg("");
    const reader=new FileReader();
    reader.onload=()=>setParsed(parseDasuCsv(reader.result));
    reader.readAsArrayBuffer(file);
  };

  const doImport=()=>{
    if(!parsed||!parsed.rows.length||!ev)return;
    const batchId="import-"+Date.now();
    dispatch({type:"IMPORT_PARTICIPANTS",eventId:ev.id,batchId,rows:parsed.rows});
    setImportedMsg(`${parsed.rows.length} deltagere importeret til ${ev.name}`);
    setParsed(null);setFileName("");
  };

  // Eksisterende import-batches (på tværs af alle løb)
  const batches={};
  state.events.forEach(e=>(e.registrations||[]).forEach(r=>{
    if(r.importBatch){
      if(!batches[r.importBatch])batches[r.importBatch]={count:0,events:new Set()};
      batches[r.importBatch].count++;batches[r.importBatch].events.add(e.name);
    }
  }));
  const batchList=Object.entries(batches);

  const evClasses=ev?.classes||Object.keys(state.classRules);
  const classCounts={};const warnings=[];
  if(parsed&&!parsed.error){
    parsed.rows.forEach(r=>{classCounts[r.class]=(classCounts[r.class]||0)+1;});
    const unknown=[...new Set(parsed.rows.filter(r=>!evClasses.includes(r.class)).map(r=>r.class))];
    if(unknown.length)warnings.push(`Klasser der ikke findes på løbet: ${unknown.join(", ")}`);
    const noKart=parsed.rows.filter(r=>!r.kartNo).length;
    if(noKart)warnings.push(`${noKart} deltager(e) uden kartnummer`);
    const dup={};
    parsed.rows.forEach(r=>{if(r.kartNo){const k=r.class+"#"+r.kartNo;dup[k]=(dup[k]||0)+1;}});
    const dups=Object.entries(dup).filter(([,n])=>n>1).map(([k])=>k);
    if(dups.length)warnings.push(`Dublerede kartnumre i samme klasse: ${dups.join(", ")}`);
    Object.entries(classCounts).forEach(([cls,n])=>{
      const m=classLimitFor(ev,cls);
      if(m&&(classCount(ev,cls)+n)>m)warnings.push(`${cls}: import giver ${classCount(ev,cls)+n} tilmeldte – maks er ${m}`);
    });
  }

  return <div>
    <SH title="CSV Import" sub="Testimport af deltagerliste fra DASU"/>
    <div style={{background:`${C.blue}11`,border:`1px solid ${C.blue}44`,borderRadius:6,padding:8,marginBottom:10,fontSize:11,color:C.blue}}>
      Importér en deltagerliste (CSV) fra DASU-tilmeldingssystemet, så systemet kan testes live sideløbende – uden at deltagerne skal tilmelde sig her. Der oprettes kørerprofiler og tilmeldinger på det valgte løb. Alt kan fjernes igen med ét klik.
    </div>
    {importedMsg&&<div style={{background:`${C.green}22`,border:`1px solid ${C.green}44`,borderRadius:8,padding:12,marginBottom:10,color:C.green,fontWeight:700,textAlign:"center"}}>✅ {importedMsg}</div>}
    <Card style={{borderLeft:`3px solid ${C.red}`}}>
      <Sel label="Importér til løb" value={selEv} onChange={setSelEv} options={state.events.map(e=>({value:String(e.id),label:e.name}))}/>
      <input type="file" accept=".csv,text/csv" style={{display:"none"}} ref={fileRef} onChange={e=>{onFile(e.target.files[0]);e.target.value="";}}/>
      <div onClick={()=>fileRef.current?.click()} style={{textAlign:"center",padding:"16px",background:C.bg,borderRadius:6,border:`2px dashed ${C.border}`,cursor:"pointer",marginBottom:10}}>
        <div style={{fontSize:22}}>📥</div>
        <div style={{color:C.text,fontSize:13,fontWeight:700}}>{fileName||"Vælg CSV-fil fra DASU"}</div>
        <div style={{color:C.textMuted,fontSize:11}}>Semikolon-separeret · UTF-8 eller UTF-16</div>
      </div>
      {parsed&&parsed.error&&<div style={{background:`${C.red}11`,border:`1px solid ${C.red}44`,borderRadius:6,padding:10,color:C.red,fontSize:12,fontWeight:700}}>⚠️ {parsed.error}</div>}
      {parsed&&!parsed.error&&<div>
        <div style={{color:C.textMuted,fontSize:10,letterSpacing:2,marginBottom:6}}>FORHÅNDSVISNING – {parsed.rows.length} DELTAGERE</div>
        <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:8}}>
          {Object.entries(classCounts).map(([cls,n])=><Badge key={cls} color={evClasses.includes(cls)?state.classRules[cls]?.color||C.red:C.orange} style={{fontSize:10}}>{cls}: {n}</Badge>)}
        </div>
        {warnings.map((w,i)=><div key={i} style={{background:`${C.orange}11`,border:`1px solid ${C.orange}44`,borderRadius:6,padding:8,marginBottom:6,fontSize:11,color:C.orange}}>⚠️ {w}</div>)}
        <div style={{maxHeight:260,overflowY:"auto",border:`1px solid ${C.border}`,borderRadius:6,marginBottom:10}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
            <thead><tr style={{background:C.surface2,position:"sticky",top:0}}>{["Kart","Navn","Klasse","Licens","Klub","Betalt"].map(h=><th key={h} style={{padding:"6px 8px",color:C.textMuted,fontWeight:600,textAlign:"left",fontSize:9,letterSpacing:1}}>{h}</th>)}</tr></thead>
            <tbody>{parsed.rows.map((r,i)=><tr key={i} style={{borderBottom:`1px solid ${C.border}`}}>
              <td style={{padding:"5px 8px",fontFamily:"monospace",color:C.textMuted}}>{r.kartNo?"#"+r.kartNo:"—"}</td>
              <td style={{padding:"5px 8px",fontWeight:700,color:C.text}}>{r.name}</td>
              <td style={{padding:"5px 8px",color:evClasses.includes(r.class)?C.textMuted:C.orange}}>{r.class}</td>
              <td style={{padding:"5px 8px",color:r.licenseOk?C.green:C.textDim}}>{r.license}{r.licenseOk?" ✓":""}</td>
              <td style={{padding:"5px 8px",color:C.textMuted}}>{r.club}</td>
              <td style={{padding:"5px 8px",color:r.paid?C.green:C.orange}}>{r.paid?"✓ Betalt":"På banen"}</td>
            </tr>)}</tbody>
          </table>
        </div>
        <Btn onClick={doImport} style={{width:"100%"}} disabled={!parsed.rows.length}>📥 IMPORTÉR {parsed.rows.length} DELTAGERE TIL {ev?.name?.toUpperCase()||"LØB"}</Btn>
      </div>}
    </Card>
    {/* Eksisterende importer */}
    {batchList.length>0&&<Card style={{borderLeft:`3px solid ${C.orange}`}}>
      <div style={{color:C.textMuted,fontSize:10,letterSpacing:2,marginBottom:8}}>IMPORTEREDE TESTDATA ({batchList.length})</div>
      {batchList.map(([bid,info])=><div key={bid} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 0",borderBottom:`1px solid ${C.border}`}}>
        <div style={{flex:1}}>
          <div style={{fontWeight:700,color:C.text,fontSize:12}}>{[...info.events].join(", ")}</div>
          <div style={{color:C.textMuted,fontSize:10}}>{info.count} tilmeldinger · {new Date(parseInt(bid.replace("import-","")))?.toLocaleString?.("da-DK")||bid}</div>
        </div>
        <Btn small variant="danger" onClick={()=>dispatch({type:"REMOVE_IMPORT_BATCH",batchId:bid})}>Fjern import</Btn>
      </div>)}
      <div style={{color:C.textDim,fontSize:10,marginTop:6}}>Fjerner både tilmeldinger og de kørerprofiler der blev oprettet ved importen.</div>
    </Card>}
  </div>;
}


function DriverListScreen({state,dispatch}){

  const classes=["Alle",...new Set(regs.map(r=>r.class))];
  const filtered=regs
    .filter(r=>selClass==="Alle"||r.class===selClass)
    .map(r=>{const u=state.users.find(u=>u.id===r.userId);return{reg:r,user:u};})
    .filter(({user})=>user&&(!search||user.name.toLowerCase().includes(search.toLowerCase())||String(user.kartNumber).includes(search)))
    .sort((a,b)=>(a.user.kartNumber||0)-(b.user.kartNumber||0));

  const openDriver=(item)=>{
    setSelDriver(item);setEditMode(false);setSaved(false);
    setEditForm({name:item.user.name,phone:item.user.phone||"",license:item.user.license||"",transponder:item.user.transponder||"",kartNumber:item.user.kartNumber||"",club:item.user.club||""});
  };
  const saveDriver=()=>{
    dispatch({type:"UPDATE_USER",payload:{id:selDriver.user.id,name:editForm.name,phone:editForm.phone,license:editForm.license,transponder:editForm.transponder,kartNumber:parseInt(editForm.kartNumber)||undefined,club:editForm.club}});
    setSaved(true);setTimeout(()=>setSaved(false),2000);
  };
  const pens=(selDriver&&ev)?((ev.penalties||[]).filter(p=>p.approved&&(p.kartNo===selDriver.user.kartNumber||p.driverName===selDriver.user.name))):[]; 

  if(selDriver){
    const u=selDriver.user;
    return <div style={{padding:16,overflowY:"auto",height:"100%"}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}>
        <Btn small variant="ghost" onClick={()=>setSelDriver(null)}>← Tilbage</Btn>
        <Btn small variant={editMode?"secondary":"ghost"} onClick={()=>{setEditMode(!editMode);setSaved(false);}}>{editMode?"Annuller":"✏️ Rediger"}</Btn>
      </div>
      <div style={{background:`linear-gradient(135deg,${C.redDark},#1a0003)`,borderRadius:10,padding:18,marginBottom:14,display:"flex",gap:14,alignItems:"center"}}>
        <div style={{width:52,height:52,borderRadius:"50%",background:`linear-gradient(135deg,${C.red},${C.redDark})`,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,color:"white",fontSize:20,flexShrink:0}}>{u.name?.charAt(0)}</div>
        <div>
          <div style={{fontWeight:900,color:"white",fontSize:26,fontFamily:"'Barlow Condensed',sans-serif"}}> #{u.kartNumber}</div>
          <div style={{color:"rgba(255,255,255,0.9)",fontWeight:700,fontSize:15}}>{u.name}</div>
          <div style={{color:"rgba(255,255,255,0.6)",fontSize:12}}>{selDriver.reg.class} · {u.club||"—"}</div>
        </div>
      </div>
      {editMode?<Card>
        <div style={{color:C.textMuted,fontSize:10,letterSpacing:2,marginBottom:10}}>REDIGER OPLYSNINGER</div>
        <Input label="Navn" value={editForm.name} onChange={v=>setEditForm(f=>({...f,name:v}))} placeholder="Fuldt navn"/>
        <Input label="Telefon" value={editForm.phone} onChange={v=>setEditForm(f=>({...f,phone:v}))} placeholder="Mobilnummer"/>
        <Input label="Licensnummer" value={editForm.license} onChange={v=>setEditForm(f=>({...f,license:v}))} placeholder="DK-2026-XXXX"/>
        <Input label="Transponder" value={editForm.transponder} onChange={v=>setEditForm(f=>({...f,transponder:v}))} placeholder="T-XXXX"/>
        <Input label="Kart #" value={String(editForm.kartNumber||"")} onChange={v=>setEditForm(f=>({...f,kartNumber:v}))} placeholder="98" type="number"/>
        <Input label="Klub" value={editForm.club} onChange={v=>setEditForm(f=>({...f,club:v}))} placeholder="Klubnavn"/>
        {saved?<div style={{background:`${C.green}22`,border:`1px solid ${C.green}44`,borderRadius:8,padding:12,textAlign:"center",color:C.green,fontWeight:700}}>✅ Gemt!</div>:<Btn onClick={saveDriver} fullWidth>Gem ændringer</Btn>}
      </Card>:<Card>
        <div style={{color:C.textMuted,fontSize:10,letterSpacing:2,marginBottom:10}}>KØRERDATA</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {[["Licens",u.license],["Transponder",u.transponder],["Klasse",selDriver.reg.class],["Kart #",u.kartNumber],["Klub",u.club],["Telefon",u.phone]].filter(([,v])=>v).map(([k,v])=><div key={k}><div style={{color:C.textDim,fontSize:10}}>{k}</div><div style={{color:C.text,fontWeight:600,fontSize:13}}>{v}</div></div>)}
        </div>
      </Card>}
      <Card accentColor={pens.length>0?C.orange:C.green}>
        <div style={{color:C.textMuted,fontSize:10,letterSpacing:2,marginBottom:8}}>STRAFFE ({pens.length})</div>
        {pens.length===0?<div style={{color:C.green,fontSize:12}}>✓ Ingen straffe</div>:pens.map((p,i)=><div key={i} style={{padding:"6px 0",borderBottom:i<pens.length-1?`1px solid ${C.border}`:"none"}}>
          <div style={{display:"flex",justifyContent:"space-between"}}><span style={{color:C.text,fontSize:12,fontWeight:700}}>{p.session}</span><Badge color={C.orange} style={{fontSize:9}}>{p.type}{p.seconds>0?" +"+p.seconds+"s":""}</Badge></div>
          <div style={{color:C.textMuted,fontSize:11}}>{p.reason}</div>
        </div>)}
      </Card>
    </div>;
  }

  return <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
    <div style={{padding:"16px 16px 0",flexShrink:0}}>
      <SH title="Kørerliste" sub="Tilmeldte kørere"/>
      <div style={{display:"flex",gap:6,marginBottom:4}}>
        <div style={{flex:1}}>
          <div style={{color:C.textMuted,fontSize:10,letterSpacing:1,marginBottom:4,textTransform:"uppercase"}}>Løb</div>
          <select value={selEv} onChange={e=>{setSelEv(e.target.value);setSelClass("Alle");}} style={{width:"100%",background:C.surface2,border:`1px solid ${C.border}`,borderRadius:6,padding:"7px 10px",color:C.text,fontSize:12,fontFamily:"inherit"}}>
            {state.events.map(e=><option key={e.id} value={String(e.id)}>{e.name}</option>)}
          </select>
        </div>
      </div>
      <div style={{display:"flex",gap:5,overflowX:"auto",marginBottom:8,paddingBottom:2}}>
        {classes.map(cls=><button key={cls} onClick={()=>setSelClass(cls)} style={{background:selClass===cls?state.classRules[cls]?.color||C.red:C.surface2,color:selClass===cls?"#fff":C.textMuted,border:`1px solid ${selClass===cls?state.classRules[cls]?.color||C.red:C.border}`,borderRadius:20,padding:"4px 10px",fontSize:10,cursor:"pointer",whiteSpace:"nowrap",fontFamily:"inherit"}}>{cls}</button>)}
      </div>
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍  Søg på kart # eller navn..."
        style={{width:"100%",background:C.surface2,border:`1px solid ${C.border}`,borderRadius:6,padding:"9px 12px",color:C.text,fontSize:13,boxSizing:"border-box",marginBottom:8,fontFamily:"inherit"}}/>
      <div style={{color:C.textMuted,fontSize:11,marginBottom:8}}>{filtered.length} kørere</div>
    </div>
    <div style={{flex:1,overflowY:"auto",padding:"0 16px 16px"}}>
      <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,overflow:"hidden"}}>
        {filtered.length===0&&<div style={{padding:24,textAlign:"center",color:C.textMuted}}>Ingen kørere fundet</div>}
        {filtered.map(({reg,user},i)=><div key={user.id} onClick={()=>openDriver({reg,user})} style={{display:"grid",gridTemplateColumns:"56px 1fr auto",alignItems:"center",padding:"10px 14px",borderBottom:i<filtered.length-1?`1px solid ${C.border}`:"none",cursor:"pointer"}}>
          <div style={{fontWeight:900,color:C.text,fontSize:22,fontFamily:"'Barlow Condensed',sans-serif"}}>#{user.kartNumber}</div>
          <div><div style={{fontWeight:700,color:C.text,fontSize:13}}>{user.name}</div><div style={{color:C.textMuted,fontSize:11}}>{reg.class}</div></div>
          <div style={{display:"flex",gap:4,alignItems:"center"}}>
            {user.licenseValid===true&&<span style={{fontSize:12}}>✅</span>}
            {user.licenseValid===false&&<span style={{fontSize:12}}>❌</span>}
            <span style={{color:C.textDim,fontSize:18}}>›</span>
          </div>
        </div>)}
      </div>
    </div>
  </div>;
}

function LicenseControl({state,dispatch}){
  const [selEv,setSelEv]=useState(String(state.events[0]?.id));
  const [selClass,setSelClass]=useState("Alle");
  const [search,setSearch]=useState("");
  const [editUser,setEditUser]=useState(null);
  const [editForm,setEditForm]=useState({});
  const [saved,setSaved]=useState(false);

  const ev=state.events.find(e=>e.id===parseInt(selEv))||state.events[0];
  const checks=ev?.licenseChecks||{};
  const fridayPaid=ev?.fridayPaid||{};

  const regs=(ev?.registrations||[]);
  const classes=["Alle",...new Set(regs.map(r=>r.class))];

  const filtered=regs
    .filter(r=>selClass==="Alle"||r.class===selClass)
    .map(r=>{const u=state.users.find(u=>u.id===r.userId);return{reg:r,user:u};})
    .filter(({user})=>user&&(!search||user.name.toLowerCase().includes(search.toLowerCase())||String(user.kartNumber).includes(search)))
    .sort((a,b)=>(a.user.kartNumber||0)-(b.user.kartNumber||0));

  const setCheck=(userId,field,val)=>dispatch({type:"SET_LICENSE_CHECK",eventId:parseInt(selEv),userId,field,value:val});
  const setFriday=(userId,val)=>dispatch({type:"SET_FRIDAY_PAID",eventId:parseInt(selEv),userId,value:val});

  const classGroups={};
  if(selClass==="Alle"){
    filtered.forEach(item=>{
      const cls=item.reg.class;
      if(!classGroups[cls])classGroups[cls]=[];
      classGroups[cls].push(item);
    });
  } else {
    classGroups[selClass]=filtered;
  }

  const totalOk=filtered.filter(({user})=>checks[user.id+"_ok"]).length;
  const totalFriday=filtered.filter(({user})=>fridayPaid[user.id]).length;
  const totalAll=filtered.length;

  const openEdit=(item)=>{
    const u=item.user;
    setEditUser(item);
    setEditForm({name:u.name||"",phone:u.phone||"",license:u.license||"",transponder:u.transponder||"",kartNumber:u.kartNumber||"",licenseValid:u.licenseValid??null});
    setSaved(false);
  };
  const saveEdit=()=>{
    dispatch({type:"UPDATE_USER",payload:{id:editUser.user.id,name:editForm.name,phone:editForm.phone,license:editForm.license,transponder:editForm.transponder,kartNumber:parseInt(editForm.kartNumber)||undefined,licenseValid:editForm.licenseValid}});
    setSaved(true);setTimeout(()=>{setSaved(false);setEditUser(null);},1500);
  };

  // ── Edit profile panel ─────────────────────────────────────────
  if(editUser){
    const u=editUser.user;
    return <div style={{padding:16,overflowY:"auto",height:"100%"}}>
      <Btn small variant="ghost" onClick={()=>setEditUser(null)} style={{marginBottom:14}}>← Tilbage</Btn>
      <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:16}}>
        <div style={{width:52,height:52,borderRadius:"50%",background:`linear-gradient(135deg,${C.red},${C.redDark})`,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,color:"white",fontSize:18,flexShrink:0}}>{u.name?.charAt(0)}</div>
        <div>
          <div style={{fontWeight:900,color:C.text,fontSize:24,fontFamily:"'Barlow Condensed',sans-serif"}}>#{u.kartNumber}</div>
          <div style={{fontWeight:700,color:C.text,fontSize:15}}>{u.name}</div>
          <div style={{color:C.textMuted,fontSize:12}}>{editUser.reg.class}</div>
        </div>
      </div>
      <Card style={{borderLeft:`3px solid ${C.red}`}}>
        <div style={{color:C.textMuted,fontSize:10,letterSpacing:2,marginBottom:12}}>REDIGER OPLYSNINGER</div>
        <Input label="Navn" value={editForm.name} onChange={v=>setEditForm(f=>({...f,name:v}))} placeholder="Fuldt navn"/>
        <Input label="Telefon" value={editForm.phone} onChange={v=>setEditForm(f=>({...f,phone:v}))} placeholder="Mobilnummer"/>
        <Input label="Licensnummer" value={editForm.license} onChange={v=>setEditForm(f=>({...f,license:v}))} placeholder="DK-2026-XXXX"/>
        <div style={{marginBottom:10}}>
          <div style={{color:C.textMuted,fontSize:10,letterSpacing:1,marginBottom:6,textTransform:"uppercase"}}>Licens status</div>
          <div style={{display:"flex",gap:6}}>
            {[[true,"✅ Godkendt",C.green],[false,"❌ Ugyldig",C.red],[null,"⏳ Ikke tjekket",C.orange]].map(([val,label,col])=>
              <button key={String(val)} onClick={()=>setEditForm(f=>({...f,licenseValid:val}))} style={{background:editForm.licenseValid===val?col+"22":C.surface2,border:`1px solid ${editForm.licenseValid===val?col:C.border}`,borderRadius:6,padding:"5px 10px",color:editForm.licenseValid===val?col:C.textMuted,cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>{label}</button>
            )}
          </div>
        </div>
        <Input label="Transponder" value={editForm.transponder} onChange={v=>setEditForm(f=>({...f,transponder:v}))} placeholder="T-XXXX"/>
        <Input label="Kart #" value={String(editForm.kartNumber||"")} onChange={v=>setEditForm(f=>({...f,kartNumber:v}))} placeholder="98" type="number"/>
        {saved?<div style={{background:`${C.green}22`,border:`1px solid ${C.green}44`,borderRadius:8,padding:12,textAlign:"center",color:C.green,fontWeight:700}}>✅ Gemt! Går tilbage...</div>:<Btn onClick={saveEdit} fullWidth>Gem ændringer</Btn>}
      </Card>
    </div>;
  }

  return <div style={{height:"100%",display:"flex",flexDirection:"column"}}>
    {/* Header */}
    <div style={{padding:"16px 20px 0",flexShrink:0}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
        <div>
          <div style={{height:3,width:36,background:C.red,marginBottom:8,borderRadius:2}}/>
          <h2 style={{margin:0,fontSize:20,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:2,color:C.text,textTransform:"uppercase"}}>Licenskontrol</h2>
          <div style={{color:C.textMuted,fontSize:11,marginTop:2}}>Tryk på kører for at redigere</div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"flex-start",flexWrap:"wrap",justifyContent:"flex-end"}}>
          <div style={{background:`${C.green}22`,border:`1px solid ${C.green}44`,borderRadius:6,padding:"6px 12px",textAlign:"center"}}>
            <div style={{color:C.green,fontWeight:900,fontSize:18}}>{totalOk}/{totalAll}</div>
            <div style={{color:C.green,fontSize:9,letterSpacing:1}}>LICENS OK</div>
          </div>
          <div style={{background:`${C.blue}22`,border:`1px solid ${C.blue}44`,borderRadius:6,padding:"6px 12px",textAlign:"center"}}>
            <div style={{color:C.blue,fontWeight:900,fontSize:18}}>{totalFriday}/{totalAll}</div>
            <div style={{color:C.blue,fontSize:9,letterSpacing:1}}>FREDAG</div>
          </div>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
        <div>
          <div style={{color:C.textMuted,fontSize:10,letterSpacing:1,marginBottom:4,textTransform:"uppercase"}}>Løb</div>
          <select value={selEv} onChange={e=>setSelEv(e.target.value)} style={{width:"100%",background:C.surface2,border:`1px solid ${C.border}`,borderRadius:6,padding:"7px 10px",color:C.text,fontSize:12,fontFamily:"inherit"}}>
            {state.events.map(e=><option key={e.id} value={String(e.id)}>{e.name}</option>)}
          </select>
        </div>
        <div>
          <div style={{color:C.textMuted,fontSize:10,letterSpacing:1,marginBottom:4,textTransform:"uppercase"}}>Klasse</div>
          <select value={selClass} onChange={e=>setSelClass(e.target.value)} style={{width:"100%",background:C.surface2,border:`1px solid ${C.border}`,borderRadius:6,padding:"7px 10px",color:C.text,fontSize:12,fontFamily:"inherit"}}>
            {classes.map(c=><option key={c} value={c}>{c}</option>)}
          </select>
        </div>
      </div>
      <div style={{marginBottom:10}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Søg på navn eller kart #..." style={{width:"100%",background:C.surface2,border:`1px solid ${C.border}`,borderRadius:6,padding:"7px 12px",color:C.text,fontSize:12,boxSizing:"border-box",fontFamily:"inherit"}}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 110px 110px",background:C.surface2,padding:"8px 14px",borderRadius:"6px 6px 0 0",border:`1px solid ${C.border}`,borderBottom:"none"}}>
        <span style={{color:C.textMuted,fontSize:10,letterSpacing:1}}>KART # / NAVN / DATA</span>
        <span style={{color:C.green,fontSize:10,letterSpacing:1,textAlign:"center"}}>✓ LICENS</span>
        <span style={{color:C.blue,fontSize:10,letterSpacing:1,textAlign:"center"}}>💰 FREDAG</span>
      </div>
    </div>

    {/* List */}
    <div style={{flex:1,overflowY:"auto",padding:"0 20px 20px"}}>
      {filtered.length===0&&<div style={{background:C.surface,border:`1px solid ${C.border}`,borderTop:"none",borderRadius:"0 0 6px 6px",padding:24,textAlign:"center",color:C.textMuted}}>Ingen kørere fundet</div>}

      {Object.entries(classGroups).map(([cls,items])=><div key={cls}>
        {selClass==="Alle"&&<div style={{display:"flex",alignItems:"center",gap:10,margin:"12px 0 0"}}>
          <div style={{height:1,flex:1,background:C.border}}/>
          <span style={{background:state.classRules[cls]?.color||C.red,color:"#fff",borderRadius:20,padding:"3px 12px",fontSize:11,fontWeight:700,letterSpacing:1,flexShrink:0}}>{cls}</span>
          <span style={{color:C.textMuted,fontSize:11}}>{items.filter(({user})=>checks[user.id+"_ok"]).length}/{items.length}</span>
          <div style={{height:1,flex:1,background:C.border}}/>
        </div>}

        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderTop:selClass==="Alle"?"1px solid "+C.border:"none",borderRadius:selClass==="Alle"?"6px":"0 0 6px 6px",overflow:"hidden",marginTop:selClass==="Alle"?4:0}}>
          {items.map(({reg,user},idx2)=>{
            const licOk=!!checks[user.id+"_ok"];
            const friOk=!!fridayPaid[user.id];
            const isLast=idx2===items.length-1;
            return <div key={user.id} style={{display:"grid",gridTemplateColumns:"1fr 110px 110px",alignItems:"center",padding:"10px 14px",borderBottom:isLast?"none":`1px solid ${C.border}`,background:licOk&&friOk?"rgba(0,204,102,0.04)":"transparent",transition:"background 0.2s"}}>
              {/* Kart# og data – klik for at redigere */}
              <div onClick={()=>openEdit({reg,user})} style={{cursor:"pointer"}}>
                <div style={{fontWeight:900,color:C.text,fontSize:22,fontFamily:"'Barlow Condensed',sans-serif",lineHeight:1.1}}>#{user.kartNumber}</div>
                <div style={{fontWeight:700,color:C.text,fontSize:13,marginTop:1}}>{user.name}</div>
                {/* Licens + transponder – større og mere synlig */}
                <div style={{display:"flex",flexDirection:"column",gap:2,marginTop:3}}>
                  {user.license&&<div style={{background:C.surface2,borderRadius:4,padding:"2px 6px",display:"inline-block"}}>
                    <span style={{color:C.textMuted,fontSize:9}}>LIC: </span>
                    <span style={{color:C.text,fontWeight:700,fontSize:12,fontFamily:"monospace"}}>{user.license}</span>
                    {user.licenseValid===true&&<span style={{color:C.green,marginLeft:4,fontSize:11}}>✅</span>}
                    {user.licenseValid===false&&<span style={{color:C.red,marginLeft:4,fontSize:11}}>❌</span>}
                  </div>}
                  {user.transponder&&<div style={{background:C.surface2,borderRadius:4,padding:"2px 6px",display:"inline-block",marginTop:1}}>
                    <span style={{color:C.textMuted,fontSize:9}}>T: </span>
                    <span style={{color:C.cyan,fontWeight:700,fontSize:13,fontFamily:"monospace",letterSpacing:1}}>{user.transponder}</span>
                  </div>}
                </div>
                <div style={{color:C.textDim,fontSize:9,marginTop:3}}>↗ tap for at redigere</div>
              </div>
              {/* Licens OK toggle */}
              <div style={{textAlign:"center"}}>
                <button onClick={()=>setCheck(user.id,"ok",!licOk)} style={{width:46,height:36,borderRadius:8,background:licOk?`${C.green}33`:C.surface2,border:`2px solid ${licOk?C.green:C.border}`,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto",transition:"all 0.15s"}}>
                  {licOk?<span style={{fontSize:20}}>✅</span>:<span style={{fontSize:18,color:C.textDim}}>○</span>}
                </button>
              </div>
              {/* Fredag betalt toggle */}
              <div style={{textAlign:"center"}}>
                <button onClick={()=>setFriday(user.id,!friOk)} style={{width:46,height:36,borderRadius:8,background:friOk?`${C.blue}33`:C.surface2,border:`2px solid ${friOk?C.blue:C.border}`,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto",transition:"all 0.15s"}}>
                  {friOk?<span style={{fontSize:20}}>💰</span>:<span style={{fontSize:18,color:C.textDim}}>○</span>}
                </button>
              </div>
            </div>;
          })}
        </div>
      </div>)}
    </div>
  </div>;
}
