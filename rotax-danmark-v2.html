// ── REDUCER ──────────────────────────────────────────────────────
function reducer(state,action){
  switch(action.type){
    case "SET_LANG":return{...state,lang:action.payload};
    case "LOGIN":return{...state,currentUser:action.payload};
    case "LOGOUT":return{...state,currentUser:null};
    case "UPDATE_USER":return{...state,users:state.users.map(u=>u.id===action.payload.id?{...u,...action.payload}:u),currentUser:state.currentUser?.id===action.payload.id?{...state.currentUser,...action.payload}:state.currentUser};
    case "REGISTER":return{...state,events:state.events.map(ev=>ev.id===action.eventId?{...ev,registrations:[...ev.registrations,{...action.payload}]}:ev)};
    case "ADD_EVENT":return{...state,events:[...state.events,{...action.payload,id:Date.now(),sessions:[],penalties:[],inspections:[],weightInspections:[],readySignals:[],registrations:[],classLimits:{}}]};
    case "UPDATE_EVENT":return{...state,events:state.events.map(ev=>ev.id===action.payload.id?{...ev,...action.payload}:ev)};
    case "ADD_SERIES":return{...state,raceSeries:[...state.raceSeries,{id:Date.now(),name:action.payload}]};
    case "ADD_NOTIFICATION":return{...state,notifications:[{...action.payload,id:Date.now()},...state.notifications]};
    case "ADD_DOCUMENT":return{...state,documents:[{...action.payload,id:Date.now()},...state.documents]};
    case "ADD_PENALTY":return{...state,events:state.events.map(ev=>ev.id===action.eventId?{...ev,penalties:[...ev.penalties,{...action.payload,id:Date.now()}]}:ev)};
    case "ADD_INSPECTION":return{...state,events:state.events.map(ev=>ev.id===action.eventId?{...ev,inspections:[...(ev.inspections||[]),{...action.payload,id:Date.now()}]}:ev)};
    case "SET_READY_SIGNAL":return{...state,events:state.events.map(ev=>ev.id===action.eventId?{...ev,readySignals:[...(ev.readySignals||[]).filter(s=>!(s.class===action.cls&&s.session===action.session&&s.stype===action.stype)),{class:action.cls,session:action.session,stype:action.stype,time:new Date().toLocaleString("da-DK"),by:action.by}]}:ev)};
    case "UPDATE_OFFICIAL_EVENTS":return{...state,users:state.users.map(u=>u.id===action.userId?{...u,approvedEvents:action.events}:u)};
    case "SET_LICENSE_CHECK":return{...state,events:state.events.map(ev=>ev.id===action.eventId?{...ev,licenseChecks:{...(ev.licenseChecks||{}),[(action.userId+"_"+action.field)]:action.value}}:ev)};
    case "SET_FRIDAY_PAID":return{...state,events:state.events.map(ev=>ev.id===action.eventId?{...ev,fridayPaid:{...(ev.fridayPaid||{}),[(action.userId)]:action.value}}:ev)};
    case "ADD_OFFICIAL":return{...state,users:[...state.users,{...action.payload,id:Date.now(),isOfficial:true,approvedEvents:[]}]};
    case "ADD_CLASS":return{...state,classRules:{...state.classRules,[action.name]:{min:action.min,max:action.max,color:action.color||C.red}}};
    case "DELETE_CLASS":{const{[action.name]:_,...rest}=state.classRules;return{...state,classRules:rest};}
    default:return state;
  }
}

function Btn({children,onClick,variant="primary",small=false,style={},disabled=false}){
  const base={cursor:disabled?"not-allowed":"pointer",border:"none",borderRadius:6,fontWeight:700,fontFamily:"'Barlow Condensed',sans-serif",transition:"all 0.15s",opacity:disabled?0.5:1,...style};
  const sz=small?{padding:"5px 12px",fontSize:12}:{padding:"10px 20px",fontSize:13};

function exportCSV(rows,headers,filename){
  const csv=[headers,...rows.map(r=>headers.map(h=>r[h]||""))].map(r=>r.map(c=>`"${String(c||"").replace(/"/g,'""')}"`).join(",")).join("\n");
  const b=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"});
  const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=filename+".csv";a.click();URL.revokeObjectURL(u);
}

function ProfileScreen({state,dispatch}){
  const u=state.currentUser;
  const [licMsg,setLicMsg]=useState("");const [checking,setChecking]=useState(false);
  const fileRef=useRef();
  const children=state.users.filter(x=>(u.childIds||[]).includes(x.id));
  const toggleOfficial=()=>dispatch({type:"UPDATE_USER",payload:{id:u.id,isOfficial:!u.isOfficial}});

  const checkLicense=async(file)=>{
    setChecking(true);setLicMsg("Analyserer...");
    const reader=new FileReader();
    reader.onload=async(e)=>{
      const b64=e.target.result.split(",")[1];
      try{
        const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:200,messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:file.type,data:b64}},{type:"text",text:'Er dette et gyldigt DASU karting kørerlicens 2026? Svar KUN JSON: {"valid":true/false,"year":"årstal","reason":"kort forklaring"}'}]}]})});
        const data=await res.json();const txt=data.content?.[0]?.text||"{}";
        const p=JSON.parse(txt.replace(/```json|```/g,"").trim());
        const ok=p.valid&&(p.year==="2026"||p.year===2026);
        setLicMsg(p.reason||(ok?"Godkendt ✓":"Ugyldig ✗"));
        dispatch({type:"UPDATE_USER",payload:{id:u.id,licenseValid:ok,licenseImg:e.target.result}});
      }catch{setLicMsg("Fejl – prøv igen");}
      setChecking(false);
    };reader.readAsDataURL(file);
  };

          {u.isOfficial&&u.type!=="official"&&<Badge color={C.purple}>+OFFICIAL</Badge>}
        </div>
      </div>
    </div>
    {u.type!=="admin"&&<Card style={{borderLeft:`3px solid ${C.purple}`,marginBottom:10}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>

        <button onClick={toggleOfficial} style={{background:u.isOfficial?`${C.purple}33`:C.surface2,border:`1px solid ${u.isOfficial?C.purple:C.border}`,borderRadius:20,padding:"5px 14px",color:u.isOfficial?C.purple:C.textMuted,cursor:"pointer",fontWeight:700,fontSize:12,fontFamily:"inherit"}}>{u.isOfficial?"✓ AKTIV":"INAKTIV"}</button>
      </div>
    </Card>}
    {u.type!=="admin"&&<Card style={{borderLeft:`3px solid ${u.licenseValid===true?C.green:u.licenseValid===false?C.red:C.orange}`}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>

      {step===3&&<div>

          <thead><tr style={{background:C.surface2}}>{["#","Kart","Kører",...Array.from({length:rounds},(_,i)=>`R${i+1}`),"Pt","Sejre"].map(h=><th key={h} style={{padding:"8px 10px",color:C.textMuted,fontWeight:600,textAlign:"left",fontSize:10,letterSpacing:1,whiteSpace:"nowrap"}}>{h}</th>)}</tr></thead>
          <tbody>{rows.map((r,i)=><tr key={i} style={{borderBottom:`1px solid ${C.border}`,background:i===0?"rgba(255,215,0,0.04)":"transparent"}}>

function AdminRegistrations({state}){

    const rows=regs.map(r=>{const u=state.users.find(u=>u.id===r.userId)||{};return{"Navn":u.name||"","E-mail":u.email||"","Klasse":r.class||"","Kart":u.kartNumber||"","Licens":u.license||"","Transponder":u.transponder||"","Klub":u.club||"","Ryttergård":r.paddockSpace||"","Slicks":(r.slicks||[]).join(";"),"Wets":(r.wets||[]).join(";"),"Betalt":r.paid?"Ja":"Nej","LicensOK":u.licenseValid===true?"Ja":u.licenseValid===false?"Nej":"?"};});
    exportCSV(rows,["Navn","E-mail","Klasse","Kart","Licens","Transponder","Klub","Ryttergård","Slicks","Wets","Betalt","LicensOK"],`tilmeldinger_${ev?.name||""}`);
  };
  return <div>

        <div style={{display:"flex",flexDirection:"column",gap:4,alignItems:"flex-end"}}>

function LicenseControl({state,dispatch}){
  const [selEv,setSelEv]=useState(String(state.events[0]?.id));
  const [selClass,setSelClass]=useState("Alle");
  const [search,setSearch]=useState("");
  const ev=state.events.find(e=>e.id===parseInt(selEv))||state.events[0];
  const checks=ev?.licenseChecks||{};
  const fridayPaid=ev?.fridayPaid||{};

  const regs=(ev?.registrations||[]);
  const classes=["Alle",...new Set(regs.map(r=>r.class))];

  const filtered=regs
    .filter(r=>selClass==="Alle"||r.class===selClass)
    .map(r=>{const u=state.users.find(u=>u.id===r.userId);return{reg:r,user:u};})
    .filter(({user})=>user&&(!search||user.name.toLowerCase().includes(search.toLowerCase())||String(user.kartNumber).includes(search)))
    .sort((a,b)=>a.user.name.localeCompare(b.user.name));

  const setCheck=(userId,field,val)=>dispatch({type:"SET_LICENSE_CHECK",eventId:parseInt(selEv),userId,field,value:val});
  const setFriday=(userId,val)=>dispatch({type:"SET_FRIDAY_PAID",eventId:parseInt(selEv),userId,value:val});

  const classGroups={};
  if(selClass==="Alle"){
    filtered.forEach(item=>{
      const cls=item.reg.class;
      if(!classGroups[cls])classGroups[cls]=[];
      classGroups[cls].push(item);
    });
  } else {
    classGroups[selClass]=filtered;
  }

  const totalOk=filtered.filter(({user})=>checks[user.id+"_ok"]).length;
  const totalFriday=filtered.filter(({user})=>fridayPaid[user.id]).length;
  const totalAll=filtered.length;

  return <div style={{height:"100%",display:"flex",flexDirection:"column"}}>
    {/* Header */}
    <div style={{padding:"16px 20px 0",flexShrink:0}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
        <div>
          <div style={{height:3,width:36,background:C.red,marginBottom:8,borderRadius:2}}/>
          <h2 style={{margin:0,fontSize:20,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:2,color:C.text,textTransform:"uppercase"}}>Licenskontrol</h2>
          <div style={{color:C.textMuted,fontSize:12,marginTop:2}}>Kontrol ved banen – lørdagstræning</div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"flex-start",flexWrap:"wrap",justifyContent:"flex-end"}}>
          <div style={{background:`${C.green}22`,border:`1px solid ${C.green}44`,borderRadius:6,padding:"6px 12px",textAlign:"center"}}>
            <div style={{color:C.green,fontWeight:900,fontSize:18,fontFamily:"'Barlow Condensed',sans-serif"}}>{totalOk}/{totalAll}</div>
            <div style={{color:C.green,fontSize:10,letterSpacing:1}}>LICENS OK</div>
          </div>
          <div style={{background:`${C.blue}22`,border:`1px solid ${C.blue}44`,borderRadius:6,padding:"6px 12px",textAlign:"center"}}>
            <div style={{color:C.blue,fontWeight:900,fontSize:18,fontFamily:"'Barlow Condensed',sans-serif"}}>{totalFriday}/{totalAll}</div>
            <div style={{color:C.blue,fontSize:10,letterSpacing:1}}>FREDAG BETALT</div>
          </div>
        </div>
      </div>

      {/* Controls */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
        <div>
          <div style={{color:C.textMuted,fontSize:10,letterSpacing:1,marginBottom:4,textTransform:"uppercase"}}>Løb</div>
          <select value={selEv} onChange={e=>setSelEv(e.target.value)} style={{width:"100%",background:C.surface2,border:`1px solid ${C.border}`,borderRadius:6,padding:"7px 10px",color:C.text,fontSize:12,fontFamily:"inherit"}}>
            {state.events.map(e=><option key={e.id} value={String(e.id)}>{e.name}</option>)}
          </select>
        </div>
        <div>
          <div style={{color:C.textMuted,fontSize:10,letterSpacing:1,marginBottom:4,textTransform:"uppercase"}}>Klasse</div>
          <select value={selClass} onChange={e=>setSelClass(e.target.value)} style={{width:"100%",background:C.surface2,border:`1px solid ${C.border}`,borderRadius:6,padding:"7px 10px",color:C.text,fontSize:12,fontFamily:"inherit"}}>
            {classes.map(c=><option key={c} value={c}>{c}</option>)}
          </select>
        </div>
      </div>
      <div style={{marginBottom:10}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Søg på navn eller kart #..." style={{width:"100%",background:C.surface2,border:`1px solid ${C.border}`,borderRadius:6,padding:"7px 12px",color:C.text,fontSize:12,boxSizing:"border-box",fontFamily:"inherit"}}/>
      </div>

      {/* Column headers */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 110px 110px",background:C.surface2,padding:"8px 14px",borderRadius:"6px 6px 0 0",border:`1px solid ${C.border}`,borderBottom:"none"}}>
        <span style={{color:C.textMuted,fontSize:10,letterSpacing:1}}>KØRER / KART #</span>
        <span style={{color:C.green,fontSize:10,letterSpacing:1,textAlign:"center"}}>✓ LICENS OK</span>
        <span style={{color:C.blue,fontSize:10,letterSpacing:1,textAlign:"center"}}>💰 FREDAG</span>
      </div>
    </div>

    {/* List */}
    <div style={{flex:1,overflowY:"auto",padding:"0 20px 20px"}}>
      {filtered.length===0&&<div style={{background:C.surface,border:`1px solid ${C.border}`,borderTop:"none",borderRadius:"0 0 6px 6px",padding:24,textAlign:"center",color:C.textMuted}}>Ingen kørere fundet</div>}

      {Object.entries(classGroups).map(([cls,items])=><div key={cls}>
        {/* Class separator */}
        {selClass==="Alle"&&<div style={{display:"flex",alignItems:"center",gap:10,margin:"12px 0 0"}}>
          <div style={{height:1,flex:1,background:C.border}}/>
          <span style={{background:state.classRules[cls]?.color||C.red,color:"#fff",borderRadius:20,padding:"3px 12px",fontSize:11,fontWeight:700,letterSpacing:1,flexShrink:0}}>{cls}</span>
          <span style={{color:C.textMuted,fontSize:11}}>{items.filter(({user})=>checks[user.id+"_ok"]).length}/{items.length}</span>
          <div style={{height:1,flex:1,background:C.border}}/>
        </div>}

        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderTop:selClass==="Alle"?"1px solid "+C.border:"none",borderRadius:selClass==="Alle"?"6px":"0 0 6px 6px",overflow:"hidden",marginTop:selClass==="Alle"?4:0}}>
          {items.map(({reg,user},idx)=>{
            const licOk=!!checks[user.id+"_ok"];
            const friOk=!!fridayPaid[user.id];
            const isLast=idx===items.length-1;
            return <div key={user.id} style={{display:"grid",gridTemplateColumns:"1fr 110px 110px",alignItems:"center",padding:"10px 14px",borderBottom:isLast?"none":`1px solid ${C.border}`,background:licOk&&friOk?"rgba(0,204,102,0.04)":"transparent",transition:"background 0.2s"}}>
              <div>
                <div style={{fontWeight:700,color:C.text,fontSize:13}}>{user.name}</div>
                <div style={{display:"flex",gap:6,marginTop:2,flexWrap:"wrap"}}>
                  <span style={{color:C.textMuted,fontSize:11}}>Kart #{user.kartNumber}</span>
                  <span style={{color:C.textDim,fontSize:11}}>·</span>
                  <span style={{color:C.textMuted,fontSize:11}}>{user.license}</span>
                  {user.licenseValid===true&&<span style={{color:C.green,fontSize:11}}>✅ app-verif.</span>}
                  {user.licenseValid===false&&<span style={{color:C.red,fontSize:11}}>❌ app-verif.</span>}
                </div>
              </div>
              {/* Licens OK toggle */}
              <div style={{textAlign:"center"}}>
                <button onClick={()=>setCheck(user.id,"ok",!licOk)} style={{width:46,height:36,borderRadius:8,background:licOk?`${C.green}33`:C.surface2,border:`2px solid ${licOk?C.green:C.border}`,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto",transition:"all 0.15s"}}>
                  {licOk?<span style={{fontSize:20}}>✅</span>:<span style={{fontSize:18,color:C.textDim}}>○</span>}
                </button>
              </div>
              {/* Fredag betalt toggle */}
              <div style={{textAlign:"center"}}>
                <button onClick={()=>setFriday(user.id,!friOk)} style={{width:46,height:36,borderRadius:8,background:friOk?`${C.blue}33`:C.surface2,border:`2px solid ${friOk?C.blue:C.border}`,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto",transition:"all 0.15s"}}>
                  {friOk?<span style={{fontSize:20}}>💰</span>:<span style={{fontSize:18,color:C.textDim}}>○</span>}
                </button>
              </div>
            </div>;
          })}
        </div>
      </div>)}
    </div>
  </div>;
}


function AdminApp({state,dispatch}){
  const [sec,setSec]=useState("dashboard");
  const totalPenalties=state.events.reduce((s,e)=>s+(e.penalties||[]).length,0);
  const nav=[
    {id:"dashboard",icon:"📊",label:"Dashboard"},
    {id:"events",icon:"📅",label:"Løb"},
    {id:"series",icon:"🏟",label:"Serier"},
    {id:"classes",icon:"🎯",label:"Klasser"},
    {id:"registrations",icon:"📝",label:"Tilmeld."},
    {id:"users",icon:"👥",label:"Brugere"},
    {id:"officials",icon:"🔒",label:"Officials"},
    {id:"notifications",icon:"🔔",label:"Notif."},
    {id:"docs",icon:"📄",label:"Docs"},
    {id:"penalties",icon:"⚠️",label:"Straffe",badge:totalPenalties},
    {id:"inspection",icon:"🔍",label:"Indr."},
    {id:"licensecheck",icon:"🪪",label:"Licensktr."},
    {id:"standings",icon:"🏆",label:"Mskb."},
  ];
  return <div style={{display:"flex",height:"100vh",background:"#0a0a0a",fontFamily:"'Barlow',sans-serif"}}>
    <div style={{width:175,background:"#111",borderRight:`1px solid ${C.border}`,display:"flex",flexDirection:"column",flexShrink:0}}>
      <div style={{padding:"12px 14px",borderBottom:`2px solid ${C.red}`,display:"flex",alignItems:"center",gap:8}}>
        <Logo size={15}/>
        <span style={{color:C.textDim,fontSize:9,letterSpacing:2}}>ADMIN</span>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"6px 0"}}>
        {nav.map(n=><button key={n.id} onClick={()=>setSec(n.id)} style={{width:"100%",background:sec===n.id?`${C.red}22`:"transparent",color:sec===n.id?C.red:C.textMuted,border:"none",cursor:"pointer",padding:"9px 14px",fontSize:12,fontFamily:"'Barlow',sans-serif",textAlign:"left",display:"flex",alignItems:"center",gap:8,borderLeft:sec===n.id?`3px solid ${C.red}`:"3px solid transparent"}}>
          <span style={{fontSize:13}}>{n.icon}</span>
          <span style={{flex:1}}>{n.label}</span>
          {n.badge>0&&<span style={{background:C.red,color:"#fff",borderRadius:"50%",width:16,height:16,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:900}}>{n.badge}</span>}
        </button>)}
      </div>
      <div style={{padding:"10px 12px",borderTop:`1px solid ${C.border}`}}>
        <div style={{marginBottom:8}}><LangBar state={state} dispatch={dispatch}/></div>
        <Btn small variant="danger" onClick={()=>dispatch({type:"LOGOUT"})} style={{width:"100%"}}>Log ud</Btn>
      </div>
    </div>
    <div style={{flex:1,overflowY:"auto",padding:20}}>
      {sec==="dashboard"&&<AdminDashboard state={state}/>}
      {sec==="events"&&<AdminEvents state={state} dispatch={dispatch}/>}
      {sec==="series"&&<AdminSeries state={state} dispatch={dispatch}/>}
      {sec==="classes"&&<AdminClassManager state={state} dispatch={dispatch}/>}
      {sec==="registrations"&&<AdminRegistrations state={state}/>}
      {sec==="users"&&<AdminUsers state={state} dispatch={dispatch}/>}
      {sec==="officials"&&<AdminOfficials state={state} dispatch={dispatch}/>}
      {sec==="notifications"&&<AdminNotifications state={state} dispatch={dispatch}/>}
      {sec==="docs"&&<AdminDocuments state={state} dispatch={dispatch}/>}
      {sec==="penalties"&&<AdminPenalties state={state} dispatch={dispatch}/>}
      {sec==="inspection"&&<AdminInspection state={state} dispatch={dispatch}/>}
      {sec==="standings"&&<AdminStandings state={state}/>}
      {sec==="licensecheck"&&<LicenseControl state={state} dispatch={dispatch}/>}
    </div>
  </div>;
}

// ── ROOT ────────────────────────────────────────────────────────────
function App(){
  const [state,dispatch]=useReducer(reducer,initialState);
  const u=state.currentUser;
  return <LangCtx.Provider value={state.lang}>
    <div style={{width:"100%",height:"100vh",overflow:"hidden"}}>
      {u?.isAdmin?<AdminApp state={state} dispatch={dispatch}/>:<UserApp state={state} dispatch={dispatch}/>}
    </div>
  </LangCtx.Provider>;
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
