function AdminDocuments({state,dispatch,seriesScope}){
  const t=useT();
  const scopedEvs=eventsInScope(state.events,seriesScope);
  const selEv=getAdminSelEv(state,scopedEvs);
  const setSelEv=v=>setAdminSelEv(dispatch,v);
  const [form,setForm]=useState({title:"",type:"Startgrid",class:"Alle",notify:true});
  const [file,setFile]=useState(null);
  const [titleTouched,setTitleTouched]=useState(false);
  const [busy,setBusy]=useState(false);
  const [msg,setMsg]=useState("");
  const [dragOver,setDragOver]=useState(false);
  const fileRef=useRef();
  const isBoard=form.type==="Opslagstavle";
  const ev=state.events.find(e=>String(e.id)===String(selEv));

  const pickFile=(f)=>{
    setFile(f||null);
    if(!f)return;
    const rawBase=f.name.replace(/\.[^.]+$/,"");
    const norm=s=>s.toLowerCase().replace(/[_\-]+/g," ").replace(/\s+/g," ").trim();
    const normName=norm(rawBase);
    // Auto-title from filename (without extension) if the user hasn't written one themselves.
    // Only replace "-"/"_" used as word separators (no surrounding spaces), so e.g. "Heat 1 - 3"
    // keeps its hyphen, while "min-fil_navn" becomes "min fil navn".
    if(!titleTouched){
      const base=rawBase.replace(/(?<=\S)[_-](?=\S)/g," ").replace(/\s+/g," ").trim();
      setForm(o=>({...o,title:base}));
    }
    // Auto-detect type from keywords in the filename. Anything that isn't explicitly a start grid
    // is treated as a result — timing-software exports rarely spell out "result" in the filename
    // since that's just what a race document normally is (e.g. "50 - Rotax DD2 - Finale.pdf").
    const detectedType=/\bstart\s?(?:ing\s?)?grid\b/.test(normName)?"Startgrid":"Resultat";
    // Auto-detect class by matching the filename against this race's own classes first, falling
    // back to the full class list in case the race's class list doesn't happen to include it.
    const detectedClass=raceClasses.find(c=>normName.includes(norm(c)))
      ||Object.keys(state.classRules).find(c=>normName.includes(norm(c)));
    if(detectedType||detectedClass){
      setForm(o=>({...o,type:detectedType||o.type,class:detectedClass||o.class}));
    }
  };

  const upload=async()=>{
    setMsg("");
    if(!file){setMsg(t.admSelectFile);return;}
    if(!form.title){setMsg(t.admTitleMissing);return;}
    if(!selEv){setMsg(t.admSelectRace);return;}
    if(!sb){setMsg(t.admNotConfigured);return;}
    setBusy(true);
    try{
      let url="#";
      const ext=file.name.split(".").pop();
      const path=`event-${selEv}/${Date.now()}-${Math.random().toString(36).slice(2,7)}.${ext}`;
      const {error:upErr}=await sb.storage.from("documents").upload(path,file,{cacheControl:"3600",upsert:false});
      if(upErr){setMsg(t.admUploadFailed+upErr.message);setBusy(false);return;}
      const {data:pub}=sb.storage.from("documents").getPublicUrl(path);
      url=pub.publicUrl;
      const evId=parseInt(selEv);
      // If a document with the exact same title already exists on this race, remove it first
      // so the new upload replaces it instead of creating a duplicate.
      const existingDoc=(docs||[]).find(d=>d.title.trim().toLowerCase()===form.title.trim().toLowerCase());
      if(existingDoc)dispatch({type:"REMOVE_EVENT_DOCUMENT",eventId:evId,docId:existingDoc.id});
      dispatch({type:"ADD_EVENT_DOCUMENT",eventId:evId,payload:{id:Date.now(),title:form.title,type:form.type,sessionType:null,class:form.class,time:new Date().toLocaleString("da-DK"),url}});
      if(form.notify){
        const evName=state.events.find(e=>e.id===evId)?.name||"";
        const icon=isBoard?"📌":form.type==="Startgrid"?"🏁":form.type==="Resultat"?"🏆":"📄";
        const notifTitle=isBoard?`📌 Opslagstavle: ${form.title}`:`${icon} ${form.type}: ${form.title}`;
        const notifBody=isBoard
          ?`Nyt opslag${form.class!=="Alle"?" for "+form.class:""}${evName?" · "+evName:""}.`
          :`${form.type} er lagt op${form.class!=="Alle"?" for "+form.class:""}${evName?" · "+evName:""}.`;
        dispatch({type:"ADD_NOTIFICATION",payload:{
          id:Date.now()+1,eventId:evId,title:notifTitle,body:notifBody,
          targetClass:form.class,officialsOnly:false,time:new Date().toLocaleString("da-DK"),docUrl:url,
        }});
        // Push to the relevant recipients
        sendPushNotification({title:notifTitle,body:notifBody,url:url||".",userIds:resolveNotifRecipients(state.users,{targetClass:form.class,officialsOnly:false})});
      }
      setMsg((existingDoc?t.admDocReplaced:"")+(form.notify?t.admDocUploadedNotif:t.admDocUploaded));
      setForm(f=>({...f,title:""}));setFile(null);setTitleTouched(false);
    }catch(e){setMsg(String(e.message||e));}
    setBusy(false);
  };

  const docs=ev?.documents||[];
  const raceClasses=(ev?.classes&&ev.classes.length)?ev.classes:sortClassesByAge(Object.keys(state.classRules),state.classRules);

  return <div>
    <SH title={t.admDocumentsTitle} sub={t.admDocumentsSub}/>
    {msg&&<div style={{background:`${C.green}22`,border:`1px solid ${C.green}44`,borderRadius:8,padding:10,marginBottom:10,color:C.green,fontSize:12,fontWeight:600}}>{msg}</div>}
    <Card style={{borderLeft:`3px solid ${C.red}`}}>
      <Sel label={t.race} value={selEv} onChange={setSelEv} options={eventsInScope(state.events,seriesScope).map(e=>({value:String(e.id),label:e.name}))}/>
      <Sel label={t.admType} value={form.type} onChange={v=>setForm(f=>({...f,type:v}))} options={["Startgrid","Resultat","Opslagstavle"]}/>
      <Sel label={t.admFieldClass} value={form.class} onChange={v=>setForm(f=>({...f,class:v}))} options={["Alle",...raceClasses]}/>
      <input ref={fileRef} type="file" accept="application/pdf,.pdf,image/*" style={{display:"none"}} onChange={e=>pickFile(e.target.files[0])}/>
      <div
        onClick={()=>fileRef.current?.click()}
        onDragOver={e=>{e.preventDefault();setDragOver(true);}}
        onDragLeave={()=>setDragOver(false)}
        onDrop={e=>{e.preventDefault();setDragOver(false);const f=e.dataTransfer.files?.[0];if(f)pickFile(f);}}
        style={{border:`2px dashed ${dragOver?C.red:file?C.green:C.border}`,borderRadius:6,padding:12,textAlign:"center",marginBottom:10,cursor:"pointer",background:dragOver?`${C.red}11`:"transparent",transition:"all 0.15s"}}>
        <div style={{fontSize:20}}>📎</div>
        <div style={{color:file?C.green:C.textMuted,fontSize:12,fontWeight:file?700:400}}>{file?file.name:dragOver?t.admDropHere:t.admChoosePdfOrImage}</div>
      </div>
      <div style={{color:C.textDim,fontSize:10,lineHeight:1.5,marginTop:-6,marginBottom:10}}>{t.admFilenameHint}</div>
      <Input label={t.admTitleAutoLabel} value={form.title} onChange={v=>{setTitleTouched(true);setForm(f=>({...f,title:v}));}} placeholder={t.admTitleAutoPlaceholder}/>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",margin:"4px 0 12px"}}>
        <span style={{color:C.text,fontSize:12,fontWeight:600}}>🔔 Send notifikation {form.class==="Alle"?t.admSendNotifAll:t.admSendNotifTo+form.class}</span>
        <button onClick={()=>setForm(f=>({...f,notify:!f.notify}))} style={{background:form.notify?`${C.green}33`:C.surface2,border:`1px solid ${form.notify?C.green:C.border}`,borderRadius:20,padding:"4px 12px",color:form.notify?C.green:C.textMuted,cursor:"pointer",fontSize:11,fontFamily:"inherit",fontWeight:700}}>{form.notify?t.admYesUpper:t.admNoUpper}</button>
      </div>
      <Btn onClick={upload} disabled={busy} style={{width:"100%"}}>{busy?t.admUploading:"⬆ UPLOAD"}</Btn>
    </Card>
    <div style={{color:C.textMuted,fontSize:10,letterSpacing:2,margin:"4px 0 8px"}}>{t.admDocsOnRaceA}{ev?.name?.toUpperCase()||t.admDocsOnRaceB} ({docs.length})</div>
    {docs.length===0&&<div style={{color:C.textDim,fontSize:12}}>{t.admNoDocsYet}</div>}
    {docs.map(d=><Card key={d.id} style={{padding:"10px 14px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><div style={{fontWeight:700,color:C.text,fontSize:12}}>{d.title}</div><div style={{display:"flex",gap:4,marginTop:3}}><Badge color={d.type==="Startgrid"?C.blue:d.type==="Resultat"?C.gold:C.textMuted} style={{fontSize:9}}>{d.type}</Badge><Badge style={{fontSize:9}}>{d.class}</Badge></div></div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          {d.url&&d.url!=="#"&&<a href={d.url} target="_blank" rel="noreferrer" style={{color:C.blue,fontSize:11,fontWeight:700}}>{t.admOpenLink}</a>}
          <button onClick={()=>{if(confirm(`${t.admDeleteDocConfirmA}"${d.title}"${t.admDeleteDocConfirmB}`))dispatch({type:"REMOVE_EVENT_DOCUMENT",eventId:ev.id,docId:d.id});}} style={{background:"none",border:"none",color:C.red,cursor:"pointer",fontSize:16,fontFamily:"inherit"}}>×</button>
        </div>
      </div>
    </Card>)}
  </div>;
}

function AdminPenalties({state,dispatch,seriesScope}){
  const t=useT();
  const scopedEvs=eventsInScope(state.events,seriesScope);
  const selEv=getAdminSelEv(state,scopedEvs);
  const setSelEv=v=>setAdminSelEv(dispatch,v);
  const [cf,setCf]=useState("Alle");const [sf,setSf]=useState("Alle");
  const [showApproved,setShowApproved]=useState(false);
  const [form,setForm]=useDraft(`gc_draft_adminpenalty_${selEv}`,{kartNo:"",driverName:"",class:"Rotax Junior",session:"Heat 1",type:"Tidsstraf",seconds:"5",reason:""});
  const [editP,setEditP]=useState(null);
  const [editForm,setEditForm]=useState({});
  const [prevCount,setPrevCount]=useState(0);
  const [newAlert,setNewAlert]=useState(false);
  const [copiedIdx,setCopiedIdx]=useState(null);
  const ev=state.events.find(e=>e.id===parseInt(selEv));
  const allP=ev?.penalties||[];

  // Auto-fill driver name from kart # + class by matching a registered driver for this race —
  // only when the name field is empty, so it never overwrites something typed in manually.
  useEffect(()=>{
    if(form.driverName||!form.kartNo||!form.class)return;
    const kartNo=parseInt(form.kartNo);
    if(!kartNo)return;
    const reg=(ev?.registrations||[]).find(r=>r.class===form.class&&state.users.find(u=>u.id===r.userId)?.kartNumber===kartNo);
    const usr=reg?state.users.find(u=>u.id===reg.userId):null;
    if(usr?.name)setForm(f=>({...f,driverName:usr.name}));
  },[form.kartNo,form.class]);

  const pending=allP.filter(p=>!p.approved);
  const approved=allP.filter(p=>p.approved);
  const shown=showApproved?approved:pending;
  const classes=["Alle",...new Set(allP.map(p=>p.class))];
  const sessions=["Alle",...new Set(allP.map(p=>p.session).filter(Boolean))];
  const filtered=shown.filter(p=>(cf==="Alle"||p.class===cf)&&(sf==="Alle"||p.session===sf));
  // If a penalty came in with only a kart # and class (e.g. auto-generated from a station report),
  // look up the registered driver's name to display instead of leaving it blank.
  const nameForPenalty=(p)=>{
    if(p.driverName)return p.driverName;
    const kartNo=parseInt(p.kartNo);
    if(!kartNo)return "";
    const reg=(ev?.registrations||[]).find(r=>r.class===p.class&&state.users.find(u=>u.id===r.userId)?.kartNumber===kartNo);
    return reg?state.users.find(u=>u.id===reg.userId)?.name||"":"";
  };

  useEffect(()=>{if(allP.length>prevCount&&prevCount>0){setNewAlert(true);setTimeout(()=>setNewAlert(false),5000);}setPrevCount(allP.length);},[allP.length]);

  const add=()=>{
    if(!form.kartNo)return;
    dispatch({type:"ADD_PENALTY",eventId:parseInt(selEv),payload:{...form,kartNo:parseInt(form.kartNo)||0,seconds:parseInt(form.seconds)||0,time:new Date().toLocaleString("da-DK"),source:"manual",approved:true}});
    setForm(f=>({...f,driverName:"",kartNo:"",reason:""}));
  };

  const approvePenalty=p=>dispatch({type:"UPDATE_PENALTY",eventId:parseInt(selEv),penaltyId:p.id,penaltyIdx:allP.indexOf(p),payload:{...p,approved:true}});
  const deletePenalty=p=>dispatch({type:"DELETE_PENALTY",eventId:parseInt(selEv),penaltyId:p.id,penaltyIdx:allP.indexOf(p)});
  const openEdit=p=>{setEditP(p);setEditForm({kartNo:p.kartNo,driverName:p.driverName||"",class:p.class,session:p.session,type:p.type,seconds:String(p.seconds||0),reason:p.reason||""});};
  const saveEdit=()=>{dispatch({type:"UPDATE_PENALTY",eventId:parseInt(selEv),penaltyId:editP.id,penaltyIdx:allP.indexOf(editP),payload:{...editP,...editForm,kartNo:parseInt(editForm.kartNo)||0,seconds:parseInt(editForm.seconds)||0}});setEditP(null);};

  const doExport=()=>exportCSV(
    filtered.map(p=>({[t.admFieldKart+" #"]:p.kartNo||"",[t.admDriverName]:p.driverName||"",[t.admFieldClass]:p.class||"",[t.admSession]:p.session||"",[t.admPenaltyType]:p.type||"",[t.admSeconds]:p.seconds||0,[t.admReason]:p.reason||"",[t.admApproved]:p.approved?t.admYes:t.admNo})),
    [t.admFieldKart+" #",t.admDriverName,t.admFieldClass,t.admSession,t.admPenaltyType,t.admSeconds,t.admReason,t.admApproved],
    "straffe"
  );

  if(editP)return <div style={{padding:0}}>
    <Btn small variant="ghost" onClick={()=>setEditP(null)} style={{marginBottom:12}}>{t.admBack}</Btn>
    <SH title={t.admEditPenaltyTitle}/>
    <Card style={{borderLeft:`3px solid ${C.orange}`}}>
      <div style={{display:"grid",gridTemplateColumns:"80px 1fr",gap:8}}>
        <Input label={t.admFieldKart+" # *"} value={String(editForm.kartNo||"")} onChange={v=>setEditForm(f=>({...f,kartNo:v}))} placeholder="98"/>
        <Input label={t.admDriverName} value={editForm.driverName} onChange={v=>setEditForm(f=>({...f,driverName:v}))} placeholder={t.admOptional}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <Sel label={t.admFieldClass} value={editForm.class} onChange={v=>setEditForm(f=>({...f,class:v}))} options={sortClassesByAge(Object.keys(state.classRules),state.classRules)}/>
        <Sel label={t.admSession} value={editForm.session} onChange={v=>setEditForm(f=>({...f,session:v}))} options={(state.sessions||[]).map(s=>s.name)}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <Sel label={t.admPenaltyType} value={editForm.type} onChange={v=>setEditForm(f=>({...f,type:v}))} options={["Tidsstraf","Advarsel","Sortflag","Diskvalifikation","Placering sidst","Hurtigste tid fjernes"]}/>
        {editForm.type==="Tidsstraf"&&<Input label={t.admSeconds} value={editForm.seconds} onChange={v=>setEditForm(f=>({...f,seconds:v}))} placeholder="5"/>}
      </div>
      <Input label={t.admReason} value={editForm.reason} onChange={v=>setEditForm(f=>({...f,reason:v}))} placeholder="Beskriv forseelsen..."/>
      <div style={{display:"flex",gap:8}}>
        <Btn onClick={saveEdit} style={{flex:1}}>{t.save}</Btn>
        <Btn variant="danger" onClick={()=>{if(confirm(t.admDeletePenaltyConfirm))(deletePenalty(editP),setEditP(null));}} style={{flex:1}}>{t.delete}</Btn>
      </div>
    </Card>
  </div>;

  return <div>
    <SH title={t.penalties}/>
    {newAlert&&<div style={{background:`${C.orange}22`,border:`1px solid ${C.orange}`,borderRadius:8,padding:"10px 14px",marginBottom:10,display:"flex",gap:8,alignItems:"center"}}>
      <div style={{position:"relative",width:14,height:14,flexShrink:0}}>
        <div style={{position:"absolute",inset:0,borderRadius:"50%",background:C.orange,animation:"ping 1s infinite"}}/>
        <div style={{position:"absolute",inset:0,borderRadius:"50%",background:C.orange}}/>
      </div>
      <span style={{color:C.orange,fontWeight:700,fontSize:13}}>{t.admNewPenaltyReceived}</span>
    </div>}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
      <button onClick={()=>setShowApproved(false)} style={{background:!showApproved?`${C.orange}22`:C.surface2,border:`2px solid ${!showApproved?C.orange:C.border}`,borderRadius:8,padding:"10px",cursor:"pointer",textAlign:"center",fontFamily:"inherit"}}>
        <div style={{color:!showApproved?C.orange:C.textMuted,fontWeight:900,fontSize:20,fontFamily:"'Barlow Condensed',sans-serif"}}>{pending.length}</div>
        <div style={{color:!showApproved?C.orange:C.textMuted,fontSize:10,letterSpacing:1}}>{t.admPending}</div>
      </button>
      <button onClick={()=>setShowApproved(true)} style={{background:showApproved?`${C.green}22`:C.surface2,border:`2px solid ${showApproved?C.green:C.border}`,borderRadius:8,padding:"10px",cursor:"pointer",textAlign:"center",fontFamily:"inherit"}}>
        <div style={{color:showApproved?C.green:C.textMuted,fontWeight:900,fontSize:20,fontFamily:"'Barlow Condensed',sans-serif"}}>{approved.length}</div>
        <div style={{color:showApproved?C.green:C.textMuted,fontSize:10,letterSpacing:1}}>{t.admApproved}</div>
      </button>
    </div>
    <Sel label={t.race} value={selEv} onChange={v=>{setSelEv(v);setCf("Alle");setSf("Alle");}} options={eventsInScope(state.events,seriesScope).map(e=>({value:String(e.id),label:e.name}))}/>
    <Card style={{borderLeft:`3px solid ${C.orange}`}}>
      <div style={{color:C.textMuted,fontSize:10,letterSpacing:2,marginBottom:8}}>{t.admNewPenaltyHint}</div>
      <div style={{display:"grid",gridTemplateColumns:"80px 1fr",gap:8}}>
        <Input label={t.admFieldKart+" # *"} value={form.kartNo} onChange={v=>setForm(f=>({...f,kartNo:v}))} placeholder="98"/>
        <Input label={t.admDriverName} value={form.driverName} onChange={v=>setForm(f=>({...f,driverName:v}))} placeholder={t.admOptional}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <Sel label={t.classLabel} value={form.class} onChange={v=>setForm(f=>({...f,class:v}))} options={sortClassesByAge(Object.keys(state.classRules),state.classRules)}/>
        <Sel label={t.session} value={form.session} onChange={v=>setForm(f=>({...f,session:v}))} options={(state.sessions||[]).map(s=>s.name)}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <Sel label={t.admPenaltyType} value={form.type} onChange={v=>setForm(f=>({...f,type:v}))} options={["Tidsstraf","Advarsel","Sortflag","Diskvalifikation","Placering sidst","Hurtigste tid fjernes"]}/>
        {form.type==="Tidsstraf"&&<Input label={t.admSeconds} value={form.seconds} onChange={v=>setForm(f=>({...f,seconds:v}))} placeholder="5"/>}
      </div>
      <Input label={t.admReason} value={form.reason} onChange={v=>setForm(f=>({...f,reason:v}))} placeholder={t.admReasonOptional}/>
      <Btn onClick={add} style={{width:"100%"}} variant="secondary" disabled={!form.kartNo}>{t.admAddPenaltyBtn}</Btn>
    </Card>
    <div style={{display:"flex",gap:5,overflowX:"auto",marginBottom:5}}>{classes.map((cl,ci)=><button key={ci+"_"+cl} onClick={()=>setCf(cl)} style={{background:cf===cl?C.orange:C.surface2,color:cf===cl?"#fff":C.textMuted,border:`1px solid ${cf===cl?C.orange:C.border}`,borderRadius:20,padding:"3px 10px",fontSize:10,cursor:"pointer",whiteSpace:"nowrap",fontFamily:"inherit"}}>{cl}</button>)}</div>
    <div style={{display:"flex",gap:5,overflowX:"auto",marginBottom:8}}>{sessions.map(s=><button key={s} onClick={()=>setSf(s)} style={{background:sf===s?C.blue:C.surface2,color:sf===s?"#fff":C.textMuted,border:`1px solid ${sf===s?C.blue:C.border}`,borderRadius:20,padding:"3px 10px",fontSize:10,cursor:"pointer",whiteSpace:"nowrap",fontFamily:"inherit"}}>{s}</button>)}</div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
      <span style={{color:C.textMuted,fontSize:11}}>{filtered.length}{t.admPenaltiesCount}</span>
      <Btn small variant="secondary" onClick={doExport}>CSV</Btn>
    </div>
    {(()=>{
      // Readable name for penalty types when there are no seconds (e.g. "Sortflag" → "Sort flag"),
      // overridable per straftype via Admin → Straffe → Opsætning.
      const typeLabel=(type)=>state.orbitsLabels?.[type]||{Sortflag:"Sort flag"}[type]||type;
      const STATION_SOURCES=["weight_official","nose_official","tech_official"];
      const orbitsLine=(p)=>{
        const label=(!STATION_SOURCES.includes(p.source)&&p.seconds>0)?`+${p.seconds}s`:typeLabel(p.type);
        return p.reason?`#${p.kartNo}: ${label} - ${p.reason}`:`#${p.kartNo}: ${label}`;
      };
      return <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,alignItems:"start"}}>
        {/* VENSTRE: godkendelse */}
        <div>
          <div style={{color:C.textMuted,fontSize:10,letterSpacing:2,marginBottom:8}}>{showApproved?t.admApprovedHdr:t.admForApprovalHdr}</div>
          {filtered.length===0&&<div style={{color:C.textMuted,textAlign:"center",padding:20}}>{showApproved?t.admNoApprovedPenalties:t.admNoPendingPenalties}</div>}
          {filtered.map((p,i)=><Card key={i} style={{padding:"10px 14px",borderLeft:`3px solid ${p.type==="Diskvalifikation"?C.red:showApproved?C.green:C.orange}`,marginBottom:6}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <span style={{fontWeight:900,color:C.text,fontSize:18,fontFamily:"'Barlow Condensed',sans-serif"}}>#{p.kartNo}</span>
                {nameForPenalty(p)&&<span style={{color:C.text,fontSize:13}}>{nameForPenalty(p)}</span>}
              </div>
              <Badge color={p.type==="Diskvalifikation"?C.red:C.orange} style={{fontSize:9}}>{p.type}{p.seconds>0?" +"+p.seconds+"s":""}</Badge>
            </div>
            <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:4}}>
              <Badge style={{fontSize:9}}>{p.class}</Badge>
              <Badge color={C.blue} style={{fontSize:9}}>{p.session}</Badge>
              <Badge color={showApproved?C.green:C.orange} style={{fontSize:9}}>{showApproved?t.admVisible:t.admPending}</Badge>
            </div>
            {p.reason&&<div style={{color:C.textMuted,fontSize:11,marginBottom:6}}>{p.reason}</div>}
            {p.nosePhotoUrl&&<a href={p.nosePhotoUrl} target="_blank" rel="noreferrer" style={{display:"inline-block",marginBottom:6}}><img src={p.nosePhotoUrl} style={{width:80,height:60,objectFit:"cover",borderRadius:6,border:`1px solid ${C.border}`}} alt={t.admNoseFairingPhoto}/><div style={{color:C.blue,fontSize:9}}>📷 {t.admNoseFairingPhotoOfficialsOnly} – klik for stor</div></a>}
            <div style={{display:"flex",gap:6}}>
              {!showApproved&&<button onClick={()=>approvePenalty(p)} style={{flex:1,background:`${C.green}22`,border:`1px solid ${C.green}44`,borderRadius:6,padding:"7px",color:C.green,fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>{t.admApproveRelease}</button>}
              <button onClick={()=>openEdit(p)} style={{background:C.surface2,border:`1px solid ${C.border}`,borderRadius:6,padding:"7px 12px",color:C.textMuted,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>{t.edit}</button>
              <button onClick={()=>{if(confirm(t.admDeletePenaltyConfirm))deletePenalty(p);}} style={{background:"#400010",border:"1px solid #FF446644",borderRadius:6,padding:"7px 12px",color:"#FF4466",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>{t.delete}</button>
            </div>
          </Card>)}
        </div>
        {/* HØJRE: Orbits-tekst */}
        <div>
          <div style={{color:C.cyan,fontSize:10,letterSpacing:2,marginBottom:8}}>{t.admToOrbits}</div>
          {filtered.length===0&&<div style={{color:C.textMuted,textAlign:"center",padding:20}}>{t.noPenalties}</div>}
          {filtered.map((p,i)=><div key={i} style={{background:C.surface,border:`1px solid ${C.border}`,borderLeft:`3px solid ${C.cyan}`,borderRadius:6,padding:"9px 12px",marginBottom:6,display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
            <div style={{minWidth:0}}>
              <div style={{fontFamily:"monospace",fontSize:13,color:C.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{orbitsLine(p)}</div>
              <div style={{display:"flex",gap:4,marginTop:3}}><Badge style={{fontSize:8}}>{p.class}</Badge><Badge color={C.blue} style={{fontSize:8}}>{p.session}</Badge></div>
            </div>
            <button onClick={()=>{navigator.clipboard&&navigator.clipboard.writeText(orbitsLine(p));setCopiedIdx(i);setTimeout(()=>setCopiedIdx(null),1500);}} style={{background:copiedIdx===i?`${C.green}33`:C.surface2,border:`1px solid ${copiedIdx===i?C.green:C.border}`,borderRadius:6,padding:"6px 12px",color:copiedIdx===i?C.green:C.cyan,fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit",flexShrink:0}}>{copiedIdx===i?t.admCopied:t.admCopy}</button>
          </div>)}
        </div>
      </div>;
    })()}
  </div>;
}

function AdminInspection({state,dispatch,seriesScope}){
  const t=useT();
  const [tab,setTab]=useState("reporting");
  const scopedEvs=eventsInScope(state.events,seriesScope);
  const selEv=getAdminSelEv(state,scopedEvs);
  const setSelEv=v=>setAdminSelEv(dispatch,v);
  const [form,setForm,clearAdminInspDraft]=useDraft(`gc_draft_admininsp_${selEv}`,{class:"Rotax Junior",session:"Heat 1",groups:[],videoOk:null,trackOk:null,techOk:null,notes:""});
  const ev=state.events.find(e=>e.id===parseInt(selEv));
  const groupLetters=classGroupLetters(ev,form.class);
  const checks=[["videoOk","📹 "+t.video],["trackOk","🏁 "+t.track]];
  const [readySent,setReadySent]=useState(false);

    dispatch({type:"ADD_INSPECTION",eventId:parseInt(selEv),payload:{...form,by:"Admin",time:new Date().toLocaleString("da-DK")}});

  };
  return <div>
    <SH title={t.navReporting} sub={t.reportingSub}/>
    <div style={{background:"#1a001a",border:"1px solid #9B59B644",borderRadius:6,padding:8,marginBottom:10,display:"flex",gap:6,alignItems:"center"}}>
      <span>🔒</span><span style={{color:C.purple,fontSize:11,fontWeight:700}}>{t.admOnlyAdminOfficials}</span>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
      <button onClick={()=>setTab("reporting")} style={{background:tab==="reporting"?`${C.purple}22`:C.surface2,border:`2px solid ${tab==="reporting"?C.purple:C.border}`,borderRadius:8,padding:"10px",cursor:"pointer",textAlign:"center",fontFamily:"inherit"}}>
        <div style={{color:tab==="reporting"?C.purple:C.textMuted,fontWeight:700,fontSize:12,letterSpacing:1}}>{t.admReportingTab}</div>
      </button>
      <button onClick={()=>setTab("notifications")} style={{background:tab==="notifications"?`${C.red}22`:C.surface2,border:`2px solid ${tab==="notifications"?C.red:C.border}`,borderRadius:8,padding:"10px",cursor:"pointer",textAlign:"center",fontFamily:"inherit"}}>
        <div style={{color:tab==="notifications"?C.red:C.textMuted,fontWeight:700,fontSize:12,letterSpacing:1}}>{t.admNotifTab}</div>
      </button>

    {tab==="notifications"&&<AdminNotifications state={state} dispatch={dispatch} seriesScope={seriesScope}/>}

    <Sel label={t.race} value={selEv} onChange={setSelEv} options={eventsInScope(state.events,seriesScope).map(e=>({value:String(e.id),label:e.name}))}/>
    <Card style={{borderLeft:`3px solid ${C.purple}`}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <Sel label={t.classLabel} value={form.class} onChange={v=>setForm(f=>({...f,class:v,groups:[]}))} options={sortClassesByAge(ev?.classes||Object.keys(state.classRules),state.classRules)}/>
        <Sel label={t.session} value={form.session} onChange={v=>setForm(f=>({...f,session:v,groups:[]}))} options={(state.sessions||[]).map(s=>s.name)}/>
      </div>
      {groupLetters.length>0&&<div style={{background:`${C.cyan}11`,border:`1px solid ${C.cyan}44`,borderRadius:6,padding:"8px 10px",marginBottom:10}}>
        <div style={{color:C.cyan,fontSize:10,letterSpacing:1,marginBottom:6}}>{t.admGroupsOptional}</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {groupLetters.map(g=>{const on=form.groups.includes(g);return <button key={g} onClick={()=>setForm(f=>({...f,groups:f.groups.includes(g)?f.groups.filter(x=>x!==g):[...f.groups,g]}))} style={{background:on?C.cyan:C.surface2,color:on?"#000":C.textMuted,border:`1px solid ${on?C.cyan:C.border}`,borderRadius:8,padding:"5px 12px",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{on?"✓ ":""}{t.admGroupPrefix} {g}</button>;})}

function AdminGroups({state,dispatch,seriesScope}){
  const t=useT();
  const scoped=eventsInScope(state.events,seriesScope);
  const selEv=getAdminSelEv(state,scoped);
  const setSelEv=v=>setAdminSelEv(dispatch,v);
  const ev=state.events.find(e=>String(e.id)===selEv);
  const classes=ev?sortClassesByAge(ev.classes||Object.keys(state.classRules),state.classRules):[];
  const sessions=(state.sessions||[]).map(s=>s.name);
  const [selClass,setSelClass]=useState("");
  const [selSession,setSelSession]=useState("*");
  const [preview,setPreview]=useState(null);
  const [msg,setMsg]=useState("");
  const fileRef=useRef();

  const activeClass=classes.includes(selClass)?selClass:classes[0]||"";
  const ALL_SESSIONS="*"; // class-wide: applies to all heats/sessions
  const sessionOpts=[{value:ALL_SESSIONS,label:t.admAllSessionsFullDay},...sessions.map(s=>({value:s,label:s}))];
  const activeSession=(selSession===ALL_SESSIONS||sessions.includes(selSession))?selSession:ALL_SESSIONS;
  const key=`${activeClass}||${activeSession}`;
  const existing=ev?.sessionGroups?.[key];
  const sessionLabel=activeSession===ALL_SESSIONS?t.admAllSessionsWord:activeSession;

  const onFile=(file)=>{
    setMsg("");setPreview(null);
    const reader=new FileReader();
    reader.onload=()=>{setPreview(parseGroupCsv(reader.result,t));};
    reader.readAsArrayBuffer(file);
  };
  const save=()=>{
    if(!preview||!preview.rows?.length)return;
    const groups={};
    preview.rows.forEach(r=>{groups[r.kart]=r.group;});
    dispatch({type:"SET_SESSION_GROUPS",eventId:ev.id,key,groups});
    setMsg(`${t.admDistributedMsgA}${preview.rows.length}${t.admDistributedMsgB}${preview.groups.length}${t.admDistributedMsgC}${activeClass} · ${sessionLabel}`);
    setPreview(null);
  };
  const clear=()=>{
    if(!confirm(`${t.admDeleteAssignmentConfirmA}${activeClass} · ${sessionLabel}${t.admDeleteAssignmentConfirmB}`))return;
    dispatch({type:"CLEAR_SESSION_GROUPS",eventId:ev.id,key});
    setMsg(t.admAssignmentDeleted);
  };

  return <div>
    <SH title={t.admGroupsTitle} sub={t.admGroupsSub}/>
    {scoped.length===0
      ?<div style={{color:C.textMuted,textAlign:"center",padding:30}}>{t.admCreateRaceFirst}</div>
      :<>
      <Sel label={t.race} value={selEv} onChange={v=>{setSelEv(v);setPreview(null);setMsg("");}} options={scoped.map(e=>({value:String(e.id),label:e.name}))}/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <Sel label={t.admFieldClass} value={activeClass} onChange={v=>{setSelClass(v);setPreview(null);}} options={classes.map(c=>({value:c,label:c}))}/>
        <Sel label={t.admAppliesTo} value={activeSession} onChange={v=>{setSelSession(v);setPreview(null);}} options={sessionOpts}/>
      </div>
      {activeSession==="*"&&<div style={{color:C.textDim,fontSize:11,marginBottom:6}}>{t.admGroupsApplyAllHeatsA}{activeClass}{t.admGroupsApplyAllHeatsB}</div>}
      <Card style={{borderLeft:`3px solid ${C.cyan}`,marginTop:6}}>
        <div style={{color:C.textMuted,fontSize:10,letterSpacing:2,marginBottom:6}}>{t.admUploadGroupCsv}</div>
        <div style={{color:C.textDim,fontSize:11,marginBottom:10}}>{t.admFileColumnsHintA}<b>KartNr</b>{t.admFileColumnsHintB}<b>Grp</b>{t.admFileColumnsHintC}</div>
        {existing&&!preview&&<div style={{background:`${C.green}11`,border:`1px solid ${C.green}44`,borderRadius:8,padding:10,marginBottom:10}}>
          <div style={{color:C.green,fontSize:12,fontWeight:700}}>{t.admGroupsExistA}{Object.keys(existing).length}{t.admGroupsExistB}</div>
          <div style={{color:C.textMuted,fontSize:11,marginTop:2}}>{t.admGroupsLabel}{[...new Set(Object.values(existing))].sort().join(", ")}</div>
          <div style={{marginTop:8}}><Btn small variant="danger" onClick={clear}>{t.admDeleteAssignment}</Btn></div>
        </div>}
        <input ref={fileRef} type="file" accept=".csv" style={{display:"none"}} onChange={e=>e.target.files[0]&&onFile(e.target.files[0])}/>
        <Btn small onClick={()=>fileRef.current.click()}>{t.admChooseCSVFile}</Btn>
        {msg&&<div style={{color:C.green,fontSize:12,marginTop:8}}>{msg}</div>}
        {preview&&preview.error&&<div style={{color:C.orange,fontSize:12,marginTop:8}}>⚠️ {preview.error}</div>}
        {preview&&!preview.error&&<div style={{marginTop:10}}>
          <div style={{color:C.text,fontSize:12,fontWeight:700,marginBottom:6}}>{t.admPreviewLabel}{preview.rows.length}{t.admDriversInA}{preview.groups.length}{t.admDriversInB}</div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:8}}>
            {preview.groups.map(g=>{const n=preview.rows.filter(r=>r.group===g).length;return <Badge key={g} color={C.cyan} style={{fontSize:11}}>{g}: {n}</Badge>;})}
          </div>
          <div style={{maxHeight:180,overflowY:"auto",border:`1px solid ${C.border}`,borderRadius:6}}>
            {preview.rows.slice(0,40).map(r=><div key={r.kart} style={{display:"flex",gap:8,padding:"4px 8px",borderBottom:`1px solid ${C.border}`,fontSize:12}}>
              <span style={{color:C.textMuted,minWidth:40}}>#{r.kart}</span>
              <span style={{flex:1,color:C.text}}>{r.name}</span>
              <Badge color={C.cyan} style={{fontSize:10}}>{r.group}</Badge>
            </div>)}
            {preview.rows.length>40&&<div style={{color:C.textDim,fontSize:11,padding:"4px 8px"}}>{t.admMoreRowsA}{preview.rows.length-40}{t.admMoreRowsB}</div>}
          </div>
          <div style={{display:"flex",gap:8,marginTop:10}}>
            <Btn small onClick={save}>{t.admSaveAssignmentTo}{activeClass} · {sessionLabel}</Btn>
            <Btn small variant="ghost" onClick={()=>setPreview(null)}>{t.cancel}</Btn>
          </div>
        </div>}
      </Card>
      </>}
  </div>;
}

function AdminStorage({state,dispatch}){
  const t=useT();
  const [scanning,setScanning]=useState(false);
  const [result,setResult]=useState(null); // {total,count,byFolder}
  const [err,setErr]=useState("");
  const [quotaInput,setQuotaInput]=useState(String(state.storageQuotaGB||1));

  const FOLDER_LABELS={
    "nose-photos":"Front fairing-billeder",
    "tech-control":"Teknisk kontrol-PDF'er",
    "event-pdfs":"Tillægsregler-PDF'er",
    "track-logos":"Bane-logoer",
    "regulations":"Reglementer",
  };
  const folderLabel=f=>FOLDER_LABELS[f]||(f.startsWith("event-")?"Løbsdokumenter":f);

  const scan=async()=>{
    if(!sb){setErr("Supabase er ikke konfigureret");return;}
    setScanning(true);setErr("");setResult(null);
    try{
      const acc={total:0,count:0,byFolder:{}};
      await scanStorageFolder("documents","",null,acc);
      setResult(acc);
    }catch(e){setErr(String(e.message||e));}
    setScanning(false);

  const quotaBytes=(parseFloat(quotaInput)||1)*1024*1024*1024;
  const pct=result?Math.min(100,(result.total/quotaBytes)*100):0;

  return <div>
    <Card style={{marginBottom:12}}>
      <div style={{color:C.textMuted,fontSize:10,letterSpacing:2,marginBottom:8}}>{t.admStorageQuota}</div>
      <div style={{color:C.textDim,fontSize:11,marginBottom:8}}>Supabase deler ikke din plans lagergrænse via API'et – angiv den selv her, så du kan se hvor meget der er tilbage (Free = 1 GB, Pro inkluderer 100 GB).</div>
      <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
        <div style={{flex:1}}><Input label="Lagerkvote (GB)" value={quotaInput} onChange={setQuotaInput} placeholder="1"/></div>
        <Btn small onClick={()=>dispatch({type:"SET_STORAGE_QUOTA",gb:parseFloat(quotaInput)||1})} style={{marginBottom:10}}>{t.save}</Btn>
      </div>
    </Card>

    <Card style={{marginBottom:12}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <div style={{color:C.textMuted,fontSize:10,letterSpacing:2}}>{t.admStorageUsage}</div>
        <Btn small variant="ghost" onClick={scan} disabled={scanning}>{scanning?"Scanner...":"↻ Opdater"}</Btn>
      </div>
      {err&&<div style={{color:C.red,fontSize:12,marginBottom:8}}>{err}</div>}
      {!result&&!scanning&&!err&&<div style={{color:C.textDim,fontSize:12,padding:"12px 0",textAlign:"center"}}>Tryk "Opdater" for at beregne det aktuelle forbrug</div>}
      {scanning&&<div style={{color:C.textDim,fontSize:12,padding:"12px 0",textAlign:"center"}}>Scanner lager – kan tage lidt tid ved mange filer...</div>}
      {result&&<>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:6}}>
          <div style={{color:C.text,fontSize:20,fontWeight:700}}>{formatBytes(result.total)}</div>
          <div style={{color:C.textMuted,fontSize:12}}>af {state.storageQuotaGB} GB ({pct.toFixed(1).replace(".",",")}%)</div>
        </div>
        <div style={{background:C.surface2,borderRadius:6,height:10,overflow:"hidden",marginBottom:8}}>
          <div style={{width:`${pct}%`,height:"100%",background:pct>90?C.red:pct>70?C.orange:C.green,transition:"width 0.3s"}}/>
        </div>
        <div style={{color:C.textDim,fontSize:11,marginBottom:12}}>{result.count} filer i alt</div>
        {Object.entries(result.byFolder).sort((a,b)=>b[1]-a[1]).map(([folder,size])=>
          <div key={folder} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:`1px solid ${C.border}`}}>
            <span style={{color:C.textMuted,fontSize:12}}>{folderLabel(folder)}</span>
            <span style={{color:C.text,fontSize:12,fontWeight:600}}>{formatBytes(size)}</span>
          </div>
        )}
      </>}
    </Card>
  </div>;
}

function AdminRegulations({state,dispatch}){
  const t=useT();
  const [title,setTitle]=useState("");
  const [file,setFile]=useState(null);
  const [busy,setBusy]=useState(false);
  const [msg,setMsg]=useState("");
  const fileRef=useRef();
  const regs=state.regulations||[];
  const upload=async()=>{
    if(!title.trim()||!file){setMsg("Udfyld titel og vælg en PDF.");return;}
    setBusy(true);setMsg("");
    try{
      let url=null;
      if(sb){
        const ext=(file.name.split(".").pop()||"pdf").toLowerCase();
        const path=`regulations/${Date.now()}_${title.trim().replace(/[^a-z0-9]/gi,"_")}.${ext}`;
        const {error:upErr}=await sb.storage.from("documents").upload(path,file,{contentType:file.type||"application/pdf",upsert:false});
        if(upErr){setMsg("Upload fejlede: "+upErr.message);setBusy(false);return;}
        const {data:pub}=sb.storage.from("documents").getPublicUrl(path);
        url=pub.publicUrl;
      }
      dispatch({type:"ADD_REGULATION",payload:{title:title.trim(),url,file:file.name,updated:new Date().toISOString().slice(0,10)}});
      setTitle("");setFile(null);if(fileRef.current)fileRef.current.value="";
      setMsg("✓ Reglement uploadet");
    }catch(e){setMsg(String(e.message||e));}
    setBusy(false);
  };
  return <div>
    <Card style={{marginBottom:12,borderLeft:`3px solid ${C.red}`}}>
      <div style={{color:C.textMuted,fontSize:10,letterSpacing:2,marginBottom:8}}>{t.admUploadRegPdf}</div>
      <Input label="Titel" value={title} onChange={setTitle} placeholder="fx Teknisk Reglement 2026"/>
      <input ref={fileRef} type="file" accept="application/pdf,.pdf" style={{display:"none"}} onChange={e=>setFile(e.target.files[0]||null)}/>
      <div style={{display:"flex",gap:8,alignItems:"center",margin:"6px 0"}}>
        <Btn small variant="secondary" onClick={()=>fileRef.current.click()}>📄 Vælg PDF</Btn>
        {file&&<span style={{color:C.textMuted,fontSize:12}}>{file.name}</span>}
      </div>
      <Btn onClick={upload} disabled={busy||!title.trim()||!file} style={{width:"100%"}}>{busy?"Uploader...":"+ Upload reglement"}</Btn>
      {msg&&<div style={{color:msg.startsWith("✓")?C.green:C.orange,fontSize:12,marginTop:8}}>{msg}</div>}
    </Card>
    <div style={{color:C.textMuted,fontSize:10,letterSpacing:2,marginBottom:8}}>REGLEMENTER ({regs.length})</div>
    {regs.length===0&&<div style={{color:C.textDim,fontSize:12,padding:16,textAlign:"center"}}>Ingen reglementer endnu</div>}
    {regs.map(r=><Card key={r.id} style={{padding:"10px 12px",marginBottom:6}}>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <span style={{fontSize:20}}>📋</span>
        <div style={{flex:1}}>
          <div style={{color:C.text,fontWeight:600,fontSize:13}}>{r.title}</div>
          <div style={{color:C.textDim,fontSize:10}}>Opdateret: {r.updated}{r.url?"":" · (ingen fil)"}</div>
        </div>
        {r.url&&<a href={r.url} target="_blank" rel="noreferrer" style={{color:C.blue,fontSize:11,textDecoration:"underline"}}>Åbn</a>}
        <Btn small variant="danger" onClick={()=>{if(confirm(`Slet reglementet "${r.title}"?`))dispatch({type:"DELETE_REGULATION",id:r.id});}}>{t.delete}</Btn>
      </div>
    </Card>)}
  </div>;
}

function AdminSessions({state,dispatch}){
  const t=useT();
  const [name,setName]=useState("");
  const [editId,setEditId]=useState(null);
  const [editName,setEditName]=useState("");
  const sessions=state.sessions||[];
  const add=()=>{if(!name.trim())return;dispatch({type:"ADD_SESSION",name:name.trim()});setName("");};
  const saveEdit=()=>{if(!editName.trim())return;dispatch({type:"UPDATE_SESSION",id:editId,name:editName.trim()});setEditId(null);};
  const move=(idx,dir)=>{
    const arr=sessions.slice();
    const j=idx+dir;
    if(j<0||j>=arr.length)return;
    [arr[idx],arr[j]]=[arr[j],arr[idx]];
    dispatch({type:"REORDER_SESSIONS",sessions:arr});
  };
  return <div>
    <Card style={{marginBottom:12}}>
      <div style={{color:C.textMuted,fontSize:10,letterSpacing:2,marginBottom:8}}>{t.admAddSession}</div>
      <div style={{color:C.textDim,fontSize:11,marginBottom:8}}>Fx: Træning 1, Kvalifikation, Kval A, Kval B, Heat 1, Heat 2, Prefinale A, Finale A. Rækkefølgen her bruges i dropdowns.</div>
      <div style={{display:"flex",gap:8}}>
        <div style={{flex:1}}><Input value={name} onChange={setName} placeholder="fx Heat 1 eller Prefinale A"/></div>
        <Btn small onClick={add} disabled={!name.trim()}>+ Tilføj</Btn>
      </div>
    </Card>
    <div style={{color:C.textMuted,fontSize:10,letterSpacing:2,marginBottom:8}}>SESSIONER ({sessions.length})</div>
    {sessions.length===0&&<div style={{color:C.textDim,fontSize:12,padding:16,textAlign:"center"}}>Ingen sessioner endnu</div>}
    {sessions.map((s,idx)=><Card key={s.id} style={{padding:"8px 12px",marginBottom:6}}>
      {editId===s.id
        ?<div style={{display:"flex",gap:8,alignItems:"center"}}>
          <div style={{flex:1}}><Input value={editName} onChange={setEditName} placeholder="Navn"/></div>
          <Btn small onClick={saveEdit}>{t.save}</Btn>
          <Btn small variant="ghost" onClick={()=>setEditId(null)}>{t.cancel}</Btn>
        </div>
        :<div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{display:"flex",flexDirection:"column",gap:1}}>
            <button onClick={()=>move(idx,-1)} disabled={idx===0} style={{background:"transparent",border:"none",color:idx===0?C.textDim:C.textMuted,cursor:idx===0?"default":"pointer",fontSize:10,lineHeight:1,padding:0}}>▲</button>
            <button onClick={()=>move(idx,1)} disabled={idx===sessions.length-1} style={{background:"transparent",border:"none",color:idx===sessions.length-1?C.textDim:C.textMuted,cursor:idx===sessions.length-1?"default":"pointer",fontSize:10,lineHeight:1,padding:0}}>▼</button>
          </div>
          <span style={{color:C.textDim,fontSize:11,minWidth:20}}>{idx+1}.</span>
          <span style={{flex:1,color:C.text,fontWeight:600,fontSize:14}}>{s.name}</span>
          <Btn small variant="ghost" onClick={()=>{setEditId(s.id);setEditName(s.name);}}>{t.edit}</Btn>
          <Btn small variant="danger" onClick={()=>{if(confirm(`Slet sessionen "${s.name}"?`))dispatch({type:"DELETE_SESSION",id:s.id});}}>{t.delete}</Btn>
        </div>}
    </Card>)}
  </div>;
}
