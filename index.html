        Tilpas straftype-tekst og standard-årsag for de tre officialstationer. Teksten bruges i selve straffen (fx <b>#12: Teknisk fejl - {"{årsag}"}</b>) og dermed også i "TIL ORBITS"-linjen under Straffe.
      </div>

      {(()=>{
        const stCfg=state.stationPenalties||{};
        const val=(station,field,fallback="")=>{
          if(stForm[`${station}.${field}`]!==undefined)return stForm[`${station}.${field}`];
          if(field.startsWith("types.")){
            const idx=parseInt(field.split(".")[1],10);
            return stCfg[station]?.types?.[idx]??fallback;
          }
          return stCfg[station]?.[field]??fallback;
        };
        const setVal=(station,field,v)=>setStForm(f=>({...f,[`${station}.${field}`]:v}));
        const save=(station,fields)=>{
          const payload={};
          fields.forEach(field=>{
            if(field.startsWith("types.")){
              if(!payload.types)payload.types=[val(station,"types.0"),val(station,"types.1"),val(station,"types.2")];
            }else{
              payload[field]=val(station,field);
            }
          });
          dispatch({type:"SET_STATION_PENALTY",station,payload});
          setStForm(f=>{const c={...f};fields.forEach(field=>delete c[`${station}.${field}`]);return c;});
        };
        return <>
          <Card style={{padding:"14px",borderLeft:`3px solid ${C.cyan}`,marginBottom:12}}>
            <div style={{fontWeight:700,color:C.text,fontSize:13,marginBottom:2}}>Teknisk kontrol</div>
            <div style={{color:C.textDim,fontSize:10,marginBottom:10}}>Op til 3 fejltyper – vises som dropdown for officials, når de markerer en kører som "Fejl". Tomme felter springes over.</div>
            <Input label="Fejltype 1" value={val("tech","types.0")} onChange={v=>setVal("tech","types.0",v)} placeholder="fx Teknisk fejl"/>
            <Input label="Fejltype 2" value={val("tech","types.1")} onChange={v=>setVal("tech","types.1",v)} placeholder="valgfri"/>
            <Input label="Fejltype 3" value={val("tech","types.2")} onChange={v=>setVal("tech","types.2",v)} placeholder="valgfri"/>
            <Input label="Standard-årsag (bruges hvis official ikke selv skriver en bemærkning)" value={val("tech","reason")} onChange={v=>setVal("tech","reason",v)} placeholder="fx Teknisk kontrol – ikke godkendt"/>
            <Btn small onClick={()=>save("tech",["types.0","types.1","types.2","reason"])}>{t.save}</Btn>
          </Card>

          <Card style={{padding:"14px",borderLeft:`3px solid ${C.cyan}`,marginBottom:12}}>
            <div style={{fontWeight:700,color:C.text,fontSize:13,marginBottom:2}}>Front fairing</div>
            <div style={{color:C.textDim,fontSize:10,marginBottom:10}}>Typen sættes automatisk ud fra sessionen (kvalifikation eller ej) – her styres kun teksten.</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              <Input label="Type – Kvalifikation" value={val("nose","typeQual")} onChange={v=>setVal("nose","typeQual",v)} placeholder="fx Hurtigste tid fjernes"/>
              <Input label="Type – Øvrige sessioner" value={val("nose","typeOther")} onChange={v=>setVal("nose","typeOther",v)} placeholder="fx Tidsstraf"/>
            </div>
            <Input label="Årsag" value={val("nose","reason")} onChange={v=>setVal("nose","reason",v)} placeholder="fx Trykket front fairing"/>
            <Btn small onClick={()=>save("nose",["typeQual","typeOther","reason"])}>{t.save}</Btn>
          </Card>

          <Card style={{padding:"14px",borderLeft:`3px solid ${C.cyan}`,marginBottom:12}}>
            <div style={{fontWeight:700,color:C.text,fontSize:13,marginBottom:10}}>Vægt</div>
            <Input label="Type" value={val("weight","type")} onChange={v=>setVal("weight","type",v)} placeholder="fx Placering sidst"/>
            <Input label="Årsag" value={val("weight","reason")} onChange={v=>setVal("weight","reason",v)} placeholder="fx Undervægt (placeres sidst)"/>
            <Btn small onClick={()=>save("weight",["type","reason"])}>{t.save}</Btn>
          </Card>
        </>;
      })()}
    </div>}
  </div>;
}

// ── ADMIN: KART NUMBER REGISTRY ────────────────────────────────────
function AdminKartRegister({state,dispatch}){
  const t=useT();
  const reg=state.kartRegister||{ranges:{},numbers:{}};
  const classes=sortClassesByAge(Object.keys(state.classRules||{}),state.classRules);
  const [cls,setCls]=useState(classes[0]||"");
  const activeCls=classes.includes(cls)?cls:classes[0]||"";
  const range=kartRange(reg,activeCls);
  const [rStart,setRStart]=useState(range?.start||"");
  const [rEnd,setREnd]=useState(range?.end||"");
  const [sel,setSel]=useState(null); // selected number {num,owner}
  const [reassignId,setReassignId]=useState("");
  const [relDate,setRelDate]=useState(reg.releaseDate||"");
  const [renewDate,setRenewDate]=useState(reg.renewOpenDate||"");
  const [msg,setMsg]=useState("");
  const csvRef=useRef();

  // Update interval fields when class changes
  useEffect(()=>{const r=kartRange(reg,activeCls);setRStart(r?.start||"");setREnd(r?.end||"");setSel(null);},[activeCls]);

  const saveRange=()=>{
    const s=parseInt(rStart),e=parseInt(rEnd);
    if(!s||!e||s>e){setMsg(t.admInvalidRange);return;}
    dispatch({type:"SET_KART_RANGE",className:activeCls,start:s,end:e});
    setMsg(`${t.admRangeFor}${activeCls}: ${s}–${e}`);
  };
  const saveDates=()=>{
    dispatch({type:"SET_KART_DATES",releaseDate:relDate||"",renewOpenDate:renewDate||""});
    setMsg(t.admDatesSaved);
  };

  const release=(num)=>{dispatch({type:"RELEASE_KART",className:activeCls,number:num});setSel(null);};
  const reassign=(num)=>{
    if(!reassignId)return;
    const usr=state.users.find(x=>String(x.id)===String(reassignId));
    if(!usr)return;
    dispatch({type:"CLAIM_KART",className:activeCls,number:num,ownerId:usr.id,ownerName:usr.name,ownerLicense:usr.license||""});
    setReassignId("");setSel(null);setMsg(`#${num}${t.admAssignedTo}${usr.name}`);
  };
  const toggleRenew=(num,owner)=>{
    // admin can manually mark/unmark renewal
    if(owner.renewed)dispatch({type:"CLAIM_KART",className:activeCls,number:num,ownerId:owner.ownerId,ownerName:owner.ownerName,ownerLicense:owner.ownerLicense});
    else dispatch({type:"RENEW_KART",className:activeCls,number:num,ownerId:owner.ownerId});
    setSel(null);
  };

  const runAnnual=()=>{
    const cnt=Object.values(reg.numbers||{}).reduce((a,nums)=>a+Object.values(nums).filter(i=>!i.renewed).length,0);
    const renewed=Object.values(reg.numbers||{}).reduce((a,nums)=>a+Object.values(nums).filter(i=>i.renewed).length,0);
    if(!window.confirm(t.admAnnualReleaseConfirm.replace("COUNT",cnt).replace("RENEWED",renewed)))return;
    dispatch({type:"RUN_ANNUAL_RELEASE"});
    setMsg(`${t.admAnnualReleaseRun}${cnt}${t.admReleasedKept.replace("RENEWED",renewed)}`);
  };

  // ── CSV import (ID number + kart number) ──
  const onCsv=(file)=>{
    if(!file)return;
    const reader=new FileReader();
    reader.onload=()=>{
      const buf=new Uint8Array(reader.result);
      let text;
      if(buf[0]===0xFF&&buf[1]===0xFE)text=new TextDecoder("utf-16le").decode(buf);
      else if(buf[0]===0xFE&&buf[1]===0xFF)text=new TextDecoder("utf-16be").decode(buf);
      else text=new TextDecoder("utf-8").decode(buf);
      text=text.replace(/^\uFEFF/,"");
      const split=(l)=>l.includes(";")?l.split(";"):l.split(",");
      const lines=text.split(/\r?\n/).filter(l=>l.trim());
      if(lines.length<2){setMsg(t.admEmptyCsv);return;}
      const head=split(lines[0]).map(h=>h.trim().toLowerCase());
      // Kart column first (more specific), then ID column
      let ki=head.findIndex(h=>h.includes("kart"));
      if(ki<0)ki=head.findIndex(h=>h==="nr"||h==="nr."||h==="nummer");
      let idi=head.findIndex((h,i)=>i!==ki&&(h.includes("id")||h.includes("licens")));
      if(idi<0||ki<0){setMsg(t.admCsvColumnsNotFound);return;}
      const entries=[];
      lines.slice(1).forEach(l=>{
        const f=split(l);
        const id=(f[idi]||"").trim();
        const num=parseInt((f[ki]||"").replace(/\D/g,""));
        if(!id||!num)return;
        // find matching profile via license/ID
        const usr=state.users.find(x=>x.license&&String(x.license).replace(/\D/g,"")===id.replace(/\D/g,""));
        entries.push({className:activeCls,number:num,ownerId:usr?.id||null,ownerName:usr?.name||("ID "+id),ownerLicense:id});
      });
      dispatch({type:"IMPORT_KART_NUMBERS",entries});
      setMsg(`${entries.length}${t.admKartsImportedTo}${activeCls}`);
    };
    reader.readAsArrayBuffer(file);
  };

  const exportCsv=()=>{
    let csv="\uFEFFKlasse;Kartnummer;Ejer;Licens/ID;Frigives\n";
    Object.entries(reg.numbers||{}).forEach(([c,nums])=>{
      Object.entries(nums).sort((a,b)=>a[0]-b[0]).forEach(([num,info])=>{
        csv+=`${c};${num};"${info.ownerName||""}";${info.ownerLicense||""};${info.releaseDate||""}\n`;
      });
    });
    const a=document.createElement("a");
    a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8"}));
    a.download="kartnummer_register_"+new Date().toISOString().slice(0,10)+".csv";
    a.click();
  };

  const nums=reg.numbers?.[activeCls]||{};
  const takenCount=Object.keys(nums).length;
  const total=range?(range.end-range.start+1):0;

  return <div>
    <SH title={t.admKartRegisterTitle} sub={t.admKartRegisterSub}/>
    {msg&&<div style={{background:`${C.green}22`,border:`1px solid ${C.green}44`,borderRadius:8,padding:10,marginBottom:10,color:C.green,fontSize:12,fontWeight:600}}>{msg}</div>}

    <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12,paddingBottom:4}}>
      {classes.map(c=><button key={c} onClick={()=>setCls(c)} style={{background:activeCls===c?state.classRules[c]?.color||C.red:C.surface2,color:activeCls===c?"#fff":C.textMuted,border:`1px solid ${activeCls===c?state.classRules[c]?.color||C.red:C.border}`,borderRadius:20,padding:"5px 14px",fontSize:12,cursor:"pointer",whiteSpace:"nowrap",fontFamily:"inherit",fontWeight:activeCls===c?700:400}}>{c}</button>)}
    </div>

    {/* Globale datoer */}
    <Card style={{borderLeft:`3px solid ${C.orange}`}}>
      <div style={{color:C.textMuted,fontSize:10,letterSpacing:2,marginBottom:8}}>{t.admAnnualDates}</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <Input label={t.admRenewOpens} value={renewDate} onChange={setRenewDate} type="date"/>
        <Input label={t.admReleaseDate} value={relDate} onChange={setRelDate} type="date"/>
      </div>
      <Btn small onClick={saveDates}>{t.admSaveDates}</Btn>
      <div style={{color:C.textDim,fontSize:10,marginTop:6}}>{t.admRenewHelp}</div>
    </Card>

    {/* Interval */}
    <Card style={{borderLeft:`3px solid ${C.red}`}}>
      <div style={{color:C.textMuted,fontSize:10,letterSpacing:2,marginBottom:8}}>{t.admNumberRange}{activeCls}</div>
      <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
        <Input label={t.admFrom} value={String(rStart)} onChange={setRStart} placeholder="1" type="number"/>
        <Input label={t.admTo} value={String(rEnd)} onChange={setREnd} placeholder="99" type="number"/>
        <Btn small onClick={saveRange} style={{marginBottom:10}}>{t.admSaveRange}</Btn>
      </div>
      {range&&<div style={{color:C.textDim,fontSize:11}}>{takenCount} {t.admOf} {total} {t.admNumbersInUse}</div>}
    </Card>

    {/* CSV + årlig frigivelse */}
    <Card>
      <div style={{color:C.textMuted,fontSize:10,letterSpacing:2,marginBottom:8}}>{t.admTools}</div>
      <input type="file" accept=".csv,text/csv" style={{display:"none"}} ref={csvRef} onChange={e=>{onCsv(e.target.files[0]);e.target.value="";}}/>
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        <Btn small variant="secondary" onClick={()=>csvRef.current?.click()}>{t.admImportCsvTo}{activeCls})</Btn>
        <Btn small variant="secondary" onClick={exportCsv}>{t.admExportBackup}</Btn>
        <Btn small variant="danger" onClick={runAnnual}>{t.admRunAnnualRelease}</Btn>
      </div>
      <div style={{color:C.textDim,fontSize:10,marginTop:6}}>{t.admCsvHelp}</div>
    </Card>

    {/* Oversigt */}
    <Card style={{borderLeft:`3px solid ${C.blue}`}}>
      <div style={{color:C.textMuted,fontSize:10,letterSpacing:2,marginBottom:8}}>{t.admNumbersFor}{activeCls}{t.admClickForDetails}</div>
      <div style={{display:"flex",gap:12,marginBottom:8,fontSize:11}}><span style={{color:C.green}}>■ {t.free}</span><span style={{color:C.textDim}}>■ {t.taken}</span></div>
      <KartNumberGrid cls={activeCls} reg={reg} selectedNum={sel?.num} onPick={(num,owner)=>{setSel({num,owner});setReassignId("");}}/>
    </Card>

    {/* Detalje/handlinger for valgt nummer */}
    {sel&&<Card style={{borderLeft:`3px solid ${sel.owner?C.orange:C.green}`}}>
      <div style={{fontWeight:700,color:C.text,fontSize:15,marginBottom:6}}>#{sel.num} · {activeCls}</div>
      {sel.owner?<div>
        <div style={{color:C.textMuted,fontSize:12,marginBottom:2}}>{t.admOwnerLabel}<strong style={{color:C.text}}>{sel.owner.ownerName}</strong>{sel.owner.ownerLicense?" ("+sel.owner.ownerLicense+")":""}</div>
        <div style={{color:sel.owner.renewed?C.green:C.textDim,fontSize:11,marginBottom:2}}>{sel.owner.renewed?t.admRenewedKeep:t.admNotRenewed}</div>
        {!sel.owner.ownerId&&<div style={{color:C.textDim,fontSize:10,marginBottom:6}}>{t.admImportedNoProfile}</div>}
        <div style={{margin:"10px 0"}}>
          <Btn small variant="ghost" onClick={()=>toggleRenew(sel.num,sel.owner)}>{sel.owner.renewed?t.admRemoveRenewal:t.admMarkRenewed}</Btn>
        </div>
        <div style={{margin:"10px 0",display:"flex",gap:8,alignItems:"flex-end"}}>
          <Sel label={t.admAssignToOther} value={reassignId} onChange={setReassignId} options={[{value:"",label:t.admSelectDriver},...state.users.filter(x=>x.type!=="admin").map(x=>({value:String(x.id),label:x.name+(x.license?" ("+x.license+")":"")}))]}/>
          <Btn small onClick={()=>reassign(sel.num)} disabled={!reassignId} style={{marginBottom:10}}>{t.admAssign}</Btn>
        </div>
        <Btn small variant="danger" onClick={()=>release(sel.num)}>{t.admReleaseNum}{sel.num}</Btn>
      </div>:<div>
        <div style={{color:C.green,fontSize:13,marginBottom:8}}>{t.admNumberFree}</div>
        <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
          <Sel label={t.admAssignToDriver} value={reassignId} onChange={setReassignId} options={[{value:"",label:t.admSelectDriver},...state.users.filter(x=>x.type!=="admin").map(x=>({value:String(x.id),label:x.name+(x.license?" ("+x.license+")":"")}))]}/>
          <Btn small onClick={()=>reassign(sel.num)} disabled={!reassignId} style={{marginBottom:10}}>{t.admAssign}</Btn>
        </div>
      </div>}
    </Card>}
  </div>;
}

function AdminStandings({state,dispatch,seriesScope}){
  const t=useT();
  const series=(state.raceSeries||[]).filter(s=>!seriesScope||seriesScope.map(Number).includes(Number(s.id)));
  const [selSer,setSelSer]=useState(String(series[0]?.id||""));
  const csvRefs=useRef({});
  const pdfRefs=useRef({});
  const [msg,setMsg]=useState("");
  const [preview,setPreview]=useState(null); // {seriesId, classes:[{name,rounds,hasDrop,rows}], errors:[]}

  const onCsvFiles=(seriesId,files)=>{
    setMsg("");
    const arr=Array.from(files);
    if(!arr.length)return;
    const results=[];const errors=[];let done=0;
    arr.forEach(file=>{
      const reader=new FileReader();
      reader.onload=()=>{
        const p=parseStandingsCsv(reader.result,file.name,t);
        if(p.error)errors.push(file.name+": "+p.error);
        else results.push({name:p.className,rounds:p.rounds,hasDrop:p.hasDrop,data:{rounds:p.rounds,hasDrop:p.hasDrop,rows:p.rows}});
        done++;
        if(done===arr.length)setPreview({seriesId,classes:results,errors});
      };
      reader.readAsArrayBuffer(file);
    });
  };

  const confirmImport=()=>{
    if(!preview)return;
    dispatch({type:"SET_CHAMP_STANDINGS",seriesId:Number(preview.seriesId),classes:preview.classes});
    setMsg(`${preview.classes.length}${t.admClassesImported}`);
    setPreview(null);
  };

  const uploadPdf=(seriesId,file)=>{
    if(!file)return;
    const reader=new FileReader();
    reader.onload=()=>dispatch({type:"SET_CHAMP_PDF",seriesId,payload:{name:file.name,dataUrl:reader.result,updated:new Date().toLocaleString("da-DK")}});
    reader.readAsDataURL(file);
  };

  return <div>
    <SH title={t.admStandingsTitle} sub={t.admStandingsSub}/>
    {msg&&<div style={{background:`${C.green}22`,border:`1px solid ${C.green}44`,borderRadius:8,padding:10,marginBottom:10,color:C.green,fontWeight:700,textAlign:"center"}}>✅ {msg}</div>}
    <div style={{background:`${C.blue}11`,border:`1px solid ${C.blue}44`,borderRadius:6,padding:8,marginBottom:12,fontSize:11,color:C.blue}}>
      {t.admStandingsHelp}
    </div>

    {series.length===0&&<div style={{color:C.textDim,fontSize:12}}>{t.admCreateSeriesFirst}</div>}

    {series.map(s=>{
      const st=(state.champStandings||{})[s.id];
      const classNames=st?Object.keys(st).filter(k=>k!=="_updated"):[];
      const pdf=(state.champPdfs||{})[s.id];
      return <Card key={s.id} style={{borderLeft:`3px solid ${C.red}`,marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <div style={{fontWeight:700,color:C.text,fontSize:14}}>{s.name}</div>
          {st?._updated&&<div style={{color:C.textDim,fontSize:10}}>{t.admUpdatedLabel}{st._updated}</div>}
        </div>

        {classNames.length>0
          ?<div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:10}}>
            {classNames.map(cn=><div key={cn} style={{display:"flex",alignItems:"center",gap:4,background:C.surface2,border:`1px solid ${C.border}`,borderRadius:20,padding:"3px 6px 3px 10px"}}>
              <span style={{color:C.text,fontSize:11,fontWeight:600}}>{cn}</span>
              <span style={{color:C.textDim,fontSize:10}}>({(st[cn].rows||[]).length})</span>
              <button onClick={()=>dispatch({type:"REMOVE_CHAMP_STANDINGS_CLASS",seriesId:s.id,className:cn})} title={t.admRemoveClassTitle} style={{background:"none",border:"none",color:C.red,cursor:"pointer",fontSize:14,lineHeight:1,fontFamily:"inherit",padding:"0 2px"}}>×</button>
            </div>)}
          </div>
          :<div style={{color:C.textDim,fontSize:11,marginBottom:10}}>{t.admNoStandingsYet}</div>}

        <input type="file" accept=".csv,text/csv" multiple style={{display:"none"}} ref={el=>csvRefs.current[s.id]=el} onChange={e=>{onCsvFiles(s.id,e.target.files);e.target.value="";}}/>
        <input type="file" accept="application/pdf,.pdf" style={{display:"none"}} ref={el=>pdfRefs.current[s.id]=el} onChange={e=>{uploadPdf(s.id,e.target.files[0]);e.target.value="";}}/>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <Btn small onClick={()=>csvRefs.current[s.id]?.click()}>{t.admImportCsvBtn}</Btn>
          {classNames.length>0&&<Btn small variant="danger" onClick={()=>dispatch({type:"REMOVE_CHAMP_STANDINGS",seriesId:s.id})}>{t.admClearAll}</Btn>}
          <Btn small variant="ghost" onClick={()=>pdfRefs.current[s.id]?.click()}>{pdf?t.admReplacePdf:t.admPdfAlternative}</Btn>
          {pdf&&<Btn small variant="ghost" onClick={()=>dispatch({type:"REMOVE_CHAMP_PDF",seriesId:s.id})}>{t.admRemovePdf}</Btn>}
        </div>
        {pdf&&<div style={{color:C.textDim,fontSize:10,marginTop:6}}>📄 PDF: {pdf.name}{t.admPdfShownIf}</div>}
      </Card>;
    })}

    {/* Forhåndsvisning før import */}
    {preview&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:16}} onClick={()=>setPreview(null)}>
      <div style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:12,padding:16,maxWidth:520,width:"100%",maxHeight:"85vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
        <div style={{fontWeight:700,color:C.text,fontSize:15,marginBottom:4}}>{t.admPreviewTitle}</div>
        <div style={{color:C.textMuted,fontSize:12,marginBottom:12}}>{t.admImportingTo}{series.find(x=>String(x.id)===String(preview.seriesId))?.name}</div>
        {preview.errors.map((er,i)=><div key={i} style={{background:`${C.red}11`,border:`1px solid ${C.red}44`,borderRadius:6,padding:8,marginBottom:6,fontSize:11,color:C.red}}>⚠️ {er}</div>)}
        {preview.classes.map((c,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:`1px solid ${C.border}`}}>
          <div>
            <div style={{fontWeight:700,color:C.text,fontSize:13}}>{c.name}</div>
            <div style={{color:C.textMuted,fontSize:11}}>{c.data.rows.length}{t.admDriversLabel}{c.rounds.length}{t.admRoundsLabel}{c.hasDrop?t.admWithDrop:""}</div>
          </div>
          <span style={{color:C.green,fontSize:16}}>✓</span>
        </div>)}
        <div style={{display:"flex",gap:8,marginTop:14}}>
          <Btn onClick={confirmImport} disabled={!preview.classes.length} style={{flex:1}}>{t.admImportClasses}{preview.classes.length}{t.admClassesLabel}</Btn>
          <Btn variant="ghost" onClick={()=>setPreview(null)}>{t.cancel}</Btn>
        </div>
      </div>
    </div>}
  </div>;
}

// ── CSV IMPORT (CHAMPIONSHIP STANDINGS) ──────────────────────────────
// Parses CSV exported from the RMC calculation tool.
// Format (actual Danish column headers from the source file): Pl.,Nr.,Navn, [Afd.N Kval,Afd.N Heats,Afd.N Pre,Afd.N Finale]... ,Total[,Med fratræk]
function parseStandingsCsv(arrayBuffer,fileName,t){
  const buf=new Uint8Array(arrayBuffer);
  let text;
  if(buf[0]===0xFF&&buf[1]===0xFE)text=new TextDecoder("utf-16le").decode(buf);
  else if(buf[0]===0xFE&&buf[1]===0xFF)text=new TextDecoder("utf-16be").decode(buf);
  else text=new TextDecoder("utf-8").decode(buf);
  text=text.replace(/^\uFEFF/,"");
  const splitLine=(line)=>{
    const out=[];let cur="";let inQ=false;
    for(let i=0;i<line.length;i++){
      const ch=line[i];
      if(ch==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
      else if(ch===","&&!inQ){out.push(cur);cur="";}
      else cur+=ch;
    }
    out.push(cur);return out;
  };
  const lines=text.split(/\r?\n/).filter(l=>l.trim().length>0);
  if(lines.length<2)return{error:t?t.admNoDataRows:"Filen indeholder ingen datarækker"};
  const header=splitLine(lines[0]).map(h=>h.trim());
  // Find rounds from "Afd.N Kval" columns
  const rounds=[];
  header.forEach(h=>{const m=h.match(/^Afd\.(\d+)\s+Kval$/i);if(m)rounds.push(parseInt(m[1]));});
  if(header[0].toLowerCase().indexOf("pl")!==0||!rounds.length)
    return{error:t?t.admUnknownCsvFormat:"Ukendt format – forventede en mesterskabs-CSV fra beregningsværktøjet (Pl., Nr., Navn, Afd.1 Kval ...)"};
  const hasDrop=header[header.length-1].toLowerCase().includes("fratræk")||header[header.length-1].toLowerCase().includes("fratraek");
  // Class name: derived from the filename (RMC_DK_2026_Rotax_Junior.csv → "Rotax Junior")
  let className=(fileName||"").replace(/\.csv$/i,"");
  className=className.replace(/^RMC[_ ]?DK[_ ]?\d{0,4}[_ ]?/i,"");
  className=className.replace(/plus/gi,"+").replace(/_/g," ").trim();
  if(!className)className=t?t.admUnknownClass:"Ukendt klasse";
  const rows=lines.slice(1).map(line=>{
    const f=splitLine(line);
    const segs={};
    rounds.forEach((rn,ri)=>{
      const base=3+ri*4;
      segs[rn]={kval:f[base]||"",heats:f[base+1]||"",pre:f[base+2]||"",finale:f[base+3]||""};
    });
    const totalIdx=3+rounds.length*4;
    return{
      pos:parseInt(f[0])||null,
      nr:(f[1]||"").trim(),
      name:(f[2]||"").trim(),
      segs,
      total:(f[totalIdx]||"").trim(),
      drop:hasDrop?(f[totalIdx+1]||"").trim():null,
    };
  }).filter(r=>r.name);
  return{error:null,className,rounds,hasDrop,rows};
}


// Robust text decoding: tries UTF-16, UTF-8, and finally Windows-1252 (Excel/ANSI).
function decodeCsvBytes(arrayBuffer){
  const buf=new Uint8Array(arrayBuffer);
  if(buf[0]===0xFF&&buf[1]===0xFE)return new TextDecoder("utf-16le").decode(buf).replace(/^\uFEFF/,"");
  if(buf[0]===0xFE&&buf[1]===0xFF)return new TextDecoder("utf-16be").decode(buf).replace(/^\uFEFF/,"");
  try{return new TextDecoder("utf-8",{fatal:true}).decode(buf).replace(/^\uFEFF/,"");}
  catch(e){return new TextDecoder("windows-1252").decode(buf).replace(/^\uFEFF/,"");}
}

// Reads group CSV: KartNr, Navn, Grp. Returns {rows:[{kart,name,group}], groups, error}.
function parseGroupCsv(arrayBuffer,t){
  let text;
  try{text=decodeCsvBytes(arrayBuffer);}catch(e){return{rows:[],error:t?t.admCouldNotReadFile:"Kunne ikke læse filen"};}
  const splitLine=(line)=>{
    const sep=(line.split(";").length>line.split(",").length)?";":",";
    if(!line.includes('"'))return line.split(sep);
    const out=[];let cur="";let inQ=false;
    for(let i=0;i<line.length;i++){const ch=line[i];
      if(ch==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
      else if(ch===sep&&!inQ){out.push(cur);cur="";}
      else cur+=ch;}
    out.push(cur);return out;
  };
  const lines=text.split(/\r?\n/).filter(l=>l.trim().length>0);
  if(lines.length<2)return{rows:[],error:t?t.admNoDataRows:"Filen indeholder ingen datarækker"};
  const headers=splitLine(lines[0]).map(h=>h.trim().toLowerCase());
  const findCol=(names)=>{for(const n of names){const i=headers.findIndex(h=>h.replace(/\s/g,"")===n);if(i>=0)return i;}return -1;};
  const ki=findCol(["kartnr","kartnummer","kart","nr","no","no."]);
  const gi=findCol(["grp","gruppe","group"]);
  const ni=findCol(["navn","name"]);
  if(ki<0||gi<0)return{rows:[],error:t?t.admMissingColumns:'Mangler kolonner. Filen skal have "KartNr" og "Grp".'};
  const rows=[];const seen=new Set();
  lines.slice(1).forEach(line=>{
    const f=splitLine(line);
    const kart=parseInt((f[ki]||"").trim());
    const group=(f[gi]||"").trim().toUpperCase();
    const name=ni>=0?(f[ni]||"").trim():"";
    if(!kart||!group)return;
    if(seen.has(kart))return;
    seen.add(kart);
    rows.push({kart,group,name});
  });
  const groups=[...new Set(rows.map(r=>r.group))].sort();
  return{rows,groups,error:rows.length?null:(t?t.admNoValidRows:"Ingen gyldige rækker fundet")};
}

function parseDasuCsv(arrayBuffer,appClasses){
  // appClasses = list of class names the user has created in the app (for smart matching)
  const buf=new Uint8Array(arrayBuffer);
  let text;
  if(buf[0]===0xFF&&buf[1]===0xFE)text=new TextDecoder("utf-16le").decode(buf);
  else if(buf[0]===0xFE&&buf[1]===0xFF)text=new TextDecoder("utf-16be").decode(buf);
  else text=new TextDecoder("utf-8").decode(buf);
  text=text.replace(/^\uFEFF/,"");
  const splitLine=(line)=>{
    if(!line.includes('"'))return line.split(";");
    const out=[];let cur="";let inQ=false;
    for(let i=0;i<line.length;i++){
      const ch=line[i];
      if(ch==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
      else if(ch===";"&&!inQ){out.push(cur);cur="";}
      else cur+=ch;
    }
    out.push(cur);return out;
  };
  const lines=text.split(/\r?\n/).filter(l=>l.trim().length>0);
  if(lines.length<2)return{error:"Filen indeholder ingen datarækker",rows:[]};
  const headers=splitLine(lines[0]).map(h=>h.trim().toLowerCase());
  const col=(names)=>{for(const n of names){const i=headers.indexOf(n.toLowerCase());if(i>=0)return i;}return -1;};
  const ci={
    name:col(["Navn"]),license:col(["ID-nummer","ID nummer","Licensnummer"]),dob:col(["Fødselsdag","Foedselsdag"]),
    club:col(["Klubnavn"]),phone:col(["Telefon"]),email:col(["E-mailadresse","Email","E-mail"]),
    cls:col(["Klasse"]),licenseType:col(["Licenstype"]),licenseOk:col(["Licens OK"]),
    transponder:col(["Transponder"]),kartNo:col(["KartNr","Kart Nr","Kartnummer"]),
    country:col(["Land","Nationalitet","Country"]),
    engineMake:col(["Motorfabrikat"]),kartMake:col(["Kartfabrikat"]),
    address:col(["Adresse"]),zip:col(["Postnummer"]),city:col(["By"]),clubCode:col(["Klubkode"]),
    guardian:col(["Værges navn","Vaerges navn"]),paid:col(["Betaling modtaget"]),
  };
  if(ci.name<0||ci.cls<0)return{error:"Kunne ikke finde kolonnerne 'Navn' og 'Klasse' – er det en DASU-deltagerliste?",rows:[]};
  // Smart class matching: compare the DASU class with the user's OWN created classes.
  const canon=(s)=>(s||"")
    .toLowerCase()
    .replace(/\s*\(.*?\)\s*/g,"")   // remove parentheses, e.g. "(32+)"
    .replace(/[^a-z0-9+]/g,"")       // letters/digits/plus only (so spaces/hyphens are ignored)
    .trim();
  const classList=(appClasses&&appClasses.length?appClasses:Object.keys(DEFAULT_CLASSES));
  const canonMap=classList.map(name=>({name,key:canon(name)}));
  const normClass=(c)=>{
    const raw=c.replace(/\s*\(.*\)\s*/g,"").trim();
    const key=canon(c);
    if(!key)return raw;
    const hasPlus=key.endsWith("+");
    // Only candidates with the same +/- status (so "Master" and "Master+" aren't confused)
    const sameplus=canonMap.filter(x=>x.key.endsWith("+")===hasPlus);
    const pool=sameplus.length?sameplus:canonMap;
    // 1) exact match
    let hit=pool.find(x=>x.key===key);
    if(hit)return hit.name;
    // 2) Find best partial match: the candidate whose key shares the most characters with the DASU class.
    //    We prefer the LONGEST candidate key that is contained in (or contains) the DASU key,
    //    so "Rotax DD2 Master" wins over "Rotax DD2".
    let best=null,bestLen=0;
    for(const x of pool){
      const contained=key.includes(x.key)||x.key.includes(key);
      if(contained){
        const score=Math.min(x.key.length,key.length);
        if(score>bestLen){bestLen=score;best=x;}
      }
    }
    if(best)return best.name;
    // 3) no match – keep the raw DASU name (gives a "not found in the event" warning)
    return raw;
  };
  const normDate=(d)=>{const m=(d||"").trim().match(/^(\d{2})-(\d{2})-(\d{4})$/);return m?`${m[3]}-${m[2]}-${m[1]}`:(d||"").trim();};
  // Translate country name (Danish/English) to ISO code. Empty/unknown → "" (treated as Danish).
  const normCountry=(name)=>{
    const x=(name||"").trim();
    if(!x)return "";
    if(x.length===2)return x.toUpperCase(); // already a code
    const low=x.toLowerCase();
    const hit=(typeof COUNTRIES!=="undefined"?COUNTRIES:[]).find(c=>c.da.toLowerCase()===low||c.en.toLowerCase()===low);
    return hit?hit.code:"";
  };
  const g=(f,i)=>ci[i]>=0?(f[ci[i]]||"").trim():"";
  const rows=lines.slice(1).map(line=>{
    const f=splitLine(line);
    const rawClass=g(f,"cls");
    const onsite=/betal tilmeldingsgebyret/i.test(rawClass);
    return{
      name:g(f,"name"),license:g(f,"license"),dob:normDate(g(f,"dob")),club:g(f,"club"),
      phone:g(f,"phone"),email:g(f,"email"),class:normClass(rawClass),licenseType:g(f,"licenseType"),
      licenseOk:g(f,"licenseOk").toLowerCase()==="ja",transponder:g(f,"transponder"),
      country:normCountry(g(f,"country")),
      engineMake:g(f,"engineMake"),kartMake:g(f,"kartMake"),
      address:g(f,"address"),zip:g(f,"zip"),city:g(f,"city"),clubCode:g(f,"clubCode"),
      kartNo:parseInt(g(f,"kartNo"))||null,guardian:g(f,"guardian"),
      paid:g(f,"paid").toUpperCase()==="ACCEPTED",onsite,
    };
  }).filter(r=>r.name);
  return{error:null,rows};
}

function AdminImport({state,dispatch,seriesScope}){
  const t=useT();
  const scopedEvs=eventsInScope(state.events,seriesScope);
  const selEv=getAdminSelEv(state,scopedEvs);
  const setSelEv=v=>setAdminSelEv(dispatch,v);
  const [parsed,setParsed]=useState(null);
  const [fileName,setFileName]=useState("");
  const [importedMsg,setImportedMsg]=useState("");
  const [excludedRows,setExcludedRows]=useState(new Set());
  const fileRef=useRef();
  const ev=state.events.find(e=>e.id===parseInt(selEv));

  const onFile=(file)=>{
    if(!file)return;
    setFileName(file.name);setImportedMsg("");setExcludedRows(new Set());
    const reader=new FileReader();
    reader.onload=()=>setParsed(parseDasuCsv(reader.result,Object.keys(state.classRules||{})));
    reader.readAsArrayBuffer(file);
  };
  const toggleRowExcluded=(i)=>setExcludedRows(prev=>{const next=new Set(prev);if(next.has(i))next.delete(i);else next.add(i);return next;});
  const includedRows=parsed?parsed.rows.filter((r,i)=>!excludedRows.has(i)):[];
  const updateRow=(i,field,value)=>setParsed(p=>({...p,rows:p.rows.map((r,idx)=>idx===i?{...r,[field]:value}:r)}));

  const doImport=()=>{
    if(!includedRows.length||!ev)return;
    const batchId="import-"+Date.now();
    dispatch({type:"IMPORT_PARTICIPANTS",eventId:ev.id,batchId,rows:includedRows});
    setImportedMsg(`${includedRows.length} deltagere importeret til ${ev.name}`);
    setParsed(null);setFileName("");setExcludedRows(new Set());
  };

  // Existing import batches (across all events)
  const batches={};
  state.events.forEach(e=>(e.registrations||[]).forEach(r=>{
    if(r.importBatch){
      if(!batches[r.importBatch])batches[r.importBatch]={count:0,events:new Set()};
      batches[r.importBatch].count++;batches[r.importBatch].events.add(e.name);
    }
  }));
  const batchList=Object.entries(batches);

  const evClasses=sortClassesByAge(ev?.classes||Object.keys(state.classRules),state.classRules);
  const classCounts={};const warnings=[];
  if(parsed&&!parsed.error){
    includedRows.forEach(r=>{classCounts[r.class]=(classCounts[r.class]||0)+1;});
    const unknown=[...new Set(includedRows.filter(r=>!evClasses.includes(r.class)).map(r=>r.class))];
    if(unknown.length)warnings.push(`Klasser der ikke findes på løbet: ${unknown.join(", ")}`);
    const noKart=includedRows.filter(r=>!r.kartNo).length;
    if(noKart)warnings.push(`${noKart} deltager(e) uden kartnummer – ofte forældre/teamchefer i DASU-udtrækket, ikke rigtige kørere. Tjek rækkerne markeret med rødt nedenfor, og fjern fluebenet for dem der ikke skal importeres.`);
    const dup={};
    includedRows.forEach(r=>{if(r.kartNo){const k=r.class+"#"+r.kartNo;dup[k]=(dup[k]||0)+1;}});
    const dups=Object.entries(dup).filter(([,n])=>n>1).map(([k])=>k);
    if(dups.length)warnings.push(`Dublerede kartnumre i samme klasse: ${dups.join(", ")}`);
    Object.entries(classCounts).forEach(([cls,n])=>{
      const m=classLimitFor(ev,cls);
      if(m&&(classCount(ev,cls)+n)>m)warnings.push(`${cls}: import giver ${classCount(ev,cls)+n} tilmeldte – maks er ${m}`);
    });
  }

  return <div>
    <SH title="CSV Import" sub="Testimport af deltagerliste fra DASU"/>
    <div style={{background:`${C.blue}11`,border:`1px solid ${C.blue}44`,borderRadius:6,padding:8,marginBottom:10,fontSize:11,color:C.blue}}>
      Importér en deltagerliste (CSV) fra DASU-tilmeldingssystemet, så systemet kan testes live sideløbende – uden at deltagerne skal tilmelde sig her. Der oprettes kørerprofiler og tilmeldinger på det valgte løb. Alt kan fjernes igen med ét klik.
    </div>
    {importedMsg&&<div style={{background:`${C.green}22`,border:`1px solid ${C.green}44`,borderRadius:8,padding:12,marginBottom:10,color:C.green,fontWeight:700,textAlign:"center"}}>✅ {importedMsg}</div>}
    <Card style={{borderLeft:`3px solid ${C.red}`}}>
      <Sel label="Importér til løb" value={selEv} onChange={setSelEv} options={eventsInScope(state.events,seriesScope).map(e=>({value:String(e.id),label:e.name}))}/>
      <input type="file" accept=".csv,text/csv" style={{display:"none"}} ref={fileRef} onChange={e=>{onFile(e.target.files[0]);e.target.value="";}}/>
      <div onClick={()=>fileRef.current?.click()} style={{textAlign:"center",padding:"16px",background:C.bg,borderRadius:6,border:`2px dashed ${C.border}`,cursor:"pointer",marginBottom:10}}>
        <div style={{fontSize:22}}>📥</div>
        <div style={{color:C.text,fontSize:13,fontWeight:700}}>{fileName||"Vælg CSV-fil fra DASU"}</div>
        <div style={{color:C.textMuted,fontSize:11}}>Semikolon-separeret · UTF-8 eller UTF-16</div>
      </div>
      {parsed&&parsed.error&&<div style={{background:`${C.red}11`,border:`1px solid ${C.red}44`,borderRadius:6,padding:10,color:C.red,fontSize:12,fontWeight:700}}>⚠️ {parsed.error}</div>}
      {parsed&&!parsed.error&&<div>
        <div style={{color:C.textMuted,fontSize:10,letterSpacing:2,marginBottom:6}}>FORHÅNDSVISNING – {includedRows.length} AF {parsed.rows.length} DELTAGERE VALGT</div>
        <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:8}}>
          {Object.entries(classCounts).map(([cls,n])=><Badge key={cls} color={evClasses.includes(cls)?state.classRules[cls]?.color||C.red:C.orange} style={{fontSize:10}}>{cls}: {n}</Badge>)}
        </div>
        {warnings.map((w,i)=><div key={i} style={{background:`${C.orange}11`,border:`1px solid ${C.orange}44`,borderRadius:6,padding:8,marginBottom:6,fontSize:11,color:C.orange}}>⚠️ {w}</div>)}
        <div style={{color:C.textDim,fontSize:10,marginBottom:6}}>Fjern fluebenet for rækker der IKKE skal importeres (fx forældre/teamchefer der er kommet med fra DASU-udtrækket). Kart #, navn og klasse kan rettes direkte i tabellen.</div>
        <div style={{maxHeight:260,overflowY:"auto",border:`1px solid ${C.border}`,borderRadius:6,marginBottom:10}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
            <thead><tr style={{background:C.surface2,position:"sticky",top:0}}>{["","Kart","Navn","Klasse","Licens","Klub","Betalt"].map(h=><th key={h} style={{padding:"6px 8px",color:C.textMuted,fontWeight:600,textAlign:"left",fontSize:9,letterSpacing:1}}>{h}</th>)}</tr></thead>
            <tbody>{parsed.rows.map((r,i)=>{
              const excluded=excludedRows.has(i);
              const suspicious=!r.kartNo;
              return <tr key={i} style={{borderBottom:`1px solid ${C.border}`,background:excluded?"transparent":suspicious?`${C.red}0d`:"transparent",opacity:excluded?0.4:1}}>
                <td style={{padding:"5px 8px"}}><input type="checkbox" checked={!excluded} onChange={()=>toggleRowExcluded(i)}/></td>
                <td style={{padding:"3px"}}><input value={r.kartNo||""} onChange={e=>updateRow(i,"kartNo",e.target.value.replace(/\D/g,""))} placeholder="—" style={{width:52,background:C.surface2,border:`1px solid ${C.border}`,borderRadius:4,padding:"4px 6px",color:suspicious?C.red:C.text,fontWeight:suspicious?700:400,fontSize:11,fontFamily:"monospace",boxSizing:"border-box"}}/></td>
                <td style={{padding:"3px"}}><input value={r.name||""} onChange={e=>updateRow(i,"name",e.target.value)} style={{width:130,background:C.surface2,border:`1px solid ${C.border}`,borderRadius:4,padding:"4px 6px",color:C.text,fontWeight:700,fontSize:11,boxSizing:"border-box"}}/></td>
                <td style={{padding:"3px"}}>
                  <select value={r.class||""} onChange={e=>updateRow(i,"class",e.target.value)} style={{width:120,background:C.surface2,border:`1px solid ${evClasses.includes(r.class)?C.border:C.orange}`,borderRadius:4,padding:"4px 6px",color:evClasses.includes(r.class)?C.textMuted:C.orange,fontSize:11,boxSizing:"border-box",fontFamily:"inherit"}}>
                    {!evClasses.includes(r.class)&&r.class&&<option value={r.class}>{r.class}</option>}
                    {evClasses.map(c=><option key={c} value={c}>{c}</option>)}
                  </select>
                </td>
                <td style={{padding:"5px 8px",color:r.licenseOk?C.green:C.textDim}}>{r.license}{r.licenseOk?" ✓":""}</td>
                <td style={{padding:"5px 8px",color:C.textMuted}}>{r.club}</td>
                <td style={{padding:"5px 8px",color:r.paid?C.green:C.orange}}>{r.paid?"✓ Betalt":"På banen"}</td>
              </tr>;
            })}</tbody>
          </table>
        </div>
        <Btn onClick={doImport} style={{width:"100%"}} disabled={!includedRows.length}>📥 IMPORTÉR {includedRows.length} DELTAGERE TIL {ev?.name?.toUpperCase()||"LØB"}</Btn>
      </div>}
    </Card>
    {/* Eksisterende importer */}
    {batchList.length>0&&<Card style={{borderLeft:`3px solid ${C.orange}`}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <div style={{color:C.textMuted,fontSize:10,letterSpacing:2}}>IMPORTEREDE TESTDATA ({batchList.length})</div>
        {batchList.length>1&&<button onClick={()=>{if(confirm(`Fjern alle ${batchList.length} importer (på tværs af alle løb)? Handlingen kan ikke fortrydes.`))batchList.forEach(([bid])=>dispatch({type:"REMOVE_IMPORT_BATCH",batchId:bid}));}} style={{background:"#400010",border:"1px solid #FF446644",borderRadius:6,padding:"4px 10px",color:"#FF4466",fontSize:10,cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>Fjern alle</button>}
      </div>
      {batchList.map(([bid,info])=><div key={bid} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 0",borderBottom:`1px solid ${C.border}`}}>
        <div style={{flex:1}}>
          <div style={{fontWeight:700,color:C.text,fontSize:12}}>{[...info.events].join(", ")}</div>
          <div style={{color:C.textMuted,fontSize:10}}>{info.count} tilmeldinger · {new Date(parseInt(bid.replace("import-","")))?.toLocaleString?.("da-DK")||bid}</div>
        </div>
        <Btn small variant="danger" onClick={()=>dispatch({type:"REMOVE_IMPORT_BATCH",batchId:bid})}>Fjern import</Btn>
      </div>)}
      <div style={{color:C.textDim,fontSize:10,marginTop:6}}>Fjerner både tilmeldinger og de kørerprofiler der blev oprettet ved importen.</div>
    </Card>}
    {(()=>{
      const csvImportCount=(state.importedUsers||[]).filter(u=>u.source==="csv-import").length;
      if(csvImportCount===0)return null;
      return <Card style={{borderLeft:`3px solid ${C.red}`}}>
        <div style={{color:C.red,fontSize:10,letterSpacing:2,marginBottom:6}}>{t.admHardReset}</div>
        <div style={{color:C.textMuted,fontSize:11,marginBottom:10}}>
          {csvImportCount} CSV-importerede kørerprofiler findes stadig i systemet – inklusiv eventuelle "forældreløse" gamle importer uden batch-mærke, som "Fjern alle" ovenfor ikke kan fange. Brug denne knap hvis du stadig ser duplikater efter at have fjernet alle importer ovenfor.
        </div>
        <Btn variant="danger" style={{width:"100%"}} onClick={()=>{if(confirm(`Fjern ALLE ${csvImportCount} CSV-importerede kørere fuldstændig, uanset batch, på tværs af alle løb? Dette kan ikke fortrydes.`))dispatch({type:"REMOVE_ALL_CSV_IMPORTS"});}}>🧨 Fjern samtlige CSV-importerede kørere ({csvImportCount})</Btn>
        <div style={{color:C.textDim,fontSize:10,marginTop:8}}>Tip: luk appen på alle andre enheder/faner før du gør dette og importerer på ny – ellers kan en gammel fane med de forældede data i hukommelsen utilsigtet gemme dem tilbage.</div>
      </Card>;
    })()}
  </div>;
}


function DriverListScreen({state,dispatch,useGlobalEv=false,seriesScope=null}){
  const t=useT();
  const scopedEvents=eventsInScope(state.events,seriesScope);
  const [localSelEv,setLocalSelEv]=useState(String(scopedEvents[0]?.id));
  const selEv=useGlobalEv?getAdminSelEv(state,scopedEvents):localSelEv;
  const setSelEv=useGlobalEv?(v=>setAdminSelEv(dispatch,v)):setLocalSelEv;
  const [selClass,setSelClass]=useState("Alle");
  const [search,setSearch]=useState("");
  const [selDriver,setSelDriver]=useState(null);
  const [editMode,setEditMode]=useState(false);
  const [editForm,setEditForm]=useState({});
  const [saved,setSaved]=useState(false);

  const ev=scopedEvents.find(e=>e.id===parseInt(selEv))||scopedEvents[0];
  const regs=ev?.registrations||[];
  const classes=["Alle",...new Set(regs.map(r=>r.class))];
  const filtered=regs
    .filter(r=>selClass==="Alle"||r.class===selClass)
    .map(r=>{const u=state.users.find(u=>u.id===r.userId);return{reg:r,user:u};})
    .filter(({user})=>user&&(!search||user.name.toLowerCase().includes(search.toLowerCase())||String(user.kartNumber).includes(search)))
    .sort((a,b)=>(a.user.kartNumber||0)-(b.user.kartNumber||0));

  const openDriver=(item)=>{
    setSelDriver(item);setEditMode(false);setSaved(false);
    setEditForm({name:item.user.name,phone:item.user.phone||"",license:item.user.license||"",transponder:item.user.transponder||"",kartNumber:item.user.kartNumber||"",club:item.user.club||""});
  };
  const saveDriver=()=>{
    dispatch({type:"UPDATE_USER",payload:{id:selDriver.user.id,name:editForm.name,phone:editForm.phone,license:editForm.license,transponder:editForm.transponder,kartNumber:parseInt(editForm.kartNumber)||undefined,club:editForm.club}});
    setSaved(true);setTimeout(()=>setSaved(false),2000);
  };
  const pens=(selDriver&&ev)?((ev.penalties||[]).filter(p=>p.approved&&(p.kartNo===selDriver.user.kartNumber||p.driverName===selDriver.user.name))):[]; 

  if(selDriver){
    const u=selDriver.user;
    return <div style={{padding:16,overflowY:"auto",height:"100%"}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}>
        <Btn small variant="ghost" onClick={()=>setSelDriver(null)}>{t.admBack}</Btn>
        <Btn small variant={editMode?"secondary":"ghost"} onClick={()=>{setEditMode(!editMode);setSaved(false);}}>{editMode?t.cancel:"✏️ "+t.edit}</Btn>
      </div>
      <div style={{background:`linear-gradient(135deg,${C.redDark},#1a0003)`,borderRadius:10,padding:18,marginBottom:14,display:"flex",gap:14,alignItems:"center"}}>
        <div style={{width:52,height:52,borderRadius:"50%",background:`linear-gradient(135deg,${C.red},${C.redDark})`,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,color:"white",fontSize:20,flexShrink:0}}>{u.name?.charAt(0)}</div>
        <div>
          <div style={{fontWeight:900,color:"white",fontSize:26,fontFamily:"'Barlow Condensed',sans-serif"}}> #{u.kartNumber}</div>
          <div style={{color:"rgba(255,255,255,0.9)",fontWeight:700,fontSize:15}}>{u.name}</div>
          <div style={{color:"rgba(255,255,255,0.6)",fontSize:12}}>{selDriver.reg.class} · {u.club||"—"}</div>
        </div>
      </div>
      {editMode?<Card>
        <div style={{color:C.textMuted,fontSize:10,letterSpacing:2,marginBottom:10}}>{t.edit.toUpperCase()}</div>
        <Input label={t.name} value={editForm.name} onChange={v=>setEditForm(f=>({...f,name:v}))} placeholder={t.admFullName}/>
        <Input label={t.admFieldPhone} value={editForm.phone} onChange={v=>setEditForm(f=>({...f,phone:v}))} placeholder={t.admMobileNumber}/>
        <Input label={t.admLicenseNumber} value={editForm.license} onChange={v=>setEditForm(f=>({...f,license:v}))} placeholder="DK-2026-XXXX"/>
        <Input label={t.admFieldTransponder} value={editForm.transponder} onChange={v=>setEditForm(f=>({...f,transponder:v}))} placeholder="T-XXXX"/>
        <Input label={t.admFieldKart+" #"} value={String(editForm.kartNumber||"")} onChange={v=>setEditForm(f=>({...f,kartNumber:v}))} placeholder="98" type="number"/>
        {(state.clubs&&state.clubs.length)
          ?<Sel label={t.admFieldClub} value={editForm.club} onChange={v=>setEditForm(f=>({...f,club:v}))} options={[{value:"",label:t.admSelectClubOpt},...state.clubs.slice().sort((a,b)=>a.name.localeCompare(b.name,"da")).map(c=>({value:c.name,label:c.name}))]}/>
          :<Input label={t.admFieldClub} value={editForm.club} onChange={v=>setEditForm(f=>({...f,club:v}))} placeholder={t.admClubName}/>}
        {saved?<div style={{background:`${C.green}22`,border:`1px solid ${C.green}44`,borderRadius:8,padding:12,textAlign:"center",color:C.green,fontWeight:700}}>{t.admSavedExcl}</div>:<Btn onClick={saveDriver} fullWidth>{t.admSaveChanges}</Btn>}
      </Card>:<Card>
        <div style={{color:C.textMuted,fontSize:10,letterSpacing:2,marginBottom:10}}>{t.admDriverData}</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {[[t.admFieldLicense,u.license],[t.admFieldTransponder,u.transponder],[t.admFieldClass,selDriver.reg.class],[t.admFieldKart+" #",u.kartNumber],[t.admFieldClub,u.club],[t.admFieldPhone,u.phone]].filter(([,v])=>v).map(([k,v])=><div key={k}><div style={{color:C.textDim,fontSize:10}}>{k}</div><div style={{color:C.text,fontWeight:600,fontSize:13}}>{v}</div></div>)}
        </div>
      </Card>}
      <Card accentColor={pens.length>0?C.orange:C.green}>
        <div style={{color:C.textMuted,fontSize:10,letterSpacing:2,marginBottom:8}}>{t.admPenaltiesHdr} ({pens.length})</div>
        {pens.length===0?<div style={{color:C.green,fontSize:12}}>{t.admNoPenalties}</div>:pens.map((p,i)=><div key={i} style={{padding:"6px 0",borderBottom:i<pens.length-1?`1px solid ${C.border}`:"none"}}>
          <div style={{display:"flex",justifyContent:"space-between"}}><span style={{color:C.text,fontSize:12,fontWeight:700}}>{p.session}</span><Badge color={C.orange} style={{fontSize:9}}>{p.type}{p.seconds>0?" +"+p.seconds+"s":""}</Badge></div>
          <div style={{color:C.textMuted,fontSize:11}}>{p.reason}</div>
          {p.nosePhotoUrl&&<a href={p.nosePhotoUrl} target="_blank" rel="noreferrer" style={{display:"inline-block",marginTop:6}}><img src={p.nosePhotoUrl} style={{width:70,height:52,objectFit:"cover",borderRadius:6,border:`1px solid ${C.border}`}} alt={t.admNoseFairingPhoto}/><div style={{color:C.blue,fontSize:9,marginTop:2}}>📷 {t.admNoseFairingPhotoOfficialsOnly}</div></a>}
        </div>)}
      </Card>
    </div>;
  }

  return <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
    <div style={{padding:"16px 16px 0",flexShrink:0}}>
      <SH title={t.admDriverListTitle} sub={t.admRegisteredDrivers}/>
      <div style={{display:"flex",gap:6,marginBottom:4}}>
        <div style={{flex:1}}>
          <div style={{color:C.textMuted,fontSize:10,letterSpacing:1,marginBottom:4,textTransform:"uppercase"}}>{t.race}</div>
          <select value={selEv} onChange={e=>{setSelEv(e.target.value);setSelClass("Alle");}} style={{width:"100%",background:C.surface2,border:`1px solid ${C.border}`,borderRadius:6,padding:"7px 10px",color:C.text,fontSize:12,fontFamily:"inherit"}}>
            {scopedEvents.map(e=><option key={e.id} value={String(e.id)}>{e.name}</option>)}
          </select>
        </div>
      </div>
      <div style={{display:"flex",gap:5,overflowX:"auto",marginBottom:8,paddingBottom:2}}>
        {classes.map(cls=><button key={cls} onClick={()=>setSelClass(cls)} style={{background:selClass===cls?state.classRules[cls]?.color||C.red:C.surface2,color:selClass===cls?"#fff":C.textMuted,border:`1px solid ${selClass===cls?state.classRules[cls]?.color||C.red:C.border}`,borderRadius:20,padding:"4px 10px",fontSize:10,cursor:"pointer",whiteSpace:"nowrap",fontFamily:"inherit"}}>{cls}</button>)}
      </div>
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder={t.admSearchKartOrName}
        style={{width:"100%",background:C.surface2,border:`1px solid ${C.border}`,borderRadius:6,padding:"9px 12px",color:C.text,fontSize:13,boxSizing:"border-box",marginBottom:8,fontFamily:"inherit"}}/>
      <div style={{color:C.textMuted,fontSize:11,marginBottom:8}}>{filtered.length}{t.admDriversCount}</div>
    </div>
    <div style={{flex:1,overflowY:"auto",padding:"0 16px 16px"}}>
      <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,overflow:"hidden"}}>
        {filtered.length===0&&<div style={{padding:24,textAlign:"center",color:C.textMuted}}>{t.admNoDriversFound}</div>}
        {filtered.map(({reg,user},i)=><div key={user.id} onClick={()=>openDriver({reg,user})} style={{display:"grid",gridTemplateColumns:"56px 1fr auto",alignItems:"center",padding:"10px 14px",borderBottom:i<filtered.length-1?`1px solid ${C.border}`:"none",cursor:"pointer"}}>
          <div style={{fontWeight:900,color:C.text,fontSize:22,fontFamily:"'Barlow Condensed',sans-serif"}}>#{user.kartNumber}</div>
          <div><div style={{fontWeight:700,color:C.text,fontSize:13}}>{user.country?flagEmoji(user.country)+" ":""}{user.name}</div><div style={{color:C.textMuted,fontSize:11}}>{reg.class}</div></div>
          <div style={{display:"flex",gap:4,alignItems:"center"}}>
            {user.licenseValid===true&&<span style={{fontSize:12}}>✅</span>}
            {user.licenseValid===false&&<span style={{fontSize:12}}>❌</span>}
            <span style={{color:C.textDim,fontSize:18}}>›</span>
          </div>
        </div>)}
      </div>
    </div>
  </div>;
}

function LicenseControl({state,dispatch,useGlobalEv=false,seriesScope=null}){
  const t=useT();
  const scopedEvents=eventsInScope(state.events,seriesScope);
  const [localSelEv,setLocalSelEv]=useState(String(scopedEvents[0]?.id));
  const selEv=useGlobalEv?getAdminSelEv(state,scopedEvents):localSelEv;
  const setSelEv=useGlobalEv?(v=>setAdminSelEv(dispatch,v)):setLocalSelEv;
  const [selClass,setSelClass]=useState("Alle");
  const [search,setSearch]=useState("");
  const [editUser,setEditUser]=useState(null);
  const [editForm,setEditForm]=useState({});
  const [saved,setSaved]=useState(false);
  const [showAddDriver,setShowAddDriver]=useState(false);
  const [addMode,setAddMode]=useState("existing"); // "existing" | "new"
  const [addExistingId,setAddExistingId]=useState("");
  const [addClass,setAddClass]=useState("");
  const [addForm,setAddForm]=useState({name:"",kartNumber:"",license:"",transponder:"",phone:"",club:"",country:"DK",email:""});
  const [addMsg,setAddMsg]=useState("");

  const ev=scopedEvents.find(e=>e.id===parseInt(selEv))||scopedEvents[0];
  const checks=ev?.licenseChecks||{};
  const fridayPaid=ev?.fridayPaid||{};
  const hasFriday=!!ev?.hasFridayTraining;

  const regs=(ev?.registrations||[]);
  const classes=["Alle",...new Set(regs.map(r=>r.class))];

  const filtered=regs
    .filter(r=>selClass==="Alle"||r.class===selClass)
    .map(r=>{const u=state.users.find(u=>u.id===r.userId);return{reg:r,user:u};})
    .filter(({user})=>user&&(!search||user.name.toLowerCase().includes(search.toLowerCase())||String(user.kartNumber).includes(search)))
    .sort((a,b)=>(a.user.kartNumber||0)-(b.user.kartNumber||0));

  const setCheck=(userId,field,val)=>dispatch({type:"SET_LICENSE_CHECK",eventId:parseInt(selEv),userId,field,value:val});
  const setFriday=(userId,val)=>dispatch({type:"SET_FRIDAY_PAID",eventId:parseInt(selEv),userId,value:val});

  const classGroups={};
  if(selClass==="Alle"){
    filtered.forEach(item=>{
      const cls=item.reg.class;
      if(!classGroups[cls])classGroups[cls]=[];
      classGroups[cls].push(item);
    });
  } else {
    classGroups[selClass]=filtered;
  }

  const totalOk=filtered.filter(({user})=>checks[user.id+"_ok"]).length;
  const totalFriday=filtered.filter(({user})=>fridayPaid[user.id]).length;
  const totalAll=filtered.length;

  const openEdit=(item)=>{
    const u=item.user;
    setEditUser(item);
    setEditForm({name:u.name||"",phone:u.phone||"",license:u.license||"",transponder:u.transponder||"",kartNumber:u.kartNumber||"",licenseValid:u.licenseValid??null});
    setSaved(false);
  };
  const saveEdit=()=>{
    dispatch({type:"UPDATE_USER",payload:{id:editUser.user.id,name:editForm.name,phone:editForm.phone,license:editForm.license,transponder:editForm.transponder,kartNumber:parseInt(editForm.kartNumber)||undefined,licenseValid:editForm.licenseValid}});
    setSaved(true);setTimeout(()=>{setSaved(false);setEditUser(null);},1500);
  };

  // Candidates for "existing profile" mode: not already registered for this race.
  const alreadyRegIds=new Set(regs.map(r=>r.userId));
  const existingCandidates=state.users.filter(u=>u.type!=="admin"&&!alreadyRegIds.has(u.id));
  const eventClasses=ev?.classes||[];

  const addExistingDriver=()=>{
    if(!addExistingId||!addClass)return;
    dispatch({type:"REGISTER",eventId:ev.id,payload:{userId:addExistingId,class:addClass,paddockSpace:"",slicks:[],slickReserve:"",wets:[],wetReserve:"",paid:true}});
    setAddMsg(t.admDriverAdded);setAddExistingId("");
    setTimeout(()=>{setAddMsg("");setShowAddDriver(false);},1200);
  };
  const addNewDriver=()=>{
    if(!addForm.name||!addClass)return;
    dispatch({type:"ADD_MANUAL_DRIVER",eventId:ev.id,name:addForm.name,kartNumber:parseInt(addForm.kartNumber)||undefined,license:addForm.license,transponder:addForm.transponder,phone:addForm.phone,club:addForm.club,country:addForm.country,email:addForm.email,class:addClass,paid:true});
    setAddMsg(t.admDriverAdded);setAddForm({name:"",kartNumber:"",license:"",transponder:"",phone:"",club:"",country:"DK",email:""});
    setTimeout(()=>{setAddMsg("");setShowAddDriver(false);},1200);
  };

  // ── Edit profile panel ─────────────────────────────────────────
  if(editUser){
    const u=editUser.user;
    return <div style={{padding:16,overflowY:"auto",height:"100%"}}>
      <Btn small variant="ghost" onClick={()=>setEditUser(null)} style={{marginBottom:14}}>{t.admBack}</Btn>
      <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:16}}>
        <div style={{width:52,height:52,borderRadius:"50%",background:`linear-gradient(135deg,${C.red},${C.redDark})`,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,color:"white",fontSize:18,flexShrink:0}}>{u.name?.charAt(0)}</div>
        <div>
          <div style={{fontWeight:900,color:C.text,fontSize:24,fontFamily:"'Barlow Condensed',sans-serif"}}>#{u.kartNumber}</div>
          <div style={{fontWeight:700,color:C.text,fontSize:15}}>{u.name}</div>
          <div style={{color:C.textMuted,fontSize:12}}>{editUser.reg.class}</div>
        </div>
      </div>
      <Card style={{borderLeft:`3px solid ${C.red}`}}>
        <div style={{color:C.textMuted,fontSize:10,letterSpacing:2,marginBottom:12}}>{t.admEditInfo}</div>
        <Input label={t.name} value={editForm.name} onChange={v=>setEditForm(f=>({...f,name:v}))} placeholder={t.admFullName}/>
        <Input label={t.admFieldPhone} value={editForm.phone} onChange={v=>setEditForm(f=>({...f,phone:v}))} placeholder={t.admMobileNumber}/>
        <Input label={t.admLicenseNumber} value={editForm.license} onChange={v=>setEditForm(f=>({...f,license:v}))} placeholder="DK-2026-XXXX"/>
        <div style={{marginBottom:10}}>
          <div style={{color:C.textMuted,fontSize:10,letterSpacing:1,marginBottom:6,textTransform:"uppercase"}}>{t.admLicenseStatus}</div>
          <div style={{display:"flex",gap:6}}>
            {[[true,t.admApprovedStatus,C.green],[false,t.admInvalidStatus,C.red],[null,t.admNotCheckedStatus,C.orange]].map(([val,label,col])=>
              <button key={String(val)} onClick={()=>setEditForm(f=>({...f,licenseValid:val}))} style={{background:editForm.licenseValid===val?col+"22":C.surface2,border:`1px solid ${editForm.licenseValid===val?col:C.border}`,borderRadius:6,padding:"5px 10px",color:editForm.licenseValid===val?col:C.textMuted,cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>{label}</button>
            )}
          </div>
        </div>
        <Input label={t.admFieldTransponder} value={editForm.transponder} onChange={v=>setEditForm(f=>({...f,transponder:v}))} placeholder="T-XXXX"/>
        <Input label={t.admFieldKart+" #"} value={String(editForm.kartNumber||"")} onChange={v=>setEditForm(f=>({...f,kartNumber:v}))} placeholder="98" type="number"/>
        {saved?<div style={{background:`${C.green}22`,border:`1px solid ${C.green}44`,borderRadius:8,padding:12,textAlign:"center",color:C.green,fontWeight:700}}>{t.admSavedGoingBack}</div>:<Btn onClick={saveEdit} fullWidth>{t.admSaveChanges}</Btn>}
      </Card>
    </div>;
  }

  return <div style={{height:"100%",display:"flex",flexDirection:"column"}}>
    {/* Header */}
    <div style={{padding:"16px 20px 0",flexShrink:0}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
        <div>
          <div style={{height:3,width:36,background:C.red,marginBottom:8,borderRadius:2}}/>
          <h2 style={{margin:0,fontSize:20,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:2,color:C.text,textTransform:"uppercase"}}>{t.admLicenseControlTitle}</h2>
          <div style={{color:C.textMuted,fontSize:11,marginTop:2}}>{t.admTapToEdit}</div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"flex-start",flexWrap:"wrap",justifyContent:"flex-end"}}>
          <div style={{background:`${C.green}22`,border:`1px solid ${C.green}44`,borderRadius:6,padding:"6px 12px",textAlign:"center"}}>
            <div style={{color:C.green,fontWeight:900,fontSize:18}}>{totalOk}/{totalAll}</div>
            <div style={{color:C.green,fontSize:9,letterSpacing:1}}>{t.admLicenseOk}</div>
          </div>
          {hasFriday&&<div style={{background:`${C.blue}22`,border:`1px solid ${C.blue}44`,borderRadius:6,padding:"6px 12px",textAlign:"center"}}>
            <div style={{color:C.blue,fontWeight:900,fontSize:18}}>{totalFriday}/{totalAll}</div>
            <div style={{color:C.blue,fontSize:9,letterSpacing:1}}>{t.admFriday}</div>
          </div>}
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
        <div>
          <div style={{color:C.textMuted,fontSize:10,letterSpacing:1,marginBottom:4,textTransform:"uppercase"}}>{t.race}</div>
          <select value={selEv} onChange={e=>setSelEv(e.target.value)} style={{width:"100%",background:C.surface2,border:`1px solid ${C.border}`,borderRadius:6,padding:"7px 10px",color:C.text,fontSize:12,fontFamily:"inherit"}}>
            {scopedEvents.map(e=><option key={e.id} value={String(e.id)}>{e.name}</option>)}
          </select>
        </div>
        <div>
          <div style={{color:C.textMuted,fontSize:10,letterSpacing:1,marginBottom:4,textTransform:"uppercase"}}>{t.admFieldClass}</div>
          <select value={selClass} onChange={e=>setSelClass(e.target.value)} style={{width:"100%",background:C.surface2,border:`1px solid ${C.border}`,borderRadius:6,padding:"7px 10px",color:C.text,fontSize:12,fontFamily:"inherit"}}>
            {classes.map(c=><option key={c} value={c}>{c}</option>)}
          </select>
        </div>
      </div>
      <div style={{marginBottom:10}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder={t.admSearchNameOrKart} style={{width:"100%",background:C.surface2,border:`1px solid ${C.border}`,borderRadius:6,padding:"7px 12px",color:C.text,fontSize:12,boxSizing:"border-box",fontFamily:"inherit"}}/>
      </div>
      <Btn small variant={showAddDriver?"secondary":"primary"} onClick={()=>{setShowAddDriver(s=>!s);setAddMsg("");}} style={{width:"100%",marginBottom:10}}>{showAddDriver?"✕ "+t.cancel:"+ "+t.admAddDriverManually}</Btn>
      {showAddDriver&&<Card style={{borderLeft:`3px solid ${C.red}`,marginBottom:10}}>
        <div style={{display:"flex",gap:6,marginBottom:10}}>
          <button onClick={()=>setAddMode("existing")} style={{flex:1,background:addMode==="existing"?`${C.red}22`:C.surface2,border:`1px solid ${addMode==="existing"?C.red:C.border}`,borderRadius:6,padding:"6px",color:addMode==="existing"?C.red:C.textMuted,cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"inherit"}}>{t.admExistingProfile}</button>
          <button onClick={()=>setAddMode("new")} style={{flex:1,background:addMode==="new"?`${C.red}22`:C.surface2,border:`1px solid ${addMode==="new"?C.red:C.border}`,borderRadius:6,padding:"6px",color:addMode==="new"?C.red:C.textMuted,cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"inherit"}}>{t.admNewDriverNoProfile}</button>
        </div>
        {addMode==="existing"?<div>
          <Sel label={t.admSelectDriver.replace("...","")} value={addExistingId} onChange={setAddExistingId} options={[{value:"",label:t.admSelectDriver},...existingCandidates.map(u=>({value:String(u.id),label:u.name+(u.license?" ("+u.license+")":"")}))]}/>
          <Sel label={t.admClassName.replace("navn","")} value={addClass} onChange={setAddClass} options={[{value:"",label:t.admSelectRaceType.replace("løbstype","klasse")},...eventClasses.map(c=>({value:c,label:c}))]}/>
          <Btn small onClick={addExistingDriver} disabled={!addExistingId||!addClass} style={{width:"100%"}}>{t.admAddDriverManually}</Btn>
        </div>:<div>
          <Input label={t.name} value={addForm.name} onChange={v=>setAddForm(f=>({...f,name:v}))} placeholder={t.admFullName}/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <Input label={t.admFieldKart+" #"} value={addForm.kartNumber} onChange={v=>setAddForm(f=>({...f,kartNumber:v}))} placeholder="98" type="number"/>
            <Input label={t.admLicenseNumber} value={addForm.license} onChange={v=>setAddForm(f=>({...f,license:v}))} placeholder="DK-2026-XXXX"/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <Input label={t.admFieldTransponder} value={addForm.transponder} onChange={v=>setAddForm(f=>({...f,transponder:v}))} placeholder="T-XXXX"/>
            <Input label={t.admFieldPhone} value={addForm.phone} onChange={v=>setAddForm(f=>({...f,phone:v}))} placeholder={t.admMobileNumber}/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <Input label={t.admFieldClub} value={addForm.club} onChange={v=>setAddForm(f=>({...f,club:v}))} placeholder={t.admClubName}/>

// Filters events to a sub-admin's series. scope=null → all events (main admin).
function eventsInScope(events,scope){
  if(!scope)return events;
  const set=new Set(scope.map(Number));
  return (events||[]).filter(e=>set.has(Number(e.seriesId)));
}
// A race counts as "past" once its last day (endDate, falling back to date for single-day races) has ended.
function isPastEvent(ev){
  const last=ev.endDate||ev.date;
  if(!last)return false;
  const d=parseDob(last);
  if(!d)return false;
  const end=new Date(d.getFullYear(),d.getMonth(),d.getDate(),23,59,59);
  return end<new Date();
}

// One shared event selection used across admin pages (Dashboard, Registrations,
// Penalties, Reporting, Import, Driver list, License check, Technical control PDFs),
// so the event doesn't need to be chosen again on every page. The value is stored in uiPrefs (locally per
// device) and updated if the event is changed on any of the pages.
// "Alle" (All) is only a meaningful value on the Dashboard (shows status/stats for all events);
// on other pages the selection automatically falls back to the first available event.
function getAdminSelEv(state,scopedEvents){
  const raw=state.uiPrefs?.adminEv;
  if(raw&&raw!=="Alle"&&scopedEvents.some(e=>String(e.id)===String(raw)))return String(raw);
  return scopedEvents[0]?String(scopedEvents[0].id):"";
}

// Rough region classification based on postal code (indicative, not an official lookup table).
function zipToRegion(zip){
  const z=parseInt(zip);
  if(!z||isNaN(z))return null;
  if(z>=900&&z<=999)return "Hovedstaden (Bornholm)";
  if(z>=1000&&z<=3699)return "Hovedstaden";
  if(z>=3700&&z<=3799)return "Hovedstaden (Bornholm)";
  if(z>=4000&&z<=4999)return "Sjælland";
  if(z>=5000&&z<=5999)return "Syddanmark (Fyn)";
  if(z>=6000&&z<=6999)return "Syddanmark (Sydjylland)";
  if(z>=7000&&z<=7599)return "Midtjylland (Vest)";
  if(z>=7600&&z<=7999)return "Midtjylland (Nord)";
  if(z>=8000&&z<=8999)return "Midtjylland (Øst)";
  if(z>=9000&&z<=9999)return "Nordjylland";
  return null;
}
// Club and region distribution for a list of registrations, sorted by count.
function regDistribution(regs,users){
  const clubCount={},regionCount={};
  (regs||[]).forEach(r=>{
    const u=(users||[]).find(u=>u.id===r.userId);
    const club=u?.club||"Ukendt klub";
    clubCount[club]=(clubCount[club]||0)+1;
    const region=zipToRegion(u?.zip)||"Ukendt";
    regionCount[region]=(regionCount[region]||0)+1;
  });
  return{
    total:(regs||[]).length,
    topClubs:Object.entries(clubCount).sort((a,b)=>b[1]-a[1]),
    topRegions:Object.entries(regionCount).sort((a,b)=>b[1]-a[1]),
  };
}

function SyncBadge({status}){
  if(!sb)return null;
  const cfg={loading:{c:"#FF8800",t:"Henter data..."},saving:{c:"#FF8800",t:"Gemmer..."},synced:{c:"#00CC66",t:"Synkroniseret"},error:{c:"#FF4466",t:"Sync-fejl – tjek forbindelse"}}[status]||{c:"#888",t:status};
  return <div style={{position:"fixed",bottom:8,right:8,zIndex:9999,display:"flex",alignItems:"center",gap:6,background:"rgba(20,20,20,0.9)",border:"1px solid #2a2a2a",borderRadius:20,padding:"4px 10px",pointerEvents:"none"}}>
