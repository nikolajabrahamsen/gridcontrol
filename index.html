// ── PUSH-NOTIFIKATIONER (klient-del) ─────────────────────────────
// Indsæt din offentlige VAPID-nøgle her (genereres når du opsætter push-serveren i Supabase).
const VAPID_PUBLIC_KEY="BOEm8qLeKGRaGEhJiSX8KK53kDozdkAS8tYVou-QN6aPbHbxsx9qVvDD7Pg6K-DXH0ltjDObybgM1voMzIAh07A";
// Sti til service worker-filen på GitHub (samme mappe som appen).
const SW_PATH="service-worker.js";

function urlBase64ToUint8Array(base64String){
  const padding="=".repeat((4-base64String.length%4)%4);
  const base64=(base64String+padding).replace(/-/g,"+").replace(/_/g,"/");
  const raw=atob(base64);
  const out=new Uint8Array(raw.length);
  for(let i=0;i<raw.length;i++)out[i]=raw.charCodeAt(i);
  return out;
}

// Er push overhovedet muligt i denne browser/enhed?
function pushSupported(){
  return "serviceWorker" in navigator && "PushManager" in window && "Notification" in window;
}

// Registrér service worker (kaldes ved app-start hvis push er understøttet)
async function registerServiceWorker(){
  if(!("serviceWorker" in navigator))return null;
  try{ return await navigator.serviceWorker.register(SW_PATH); }
  catch(e){ console.warn("SW-registrering fejlede:",e); return null; }
}

// Bed om tilladelse + opret abonnement + gem i Supabase
async function enablePush(userId){
  if(!pushSupported())throw new Error("unsupported");
  if(VAPID_PUBLIC_KEY.startsWith("INDSÆT"))throw new Error("no-vapid");
  const perm=await Notification.requestPermission();
  if(perm!=="granted")throw new Error("denied");
  const reg=await navigator.serviceWorker.ready;
  let sub=await reg.pushManager.getSubscription();
  if(!sub){
    sub=await reg.pushManager.subscribe({
      userVisibleOnly:true,
      applicationServerKey:urlBase64ToUint8Array(VAPID_PUBLIC_KEY),
    });
  }
  // Gem abonnementet i Supabase, så serveren kan sende til denne enhed
  if(sb&&userId){
    const j=sub.toJSON();
    await sb.from("push_subscriptions").upsert({
      user_id:userId,
      endpoint:sub.endpoint,
      p256dh:j.keys?.p256dh,
      auth:j.keys?.auth,
      updated_at:new Date().toISOString(),
    },{onConflict:"endpoint"});
  }
  return sub;
}

async function disablePush(userId){
  try{
    const reg=await navigator.serviceWorker.ready;
    const sub=await reg.pushManager.getSubscription();
    if(sub){
      if(sb&&userId)await sb.from("push_subscriptions").delete().eq("endpoint",sub.endpoint);
      await sub.unsubscribe();
    }
  }catch(e){/* ignore */}
}

// Bed push-serveren (Edge Function) om at sende en notifikation.
// userIds = liste af modtagere; udelades den, sendes til alle.
async function sendPushNotification({title,body,url,userIds}){
  if(!sb)return;
  try{
    await sb.functions.invoke("send-push",{body:{title,body,url:url||".",userIds}});
  }catch(e){ console.warn("Push-afsendelse fejlede:",e); }
}

// Find hvilke bruger-id'er der skal have en given notifikation (til push).
// officialsOnly → alle officials/admin. targetClass → kørere i klassen + deres forældre.
// Kun rigtige konto-id'er (UUID) sendes med – børn/importerede uden egen konto
// har ingen enhed at sende til, og deres forælder får beskeden i stedet.
function isRealAccountId(id){
  // Supabase Auth-id'er er UUID'er. Frasortér "child-..."/"imported-..." m.m.
  return typeof id==="string" && /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(id);
}
// Send notifikation + push til officials/admin når en station er færdig med et heat.
// adminOnly=true → kun admin + sub-admin får besked (bruges til vægt/front fairing/teknisk kontrol,
// da disse stationer i forvejen er bemandet af de officials der udfører kontrollen selv).
function notifyHeatDone(dispatch,state,{stationLabel,icon,eventId,cls,session,by,adminOnly}){
  const ev=(state.events||[]).find(e=>e.id===eventId);
  const title=`${icon} ${stationLabel} færdig`;
  const body=`${cls||""}${cls&&session?" · ":""}${session||""}${ev?.name?" · "+ev.name:""} er klar${by?" (rapporteret af "+by+")":""}.`;
  dispatch({type:"ADD_NOTIFICATION",payload:{eventId,title,body,targetClass:"Alle",officialsOnly:true,adminOnly:!!adminOnly,time:new Date().toLocaleString("da-DK")}});
  try{sendPushNotification({title,body,userIds:resolveNotifRecipients(state.users,{officialsOnly:true,adminOnly:!!adminOnly})});}catch(e){}
}

function resolveNotifRecipients(users,{targetClass,officialsOnly,adminOnly}){
  const ids=new Set();
  (users||[]).forEach(u=>{
    if(!isRealAccountId(u.id))return; // spring børn/importerede uden rigtig konto over
    const isOff=u.isOfficial||u.type==="official"||u.isAdmin;
    const isAdminOrSub=u.isAdmin||u.isSubAdmin||u.type==="admin";
    if(adminOnly){ if(isAdminOrSub)ids.add(u.id); return; }
    if(officialsOnly){ if(isOff)ids.add(u.id); return; }
    if(!targetClass||targetClass==="Alle"){ ids.add(u.id); return; }
    // klasse-målrettet: køreren selv i klassen
    if(u.class===targetClass)ids.add(u.id);
    // forældre hvis et af deres børn er i klassen
    const kids=childrenOf(users,u);
    if(kids.some(c=>c.class===targetClass))ids.add(u.id);
    // officials/admin ser alt
    if(isOff)ids.add(u.id);
  });
  return [...ids];
}

    approvedEvents:r.approved_events||[],dispensations:r.dispensations||[],

    approved_events:u.approvedEvents||[],dispensations:u.dispensations||[],
    child_ids:u.childIds||[],parent_id:u.parentId||null,
  };
}
async function loadProfiles(){
  if(!sb)return[];
  const {data,error}=await sb.from("profiles").select("*");
  if(error){console.error("loadProfiles:",error);return[];}
  return (data||[]).map(rowToUser);
}

// Emoji-flag ud fra ISO-2 landekode (regionale indikator-symboler)
function flagEmoji(code){
  if(!code||code.length!==2)return "";
  return String.fromCodePoint(...[...code.toUpperCase()].map(c=>0x1F1E6+(c.charCodeAt(0)-65)));
}
function countryName(code,lang){const c=COUNTRIES.find(x=>x.code===code);return c?(lang==="en"?c.en:c.da):"";}
function countryOptions(lang){return COUNTRIES.slice().sort((a,b)=>(lang==="en"?a.en:a.da).localeCompare(lang==="en"?b.en:b.da,lang==="en"?"en":"da")).map(c=>({value:c.code,label:flagEmoji(c.code)+" "+(lang==="en"?c.en:c.da)}));}
// Er køreren dansk? (tom nationalitet = behandles som dansk)
function isDanish(u){return !u?.country||u.country==="DK";}

function getAge(dob){if(!dob)return null;const t=new Date(),b=new Date(dob);let a=t.getFullYear()-b.getFullYear();if(t.getMonth()<b.getMonth()||(t.getMonth()===b.getMonth()&&t.getDate()<b.getDate()))a--;return a;}
function eligibleClasses(dob,cr){const age=getAge(dob);if(!age)return Object.keys(cr);return Object.entries(cr).filter(([,r])=>age>=r.min&&age<=r.max).map(([c])=>c);}
// Sorterer klassenavne efter startalder (min), derefter alfabetisk
function sortClassesByAge(names,classRules){
  return (names||[]).slice().sort((a,b)=>{
    const ma=classRules?.[a]?.min??999,mb=classRules?.[b]?.min??999;
    return ma!==mb?ma-mb:String(a).localeCompare(String(b),"da");
  });
}

function myKartInClass(reg,cls,userId){
  const nums=reg?.numbers?.[cls]||{};
  const found=Object.entries(nums).find(([,info])=>info.ownerId===userId);
  return found?parseInt(found[0]):null;
}
function renewWindowOpen(reg){
  const today=new Date().toISOString().slice(0,10);
  const open=reg?.renewOpenDate,close=reg?.releaseDate;
  if(!open||!close)return false;
  return today>=open&&today<=close;
}
function classLimitFor(ev,cls){
  const base=ev?.classLimits?.[cls]?.max||ev?.maxParticipants||null;
  // Tidlig maks-reduktion: hvis den tidlige frist er nået, og klassen endnu ikke har nået
  // det reducerede antal, sænkes loftet til det reducerede tal (i stedet for det normale maks).
  if(ev?.earlyMaxDate&&ev?.earlyMaxParticipants){
    const today=new Date().toISOString().slice(0,10);
    if(today>=ev.earlyMaxDate&&classCount(ev,cls)<ev.earlyMaxParticipants)return ev.earlyMaxParticipants;
  }
  return base;
}
function classCount(ev,cls){return (ev?.registrations||[]).filter(r=>r.class===cls).length;}
function classFull(ev,cls){const m=classLimitFor(ev,cls);return m?classCount(ev,cls)>=m:false;}

// Fletter Auth-profiler + importerede (login-løse) brugere til én liste
function mergeUsers(profiles,imported){return [...(profiles||[]),...(imported||[])];}
// Finder en forælders børn via BEGGE retninger (childIds på forælder ELLER parentId på barn)
function childrenOf(users,parent){
  if(!parent)return [];
  const ids=new Set(parent.childIds||[]);
  return (users||[]).filter(x=>ids.has(x.id)||(x.parentId&&x.parentId===parent.id));
}

// ── REDUCER ──────────────────────────────────────────────────────
function reducer(state,action){
  switch(action.type){
    case "HYDRATE":{
      // action.payload = app_state-dokumentet (uden Auth-profiler)
      // uiPrefs er bevidst lokal pr. enhed og synkroniseres ALDRIG til serveren (se stripLocal),
      // så den skal bevares som den er lige nu – ellers nulstilles fx det valgte løb i admin
      // hver gang der kommer en realtime-opdatering fra en anden bruger/enhed.
      const merged={...initialState,...action.payload,lang:state.lang,uiPrefs:state.uiPrefs};
      const profiles=state.authProfiles||[];
      merged.authProfiles=profiles;
      merged.importedUsers=action.payload.importedUsers||[];
      merged.users=mergeUsers(profiles,merged.importedUsers);
      const cu=state.currentUser;
      merged.currentUser=cu?(merged.users.find(x=>x.id===cu.id)||cu):null;
      return merged;
    }
    case "SET_PROFILES":{
      const profiles=action.payload||[];
      const users=mergeUsers(profiles,state.importedUsers);
      const cu=state.currentUser;
      return{...state,authProfiles:profiles,users,currentUser:cu?(users.find(x=>x.id===cu.id)||cu):null};
    }
    case "SET_LANG":return{...state,lang:action.payload};
    case "LOGIN":return{...state,currentUser:action.payload};
    case "LOGOUT":return{...state,currentUser:null};
    case "UPDATE_USER":{
      const profiles=(state.authProfiles||[]).map(u=>u.id===action.payload.id?{...u,...action.payload}:u);
      const imported=(state.importedUsers||[]).map(u=>u.id===action.payload.id?{...u,...action.payload}:u);
      const users=mergeUsers(profiles,imported);
      return{...state,authProfiles:profiles,importedUsers:imported,users,currentUser:state.currentUser?.id===action.payload.id?{...state.currentUser,...action.payload}:state.currentUser};
    }
    case "ADD_CHILD":{
      const childId=action.childId||("child-"+Date.now());
      const child={id:childId,type:"driver",source:"child",parentId:action.parentId,isOfficial:false,approvedEvents:[],licenseValid:null,...action.payload};
      const imported=[...(state.importedUsers||[]),child];
      const profiles=(state.authProfiles||[]).map(u=>u.id===action.parentId?{...u,childIds:[...(u.childIds||[]),child.id]}:u);
      const users=mergeUsers(profiles,imported);
      const cu=state.currentUser?.id===action.parentId?users.find(x=>x.id===action.parentId):state.currentUser;
      return{...state,authProfiles:profiles,importedUsers:imported,users,currentUser:cu};
    }
    case "RELEASE_CHILD":{
      // barnet får en rigtig Auth-konto (id opdateres til auth-uid) og løsnes fra forælderen
      const oldId=action.childId;const newId=action.newId;
      const released=(state.importedUsers||[]).find(x=>x.id===oldId);
      if(!released)return state;
      const releasedUser={...released,id:newId,parentId:null,source:"auth",email:action.email};
      // fjern barnet fra importedUsers, læg over i authProfiles
      const imported=(state.importedUsers||[]).filter(x=>x.id!==oldId);
      const profiles=[...(state.authProfiles||[]).map(u=>u.id===action.parentId?{...u,childIds:(u.childIds||[]).filter(cid=>cid!==oldId)}:u),releasedUser];
      // opdater tilmeldinger der pegede på det gamle id
      const events=state.events.map(ev=>({...ev,registrations:(ev.registrations||[]).map(r=>r.userId===oldId?{...r,userId:newId}:r)}));
      const users=mergeUsers(profiles,imported);
      const cu=state.currentUser?.id===action.parentId?users.find(x=>x.id===action.parentId):state.currentUser;
      return{...state,authProfiles:profiles,importedUsers:imported,events,users,currentUser:cu};
    }
    case "REGISTER":return{...state,events:state.events.map(ev=>ev.id===action.eventId?{...ev,registrations:[...ev.registrations,{...action.payload}]}:ev)};
    case "ADD_EVENT":return{...state,events:[...state.events,{...action.payload,id:Date.now(),sessions:[],penalties:[],inspections:[],weightInspections:[],readySignals:[],registrations:[],classLimits:{}}]};
    case "UPDATE_EVENT":return{...state,events:state.events.map(ev=>ev.id===action.payload.id?{...ev,...action.payload}:ev)};
    case "ADD_SERIES":return{...state,raceSeries:[...state.raceSeries,{id:Date.now(),name:action.payload?.name||action.payload,logo:action.payload?.logo||null}]};
    case "UPDATE_SERIES":return{...state,raceSeries:state.raceSeries.map(s=>s.id===action.id?{...s,...action.payload}:s)};
    case "DELETE_SERIES":return{...state,raceSeries:state.raceSeries.filter(s=>s.id!==action.id)};
    case "DELETE_EVENT":return{...state,events:state.events.filter(ev=>ev.id!==action.id)};
    case "UPDATE_PENALTY":return{...state,events:state.events.map(ev=>ev.id===action.eventId?{...ev,penalties:ev.penalties.map((p,i)=>((action.penaltyId!=null&&p.id===action.penaltyId)||(action.penaltyId==null&&i===action.penaltyIdx))?{...action.payload}:p)}:ev)};
    case "DELETE_PENALTY":return{...state,events:state.events.map(ev=>ev.id===action.eventId?{...ev,penalties:ev.penalties.filter((p,i)=>(action.penaltyId!=null&&p.id===action.penaltyId)||(action.penaltyId==null&&i===action.penaltyIdx)?false:true)}:ev)};
    case "ADD_PENALTY_TYPE":return{...state,penaltyTypes:[...(state.penaltyTypes||[]),{...action.payload,id:Date.now()}]};
    case "UPDATE_PENALTY_TYPE":return{...state,penaltyTypes:(state.penaltyTypes||[]).map(pt=>pt.id===action.id?{...pt,...action.payload}:pt)};
    case "DELETE_PENALTY_TYPE":return{...state,penaltyTypes:(state.penaltyTypes||[]).filter(pt=>pt.id!==action.id)};
    case "ADD_RACE_TYPE":return{...state,raceTypes:[...(state.raceTypes||[]),{id:Date.now(),name:action.name}]};
    case "DELETE_RACE_TYPE":return{...state,raceTypes:(state.raceTypes||[]).filter(rt=>rt.id!==action.id)};
    case "UPDATE_RACE_TYPE":return{...state,raceTypes:(state.raceTypes||[]).map(rt=>rt.id===action.id?{...rt,name:action.name}:rt)};
    case "ADD_SESSION":return{...state,sessions:[...(state.sessions||[]),{id:Date.now(),name:action.name}]};
    case "DELETE_SESSION":return{...state,sessions:(state.sessions||[]).filter(x=>x.id!==action.id)};
    case "UPDATE_SESSION":return{...state,sessions:(state.sessions||[]).map(x=>x.id===action.id?{...x,name:action.name}:x)};

    case "DELETE_REGULATION":return{...state,regulations:(state.regulations||[]).filter(r=>r.id!==action.id)};
    case "ADD_CLUB":return{...state,clubs:[...(state.clubs||[]),{id:Date.now(),name:action.name}]};
    case "DELETE_CLUB":return{...state,clubs:(state.clubs||[]).filter(c=>c.id!==action.id)};
    case "UPDATE_CLUB":return{...state,clubs:(state.clubs||[]).map(c=>c.id===action.id?{...c,name:action.name}:c)};
    case "SET_SESSION_GROUPS":return{...state,events:state.events.map(ev=>ev.id===action.eventId?{...ev,sessionGroups:{...(ev.sessionGroups||{}),[action.key]:action.groups}}:ev)};
    case "CLEAR_SESSION_GROUPS":return{...state,events:state.events.map(ev=>{if(ev.id!==action.eventId)return ev;const sg={...(ev.sessionGroups||{})};delete sg[action.key];return{...ev,sessionGroups:sg};})};
    case "ADD_REASON_TEXT":return{...state,reasonTexts:[...(state.reasonTexts||[]),{...action.payload,id:Date.now()}]};
    case "UPDATE_REASON_TEXT":return{...state,reasonTexts:(state.reasonTexts||[]).map(rt=>rt.id===action.id?{...rt,...action.payload}:rt)};
    case "DELETE_REASON_TEXT":return{...state,reasonTexts:(state.reasonTexts||[]).filter(rt=>rt.id!==action.id)};
    case "SET_CHAMP_PDF":return{...state,champPdfs:{...(state.champPdfs||{}),[action.seriesId]:action.payload}};
    case "REMOVE_CHAMP_PDF":{const cp={...(state.champPdfs||{})};delete cp[action.seriesId];return{...state,champPdfs:cp};}
    case "SET_KART_RANGE":{
      const reg=state.kartRegister||{ranges:{},numbers:{}};
      return{...state,kartRegister:{...reg,ranges:{...reg.ranges,[action.className]:{start:action.start,end:action.end}}}};
    }
    case "SET_KART_DATES":{
      const reg=state.kartRegister||{ranges:{},numbers:{}};
      return{...state,kartRegister:{...reg,releaseDate:action.releaseDate??reg.releaseDate,renewOpenDate:action.renewOpenDate??reg.renewOpenDate}};
    }
    case "CLAIM_KART":{
      const reg=state.kartRegister||{ranges:{},numbers:{}};
      const cls={...(reg.numbers[action.className]||{})};
      cls[action.number]={ownerId:action.ownerId,ownerName:action.ownerName,ownerLicense:action.ownerLicense||"",renewed:false,claimed:new Date().toISOString()};
      return{...state,kartRegister:{...reg,numbers:{...reg.numbers,[action.className]:cls}}};
    }
    case "RELEASE_KART":{
      const reg=state.kartRegister||{ranges:{},numbers:{}};
      const cls={...(reg.numbers[action.className]||{})};
      delete cls[action.number];
      return{...state,kartRegister:{...reg,numbers:{...reg.numbers,[action.className]:cls}}};
    }
    case "RENEW_KART":{
      // Kører fornyer sit nuværende nummer i klassen (kun i vinduet)
      const reg=state.kartRegister||{ranges:{},numbers:{}};
      const cls={...(reg.numbers[action.className]||{})};
      if(cls[action.number]&&cls[action.number].ownerId===action.ownerId){
        cls[action.number]={...cls[action.number],renewed:true,renewedAt:new Date().toISOString()};
      }
      return{...state,kartRegister:{...reg,numbers:{...reg.numbers,[action.className]:cls}}};
    }
    case "RUN_ANNUAL_RELEASE":{
      // Frigiver alle numre der IKKE er fornyet. Fornyede numre nulstilles til "ikke fornyet" til næste år.
      const reg=state.kartRegister||{ranges:{},numbers:{}};
      const numbers={};
      Object.entries(reg.numbers||{}).forEach(([cls,nums])=>{
        const kept={};
        Object.entries(nums).forEach(([num,info])=>{
          if(info.renewed)kept[num]={...info,renewed:false,renewedAt:null};
        });
        numbers[cls]=kept;
      });
      return{...state,kartRegister:{...reg,numbers}};
    }
    case "IMPORT_KART_NUMBERS":{
      const reg=state.kartRegister||{ranges:{},numbers:{}};
      const numbers={...reg.numbers};
      (action.entries||[]).forEach(e=>{
        if(!e.className||!e.number)return;
        const cls={...(numbers[e.className]||{})};
        cls[e.number]={ownerId:e.ownerId||null,ownerName:e.ownerName||"",ownerLicense:e.ownerLicense||"",renewed:false,claimed:new Date().toISOString(),imported:true};
        numbers[e.className]=cls;
      });
      return{...state,kartRegister:{...reg,numbers}};
    }
    case "SET_CHAMP_STANDINGS":{
      const cur={...(state.champStandings||{})};
      const forSeries={...(cur[action.seriesId]||{})};
      (action.classes||[]).forEach(c=>{forSeries[c.name]=c.data;});
      cur[action.seriesId]={...forSeries,_updated:new Date().toLocaleString("da-DK")};
      return{...state,champStandings:cur};
    }
    case "REMOVE_CHAMP_STANDINGS":{const cs={...(state.champStandings||{})};delete cs[action.seriesId];return{...state,champStandings:cs};}
    case "REMOVE_CHAMP_STANDINGS_CLASS":{
      const cs={...(state.champStandings||{})};
      if(cs[action.seriesId]){const s={...cs[action.seriesId]};delete s[action.className];cs[action.seriesId]=s;}
      return{...state,champStandings:cs};
    }
    case "IMPORT_PARTICIPANTS":{
      const imported=[...(state.importedUsers||[])];
      const all=[...(state.authProfiles||[]),...imported];
      const regs=[];
      action.rows.forEach((r,idx)=>{
        let usr=all.find(x=>(r.license&&String(x.license)===String(r.license))||(r.email&&x.email&&x.email.toLowerCase()===r.email.toLowerCase()));
        if(!usr){
          usr={id:"imp-"+(Date.now()+idx),type:"driver",name:r.name,email:r.email||"",license:r.license||"",licenseValid:r.licenseOk?true:null,licenseImg:null,licenseType:r.licenseType||"",transponder:r.transponder||"",class:r.class,kartNumber:r.kartNo||undefined,dob:r.dob||"",phone:r.phone||"",parentId:null,club:r.club||"",clubCode:r.clubCode||"",country:r.country||"",engineMake:r.engineMake||"",kartMake:r.kartMake||"",address:r.address||"",zip:r.zip||"",city:r.city||"",guardianName:r.guardian||"",isOfficial:false,approvedEvents:[],importBatch:action.batchId,source:"csv-import"};
          imported.push(usr);all.push(usr);
        }
        regs.push({userId:usr.id,class:r.class,paddockSpace:"",slicks:[],slickReserve:"",wets:[],wetReserve:"",paid:!!r.paid,imported:true,importBatch:action.batchId});
      });
      return{...state,importedUsers:imported,users:mergeUsers(state.authProfiles,imported),events:state.events.map(ev=>ev.id===action.eventId?{...ev,registrations:[...ev.registrations.filter(x=>!regs.some(nr=>nr.userId===x.userId)),...regs]}:ev)};
    }
    case "REMOVE_IMPORT_BATCH":{
      const imported=(state.importedUsers||[]).filter(u=>u.importBatch!==action.batchId);
      return{...state,importedUsers:imported,users:mergeUsers(state.authProfiles,imported),
        events:state.events.map(ev=>({...ev,registrations:(ev.registrations||[]).filter(r=>r.importBatch!==action.batchId)}))};
    }
    case "SET_UI_PREF":return{...state,uiPrefs:{...(state.uiPrefs||{}),[action.key]:action.value}};
    case "ADD_NOTIFICATION":{
      // Sikr unikt id (Date.now() kan kollidere hvis to laves i samme millisekund)
      const existingIds=new Set((state.notifications||[]).map(n=>n.id));
      let nid=action.payload.id||Date.now();
      while(existingIds.has(nid))nid++;
      return{...state,notifications:[{...action.payload,id:nid},...state.notifications]};
    }
    case "DELETE_NOTIFICATION":return{...state,notifications:(state.notifications||[]).filter(n=>String(n.id)!==String(action.id))};
    case "ADD_DOCUMENT":return{...state,documents:[{...action.payload,id:Date.now()},...state.documents]};
    case "ADD_EVENT_DOCUMENT":return{...state,events:state.events.map(ev=>ev.id===action.eventId?{...ev,documents:[...(ev.documents||[]),action.payload]}:ev)};
    case "REMOVE_EVENT_DOCUMENT":return{...state,events:state.events.map(ev=>ev.id===action.eventId?{...ev,documents:(ev.documents||[]).filter(d=>d.id!==action.docId)}:ev)};
    case "ADD_PENALTY":return{...state,events:state.events.map(ev=>{if(ev.id!==action.eventId)return ev;const ids=new Set((ev.penalties||[]).map(p=>p.id));let pid=action.payload.id||Date.now();while(ids.has(pid))pid++;return{...ev,penalties:[...ev.penalties,{...action.payload,id:pid}]};})};
    case "ADD_INSPECTION":return{...state,events:state.events.map(ev=>ev.id===action.eventId?{...ev,inspections:[...(ev.inspections||[]),{...action.payload,id:Date.now()}]}:ev)};
    case "ADD_TECH_PDF":return{...state,events:state.events.map(ev=>{if(ev.id!==action.eventId)return ev;const ids=new Set((ev.techPdfs||[]).map(p=>p.id));let pid=action.payload.id||Date.now();while(ids.has(pid))pid++;return{...ev,techPdfs:[{...action.payload,id:pid},...(ev.techPdfs||[])]};})};
    case "SET_READY_SIGNAL":return{...state,events:state.events.map(ev=>ev.id===action.eventId?{...ev,readySignals:[...(ev.readySignals||[]).filter(s=>!(s.class===action.cls&&s.session===action.session&&s.stype===action.stype)),{class:action.cls,session:action.session,stype:action.stype,time:new Date().toLocaleString("da-DK"),by:action.by}]}:ev)};
    case "UPDATE_OFFICIAL_EVENTS":{
      const profiles=(state.authProfiles||[]).map(u=>u.id===action.userId?{...u,approvedEvents:action.events}:u);
      const imported=(state.importedUsers||[]).map(u=>u.id===action.userId?{...u,approvedEvents:action.events}:u);
      return{...state,authProfiles:profiles,importedUsers:imported,users:mergeUsers(profiles,imported)};
    }
    case "SET_LICENSE_CHECK":return{...state,events:state.events.map(ev=>ev.id===action.eventId?{...ev,licenseChecks:{...(ev.licenseChecks||{}),[(action.userId+"_"+action.field)]:action.value}}:ev)};
    case "SET_FRIDAY_PAID":return{...state,events:state.events.map(ev=>ev.id===action.eventId?{...ev,fridayPaid:{...(ev.fridayPaid||{}),[(action.userId)]:action.value}}:ev)};
    case "TOGGLE_EVENT_ROLE_OFFICIAL":{
      // action.role = "noseOfficials" | "weightOfficials", max 3
      return{...state,events:state.events.map(ev=>{
        if(ev.id!==action.eventId)return ev;
        const cur=ev[action.role]||[];
        let next;
        if(cur.includes(action.userId))next=cur.filter(x=>x!==action.userId);
        else{if(cur.length>=3)return ev;next=[...cur,action.userId];}
        return{...ev,[action.role]:next};
      })};
    }
    case "DELETE_USER":{
      const profiles=(state.authProfiles||[]).filter(u=>u.id!==action.id);
      const imported=(state.importedUsers||[]).filter(u=>u.id!==action.id);
      return{...state,authProfiles:profiles,importedUsers:imported,users:mergeUsers(profiles,imported),currentUser:state.currentUser?.id===action.id?state.currentUser:state.currentUser};
    }
    case "ADD_CLASS":return{...state,classRules:{...state.classRules,[action.name]:{min:action.min,max:action.max,color:action.color||C.red,seriesIds:action.seriesIds||[]}}};
    case "UPDATE_CLASS":{const{[action.oldName]:_,...rest}=state.classRules;return{...state,classRules:{...rest,[action.name]:{min:action.min,max:action.max,color:action.color||C.red,seriesIds:action.seriesIds||[]}}};}
    case "DELETE_CLASS":{const{[action.name]:_,...rest}=state.classRules;return{...state,classRules:rest};}
    default:return state;
  }
}

function SignupScreen({onBack,onDone,clubs}){
  const t=useT();
  const [type,setType]=useState("driver");
  const [f,setF]=useState({name:"",email:"",pw:"",pw2:"",phone:"",license:"",club:"",country:"DK"});

  const set=(k,v)=>setF(o=>({...o,[k]:v}));
  const lang=useLang();

  const submit=async()=>{
    setErr("");
    if(!f.name.trim())return setErr(t.writeName);
    if(!f.email.trim())return setErr(t.writeEmail);
    if(f.pw.length<6)return setErr(t.pwMin);
    if(f.pw!==f.pw2)return setErr(t.pwMismatch);
    if(!sb)return setErr(t.notConfigured);
    setBusy(true);
    try{
      const {data,error}=await sb.auth.signUp({email:f.email.trim(),password:f.pw});
      if(error){setErr(error.message);setBusy(false);return;}
      const uid=data.user?.id;
      if(!uid){setErr("Kunne ikke oprette bruger – prøv igen");setBusy(false);return;}
      const baseType=type==="official"?"driver":type;
      const row=userToRow({id:uid,type:baseType,name:f.name.trim(),email:f.email.trim(),phone:f.phone,
        license:f.license,club:f.club,country:f.country,isAdmin:false,isOfficial:type==="official",approvedEvents:[],licenseValid:null});
      const {error:pErr}=await sb.from("profiles").upsert(row);
      if(pErr){setErr("Konto oprettet, men profil fejlede: "+pErr.message);setBusy(false);return;}
      onDone&&onDone();
    }catch(e){setErr(String(e.message||e));}
    setBusy(false);
  };

    <div style={{color:C.textMuted,fontSize:10,letterSpacing:1,marginBottom:6}}>{t.iAm.toUpperCase()}</div>
    <div style={{display:"flex",gap:6,marginBottom:14}}>
      {[["driver","🏎️",t.roleDriver,C.red],["parent","👨‍👩‍👧",t.roleParent,C.blue],["official","🏁",t.roleOfficial,C.purple]].map(([val,icon,label,col])=>
        <button key={val} onClick={()=>setType(val)} style={{flex:1,background:type===val?col+"22":C.surface2,border:`2px solid ${type===val?col:C.border}`,borderRadius:8,padding:"8px 4px",cursor:"pointer",textAlign:"center",fontFamily:"inherit"}}>
          <div style={{fontSize:18}}>{icon}</div><div style={{color:type===val?col:C.textMuted,fontWeight:type===val?700:400,fontSize:11}}>{label}</div>
        </button>
      )}
    </div>
    <Input label={t.name+" *"} value={f.name} onChange={v=>set("name",v)} placeholder={t.name}/>
    <Sel label={lang==="en"?"Country / nationality":"Land / nationalitet"} value={f.country} onChange={v=>set("country",v)} options={countryOptions(lang)}/>
    <Input label={t.email+" *"} value={f.email} onChange={v=>set("email",v)} placeholder="din@email.dk" type="email"/>
    <Input label={t.password+" * (min. 6)"} value={f.pw} onChange={v=>set("pw",v)} type="password" placeholder="••••••"/>
    <Input label={t.repeatPw+" *"} value={f.pw2} onChange={v=>set("pw2",v)} type="password" placeholder="••••••"/>
    <div style={{color:C.textDim,fontSize:11,margin:"4px 0 10px"}}>{t.optionalNote}</div>
    <Input label={t.phone} value={f.phone} onChange={v=>set("phone",v)} placeholder={t.phone}/>
    {type!=="parent"&&<><Input label={t.licenseNo} value={f.license} onChange={v=>set("license",v)} placeholder="DK-2026-XXXX"/>
    {(clubs&&clubs.length)

      :<Input label={t.club} value={f.club} onChange={v=>set("club",v)} placeholder={t.club}/>}</>}

function LoginScreen({state,dispatch}){
  const t=useT();
  const [email,setEmail]=useState("");const [pw,setPw]=useState("");const [err,setErr]=useState("");
  const [showForgot,setShowForgot]=useState(false);const [showSignup,setShowSignup]=useState(false);const [busy,setBusy]=useState(false);

  const login=async()=>{
    setErr("");
    if(!sb){setErr(t.notConfigured);return;}
    setBusy(true);
    try{
      const {data,error}=await sb.auth.signInWithPassword({email:email.trim(),password:pw});
      if(error){setErr(t.wrongLogin);setBusy(false);return;}
      const uid=data.user?.id;
      let {data:prof}=await sb.from("profiles").select("*").eq("id",uid).maybeSingle();
      if(!prof){
        const row=userToRow({id:uid,type:"driver",name:data.user.email.split("@")[0],email:data.user.email,isAdmin:false,isOfficial:false,approvedEvents:[],licenseValid:null});
        await sb.from("profiles").upsert(row);prof=row;
      }
      const profiles=await loadProfiles();
      dispatch({type:"SET_PROFILES",payload:profiles});
      dispatch({type:"LOGIN",payload:rowToUser(prof)});
    }catch(e){setErr(String(e.message||e));}
    setBusy(false);
  };

  if(showForgot)return <ForgotScreen onBack={()=>setShowForgot(false)}/>;
  if(showSignup)return <SignupScreen clubs={state.clubs||[]} onBack={()=>setShowSignup(false)} onDone={()=>setShowSignup(false)}/>;

  return <div style={{padding:24,display:"flex",flexDirection:"column",height:"100%",justifyContent:"center",overflowY:"auto"}}>
    <div style={{textAlign:"center",marginBottom:28}}><Logo size={42}/><div style={{marginTop:8,color:C.textMuted,fontSize:11,letterSpacing:3}}>RACE MANAGEMENT</div></div>
    <Input label={t.email} value={email} onChange={setEmail} placeholder="din@email.dk"/>
    <Input label={t.password} value={pw} onChange={setPw} type="password" placeholder="••••••"/>
    {err&&<div style={{color:C.red,fontSize:12,marginBottom:8,textAlign:"center"}}>{err}</div>}
    <Btn onClick={login} disabled={busy} style={{width:"100%",marginBottom:6}}>{busy?t.loggingIn:t.login}</Btn>
    <button onClick={()=>setShowForgot(true)} style={{background:"none",border:"none",color:C.textMuted,fontSize:12,cursor:"pointer",fontFamily:"inherit",marginBottom:12,textDecoration:"underline"}}>{t.forgotPw}</button>
    <div style={{height:1,background:C.border,marginBottom:12}}/>
    <Btn onClick={()=>setShowSignup(true)} variant="secondary" style={{width:"100%",marginBottom:10}}>{t.createUser.toUpperCase()}</Btn>
    <button onClick={()=>dispatch({type:"LOGIN",payload:GUEST_USER})} style={{background:C.surface2,border:`1px solid ${C.border}`,borderRadius:6,padding:"11px",color:C.textMuted,fontWeight:600,fontSize:13,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center",gap:8,width:"100%"}}>
      <span style={{fontSize:16}}>👁</span> {t.continueGuest.toUpperCase()}
      <span style={{fontSize:10,color:C.textDim}}>{t.guestAccess}</span>
    </button>
  </div>;
}

function KartNumberGrid({cls,reg,onPick,selectedNum}){
  const range=kartRange(reg,cls);
  if(!range)return <div style={{color:C.textDim,fontSize:12,padding:12,textAlign:"center"}}>Intet nummerinterval opsat for {cls} endnu.</div>;
  const nums=[];for(let n=range.start;n<=range.end;n++)nums.push(n);
  return <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(46px,1fr))",gap:5}}>
    {nums.map(n=>{
      const owner=kartOwner(reg,cls,n);
      const taken=!!owner;const isSel=selectedNum===n;
      return <button key={n} onClick={()=>onPick&&onPick(n,owner)} style={{
        background:isSel?C.red:taken?`${C.textDim}22`:C.surface2,
        border:`1px solid ${isSel?C.red:taken?C.border:C.green+"66"}`,
        color:isSel?"#fff":taken?C.textDim:C.green,
        borderRadius:6,padding:"8px 2px",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit",
        textDecoration:taken?"line-through":"none"
      }} title={taken?`Optaget: ${owner.ownerName}`:"Ledigt"}>{n}</button>;
    })}
  </div>;
}

function KartRegisterScreen({state,dispatch}){
  const t=useT();
  const cu=state.currentUser;
  const reg=state.kartRegister||{ranges:{},numbers:{}};

  // Hvem vælger vi nummer til? Sig selv eller (for forældre) et af børnene.
  const kids=childrenOf(state.users,cu);
  const people=[cu,...kids];
  const [forId,setForId]=useState(cu.id);
  const u=people.find(p=>p.id===forId)||cu;
  const isForChild=u.id!==cu.id;

  const eligible=sortClassesByAge(eligibleClasses(u.dob,state.classRules).filter(c=>kartRange(reg,c)),state.classRules);
  const [cls,setCls]=useState(eligible[0]||"");
  const activeCls=eligible.includes(cls)?cls:eligible[0]||"";
  const [picked,setPicked]=useState(null); // {num, owner}
  const myNum=activeCls?myKartInClass(reg,activeCls,u.id):null;

  // Nulstil klasse/valg når man skifter person
  useEffect(()=>{setCls("");setPicked(null);},[forId]);

  const claim=(num)=>{
    // frigiv personens gamle nummer i denne klasse først
    if(myNum)dispatch({type:"RELEASE_KART",className:activeCls,number:myNum});
    dispatch({type:"CLAIM_KART",className:activeCls,number:num,ownerId:u.id,ownerName:u.name,ownerLicense:u.license||""});
    setPicked(null);
  };

  return <div style={{padding:16,overflowY:"auto",height:"100%"}}>
    <SH title={t.kartNumber} sub={t.kartNumberSub}/>
    {kids.length>0&&<div style={{marginBottom:14}}>
      <div style={{color:C.textMuted,fontSize:10,letterSpacing:1,marginBottom:6,textTransform:"uppercase"}}>{t.colName==="Navn"?"Vælg nummer til":"Choose number for"}</div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
        {people.map(p=><button key={p.id} onClick={()=>setForId(p.id)} style={{background:forId===p.id?C.red:C.surface2,color:forId===p.id?"#fff":C.textMuted,border:`1px solid ${forId===p.id?C.red:C.border}`,borderRadius:20,padding:"6px 14px",fontSize:12,cursor:"pointer",fontFamily:"inherit",fontWeight:forId===p.id?700:400}}>
          {p.id===cu.id?(t.colName==="Navn"?"Mig selv":"Myself"):(p.country?flagEmoji(p.country)+" ":"")+p.name}
        </button>)}
      </div>
    </div>}
    {eligible.length===0
      ?<div style={{color:C.textMuted,textAlign:"center",padding:30,fontSize:13}}>
        {u.dob
          ?(isForChild?`${u.name}: `:"")+"Der er endnu ikke oprettet nummerinterval for de aldersberettigede klasser."
          :(isForChild?`Udfyld ${u.name}s fødselsdato under "Mine kørere" for at se klasser.`:"Udfyld din fødselsdato under Profil for at se dine klasser.")}
      </div>
      :<div>
        <div style={{display:"flex",gap:6,overflowX:"auto",marginBottom:12,paddingBottom:4}}>
          {eligible.map(c=><button key={c} onClick={()=>{setCls(c);setPicked(null);}} style={{background:activeCls===c?state.classRules[c]?.color||C.red:C.surface2,color:activeCls===c?"#fff":C.textMuted,border:`1px solid ${activeCls===c?state.classRules[c]?.color||C.red:C.border}`,borderRadius:20,padding:"5px 14px",fontSize:12,cursor:"pointer",whiteSpace:"nowrap",fontFamily:"inherit",fontWeight:activeCls===c?700:400}}>{c}</button>)}
        </div>
        {myNum&&<div style={{background:`${C.green}11`,border:`1px solid ${C.green}44`,borderRadius:8,padding:10,marginBottom:10}}>
          <div style={{color:C.green,fontSize:13,fontWeight:700}}>{isForChild?u.name+"s":"Dit"} nummer i {activeCls}: #{myNum}</div>
          {(()=>{
            const info=reg.numbers?.[activeCls]?.[myNum];
            const renewed=info?.renewed;
            const canRenew=renewWindowOpen(reg)&&!renewed;
            if(renewed)return <div style={{color:C.green,fontSize:11,marginTop:4}}>✓ Fornyet til næste sæson – bevares ved frigivelsen</div>;
            if(canRenew)return <div style={{marginTop:8}}>
              <div style={{color:C.textMuted,fontSize:11,marginBottom:6}}>Fornyelse er åben (indtil {reg.releaseDate}). Forny for at beholde #{myNum} i {activeCls} næste sæson.</div>
              <Btn small onClick={()=>dispatch({type:"RENEW_KART",className:activeCls,number:myNum,ownerId:u.id})}>Forny #{myNum}</Btn>
            </div>;
            if(reg.renewOpenDate&&reg.releaseDate&&new Date().toISOString().slice(0,10)<reg.renewOpenDate)
              return <div style={{color:C.textDim,fontSize:11,marginTop:4}}>Fornyelse åbner {reg.renewOpenDate}</div>;
            return null;
          })()}
        </div>}
        <div style={{display:"flex",gap:12,marginBottom:10,fontSize:11}}>
          <span style={{color:C.green}}>■ {t.free}</span>
          <span style={{color:C.textDim}}>■ {t.taken}</span>
        </div>
        <KartNumberGrid cls={activeCls} reg={reg} selectedNum={picked?.num} onPick={(num,owner)=>setPicked({num,owner})}/>
        {picked&&<Card style={{marginTop:12,borderLeft:`3px solid ${picked.owner?C.textDim:C.green}`}}>
          {picked.owner
            ?<div>
              <div style={{fontWeight:700,color:C.text,fontSize:14}}>#{picked.num} er optaget</div>
              <div style={{color:C.textMuted,fontSize:12,marginTop:4}}>Ejer: {picked.owner.ownerName}{picked.owner.ownerLicense?" ("+picked.owner.ownerLicense+")":""}</div>
              {picked.owner.releaseDate&&<div style={{color:C.textDim,fontSize:11,marginTop:2}}>Frigives: {picked.owner.releaseDate}</div>}
            </div>
            :<div>
              <div style={{fontWeight:700,color:C.text,fontSize:14,marginBottom:8}}>Vælg nummer #{picked.num} i {activeCls}{isForChild?" til "+u.name:""}?</div>
              {myNum&&<div style={{color:C.orange,fontSize:11,marginBottom:8}}>{isForChild?u.name+"s":"Dit"} nuværende nummer #{myNum} frigives automatisk.</div>}
              <div style={{display:"flex",gap:8}}>
                <Btn small onClick={()=>claim(picked.num)}>Vælg #{picked.num}</Btn>
                <Btn small variant="ghost" onClick={()=>setPicked(null)}>Annuller</Btn>
              </div>
            </div>}
        </Card>}
      </div>}
  </div>;
}

function ChildManager({u,state,dispatch}){
  const t=useT();
  const lang=useLang();
  const children=childrenOf(state.users,u);
  const CLASSES=sortClassesByAge(Object.keys(state.classRules||{}),state.classRules);
  const [mode,setMode]=useState(null); // null | "add" | editId
  const [releaseId,setReleaseId]=useState(null);
  const [f,setF]=useState({name:"",dob:"",license:"",transponder:"",class:"",kartNumber:"",club:"",phone:"",email:"",country:"DK"});
  const [rel,setRel]=useState({email:"",pw:"",pw2:""});
  const [err,setErr]=useState("");const [busy,setBusy]=useState(false);const [msg,setMsg]=useState("");
  const set=(k,v)=>setF(o=>({...o,[k]:v}));

  const startAdd=()=>{setF({name:"",dob:"",license:"",transponder:"",class:"",kartNumber:"",club:"",phone:"",email:"",country:u.country||"DK"});setErr("");setMode("add");};
  const startEdit=(c)=>{setF({name:c.name||"",dob:c.dob||"",license:c.license||"",transponder:c.transponder||"",class:c.class||"",kartNumber:c.kartNumber||"",club:c.club||"",phone:c.phone||"",email:c.email||"",country:c.country||"DK"});setErr("");setMode(c.id);};

  const save=()=>{
    setErr("");
    if(!f.name.trim()){setErr("Skriv barnets navn");return;}
    const payload={name:f.name.trim(),dob:f.dob,license:f.license,transponder:f.transponder,class:f.class,kartNumber:parseInt(f.kartNumber)||undefined,club:f.club,phone:f.phone,email:f.email.trim(),country:f.country};
    if(mode==="add"){
      const childId="child-"+Date.now();
      dispatch({type:"ADD_CHILD",parentId:u.id,childId,payload:payload,_newChildIds:[...(u.childIds||[]),childId]});
    }
    else{dispatch({type:"UPDATE_USER",payload:{id:mode,...payload}});}
    setMode(null);
  };

  const doRelease=async(child)=>{
    setErr("");
    if(!rel.email.trim()){setErr("Barnet skal have en e-mail for at kunne frigives");return;}
    if(rel.email.trim().toLowerCase()===(u.email||"").toLowerCase()){setErr("E-mailen må ikke være forælderens egen e-mail");return;}
    if(rel.pw.length<6){setErr("Midlertidig adgangskode skal være mindst 6 tegn");return;}
    if(rel.pw!==rel.pw2){setErr("Adgangskoderne er ikke ens");return;}
    if(!sb){setErr("Supabase er ikke konfigureret");return;}
    setBusy(true);
    try{
      // Opret Auth-bruger til barnet. NB: dette logger barnet ind i den aktuelle session,
      // så vi gemmer forælderens session og genopretter den bagefter.
      const {data:parentSession}=await sb.auth.getSession();
      const {data,error}=await sb.auth.signUp({email:rel.email.trim(),password:rel.pw});
      if(error){setErr(error.message);setBusy(false);return;}
      const newId=data.user?.id;
      if(!newId){setErr("Kunne ikke oprette login – prøv igen");setBusy(false);return;}
      // Opret barnets profil-række
      const row=userToRow({...child,id:newId,parentId:null,email:rel.email.trim(),isAdmin:false});
      const {error:pErr}=await sb.from("profiles").upsert(row);
      if(pErr){setErr("Login oprettet, men profil fejlede: "+pErr.message);setBusy(false);return;}
      // Fjern barnet fra forælderens childIds i forælderens profil-række
      await sb.from("profiles").update({child_ids:(u.childIds||[]).filter(cid=>cid!==child.id)}).eq("id",u.id);
      // Genopret forælderens session (signUp skiftede den til barnet)
      if(parentSession?.session){
        await sb.auth.setSession({access_token:parentSession.session.access_token,refresh_token:parentSession.session.refresh_token});
      }
      dispatch({type:"RELEASE_CHILD",parentId:u.id,childId:child.id,newId,email:rel.email.trim()});
      setMsg(`${child.name} er frigivet. Barnet kan nu logge ind med sin e-mail og den midlertidige kode – og bør skifte kode via "Glemt adgangskode".`);
      setReleaseId(null);setRel({email:"",pw:"",pw2:""});
    }catch(e){setErr(String(e.message||e));}
    setBusy(false);
  };

  return <Card style={{borderLeft:`3px solid ${C.blue}`}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
      <div style={{color:C.textMuted,fontSize:10,letterSpacing:2}}>{t.myDrivers.toUpperCase()}</div>
      {!mode&&<Btn small onClick={startAdd}>+ {t.addDriver}</Btn>}
    </div>
    {msg&&<div style={{background:`${C.green}22`,border:`1px solid ${C.green}44`,borderRadius:8,padding:10,marginBottom:10,color:C.green,fontSize:12,fontWeight:600}}>✅ {msg}</div>}

    {mode&&<div style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:12,marginBottom:10}}>
      <div style={{fontWeight:700,color:C.text,fontSize:13,marginBottom:8}}>{mode==="add"?"Ny kører":"Rediger kører"}</div>
      <Input label="Navn *" value={f.name} onChange={v=>set("name",v)} placeholder="Barnets navn"/>
      <Sel label={lang==="en"?"Country / nationality":"Land / nationalitet"} value={f.country} onChange={v=>set("country",v)} options={countryOptions(lang)}/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <Input label="Fødselsdato" value={f.dob} onChange={v=>set("dob",v)} placeholder="2014-05-12"/>
        <Sel label="Klasse" value={f.class} onChange={v=>set("class",v)} options={[{value:"",label:"Vælg..."},...CLASSES.map(c=>({value:c,label:c}))]}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <Input label="Licensnummer" value={f.license} onChange={v=>set("license",v)} placeholder="DK-2026-XXXX"/>
        <Input label="Kart #" value={String(f.kartNumber||"")} onChange={v=>set("kartNumber",v)} placeholder="98" type="number"/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <Input label="Transponder" value={f.transponder} onChange={v=>set("transponder",v)} placeholder="T-XXXX"/>
        {(state.clubs&&state.clubs.length)
          ?<Sel label="Klub" value={f.club} onChange={v=>set("club",v)} options={[{value:"",label:"Vælg klub..."},...state.clubs.slice().sort((a,b)=>a.name.localeCompare(b.name,"da")).map(c=>({value:c.name,label:c.name}))]}/>
          :<Input label="Klub" value={f.club} onChange={v=>set("club",v)} placeholder="Klubnavn"/>}
      </div>
      <Input label="Telefon" value={f.phone} onChange={v=>set("phone",v)} placeholder="Mobilnummer"/>
      <Input label="E-mail (valgfri)" value={f.email} onChange={v=>set("email",v)} placeholder="barnets@email.dk – kræves for frigivelse" type="email"/>
      {err&&<div style={{color:C.red,fontSize:12,marginBottom:8}}>{err}</div>}
      <div style={{display:"flex",gap:8}}>
        <Btn small onClick={save}>Gem</Btn>
        <Btn small variant="ghost" onClick={()=>setMode(null)}>Annuller</Btn>
      </div>
    </div>}

    {children.length===0&&!mode&&<div style={{color:C.textDim,fontSize:12}}>Ingen kørere tilføjet endnu.</div>}
    {children.map(c=>{
      const canRelease=c.email&&c.email.toLowerCase()!==(u.email||"").toLowerCase();
      const isReleasing=releaseId===c.id;
      return <div key={c.id} style={{padding:"10px 0",borderBottom:`1px solid ${C.border}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <div style={{fontWeight:700,color:C.text,fontSize:13}}>{c.country?flagEmoji(c.country)+" ":""}{c.name}</div>
            <div style={{color:C.textMuted,fontSize:11}}>{[c.class,c.kartNumber?"#"+c.kartNumber:"",c.license].filter(Boolean).join(" · ")||"Ingen data"}</div>
            {c.email&&<div style={{color:C.textDim,fontSize:10}}>{c.email}</div>}
          </div>
          <Badge color={C.blue} style={{fontSize:9}}>{t.linked.toUpperCase()}</Badge>
        </div>
        {!isReleasing&&<div style={{display:"flex",gap:8,marginTop:6}}>
          <Btn small variant="ghost" onClick={()=>startEdit(c)}>{t.edit}</Btn>
          {canRelease&&<Btn small variant="secondary" onClick={()=>{setRel({email:c.email,pw:"",pw2:""});setErr("");setReleaseId(c.id);}}>{t.releaseToOwn}</Btn>}
        </div>}
        {isReleasing&&<div style={{background:C.bg,border:`1px solid ${C.blue}44`,borderRadius:8,padding:12,marginTop:8}}>
          <div style={{fontWeight:700,color:C.blue,fontSize:12,marginBottom:4}}>Frigiv {c.name} til selvstændig profil</div>
          <div style={{color:C.textMuted,fontSize:11,marginBottom:10}}>Barnet får sin egen konto med e-mailen nedenfor. Du sætter en midlertidig adgangskode, som barnet logger ind med og selv bør skifte bagefter. Dette kan ikke fortrydes.</div>
          <Input label="Barnets e-mail" value={rel.email} onChange={v=>setRel(o=>({...o,email:v}))} placeholder="barnets@email.dk" type="email"/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <Input label="Midlertidig kode" value={rel.pw} onChange={v=>setRel(o=>({...o,pw:v}))} type="password" placeholder="min. 6 tegn"/>
            <Input label="Gentag kode" value={rel.pw2} onChange={v=>setRel(o=>({...o,pw2:v}))} type="password" placeholder="••••••"/>
          </div>
          {err&&<div style={{color:C.red,fontSize:12,marginBottom:8}}>{err}</div>}
          <div style={{display:"flex",gap:8}}>
            <Btn small onClick={()=>doRelease(c)} disabled={busy}>{busy?"Frigiver...":"Bekræft frigivelse"}</Btn>
            <Btn small variant="ghost" onClick={()=>{setReleaseId(null);setErr("");}}>Annuller</Btn>
          </div>
        </div>}
      </div>;
    })}
  </Card>;
}

function ProfileEditor({u,dispatch,classRules,clubs}){
  const lang=useLang();const t=useT();
  const [edit,setEdit]=useState(false);
  const [f,setF]=useState({});
  const [saved,setSaved]=useState(false);
  const start=()=>{setF({name:u.name||"",dob:u.dob||"",phone:u.phone||"",license:u.license||"",transponder:u.transponder||"",club:u.club||"",country:u.country||"DK"});setEdit(true);setSaved(false);};
  const save=()=>{
    dispatch({type:"UPDATE_USER",payload:{id:u.id,name:f.name,dob:f.dob,phone:f.phone,license:f.license,transponder:f.transponder,club:f.club,country:f.country}});
    setSaved(true);setEdit(false);setTimeout(()=>setSaved(false),2000);
  };
  if(!edit)return <Card>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
      <div style={{color:C.textMuted,fontSize:10,letterSpacing:2}}>{t.myInfo.toUpperCase()}</div>
      <Btn small variant="ghost" onClick={start}>{t.edit}</Btn>
    </div>

function PushToggle({u}){
  const t=useT();
  const [status,setStatus]=useState("idle"); // idle | on | busy | error | unsupported
  const [msg,setMsg]=useState("");
  useEffect(()=>{
    if(!pushSupported()){setStatus("unsupported");return;}
    // Tjek om vi allerede har et aktivt abonnement
    navigator.serviceWorker.ready.then(reg=>reg.pushManager.getSubscription()).then(sub=>{
      if(sub&&Notification.permission==="granted")setStatus("on");
    }).catch(()=>{});
  },[]);
  const isStandalone=window.matchMedia&&window.matchMedia("(display-mode: standalone)").matches||window.navigator.standalone===true;
  const isiOS=/iphone|ipad|ipod/i.test(navigator.userAgent);

  const turnOn=async()=>{
    setStatus("busy");setMsg("");
    try{
      await enablePush(u.id);
      setStatus("on");
    }catch(e){
      setStatus("error");
      if(e.message==="denied")setMsg("Du afviste tilladelsen. Slå notifikationer til i browserens/telefonens indstillinger for GridControl.");
      else if(e.message==="no-vapid")setMsg("Push-serveren er ikke sat op endnu (mangler VAPID-nøgle).");
      else if(e.message==="unsupported")setMsg("Denne enhed/browser understøtter ikke push.");
      else setMsg("Kunne ikke slå notifikationer til. Prøv igen.");
    }
  };
  const turnOff=async()=>{setStatus("busy");await disablePush(u.id);setStatus("idle");};

  return <Card style={{borderLeft:`3px solid ${C.blue}`}}>
    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
      <span style={{fontSize:16}}>🔔</span>
      <div>
        <div style={{color:C.text,fontSize:13,fontWeight:700}}>{t.colName==="Navn"?"Push-notifikationer":"Push notifications"}</div>
        <div style={{color:C.textMuted,fontSize:11}}>{t.colName==="Navn"?"Få besked på telefonen – også når appen er lukket":"Get alerts on your phone – even when the app is closed"}</div>
      </div>
    </div>
    {status==="unsupported"&&<div style={{color:C.textMuted,fontSize:12}}>{t.colName==="Navn"?"Denne enhed understøtter ikke push-notifikationer.":"This device does not support push notifications."}</div>}
    {status!=="unsupported"&&isiOS&&!isStandalone&&<div style={{background:`${C.orange}18`,border:`1px solid ${C.orange}44`,borderRadius:8,padding:10,marginBottom:8,color:C.orange,fontSize:11}}>{t.colName==="Navn"?"På iPhone/iPad skal appen først tilføjes til hjemmeskærmen (via Del → Føj til hjemmeskærm), før notifikationer kan slås til.":"On iPhone/iPad, add the app to your home screen first (Share → Add to Home Screen) before enabling notifications."}</div>}
    {msg&&<div style={{color:C.orange,fontSize:11,marginBottom:8}}>{msg}</div>}
    {status==="on"
      ? <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{color:C.green,fontSize:12,fontWeight:700}}>✓ {t.colName==="Navn"?"Slået til":"Enabled"}</span>
          <Btn small variant="ghost" onClick={turnOff}>{t.colName==="Navn"?"Slå fra":"Turn off"}</Btn>
        </div>
      : <Btn small onClick={turnOn} disabled={status==="busy"||(isiOS&&!isStandalone)}>{status==="busy"?"...":(t.colName==="Navn"?"Slå notifikationer til":"Enable notifications")}</Btn>
    }
  </Card>;
}

            <Input label="Reserve wet (valgfrit)" value={wetRes} onChange={setWetRes} placeholder="EAN-XXXX" style={{marginTop:8}}/>

      {step===3&&<div>
        <Card>
          <div style={{color:C.textMuted,fontSize:10,letterSpacing:2,marginBottom:10}}>ORDREOVERSIGT</div>
          {[["Gebyr",`${sel.fee} kr.`],["Klasse",selClass||sel.classes.filter(c=>myEligible.includes(c))[0]||""],["Ryttergård",(paddock&&paddockNote)?`${paddock}m × ${paddockNote}m`:paddock||"—"],["Slicks",slicks.length+" stk"],["Wets",wets.length+" stk"]].map(([k,v])=><div key={k} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:`1px solid ${C.border}`}}><span style={{color:C.textMuted,fontSize:12}}>{k}</span><span style={{color:C.text,fontWeight:600,fontSize:12}}>{v}</span></div>)}
          <div style={{display:"flex",justifyContent:"space-between",marginTop:8}}><span style={{fontWeight:700,color:C.text}}>TOTAL</span><span style={{fontWeight:900,color:C.red,fontSize:18}}>{sel.fee} kr.</span></div>
          <div style={{marginTop:8,padding:8,background:C.surface2,borderRadius:6,fontSize:11,color:C.textMuted}}>Betaling: <strong style={{color:C.text}}>{pm.type==="mobilepay"?`MobilePay #${pm.number}`:"Betalingskort (Stripe)"}</strong></div>
        </Card>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
          <div style={{background:C.surface2,border:`1px solid ${C.border}`,borderRadius:8,padding:12,textAlign:"center",cursor:"pointer"}}><div style={{fontSize:22}}>📱</div><div style={{fontWeight:700,fontSize:12,color:C.text}}>MobilePay</div></div>
          <div style={{background:C.surface2,border:`1px solid ${C.border}`,borderRadius:8,padding:12,textAlign:"center",cursor:"pointer"}}><div style={{fontSize:22}}>💳</div><div style={{fontWeight:700,fontSize:12,color:C.text}}>Kort</div></div>
        </div>
        {(()=>{
          const cls=selClass||sel.classes.filter(c=>myEligible.includes(c))[0]||"";
          if(classFull(sel,cls))return <div style={{background:`${C.red}11`,border:`1px solid ${C.red}44`,borderRadius:8,padding:12,textAlign:"center",color:C.red,fontWeight:700,fontSize:13}}>⚠️ Klassen er fuld – tilmelding ikke mulig</div>;
          const kc=kartCheck(cls);
          if(!kc.ok)return <div style={{background:`${C.red}11`,border:`1px solid ${C.red}44`,borderRadius:8,padding:12,textAlign:"center",color:C.red,fontWeight:700,fontSize:12}}>⚠️ {kc.msg}</div>;
          return <Btn onClick={finishReg} style={{width:"100%",background:"#006633"}}>✓ BEKRÆFT & BETAL</Btn>;
        })()}
      </div>}
    </div>;
  }

  if(sel&&showOverview){
    return <div style={{padding:16,overflowY:"auto",height:"100%"}}>
      <Btn small variant="ghost" onClick={()=>setShowOverview(false)} style={{marginBottom:12}}>{t.back}</Btn>
      <EventOverview ev={sel} state={state}/>
    </div>;
  }

  if(sel){
    const evClasses=sortClassesByAge(sel.classes.filter(c=>eligibleClasses(u?.dob,state.classRules).includes(c)),state.classRules);
    return <div style={{padding:16,overflowY:"auto",height:"100%"}}>
      <Btn small variant="ghost" onClick={()=>setSel(null)} style={{marginBottom:12}}>{t.back}</Btn>
      <div style={{background:`linear-gradient(135deg,${C.redDark},#1a0003)`,borderRadius:10,padding:18,marginBottom:14}}>
        <div style={{color:"rgba(255,255,255,0.5)",fontSize:11}}>{sel.date}{sel.endDate&&sel.endDate!==sel.date?" – "+sel.endDate:""}</div>
        <div style={{fontSize:20,fontWeight:900,color:"#fff",fontFamily:"'Barlow Condensed',sans-serif"}}>{sel.name}</div>
        <div style={{color:"rgba(255,255,255,0.6)",fontSize:12}}>📍 {sel.location}</div>
        {sel.address&&<a href={`https://maps.google.com/?q=${encodeURIComponent(sel.address)}`} target="_blank" rel="noopener noreferrer" style={{color:"rgba(255,255,255,0.75)",fontSize:11,textDecoration:"underline"}}>🗺️ {sel.address}</a>}
        {sel.raceType&&<div style={{marginTop:6}}><Badge color={C.cyan} style={{fontSize:10}}>{sel.raceType}</Badge></div>}
        {!sel.registrationOpen&&<Badge color={C.orange} style={{marginTop:8}}>TILMELDING ÅBNER SENERE</Badge>}
      </div>
      {sel.eventPdf&&<Card style={{cursor:"pointer",display:"flex",gap:12,alignItems:"center"}}><div style={{fontSize:22}}>📋</div><div><div style={{fontWeight:700,color:C.text,fontSize:13}}>Tillægsregler – {sel.name}</div><div style={{color:C.textMuted,fontSize:11}}>Tryk for at åbne PDF</div></div><div style={{color:C.red,marginLeft:"auto",fontSize:18}}>↓</div></Card>}
      <Card>{[["Tilmeldingsfrist",sel.deadline],["Gebyr",`${sel.fee} kr.`],["Tilmeldte",`${sel.registrations.length}`]].map(([k,v])=><div key={k} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:`1px solid ${C.border}`}}><span style={{color:C.textMuted,fontSize:12}}>{k}</span><span style={{color:C.text,fontWeight:600,fontSize:12}}>{v}</span></div>)}</Card>
      <div style={{marginBottom:12}}><div style={{color:C.textMuted,fontSize:10,letterSpacing:2,marginBottom:6}}>KLASSER (aldersgodkendt)</div><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{evClasses.map(c=>{const m=classLimitFor(sel,c);const n=classCount(sel,c);const full=m&&n>=m;return <Badge key={c} color={full?C.textDim:state.classRules[c]?.color||C.red}>{c}{m?` ${n}/${m}`:""}{full?" · FULD":""}</Badge>;})}</div></div>
      {u?.type==="guest"
        ?<div style={{background:`${C.blue}11`,border:`1px solid ${C.blue}44`,borderRadius:8,padding:12,textAlign:"center",color:C.blue,fontSize:12}}>{t.colName==="Navn"?"Log ind for at tilmelde dig":"Log in to register"}</div>
        :isReg(sel)?<div style={{background:"#00331a",border:"1px solid #00CC6644",borderRadius:8,padding:14,textAlign:"center",color:C.green,fontWeight:700}}>{t.youAreRegistered}</div>:sel.registrationOpen?<Btn onClick={()=>setStep(1)} style={{width:"100%"}}>{t.register}</Btn>:<div style={{background:`${C.orange}11`,border:`1px solid ${C.orange}44`,borderRadius:8,padding:12,textAlign:"center",color:C.orange,fontSize:13}}>{t.regOpensLater}</div>}
      <div style={{height:12}}/>
      <Btn variant="secondary" onClick={()=>setShowOverview(true)} style={{width:"100%"}}>📋 {t.raceOverview}</Btn>
    </div>;
  }

  return <div style={{padding:16,overflowY:"auto",height:"100%"}}>
    <SH title={t.raceCalendar} sub={t.raceCalendarSub}/>
    {state.events.map(ev=>{const evSer=state.raceSeries.find(s=>s.id===ev.seriesId);return <Card key={ev.id} onClick={()=>setSel(ev)} style={{borderLeft:`3px solid ${ev.registrations.some(r=>r.userId===u?.id)?C.green:ev.registrationOpen?C.red:C.textDim}`}}>
      <div style={{display:"flex",justifyContent:"space-between"}}>
        <div>
          {evSer&&evSer.logo&&<img src={evSer.logo} style={{height:16,maxWidth:55,objectFit:"contain",marginBottom:3,display:"block",opacity:0.85}} alt=""/>}
          <div style={{fontWeight:700,color:C.text,fontSize:14}}>{ev.name}</div>
          <div style={{color:C.textMuted,fontSize:11}}>📍 {ev.location} · 📅 {ev.date}</div>
          <div style={{color:C.textDim,fontSize:10}}>Serie: {state.raceSeries.find(s=>s.id===ev.seriesId)?.name||"—"}</div>
        </div>
        <div style={{textAlign:"right"}}>
          {ev.registrations.some(r=>r.userId===u?.id)?<Badge color={C.green} style={{fontSize:10}}>{t.registered}</Badge>:ev.registrationOpen?<Badge color={C.red} style={{fontSize:10}}>{t.open}</Badge>:<Badge color={C.textDim} style={{fontSize:10}}>{t.upcoming}</Badge>}
          <div style={{color:C.textDim,fontSize:10,marginTop:4}}>{ev.registrations.length} {t.signups}</div>
        </div>
      </div>
      <button onClick={(e)=>{e.stopPropagation();setSel(ev);setShowOverview(true);}} style={{marginTop:10,width:"100%",background:C.surface2,border:`1px solid ${C.border}`,borderRadius:6,padding:"7px",color:C.textMuted,fontSize:11,cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>📋 {t.raceOverview}</button>
    </Card>;})}
  </div>;
}

// ── STANDINGS ────────────────────────────────────────────────────
function StandingsScreen({state,dispatch}){
  const t=useT();
  const series=state.raceSeries||[];
  const P=state.uiPrefs||{};
  const serId=P.stanSer!=null&&series.some(s=>String(s.id)===String(P.stanSer))?P.stanSer:series[0]?.id;
  const setSerId=v=>{dispatch({type:"SET_UI_PREF",key:"stanSer",value:v});dispatch({type:"SET_UI_PREF",key:"stanClass",value:null});};
  const standings=(state.champStandings||{})[serId];
  const classNames=(standings?Object.keys(standings).filter(k=>k!=="_updated"):[]).slice().sort((a,b)=>{
    const ma=state.classRules[a]?.min??999,mb=state.classRules[b]?.min??999;
    return ma!==mb?ma-mb:a.localeCompare(b,"da");
  });
  const pdf=(state.champPdfs||{})[serId];
  const setAc=v=>dispatch({type:"SET_UI_PREF",key:"stanClass",value:v});
  const ac=P.stanClass;
  const activeClass=classNames.includes(ac)?ac:classNames[0];
  const cls=activeClass?standings[activeClass]:null;
  const rounds=cls?.rounds||[];
  const rows=cls?.rows||[];
  const hasDrop=cls?.hasDrop;
  const SEGS=[["kval","Kval"],["heats","Heats"],["pre","Pre"],["finale","Fin"]];

  return <div style={{padding:16,overflowY:"auto",height:"100%"}}>
    <SH title={t.championship}/>
    {series.length===0
      ?<div style={{color:C.textMuted,textAlign:"center",padding:30,fontSize:13}}>{t.noSeries}</div>
      :<Sel label={t.raceSeries} value={String(serId)} onChange={v=>{const n=Number(v);setSerId(n);const st=(state.champStandings||{})[n];setAc(st?Object.keys(st).filter(k=>k!=="_updated")[0]:undefined);}} options={series.map(s=>({value:String(s.id),label:s.name}))}/>}

    {classNames.length>0?<div>
      {standings._updated&&<div style={{color:C.textDim,fontSize:10,marginBottom:8}}>{t.updated}: {standings._updated}</div>}
      <div style={{display:"flex",gap:6,overflowX:"auto",marginBottom:12,paddingBottom:4}}>
        {classNames.map(c=><button key={c} onClick={()=>setAc(c)} style={{background:activeClass===c?state.classRules[c]?.color||C.red:C.surface2,color:activeClass===c?"#fff":C.textMuted,border:`1px solid ${activeClass===c?state.classRules[c]?.color||C.red:C.border}`,borderRadius:20,padding:"5px 14px",fontSize:12,cursor:"pointer",whiteSpace:"nowrap",fontFamily:"inherit",fontWeight:activeClass===c?700:400}}>{c}</button>)}
      </div>
      <Card style={{padding:0,overflow:"hidden"}}>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <thead>
              <tr style={{background:C.surface2}}>
                <th rowSpan={2} style={{padding:"6px 8px",color:C.textMuted,fontWeight:700,textAlign:"left",fontSize:10,position:"sticky",left:0,background:C.surface2,minWidth:34,width:34,boxSizing:"border-box"}}>#</th>
                <th rowSpan={2} style={{padding:"6px 6px",color:C.textMuted,fontWeight:600,textAlign:"left",fontSize:10,position:"sticky",left:34,background:C.surface2,zIndex:1,boxShadow:`-1px 0 0 ${C.surface2}`}}>{t.colName==="Navn"?"Nr":"No"}</th>
                <th rowSpan={2} style={{padding:"6px 8px",color:C.textMuted,fontWeight:600,textAlign:"left",fontSize:10,whiteSpace:"nowrap"}}>{t.colName}</th>
                {rounds.map(rn=><th key={rn} colSpan={4} style={{padding:"5px 6px",color:C.textMuted,fontWeight:700,textAlign:"center",fontSize:9,letterSpacing:1,borderLeft:`1px solid ${C.border}`}}>{t.round.toUpperCase()} {rn}</th>)}
                <th rowSpan={2} style={{padding:"6px 8px",color:C.textMuted,fontWeight:700,textAlign:"right",fontSize:10,borderLeft:`1px solid ${C.border}`}}>{t.total}</th>
                {hasDrop&&<th rowSpan={2} style={{padding:"6px 8px",color:C.red,fontWeight:700,textAlign:"right",fontSize:10}}>{t.withDrop}</th>}
              </tr>
              <tr style={{background:C.surface2}}>
                {rounds.map(rn=>SEGS.map(([k,lbl])=><th key={rn+k} style={{padding:"3px 5px",color:C.textDim,fontWeight:500,textAlign:"center",fontSize:8,borderLeft:k==="kval"?`1px solid ${C.border}`:"none"}}>{lbl}</th>))}
              </tr>
            </thead>
            <tbody>{rows.map((r,i)=><tr key={i} style={{borderBottom:`1px solid ${C.border}`,background:r.pos===1?"rgba(255,215,0,0.05)":"transparent"}}>
              <td style={{padding:"8px",fontWeight:900,color:r.pos===1?C.gold:r.pos===2?"#C0C0C0":r.pos===3?"#CD7F32":C.textMuted,fontSize:14,position:"sticky",left:0,background:r.pos===1?"#1a1608":C.surface,minWidth:34,width:34,boxSizing:"border-box"}}>{r.pos}</td>
              <td style={{padding:"8px 6px",color:C.textMuted,fontFamily:"monospace",fontSize:11,position:"sticky",left:34,background:r.pos===1?"#1a1608":C.surface,zIndex:1,boxShadow:`-1px 0 0 ${r.pos===1?"#1a1608":C.surface}`}}>{r.nr}</td>
              <td style={{padding:"8px",fontWeight:700,color:C.text,whiteSpace:"nowrap"}}>{r.name}</td>
              {rounds.map(rn=>SEGS.map(([k])=>{
                const v=r.segs[rn]?.[k];
                return <td key={rn+k} style={{padding:"8px 5px",color:v?C.textMuted:C.textDim,textAlign:"center",fontSize:11,borderLeft:k==="kval"?`1px solid ${C.border}`:"none"}}>{v||"–"}</td>;
              }))}
              <td style={{padding:"8px",fontWeight:700,color:C.text,textAlign:"right",borderLeft:`1px solid ${C.border}`}}>{r.total}</td>
              {hasDrop&&<td style={{padding:"8px",fontWeight:900,color:C.red,textAlign:"right",fontSize:13}}>{r.drop}</td>}
            </tr>)}</tbody>
          </table>
        </div>
      </Card>
      <div style={{color:C.textDim,fontSize:10,marginTop:8,textAlign:"center"}}>{t.swipeForRounds}</div>
    </div>:pdf?<div>
      <Card style={{borderLeft:`3px solid ${C.red}`,padding:"12px 14px"}}>
        <div style={{display:"flex",gap:10,alignItems:"center"}}>
          <div style={{fontSize:22}}>🏆</div>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,color:C.text,fontSize:13}}>{pdf.name||"Mesterskabsstilling"}</div>
            <div style={{color:C.textMuted,fontSize:11}}>Opdateret: {pdf.updated}</div>
          </div>
          <a href={pdf.dataUrl} target="_blank" rel="noreferrer" style={{background:C.red,color:"#fff",fontSize:12,fontWeight:700,textDecoration:"none",borderRadius:6,padding:"7px 14px"}}>Åbn PDF ↗</a>
        </div>
      </Card>
    </div>:<div style={{color:C.textMuted,textAlign:"center",padding:30,fontSize:13}}>{t.noStandings}<br/><span style={{fontSize:11,color:C.textDim}}>{t.importCsvHint}</span></div>}
  </div>;
}

// ── DOCUMENTS ────────────────────────────────────────────────────
function DocumentsScreen({state,dispatch}){
  const t=useT();
  const P=state.uiPrefs||{};
  const evF=P.docsEv||"Alle",cf=P.docsClass||"Alle",tf=P.docsType||"Alle";
  const setEvF=v=>{dispatch({type:"SET_UI_PREF",key:"docsEv",value:v});dispatch({type:"SET_UI_PREF",key:"docsClass",value:"Alle"});};
  const setCf=v=>dispatch({type:"SET_UI_PREF",key:"docsClass",value:v});
  const setTf=v=>dispatch({type:"SET_UI_PREF",key:"docsType",value:v});
  // Saml dokumenter fra alle løb (eller valgt løb) + evt. gamle globale dokumenter
  const allDocs=[
    ...state.events.filter(ev=>evF==="Alle"||String(ev.id)===evF).flatMap(ev=>(ev.documents||[]).map(d=>({...d,eventName:ev.name,eventDate:ev.date}))),
    ...(evF==="Alle"?(state.documents||[]):[]),
  ];
  const classes=["Alle",...new Set(allDocs.map(d=>d.class).filter(Boolean))];
  const types=["Alle","Startgrid","Resultat","Opslagstavle"];
  const SL={kval:"Kval",heat:"Heat",prefinale:"Prefinale",finale:"Finale"};
  const filtered=allDocs.filter(d=>(cf==="Alle"||d.class===cf)&&(tf==="Alle"||d.type===tf));
  return <div style={{padding:16,overflowY:"auto",height:"100%"}}>
    <SH title={t.docs}/>
    <Sel label={t.race} value={evF} onChange={v=>{setEvF(v);setCf("Alle");}} options={[{value:"Alle",label:t.allRaces},...state.events.map(e=>({value:String(e.id),label:e.name}))]}/>
    <div style={{display:"flex",gap:6,overflowX:"auto",marginBottom:6,paddingBottom:2}}>{classes.map(c=><button key={c} onClick={()=>setCf(c)} style={{background:cf===c?C.red:C.surface2,color:cf===c?"#fff":C.textMuted,border:`1px solid ${cf===c?C.red:C.border}`,borderRadius:20,padding:"4px 10px",fontSize:10,cursor:"pointer",whiteSpace:"nowrap",fontFamily:"inherit"}}>{c}</button>)}</div>
    <div style={{display:"flex",gap:6,overflowX:"auto",marginBottom:12,paddingBottom:2}}>{types.map(t=><button key={t} onClick={()=>setTf(t)} style={{background:tf===t?C.blue:C.surface2,color:tf===t?"#fff":C.textMuted,border:`1px solid ${tf===t?C.blue:C.border}`,borderRadius:20,padding:"4px 10px",fontSize:10,cursor:"pointer",whiteSpace:"nowrap",fontFamily:"inherit"}}>{t}</button>)}</div>
    {filtered.length===0&&<div style={{color:C.textDim,fontSize:12,textAlign:"center",padding:20}}>{t.noDocuments}</div>}
    {filtered.map((d,i)=>{
      const inner=<div style={{display:"flex",gap:10,alignItems:"center"}}>
        <div style={{fontSize:22}}>{d.type==="Startgrid"?"🏁":d.type==="Resultat"?"🏆":"📋"}</div>
        <div style={{flex:1}}>
          <div style={{fontWeight:700,color:C.text,fontSize:13}}>{d.title}</div>
          <div style={{display:"flex",gap:5,marginTop:3,flexWrap:"wrap"}}>
            <Badge color={d.type==="Startgrid"?C.blue:d.type==="Resultat"?C.gold:C.textMuted} style={{fontSize:10}}>{d.type}</Badge>
            {d.sessionType&&<Badge color={C.orange} style={{fontSize:10}}>{SL[d.sessionType]||d.sessionType}</Badge>}
            {d.class&&<Badge style={{fontSize:10}}>{d.class}</Badge>}
          </div>
          <div style={{color:C.textDim,fontSize:10,marginTop:2}}>{d.eventName&&evF==="Alle"?d.eventName+" · ":""}🕐 {d.time}</div>
        </div>
        <div style={{color:C.red,fontSize:16}}>{d.url&&d.url!=="#"?"↗":""}</div>
      </div>;
      return d.url&&d.url!=="#"
        ?<a key={i} href={d.url} target="_blank" rel="noreferrer" style={{textDecoration:"none"}}><Card style={{cursor:"pointer",padding:"12px 14px"}}>{inner}</Card></a>
        :<Card key={i} style={{padding:"12px 14px"}}>{inner}</Card>;
    })}
  </div>;
}

// ── PENALTIES (user) ─────────────────────────────────────────────
function PenaltiesScreen({state,dispatch}){
  const t=useT();
  const P=state.uiPrefs||{};
  const evF=P.penEv||"Alle",cf=P.penClass||"Alle";
  const setEvF=v=>{dispatch({type:"SET_UI_PREF",key:"penEv",value:v});dispatch({type:"SET_UI_PREF",key:"penClass",value:"Alle"});};
  const setCf=v=>dispatch({type:"SET_UI_PREF",key:"penClass",value:v});
  const evPenalties=evF==="Alle"?state.events.flatMap(ev=>(ev.penalties||[]).map(p=>({...p,_evName:ev.name}))):(state.events.find(e=>String(e.id)===evF)?.penalties||[]);
  const allP=evPenalties;
  const classes=["Alle",...new Set(allP.map(p=>p.class))];

// Returnér kørere til en session: filtreret til valgte grupper (hvis grupper findes),
// og altid sorteret efter kartnummer (laveste først).
// Slå gruppeinddeling op for en klasse+session, med fald-tilbage til klasse-dækkende
// inddeling ("<klasse>||*"), så man kun behøver uploade grupperne én gang pr. klasse.
function resolveGroups(ev,cls,session){
  const sg=ev?.sessionGroups||{};
  return sg[`${cls}||${session}`]||sg[`${cls}||*`]||null;
}

// selGroups = array af valgte gruppebogstaver, fx ["A","B"]. Tom = vis alle i inddelingen.
function sessionDrivers(ev,cls,session,users,selGroups){
  // Kræv altid en valgt klasse for gruppe-visning, og filtrér registreringer til klassen FØRST.
  const regs=(ev?.registrations||[]).filter(r=>!cls||r.class===cls);
  let drivers=regs.map(r=>{const u=users.find(x=>x.id===r.userId);return u?{...u,_regClass:r.class}:null;}).filter(Boolean);
  const groups=resolveGroups(ev,cls,session);
  if(groups&&cls){
    // Kun kørere DER ER I DENNE KLASSE og hvis kartnummer findes i gruppeinddelingen.
    // (Kartnumre går igen på tværs af klasser, så klasse-tjekket ovenfor er afgørende.)
    drivers=drivers
      .filter(d=>d._regClass===cls&&groups[d.kartNumber]!=null)
      .map(d=>({...d,_group:groups[d.kartNumber]}));
    if(selGroups&&selGroups.length)drivers=drivers.filter(d=>selGroups.includes(d._group));
  }
  drivers.sort((a,b)=>(a.kartNumber||99999)-(b.kartNumber||99999));
  return drivers;
}

// Hvilke gruppebogstaver findes for en klasse+session? (til flueben-visning)
function sessionGroupLetters(ev,cls,session){
  const groups=resolveGroups(ev,cls,session);
  if(!groups)return [];
  return [...new Set(Object.values(groups))].sort();
}
