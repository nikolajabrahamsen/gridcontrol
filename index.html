<script type="text/babel">
const {useState,useRef,useEffect,useReducer}=React;

// Persists in-progress (not-yet-submitted) form state to localStorage, keyed by whatever context
// string is passed in (typically race+class+session), so officials/admin don't lose 10 marked
// drivers' worth of work just from navigating away and back. Purely local per device — never synced.
// Automatically reloads when the key changes (e.g. switching class/session loads that combo's own draft).
function useDraft(key,initial){
  const [value,setValue]=useState(initial);
  const loadedKeyRef=useRef(null);
  useEffect(()=>{
    if(loadedKeyRef.current===key)return;
    loadedKeyRef.current=key;
    try{
      const saved=localStorage.getItem(key);
      setValue(saved?JSON.parse(saved):initial);
    }catch(e){setValue(initial);}
    // eslint-disable-next-line
  },[key]);
  useEffect(()=>{
    if(loadedKeyRef.current!==key)return; // don't overwrite a draft with the initial value before it's loaded
    try{localStorage.setItem(key,JSON.stringify(value));}catch(e){}
  },[key,value]);
  const clearDraft=()=>{try{localStorage.removeItem(key);}catch(e){}};
  return [value,setValue,clearDraft];
}

// Path to the service worker file on GitHub (same folder as the app).
const SW_PATH="service-worker.js";

function urlBase64ToUint8Array(base64String){
  const padding="=".repeat((4-base64String.length%4)%4);
  const base64=(base64String+padding).replace(/-/g,"+").replace(/_/g,"/");
  const raw=atob(base64);
  const out=new Uint8Array(raw.length);
  for(let i=0;i<raw.length;i++)out[i]=raw.charCodeAt(i);
  return out;
}

// Is push even possible in this browser/device?
function pushSupported(){
  return "serviceWorker" in navigator && "PushManager" in window && "Notification" in window;
}

// Register service worker (called at app startup if push is supported)
async function registerServiceWorker(){
  if(!("serviceWorker" in navigator))return null;
  try{ return await navigator.serviceWorker.register(SW_PATH); }
  catch(e){ console.warn("SW-registrering fejlede:",e); return null; }
}

// Request permission + create subscription + save in Supabase
async function enablePush(userId){
  if(!pushSupported())throw new Error("unsupported");
  if(VAPID_PUBLIC_KEY.startsWith("INDSÆT"))throw new Error("no-vapid");
  const perm=await Notification.requestPermission();
  if(perm!=="granted")throw new Error("denied");
  const reg=await navigator.serviceWorker.ready;
  let sub=await reg.pushManager.getSubscription();
  if(!sub){
    sub=await reg.pushManager.subscribe({
      userVisibleOnly:true,
      applicationServerKey:urlBase64ToUint8Array(VAPID_PUBLIC_KEY),
    });
  }
  // Save the subscription in Supabase, so the server can send to this device
  if(sb&&userId){
    const j=sub.toJSON();
    await sb.from("push_subscriptions").upsert({
      user_id:userId,
      endpoint:sub.endpoint,
      p256dh:j.keys?.p256dh,
      auth:j.keys?.auth,
      updated_at:new Date().toISOString(),
    },{onConflict:"endpoint"});
  }
  return sub;
}

async function disablePush(userId){
  try{
    const reg=await navigator.serviceWorker.ready;
    const sub=await reg.pushManager.getSubscription();
    if(sub){
      if(sb&&userId)await sb.from("push_subscriptions").delete().eq("endpoint",sub.endpoint);
      await sub.unsubscribe();
    }
  }catch(e){/* ignore */}
}

// Ask the push server (Edge Function) to send a notification.
// userIds = list of recipients; if omitted, sends to everyone.
async function sendPushNotification({title,body,url,userIds}){
  if(!sb)return;
  try{
    await sb.functions.invoke("send-push",{body:{title,body,url:url||".",userIds}});
  }catch(e){ console.warn("Push-afsendelse fejlede:",e); }
}

// Find which user IDs should receive a given notification (for push).
// officialsOnly → all officials/admin. targetClass → drivers in the class + their parents.
// Only real account IDs (UUID) are included – children/imported users without their own account
// have no device to send to, and their parent gets the message instead.
function isRealAccountId(id){
  // Supabase Auth IDs are UUIDs. Filter out "child-..."/"imported-..." etc.
  return typeof id==="string" && /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(id);
}
// Send notification + push to officials/admin when a station has finished a heat.
// adminOnly=true → only admin + sub-admin get notified (used for weight/front fairing/technical control,
// since these stations are already staffed by the officials performing the check themselves).
function notifyHeatDone(dispatch,state,{stationLabel,icon,eventId,cls,session,by,adminOnly}){
  const ev=(state.events||[]).find(e=>e.id===eventId);
  const title=`${icon} ${stationLabel} færdig`;
  const body=`${cls||""}${cls&&session?" · ":""}${session||""}${ev?.name?" · "+ev.name:""} er klar${by?" (rapporteret af "+by+")":""}.`;
  dispatch({type:"ADD_NOTIFICATION",payload:{eventId,title,body,targetClass:"Alle",officialsOnly:true,adminOnly:!!adminOnly,time:new Date().toLocaleString("da-DK")}});
  try{sendPushNotification({title,body,userIds:resolveNotifRecipients(state.users,{officialsOnly:true,adminOnly:!!adminOnly})});}catch(e){}
}

function resolveNotifRecipients(users,{targetClass,officialsOnly,adminOnly}){
  const ids=new Set();
  (users||[]).forEach(u=>{
    if(!isRealAccountId(u.id))return; // skip children/imported users without a real account
    const isOff=u.isOfficial||u.type==="official"||u.isAdmin;
    const isAdminOrSub=u.isAdmin||u.isSubAdmin||u.type==="admin";
    if(adminOnly){ if(isAdminOrSub)ids.add(u.id); return; }
    if(officialsOnly){ if(isOff)ids.add(u.id); return; }
    if(!targetClass||targetClass==="Alle"){ ids.add(u.id); return; }
    // class-targeted: the driver themself in the class
    if(u.class===targetClass)ids.add(u.id);
    // parents if one of their children is in the class
    const kids=childrenOf(users,u);
    if(kids.some(c=>c.class===targetClass))ids.add(u.id);
    // officials/admin see everything
    if(isOff)ids.add(u.id);
  });
  return [...ids];
}

// Emoji flag from ISO-2 country code (regional indicator symbols)
function flagEmoji(code){
  if(!code||code.length!==2)return "";
  return String.fromCodePoint(...[...code.toUpperCase()].map(c=>0x1F1E6+(c.charCodeAt(0)-65)));
}
function countryName(code,lang){const c=COUNTRIES.find(x=>x.code===code);return c?(lang==="en"?c.en:c.da):"";}
function countryOptions(lang){return COUNTRIES.slice().sort((a,b)=>(lang==="en"?a.en:a.da).localeCompare(lang==="en"?b.en:b.da,lang==="en"?"en":"da")).map(c=>({value:c.code,label:flagEmoji(c.code)+" "+(lang==="en"?c.en:c.da)}));}
// Is the driver Danish? (empty nationality = treated as Danish)

// Parses a birthdate stored as either ISO ("YYYY-MM-DD") or Danish-typed ("DD-MM-YYYY" / "DD/MM/YYYY").
// The birthdate field is a free-text input (no date picker), so it's easy for someone to type it the
// natural Danish way instead of ISO — without this, that silently breaks age calculations for that
// person specifically (every class fails its age check), while working fine for everyone else.
function parseDob(dob){
  if(!dob)return null;
  const s=String(dob).trim();
  const iso=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
  if(iso)return new Date(Number(iso[1]),Number(iso[2])-1,Number(iso[3]));
  const dmy=s.match(/^(\d{1,2})[-/.](\d{1,2})[-/.](\d{4})$/);
  if(dmy)return new Date(Number(dmy[3]),Number(dmy[2])-1,Number(dmy[1]));
  const d=new Date(s);
  return isNaN(d)?null:d;
}
function getAge(dob){if(!dob)return null;const t=new Date(),b=parseDob(dob);if(!b)return null;let a=t.getFullYear()-b.getFullYear();if(t.getMonth()<b.getMonth()||(t.getMonth()===b.getMonth()&&t.getDate()<b.getDate()))a--;return a;}
// "Turning-age" per motorsport convention: the age the driver turns during the current calendar year,
// regardless of whether their birthday has happened yet (e.g. born 2018 → turns 8 in 2026, even in January).
function getAgeByYear(dob){if(!dob)return null;const b=parseDob(dob);if(!b)return null;return new Date().getFullYear()-b.getFullYear();}
function classAge(dob,rule){return rule?.byYear?getAgeByYear(dob):getAge(dob);}
function eligibleClasses(dob,cr){return Object.entries(cr).filter(([,r])=>{const age=classAge(dob,r);return age==null||(age>=r.min&&age<=r.max);}).map(([c])=>c);}
// Sorts class names by starting age (min), then alphabetically
function sortClassesByAge(names,classRules){
  return (names||[]).slice().sort((a,b)=>{
    const ma=classRules?.[a]?.min??999,mb=classRules?.[b]?.min??999;
    return ma!==mb?ma-mb:String(a).localeCompare(String(b),"da");
  });
}
// Classes belonging to a race series: a class with no seriesIds set applies to every series (legacy/unrestricted),
// otherwise it must explicitly list the series.
function classesForSeries(classRules,seriesId){
  return Object.keys(classRules||{}).filter(name=>{
    const ids=classRules[name]?.seriesIds||[];
    return ids.length===0||ids.map(Number).includes(Number(seriesId));
  });
}
// Formats a byte count as a human-readable size (KB/MB/GB), Danish-style comma decimal.
function formatBytes(bytes){
  if(!bytes)return "0 KB";
  const units=["B","KB","MB","GB","TB"];
  let i=0,n=bytes;
  while(n>=1024&&i<units.length-1){n/=1024;i++;}
  return `${n.toFixed(i===0?0:1).replace(".",",")} ${units[i]}`;
}
// Recursively walks a Supabase Storage bucket folder, summing file sizes and grouping by top-level folder.
// Supabase's list() only returns one directory level at a time, so subfolders (items without an id) are recursed into.
async function scanStorageFolder(bucket,path,topFolder,acc){
  const {data,error}=await sb.storage.from(bucket).list(path,{limit:1000,sortBy:{column:"name",order:"asc"}});
  if(error||!data)return;
  for(const item of data){
    const fullPath=path?`${path}/${item.name}`:item.name;
    const tf=topFolder||item.name;
    if(item.id==null){
      // folder – recurse
      await scanStorageFolder(bucket,fullPath,tf,acc);
    }else{
      const size=item.metadata?.size||0;
      acc.total+=size;
      acc.count++;
      acc.byFolder[tf]=(acc.byFolder[tf]||0)+size;
    }
  }
}

function renewWindowOpen(reg){
  const today=new Date().toISOString().slice(0,10);
  const open=reg?.renewOpenDate,close=reg?.releaseDate;
  if(!open||!close)return false;
  return today>=open&&today<=close;
}
function classLimitFor(ev,cls){
  const base=ev?.classLimits?.[cls]?.max||ev?.maxParticipants||null;
  // Early max reduction: if the early deadline has passed and the class hasn't yet reached
  // the reduced count, the cap is lowered to the reduced number (instead of the normal max).
  if(ev?.earlyMaxDate&&ev?.earlyMaxParticipants){
    const today=new Date().toISOString().slice(0,10);
    if(today>=ev.earlyMaxDate&&classCount(ev,cls)<ev.earlyMaxParticipants)return ev.earlyMaxParticipants;
  }
  return base;
}
function classCount(ev,cls){return (ev?.registrations||[]).filter(r=>r.class===cls).length;}
function classFull(ev,cls){const m=classLimitFor(ev,cls);return m?classCount(ev,cls)>=m:false;}

      const removedIds=new Set((state.importedUsers||[]).filter(u=>u.source==="csv-import").map(u=>u.id));
      const imported=(state.importedUsers||[]).filter(u=>u.source!=="csv-import");
      return{...state,importedUsers:imported,users:mergeUsers(state.authProfiles,imported),
        events:state.events.map(ev=>({...ev,registrations:(ev.registrations||[]).filter(r=>!r.imported&&!removedIds.has(r.userId))}))};
    }
    case "SET_UI_PREF":return{...state,uiPrefs:{...(state.uiPrefs||{}),[action.key]:action.value}};
    case "ADD_NOTIFICATION":{
      // Ensure unique id (Date.now() can collide if two are created in the same millisecond)
      const existingIds=new Set((state.notifications||[]).map(n=>n.id));
      let nid=action.payload.id||Date.now();
      while(existingIds.has(nid))nid++;
      return{...state,notifications:[{...action.payload,id:nid},...state.notifications]};
    }
    case "DELETE_NOTIFICATION":return{...state,notifications:(state.notifications||[]).filter(n=>String(n.id)!==String(action.id))};
    case "ADD_DOCUMENT":return{...state,documents:[{...action.payload,id:Date.now()},...state.documents]};
    case "ADD_EVENT_DOCUMENT":return{...state,events:state.events.map(ev=>ev.id===action.eventId?{...ev,documents:[...(ev.documents||[]),action.payload]}:ev)};
    case "REMOVE_EVENT_DOCUMENT":return{...state,events:state.events.map(ev=>ev.id===action.eventId?{...ev,documents:(ev.documents||[]).filter(d=>d.id!==action.docId)}:ev)};
    case "ADD_PENALTY":return{...state,events:state.events.map(ev=>{if(ev.id!==action.eventId)return ev;const ids=new Set((ev.penalties||[]).map(p=>p.id));let pid=action.payload.id||Date.now();while(ids.has(pid))pid++;return{...ev,penalties:[...ev.penalties,{...action.payload,id:pid}]};})};
    case "ADD_INSPECTION":return{...state,events:state.events.map(ev=>ev.id===action.eventId?{...ev,inspections:[...(ev.inspections||[]),{...action.payload,id:Date.now()}]}:ev)};
    case "ADD_TECH_PDF":return{...state,events:state.events.map(ev=>{if(ev.id!==action.eventId)return ev;const ids=new Set((ev.techPdfs||[]).map(p=>p.id));let pid=action.payload.id||Date.now();while(ids.has(pid))pid++;return{...ev,techPdfs:[{...action.payload,id:pid},...(ev.techPdfs||[])]};})};
    case "DELETE_TECH_PDF":return{...state,events:state.events.map(ev=>ev.id===action.eventId?{...ev,techPdfs:(ev.techPdfs||[]).filter(p=>p.id!==action.pdfId)}:ev)};
    case "SET_READY_SIGNAL":{
      const groupKey=(action.groups||[]).slice().sort().join(",");
      return{...state,events:state.events.map(ev=>ev.id===action.eventId?{...ev,readySignals:[
        ...(ev.readySignals||[]).filter(s=>!(s.class===action.cls&&s.session===action.session&&s.stype===action.stype&&(s.groups||[]).slice().sort().join(",")===groupKey)),
        {class:action.cls,session:action.session,stype:action.stype,groups:action.groups||[],time:new Date().toLocaleString("da-DK"),by:action.by}
      ]}:ev)};
    }
    case "CLEAR_ALL_READY_SIGNALS":return{...state,events:state.events.map(ev=>ev.id===action.eventId?{...ev,readySignals:[],inspections:[]}:ev)};
    // Lets an official volunteer ("I can help at this race") or withdraw, with an optional note
    // (e.g. "kun lørdag"). Admin sees who's volunteered and can then assign them a role as usual.
    case "TOGGLE_OFFICIAL_AVAILABLE":return{...state,events:state.events.map(ev=>{
      if(ev.id!==action.eventId)return ev;
      const list=ev.availableOfficials||[];
      const exists=list.some(a=>a.userId===action.userId);
      return{...ev,availableOfficials:exists?list.filter(a=>a.userId!==action.userId):[...list,{userId:action.userId,name:action.name,note:action.note||"",time:new Date().toLocaleString("da-DK")}]};
    })};
    // Merges a live update from another device (via the penalties/ready_signals/notifications
    // realtime subscriptions) into local state, without touching anything else.
    case "_RT_PENALTY_UPSERT":return{...state,events:state.events.map(ev=>{
      if(ev.id!==action.eventId)return ev;
      const exists=(ev.penalties||[]).some(p=>p.id===action.penalty.id);
      return{...ev,penalties:exists?ev.penalties.map(p=>p.id===action.penalty.id?action.penalty:p):[...(ev.penalties||[]),action.penalty]};
    })};
    case "_RT_PENALTY_DELETE":return{...state,events:state.events.map(ev=>ev.id===action.eventId?{...ev,penalties:(ev.penalties||[]).filter(p=>p.id!==action.penaltyId)}:ev)};
    case "_RT_READY_SIGNAL_UPSERT":return{...state,events:state.events.map(ev=>{
      if(ev.id!==action.eventId)return ev;
      const newKey=(action.signal.groups||[]).slice().sort().join(",");
      const filtered=(ev.readySignals||[]).filter(s=>!(s.class===action.signal.class&&s.session===action.signal.session&&s.stype===action.signal.stype&&(s.groups||[]).slice().sort().join(",")===newKey));
      return{...ev,readySignals:[...filtered,action.signal]};
    })};
    case "_RT_READY_SIGNAL_DELETE":return{...state,events:state.events.map(ev=>{
      if(ev.id!==action.eventId)return ev;
      const delKey=(action.signal.groups||[]).slice().sort().join(",");
      return{...ev,readySignals:(ev.readySignals||[]).filter(s=>!(s.class===action.signal.class&&s.session===action.signal.session&&s.stype===action.signal.stype&&(s.groups||[]).slice().sort().join(",")===delKey))};
    })};
    case "_RT_NOTIFICATION_UPSERT":{
      const exists=(state.notifications||[]).some(n=>n.id===action.notification.id);
      return{...state,notifications:exists?state.notifications.map(n=>n.id===action.notification.id?action.notification:n):[action.notification,...state.notifications]};
    }
    case "_RT_NOTIFICATION_DELETE":return{...state,notifications:(state.notifications||[]).filter(n=>String(n.id)!==String(action.id))};
    case "_RT_REGISTRATION_UPSERT":return{...state,events:state.events.map(ev=>{
      if(ev.id!==action.eventId)return ev;
      const exists=(ev.registrations||[]).some(r=>r.userId===action.registration.userId);
      return{...ev,registrations:exists?ev.registrations.map(r=>r.userId===action.registration.userId?action.registration:r):[...(ev.registrations||[]),action.registration]};
    })};
    case "_RT_REGISTRATION_DELETE":return{...state,events:state.events.map(ev=>ev.id===action.eventId?{...ev,registrations:(ev.registrations||[]).filter(r=>r.userId!==action.userId)}:ev)};
    case "_RT_IMPORTED_USER_UPSERT":{
      const exists=(state.importedUsers||[]).some(u=>u.id===action.user.id);
      const imported=exists?state.importedUsers.map(u=>u.id===action.user.id?action.user:u):[...(state.importedUsers||[]),action.user];
      return{...state,importedUsers:imported,users:mergeUsers(state.authProfiles,imported)};
    }
    case "_RT_IMPORTED_USER_DELETE":{
      const imported=(state.importedUsers||[]).filter(u=>u.id!==action.id);
      return{...state,importedUsers:imported,users:mergeUsers(state.authProfiles,imported)};
    }
    case "UPDATE_OFFICIAL_EVENTS":{
      const profiles=(state.authProfiles||[]).map(u=>u.id===action.userId?{...u,approvedEvents:action.events}:u);
      const imported=(state.importedUsers||[]).map(u=>u.id===action.userId?{...u,approvedEvents:action.events}:u);
      return{...state,authProfiles:profiles,importedUsers:imported,users:mergeUsers(profiles,imported)};
    }
    case "SET_LICENSE_CHECK":return{...state,events:state.events.map(ev=>ev.id===action.eventId?{...ev,licenseChecks:{...(ev.licenseChecks||{}),[(action.userId+"_"+action.field)]:action.value}}:ev)};
    case "SET_FRIDAY_PAID":return{...state,events:state.events.map(ev=>ev.id===action.eventId?{...ev,fridayPaid:{...(ev.fridayPaid||{}),[(action.userId)]:action.value}}:ev)};
    case "TOGGLE_EVENT_ROLE_OFFICIAL":{
      // action.role = "noseOfficials" | "weightOfficials", max 3
      return{...state,events:state.events.map(ev=>{
        if(ev.id!==action.eventId)return ev;
        const cur=ev[action.role]||[];
        let next;
        if(cur.includes(action.userId))next=cur.filter(x=>x!==action.userId);
        else{if(cur.length>=3)return ev;next=[...cur,action.userId];}
        return{...ev,[action.role]:next};
      })};
    }
    case "DELETE_USER":{
      const profiles=(state.authProfiles||[]).filter(u=>u.id!==action.id);
      const imported=(state.importedUsers||[]).filter(u=>u.id!==action.id);
      return{...state,authProfiles:profiles,importedUsers:imported,users:mergeUsers(profiles,imported),currentUser:state.currentUser?.id===action.id?state.currentUser:state.currentUser};
    }
    case "ADD_CLASS":return{...state,classRules:{...state.classRules,[action.name]:{min:action.min,max:action.max,color:action.color||C.red,seriesIds:action.seriesIds||[],byYear:!!action.byYear,useKartRegister:action.useKartRegister!==false}}};
    case "UPDATE_CLASS":{const{[action.oldName]:_,...rest}=state.classRules;return{...state,classRules:{...rest,[action.name]:{min:action.min,max:action.max,color:action.color||C.red,seriesIds:action.seriesIds||[],byYear:!!action.byYear,useKartRegister:action.useKartRegister!==false}}};}
    case "DELETE_CLASS":{const{[action.name]:_,...rest}=state.classRules;return{...state,classRules:rest};}
    default:return state;
  }
}

// Draws the GridControl 3x3 starting-grid logo onto a canvas at (x,y), matching the SVG Logo component.
function drawLogoOnCanvas(ctx,x,y,size){
  const cell=size*0.153,gap=cell*0.18,pad=size*0.278;
  const colors=[["#E30613","#E30613","#E30613"],["#3a3a3a","#555555","#3a3a3a"],["#262626","#3a3a3a","#262626"]];
  ctx.save();
  ctx.fillStyle="#141414";ctx.strokeStyle="#2E2E2E";ctx.lineWidth=1;
  roundRectPath(ctx,x,y,size,size,size*0.21);ctx.fill();ctx.stroke();
  for(let r=0;r<3;r++)for(let c=0;c<3;c++){
    ctx.fillStyle=colors[r][c];
    const cx=x+pad+c*(cell+gap),cy=y+pad+r*(cell+gap);
    roundRectPath(ctx,cx,cy,cell,cell,cell*0.18);ctx.fill();
  }
  ctx.restore();
}
function roundRectPath(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}
// Renders a wallet-sized driver ID card (name, ID/license number, class, year, Code128 barcode of the
// ID number, and the GridControl logo) and triggers a PNG download.
async function downloadIdCard(u){
  if(document.fonts&&document.fonts.ready)await document.fonts.ready;
  const W=1050,H=660;
  const canvas=document.createElement("canvas");
  canvas.width=W;canvas.height=H;
  const ctx=canvas.getContext("2d");

  // Background
  ctx.fillStyle="#0D0D0D";
  roundRectPath(ctx,0,0,W,H,32);ctx.fill();
  const grad=ctx.createLinearGradient(0,0,W,H);
  grad.addColorStop(0,"#181818");grad.addColorStop(1,"#0D0D0D");
  ctx.fillStyle=grad;
  roundRectPath(ctx,6,6,W-12,H-12,28);ctx.fill();
  ctx.strokeStyle="#2E2E2E";ctx.lineWidth=2;
  roundRectPath(ctx,6,6,W-12,H-12,28);ctx.stroke();
  ctx.strokeStyle="#E30613";ctx.lineWidth=6;
  ctx.beginPath();ctx.moveTo(40,H-40);ctx.lineTo(140,H-40);ctx.stroke();

  // Logo
  drawLogoOnCanvas(ctx,48,44,66);
  ctx.textBaseline="alphabetic";
  ctx.font="800 34px 'Barlow Condensed',Arial,sans-serif";
  ctx.fillStyle="#F5F5F5";ctx.fillText("GRID",130,80);
  const gridW=ctx.measureText("GRID").width;
  ctx.fillStyle="#E30613";ctx.fillText("CONTROL",130+gridW,80);

  // "DRIVER ID" label + year, top right
  ctx.textAlign="right";
  ctx.font="700 18px 'Barlow',Arial,sans-serif";
  ctx.fillStyle="#888888";ctx.fillText("KØRER-ID",W-48,54);
  ctx.font="900 30px 'Barlow Condensed',Arial,sans-serif";
  ctx.fillStyle="#F5F5F5";ctx.fillText(String(new Date().getFullYear()),W-48,86);
  ctx.textAlign="left";

  // Name
  ctx.font="900 52px 'Barlow Condensed',Arial,sans-serif";
  ctx.fillStyle="#F5F5F5";
  ctx.fillText(u.name||"",48,210);

  // Class
  ctx.font="700 22px 'Barlow',Arial,sans-serif";
  ctx.fillStyle="#888888";ctx.fillText("KLASSE",48,254);
  ctx.font="700 30px 'Barlow',Arial,sans-serif";
  ctx.fillStyle="#E30613";ctx.fillText(u.class||"–",48,290);

  // ID/license number
  ctx.font="700 22px 'Barlow',Arial,sans-serif";
  ctx.fillStyle="#888888";ctx.fillText("ID-NUMMER",48,340);
  ctx.font="700 36px monospace";
  ctx.fillStyle="#F5F5F5";
  const idNumber=u.license||String(u.id).slice(0,10);
  ctx.fillText(idNumber,48,378);

  // Barcode (Code128, encoding the ID number) on a white panel near the bottom
  const barcodeCanvas=document.createElement("canvas");
  try{
    window.JsBarcode(barcodeCanvas,idNumber,{format:"CODE128",width:3,height:80,margin:0,displayValue:false,background:"#ffffff",lineColor:"#000000"});
  }catch(e){
    // Fall back to a placeholder if the ID number contains characters Code128 can't encode
    window.JsBarcode(barcodeCanvas,String(u.id),{format:"CODE128",width:3,height:80,margin:0,displayValue:false,background:"#ffffff",lineColor:"#000000"});
  }
  const panelX=48,panelY=430,panelW=W-96,panelH=140;
  ctx.fillStyle="#ffffff";
  roundRectPath(ctx,panelX,panelY,panelW,panelH,10);ctx.fill();
  const bw=Math.min(panelW-40,barcodeCanvas.width*((panelH-50)/barcodeCanvas.height));
  const bh=(panelH-50);
  const bx=panelX+(panelW-bw)/2,by=panelY+16;
  ctx.drawImage(barcodeCanvas,bx,by,bw,bh);
  ctx.fillStyle="#111111";
  ctx.font="700 20px monospace";
  ctx.textAlign="center";
  ctx.fillText(idNumber,panelX+panelW/2,panelY+panelH-16);
  ctx.textAlign="left";

  canvas.toBlob(async(blob)=>{
    const filename=`GridControl-ID-${(u.name||"kort").replace(/[^a-z0-9]/gi,"_")}.png`;
    const file=new File([blob],filename,{type:"image/png"});
    // iOS Safari doesn't reliably support the download attribute for blob URLs – it just opens
    // the image instead of saving it. The Share Sheet (with "Save Image"/"Add to Photos") is the
    // correct native way to save a generated image on iPhone/iPad, so prefer that when available.
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      try{
        await navigator.share({files:[file],title:"GridControl ID-kort"});
        return;
      }catch(e){/* user cancelled the share sheet, or share failed – fall through to direct download */}
    }
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download=filename;
    a.click();
    URL.revokeObjectURL(url);
  },"image/png");
}


function exportCSV(rows,headers,filename){
  const csv=[headers,...rows.map(r=>headers.map(h=>r[h]||""))].map(r=>r.map(c=>`"${String(c||"").replace(/"/g,'""')}"`).join(",")).join("\n");
  const b=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"});
  const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=filename+".csv";a.click();URL.revokeObjectURL(u);
}

function SignupScreen({onBack,onDone,clubs,dispatch,state}){
  const t=useT();
  const [type,setType]=useState("driver");
  const [f,setF]=useState({name:"",email:"",pw:"",pw2:"",phone:"",dob:"",license:"",transponder:"",club:"",country:"DK"});
  const [err,setErr]=useState("");const [busy,setBusy]=useState(false);
  const [confirmMsg,setConfirmMsg]=useState("");
  const set=(k,v)=>setF(o=>({...o,[k]:v}));
  const lang=useLang();

  // At least 10 characters, a digit, at least 2 letters (one of them uppercase), and one special character.
  const passwordValid=(pw)=>{
    if(pw.length<10)return false;
    if(!/\d/.test(pw))return false;
    const letters=pw.match(/[a-zA-Z]/g)||[];
    if(letters.length<2)return false;
    if(!/[A-Z]/.test(pw))return false;
    if(!/[^a-zA-Z0-9]/.test(pw))return false;
    return true;
  };

  const submit=async()=>{
    setErr("");
    if(!f.name.trim())return setErr(t.writeName);
    if(!f.email.trim())return setErr(t.writeEmail);
    if(!f.dob)return setErr(t.dobRequired);
    if(!passwordValid(f.pw))return setErr(t.pwRequirements);
    if(f.pw!==f.pw2)return setErr(t.pwMismatch);
    if(!sb)return setErr(t.notConfigured);
    setBusy(true);
    try{
      const {data,error}=await sb.auth.signUp({email:f.email.trim(),password:f.pw});
      if(error){setErr(error.message);setBusy(false);return;}
      const uid=data.user?.id;
      if(!uid){setErr("Kunne ikke oprette bruger – prøv igen");setBusy(false);return;}
      const baseType=type==="official"?"driver":type;
      const newUser={id:uid,type:baseType,name:f.name.trim(),email:f.email.trim(),phone:f.phone,dob:f.dob,
        license:f.license,transponder:f.transponder,club:f.club,country:f.country,isAdmin:false,isOfficial:type==="official",approvedEvents:[],licenseValid:null};
      const row=userToRow(newUser);
      const {error:pErr}=await sb.from("profiles").upsert(row);
      if(pErr){setErr("Konto oprettet, men profil fejlede: "+pErr.message);setBusy(false);return;}
      if(data.session){
        // Supabase returned an active session immediately (email confirmation is off) — actually log them in.
        dispatch&&dispatch({type:"LOGIN",payload:rowToUser(row)});
        onDone&&onDone();
      }else{
        // No session yet — Supabase requires email confirmation before login is possible.
        setConfirmMsg(t.confirmEmailMsg);
      }
    }catch(e){setErr(String(e.message||e));}
    setBusy(false);
  };

  if(confirmMsg)return <div style={{padding:24,display:"flex",flexDirection:"column",height:"100%",justifyContent:"center",textAlign:"center"}}>
    <div style={{fontSize:36,marginBottom:12}}>📧</div>
    <div style={{color:C.text,fontSize:15,fontWeight:700,marginBottom:8}}>{confirmMsg}</div>
    <Btn onClick={onBack} style={{marginTop:14}}>{t.back}</Btn>
  </div>;


  return <div style={{padding:24,display:"flex",flexDirection:"column",height:"100%",justifyContent:"center",overflowY:"auto"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
      <button onClick={onBack} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:6,padding:"5px 12px",color:C.textMuted,cursor:"pointer",fontFamily:"inherit"}}>{t.back}</button>
      <LangBar state={state} dispatch={dispatch}/>
    </div>
    <div style={{textAlign:"center",marginBottom:20}}><Logo size={36}/></div>
    <div style={{fontSize:18,fontWeight:700,color:C.text,marginBottom:14,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:1}}>{t.signupTitle.toUpperCase()}</div>
    <div style={{color:C.textMuted,fontSize:10,letterSpacing:1,marginBottom:6}}>{t.iAm.toUpperCase()}</div>
    <div style={{display:"flex",gap:6,marginBottom:14}}>
      {[["driver","🏎️",t.roleDriver,C.red],["parent","👨‍👩‍👧",t.roleParent,C.blue],["official","🏁",t.roleOfficial,C.purple]].map(([val,icon,label,col])=>
        <button key={val} onClick={()=>setType(val)} style={{flex:1,background:type===val?col+"22":C.surface2,border:`2px solid ${type===val?col:C.border}`,borderRadius:8,padding:"8px 4px",cursor:"pointer",textAlign:"center",fontFamily:"inherit"}}>
          <div style={{fontSize:18}}>{icon}</div><div style={{color:type===val?col:C.textMuted,fontWeight:type===val?700:400,fontSize:11}}>{label}</div>
        </button>
      )}
    </div>
    <Input label={t.name+" *"} value={f.name} onChange={v=>set("name",v)} placeholder={t.name}/>
    <Sel label={lang==="en"?"Country / nationality":"Land / nationalitet"} value={f.country} onChange={v=>set("country",v)} options={countryOptions(lang)}/>
    <Input label={t.email+" *"} value={f.email} onChange={v=>set("email",v)} placeholder="din@email.dk" type="email"/>
    <Input label={t.password+" *"} value={f.pw} onChange={v=>set("pw",v)} type="password" placeholder="••••••••••"/>
    <div style={{color:C.textMuted,fontSize:11,lineHeight:1.4,background:C.surface2,border:`1px solid ${C.border}`,borderRadius:6,padding:"6px 10px",margin:"-6px 0 10px"}}>🔒 {t.pwRequirementsHint}</div>

    <div style={{color:C.textDim,fontSize:11,margin:"4px 0 10px"}}>{t.optionalNote}</div>

    {(clubs&&clubs.length)
      ?<Sel label={t.club} value={f.club} onChange={v=>set("club",v)} options={[{value:"",label:"Vælg klub..."},...clubs.slice().sort((a,b)=>a.name.localeCompare(b.name,"da")).map(c=>({value:c.name,label:c.name}))]}/>
      :<Input label={t.club} value={f.club} onChange={v=>set("club",v)} placeholder={t.club}/>}
    {err&&<div style={{color:C.red,fontSize:12,marginBottom:8,textAlign:"center"}}>{err}</div>}
    <Btn onClick={submit} disabled={busy} style={{width:"100%"}}>{busy?t.creating:t.createLogin.toUpperCase()}</Btn>
  </div>;
}

        </div>

          {(()=>{

function ChildManager({u,state,dispatch}){
  const t=useT();
  const lang=useLang();
  const children=childrenOf(state.users,u);
  const CLASSES=sortClassesByAge(Object.keys(state.classRules||{}),state.classRules);
  const [mode,setMode]=useState(null); // null | "add" | editId
  const [releaseId,setReleaseId]=useState(null);
  const [f,setF]=useState({name:"",dob:"",license:"",transponder:"",class:"",kartNumber:"",club:"",phone:"",email:"",country:"DK"});
  const [rel,setRel]=useState({email:"",pw:"",pw2:""});
  const [err,setErr]=useState("");const [busy,setBusy]=useState(false);const [msg,setMsg]=useState("");
  const set=(k,v)=>setF(o=>({...o,[k]:v}));

  const startAdd=()=>{setF({name:"",dob:"",license:"",transponder:"",class:"",kartNumber:"",club:"",phone:"",email:"",country:u.country||"DK"});setErr("");setMode("add");};
  const startEdit=(c)=>{setF({name:c.name||"",dob:c.dob||"",license:c.license||"",transponder:c.transponder||"",class:c.class||"",kartNumber:c.kartNumber||"",club:c.club||"",phone:c.phone||"",email:c.email||"",country:c.country||"DK"});setErr("");setMode(c.id);};

  const save=()=>{
    setErr("");
    if(!f.name.trim()){setErr("Skriv barnets navn");return;}
    const payload={name:f.name.trim(),dob:f.dob,license:f.license,transponder:f.transponder,class:f.class,kartNumber:parseInt(f.kartNumber)||undefined,club:f.club,phone:f.phone,email:f.email.trim(),country:f.country};
    if(mode==="add"){
      const childId="child-"+Date.now();
      dispatch({type:"ADD_CHILD",parentId:u.id,childId,payload:payload,_newChildIds:[...(u.childIds||[]),childId]});
    }
    else{dispatch({type:"UPDATE_USER",payload:{id:mode,...payload}});}
    setMode(null);
  };

  const doRelease=async(child)=>{
    setErr("");
    if(!rel.email.trim()){setErr("Barnet skal have en e-mail for at kunne frigives");return;}
    if(rel.email.trim().toLowerCase()===(u.email||"").toLowerCase()){setErr("E-mailen må ikke være forælderens egen e-mail");return;}
    if(rel.pw.length<6){setErr("Midlertidig adgangskode skal være mindst 6 tegn");return;}
    if(rel.pw!==rel.pw2){setErr("Adgangskoderne er ikke ens");return;}
    if(!sb){setErr("Supabase er ikke konfigureret");return;}
    setBusy(true);
    try{
      // Create an Auth user for the child. NB: this logs the child into the current session,
      // so we save the parent's session and restore it afterward.
      const {data:parentSession}=await sb.auth.getSession();
      const {data,error}=await sb.auth.signUp({email:rel.email.trim(),password:rel.pw});
      if(error){setErr(error.message);setBusy(false);return;}
      const newId=data.user?.id;
      if(!newId){setErr("Kunne ikke oprette login – prøv igen");setBusy(false);return;}
      // Create the child's profile row
      const row=userToRow({...child,id:newId,parentId:null,email:rel.email.trim(),isAdmin:false});
      const {error:pErr}=await sb.from("profiles").upsert(row);
      if(pErr){setErr("Login oprettet, men profil fejlede: "+pErr.message);setBusy(false);return;}
      // Remove the child from the parent's childIds in the parent's profile row
      await sb.from("profiles").update({child_ids:(u.childIds||[]).filter(cid=>cid!==child.id)}).eq("id",u.id);
      // Restore the parent's session (signUp switched it to the child)
      if(parentSession?.session){
        await sb.auth.setSession({access_token:parentSession.session.access_token,refresh_token:parentSession.session.refresh_token});
      }
      dispatch({type:"RELEASE_CHILD",parentId:u.id,childId:child.id,newId,email:rel.email.trim()});

function PushToggle({u}){
  const t=useT();
  const [status,setStatus]=useState("idle"); // idle | on | busy | error | unsupported
  const [msg,setMsg]=useState("");
  useEffect(()=>{
    if(!pushSupported()){setStatus("unsupported");return;}
    // Check if we already have an active subscription
    navigator.serviceWorker.ready.then(reg=>reg.pushManager.getSubscription()).then(sub=>{
      if(sub&&Notification.permission==="granted")setStatus("on");
    }).catch(()=>{});
  },[]);
  const isStandalone=window.matchMedia&&window.matchMedia("(display-mode: standalone)").matches||window.navigator.standalone===true;
  const isiOS=/iphone|ipad|ipod/i.test(navigator.userAgent);

  const turnOn=async()=>{
    setStatus("busy");setMsg("");
    try{
      await enablePush(u.id);
      setStatus("on");
    }catch(e){
      setStatus("error");
      if(e.message==="denied")setMsg("Du afviste tilladelsen. Slå notifikationer til i browserens/telefonens indstillinger for GridControl.");
      else if(e.message==="no-vapid")setMsg("Push-serveren er ikke sat op endnu (mangler VAPID-nøgle).");
      else if(e.message==="unsupported")setMsg("Denne enhed/browser understøtter ikke push.");
      else setMsg("Kunne ikke slå notifikationer til. Prøv igen.");
    }
  };
  const turnOff=async()=>{setStatus("busy");await disablePush(u.id);setStatus("idle");};

  return <Card style={{borderLeft:`3px solid ${C.blue}`}}>
    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
      <span style={{fontSize:16}}>🔔</span>
      <div>
        <div style={{color:C.text,fontSize:13,fontWeight:700}}>{t.colName==="Navn"?"Push-notifikationer":"Push notifications"}</div>
        <div style={{color:C.textMuted,fontSize:11}}>{t.colName==="Navn"?"Få besked på telefonen – også når appen er lukket":"Get alerts on your phone – even when the app is closed"}</div>
      </div>
    </div>
    {status==="unsupported"&&<div style={{color:C.textMuted,fontSize:12}}>{t.colName==="Navn"?"Denne enhed understøtter ikke push-notifikationer.":"This device does not support push notifications."}</div>}
    {status!=="unsupported"&&isiOS&&!isStandalone&&<div style={{background:`${C.orange}18`,border:`1px solid ${C.orange}44`,borderRadius:8,padding:10,marginBottom:8,color:C.orange,fontSize:11}}>{t.colName==="Navn"?"På iPhone/iPad skal appen først tilføjes til hjemmeskærmen (via Del → Føj til hjemmeskærm), før notifikationer kan slås til.":"On iPhone/iPad, add the app to your home screen first (Share → Add to Home Screen) before enabling notifications."}</div>}
    {msg&&<div style={{color:C.orange,fontSize:11,marginBottom:8}}>{msg}</div>}
    {status==="on"
      ? <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{color:C.green,fontSize:12,fontWeight:700}}>✓ {t.colName==="Navn"?"Slået til":"Enabled"}</span>
          <Btn small variant="ghost" onClick={turnOff}>{t.colName==="Navn"?"Slå fra":"Turn off"}</Btn>
        </div>
      : <Btn small onClick={turnOn} disabled={status==="busy"||(isiOS&&!isStandalone)}>{status==="busy"?"...":(t.colName==="Navn"?"Slå notifikationer til":"Enable notifications")}</Btn>
    }
  </Card>;
}

function ProfileScreen({state,dispatch}){

  const checkLicense=async(file)=>{
    setChecking(true);setLicMsg(t.analyzing);
    const reader=new FileReader();
    reader.onload=async(e)=>{
      const b64=e.target.result.split(",")[1];
      try{
        const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:200,messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:file.type,data:b64}},{type:"text",text:'Er dette et gyldigt DASU karting kørerlicens 2026? Svar KUN JSON: {"valid":true/false,"year":"årstal","reason":"kort forklaring"}'}]}]})});
        const data=await res.json();const txt=data.content?.[0]?.text||"{}";
        const p=JSON.parse(txt.replace(/```json|```/g,"").trim());
        const ok=p.valid&&(p.year==="2026"||p.year===2026);
        setLicMsg(p.reason||(ok?"Godkendt ✓":"Ugyldig ✗"));
        dispatch({type:"UPDATE_USER",payload:{id:u.id,licenseValid:ok,licenseImg:e.target.result}});

          {u.isOfficial&&<Badge color={C.purple}>OFFICIAL</Badge>}
          {u.isAdmin&&<Badge color={C.orange}>ADMIN</Badge>}
        </div>

        <button onClick={toggleOfficial} style={{background:u.isOfficial?`${C.purple}33`:C.surface2,border:`1px solid ${u.isOfficial?C.purple:C.border}`,borderRadius:20,padding:"5px 14px",color:u.isOfficial?C.purple:C.textMuted,cursor:"pointer",fontWeight:700,fontSize:12,fontFamily:"inherit"}}>{u.isOfficial?"✓ "+t.active.toUpperCase():t.inactive.toUpperCase()}</button>
      </div>

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>

        <div style={{color:C.textMuted,fontSize:11}}>{p.session} · {p.reason}</div>
      </div>)}
    </Card>
    <Card style={{borderLeft:`3px solid ${C.red}`}}>
      <div style={{color:C.textMuted,fontSize:10,letterSpacing:2,marginBottom:8}}>NOTIFIKATIONER ({notifs.length})</div>
      {notifs.length===0?<div style={{color:C.textDim,fontSize:12}}>Ingen notifikationer</div>:notifs.map((n,i)=><div key={i} style={{padding:"6px 0",borderBottom:i<notifs.length-1?`1px solid ${C.border}`:"none"}}>
        <div style={{fontWeight:700,color:C.text,fontSize:12}}>{n.title}</div>
        <div style={{color:C.textMuted,fontSize:11}}>{n.body}</div>
      </div>)}
    </Card>
  </div>;
}

function CalendarScreen({state,dispatch}){
  const t=useT();
  const u=state.currentUser;
  const [selRaw,setSel]=useState(null);
  // Always re-derive the live event from state.events (instead of using the stale snapshot captured
  // at the moment of selection), so changes made elsewhere — e.g. offering to help — show up
  // immediately instead of only after leaving this screen and coming back.
  const sel=selRaw?(state.events.find(e=>e.id===selRaw.id)||selRaw):null;
  const [step,setStep]=useState(0);
  const [showOverview,setShowOverview]=useState(false);
  const [regFor,setRegFor]=useState("self");
  const [selClass,setSelClass]=useState("");
  const [paddock,setPaddock]=useState("");const [paddockNote,setPaddockNote]=useState("");
  const [slicks,setSlicks]=useState([]);const [slickRes,setSlickRes]=useState("");
  const [wets,setWets]=useState([]);const [wetRes,setWetRes]=useState("");
  const [tyreMode,setTyreMode]=useState(false);
  const [showInfoPopup,setShowInfoPopup]=useState(false);
  const [helperNote,setHelperNote]=useState("");
  const [evTab,setEvTab]=useState("upcoming");

  const children=childrenOf(state.users,u);
  const regUser=regFor==="self"?u:state.users.find(x=>x.id===regFor)||u;
  const isReg=ev=>ev.registrations.some(r=>r.userId===regUser?.id);
  const myEligible=[...eligibleClasses(regUser?.dob,state.classRules),...(regUser?.dispensations||[])].filter((v,i,a)=>a.indexOf(v)===i);

  const scanTyre=(list,setList,max=4)=>()=>{if(list.length<max)setList(l=>[...l,`EAN-${String(Math.floor(Math.random()*9000)+1000)}`]);};

  const kartCheck=(cls)=>{
    // If this class doesn't use the kart number register, drivers can register with whatever
    // number is on their profile — it just can't be missing or 0.
    if(state.classRules[cls]?.useKartRegister===false){
      const num=regUser?.kartNumber;
      if(!num||parseInt(num)===0)return{ok:false,msg:`${regUser?.name}${t.admNoKartNumberError}`};
      return{ok:true,msg:""};
    }
    // Only Danish drivers need a number in the registry. Foreign drivers can register freely.
    if(!isDanish(regUser))return{ok:true,msg:""};
    const reg=state.kartRegister||{ranges:{},numbers:{}};
    const regNum=myKartInClass(reg,cls,regUser?.id);
    const profNum=regUser?.kartNumber;
    if(!kartRange(reg,cls))return{ok:true,msg:""};
    if(!regNum)return{ok:false,msg:`${regUser?.name} har ikke valgt et kartnummer i ${cls}. Vælg nummer under "Kartnummer" før tilmelding.`};
    if(profNum&&parseInt(profNum)!==regNum)return{ok:false,msg:`Kartnummeret på profilen (#${profNum}) stemmer ikke med registeret (#${regNum}) i ${cls}. Ret det før tilmelding.`};
    return{ok:true,msg:""};
  };

  const finishReg=()=>{
    const cls=selClass||(sel?.classes.filter(c=>myEligible.includes(c))[0])||"";
    if(classFull(sel,cls))return;
    if(!kartCheck(cls).ok)return;
    dispatch({type:"REGISTER",eventId:sel.id,payload:{userId:regUser.id,class:cls,paddockSpace:paddock,slicks,slickReserve:slickRes,wets,wetReserve:wetRes,paid:true}});
    setStep(0);setSel(null);setPaddock("");setSlicks([]);setSlickRes("");setWets([]);setWetRes("");setRegFor("self");setTyreMode(false);
  };

  if(sel&&step>0){
    const pm=sel.paymentDestination||{};
    const evClasses=sortClassesByAge(sel.classes.filter(c=>myEligible.includes(c)),state.classRules);
    return <div style={{padding:16,overflowY:"auto",height:"100%"}}>
      <Btn small variant="ghost" onClick={()=>setStep(step>1?(step===3&&!TYRE_REGISTRATION_ENABLED?1:step-1):0)} style={{marginBottom:12}}>{t.back}</Btn>
      <SH title={sel.name} sub={`Trin ${TYRE_REGISTRATION_ENABLED?step:(step===3?2:step)} af ${TYRE_REGISTRATION_ENABLED?3:2}`}/>
      {step===1&&<div>
        {children.length>0&&<Card style={{marginBottom:10}}>
          <div style={{color:C.textMuted,fontSize:10,letterSpacing:2,marginBottom:8}}>TILMELD HVEM?</div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            <button onClick={()=>setRegFor("self")} style={{background:regFor==="self"?`${C.red}22`:C.surface2,border:`1px solid ${regFor==="self"?C.red:C.border}`,borderRadius:6,padding:"8px 12px",color:regFor==="self"?C.red:C.textMuted,cursor:"pointer",fontFamily:"inherit",textAlign:"left",fontSize:13,fontWeight:700}}>{t.registerSelf} – {u.name}</button>
            {children.map(c=><button key={c.id} onClick={()=>setRegFor(c.id)} style={{background:regFor===c.id?`${C.blue}22`:C.surface2,border:`1px solid ${regFor===c.id?C.blue:C.border}`,borderRadius:6,padding:"8px 12px",color:regFor===c.id?C.blue:C.textMuted,cursor:"pointer",fontFamily:"inherit",textAlign:"left",fontSize:13,fontWeight:700}}>{t.registerChild}: {c.name} – {c.class}</button>)}
          </div>
        </Card>}
        <Card>
          <div style={{color:C.textMuted,fontSize:10,letterSpacing:2,marginBottom:8}}>OPLYSNINGER</div>
          {[["Navn",regUser?.name],["Licens",regUser?.license],["Transponder",regUser?.transponder],["Kart #",regUser?.kartNumber]].map(([k,v])=><div key={k} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:`1px solid ${C.border}`}}><span style={{color:C.textMuted,fontSize:12}}>{k}</span><span style={{color:C.text,fontWeight:600,fontSize:12}}>{v}</span></div>)}
          <div style={{marginTop:8,padding:8,background:regUser?.licenseValid?`${C.green}11`:`${C.orange}11`,borderRadius:6,display:"flex",gap:8,alignItems:"center"}}>
            <span>{regUser?.licenseValid?"✅":"⚠️"}</span>
            <span style={{color:regUser?.licenseValid?C.green:C.orange,fontSize:12,fontWeight:700}}>{regUser?.licenseValid?"Licens godkendt":"Licens ikke verificeret"}</span>
          </div>
        </Card>
        {evClasses.length>0&&<Sel label="Klasse (aldersgodkendt)" value={selClass||evClasses[0]} onChange={setSelClass} options={evClasses.map(c=>{const m=classLimitFor(sel,c);const n=classCount(sel,c);return{value:c,label:c+(m?` (${n}/${m}${n>=m?" – FULD":""})`:"")};})}/>}
        {classFull(sel,selClass||evClasses[0])&&<div style={{background:`${C.red}11`,border:`1px solid ${C.red}44`,borderRadius:6,padding:10,marginBottom:10,color:C.red,fontSize:12,fontWeight:700}}>⚠️ Klassen er fuld – vælg en anden klasse hvis muligt</div>}
        <div style={{marginBottom:10}}>
          <div style={{color:C.textMuted,fontSize:10,letterSpacing:1,marginBottom:6,textTransform:"uppercase"}}>Ryttergård mål</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:6}}>
            <Input label="Front / Længde (m)" value={paddock} onChange={setPaddock} placeholder="f.eks. 6"/>
            <Input label="Side / Dybde (m)" value={paddockNote} onChange={setPaddockNote} placeholder="f.eks. 4"/>
          </div>
          <input value={paddockNote.length>1?"":""} style={{display:"none"}}/>
        </div>
        <Btn onClick={()=>setStep(TYRE_REGISTRATION_ENABLED?2:3)} style={{width:"100%"}}>FORTSÆT →</Btn>
      </div>}
      {step===2&&TYRE_REGISTRATION_ENABLED&&<div>
        <div style={{marginBottom:10,display:"flex",gap:8,alignItems:"center"}}>
          <div style={{color:C.textMuted,fontSize:12}}>Dæk-registrering er valgfrit</div>
          <button onClick={()=>setTyreMode(!tyreMode)} style={{background:tyreMode?`${C.green}22`:C.surface2,border:`1px solid ${tyreMode?C.green:C.border}`,borderRadius:20,padding:"4px 12px",color:tyreMode?C.green:C.textMuted,cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>{tyreMode?"✓ Tilvalgt":"+ Tilføj dæk"}</button>
        </div>
        {tyreMode&&<div>
          <Card>
            <div style={{color:C.textMuted,fontSize:10,letterSpacing:2,marginBottom:8}}>SLICKS ({slicks.length}/4)</div>
            {slicks.map((s,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:`1px solid ${C.border}`}}><span style={{color:C.textMuted,fontSize:11}}>Slick {i+1}</span><span style={{color:C.text,fontFamily:"monospace",fontSize:12}}>{s}</span></div>)}
            {slicks.length<4&&<div onClick={scanTyre(slicks,setSlicks,4)} style={{textAlign:"center",padding:"10px",background:C.bg,borderRadius:6,border:`2px dashed ${C.border}`,cursor:"pointer",marginTop:6}}><div style={{fontSize:18}}>📷</div><div style={{color:C.text,fontSize:12,fontWeight:700}}>Scan slick</div></div>}
            <Input label="Reserve slick (valgfrit)" value={slickRes} onChange={setSlickRes} placeholder="EAN-XXXX" style={{marginTop:8}}/>
          </Card>
          <Card>
            <div style={{color:C.textMuted,fontSize:10,letterSpacing:2,marginBottom:8}}>WET ({wets.length}/4)</div>
            {wets.map((w,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:`1px solid ${C.border}`}}><span style={{color:C.textMuted,fontSize:11}}>Wet {i+1}</span><span style={{color:C.text,fontFamily:"monospace",fontSize:12}}>{w}</span></div>)}
            {wets.length<4&&<div onClick={scanTyre(wets,setWets,4)} style={{textAlign:"center",padding:"10px",background:C.bg,borderRadius:6,border:`2px dashed ${C.border}`,cursor:"pointer",marginTop:6}}><div style={{fontSize:18}}>📷</div><div style={{color:C.text,fontSize:12,fontWeight:700}}>Scan wet</div></div>}
            <Input label="Reserve wet (valgfrit)" value={wetRes} onChange={setWetRes} placeholder="EAN-XXXX" style={{marginTop:8}}/>
          </Card>
        </div>}
        <Btn onClick={()=>setStep(3)} style={{width:"100%"}}>FORTSÆT →</Btn>
      </div>}
      {step===3&&<div>
        <Card>
          <div style={{color:C.textMuted,fontSize:10,letterSpacing:2,marginBottom:10}}>ORDREOVERSIGT</div>
          {[["Gebyr",`${sel.fee} kr.`],["Klasse",selClass||sel.classes.filter(c=>myEligible.includes(c))[0]||""],["Ryttergård",(paddock&&paddockNote)?`${paddock}m × ${paddockNote}m`:paddock||"—"],["Slicks",slicks.length+" stk"],["Wets",wets.length+" stk"]].map(([k,v])=><div key={k} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:`1px solid ${C.border}`}}><span style={{color:C.textMuted,fontSize:12}}>{k}</span><span style={{color:C.text,fontWeight:600,fontSize:12}}>{v}</span></div>)}
          <div style={{display:"flex",justifyContent:"space-between",marginTop:8}}><span style={{fontWeight:700,color:C.text}}>TOTAL</span><span style={{fontWeight:900,color:C.red,fontSize:18}}>{sel.fee} kr.</span></div>
          <div style={{marginTop:8,padding:8,background:C.surface2,borderRadius:6,fontSize:11,color:C.textMuted}}>Betaling: <strong style={{color:C.text}}>{pm.type==="mobilepay"?`MobilePay #${pm.number}`:"Betalingskort (Stripe)"}</strong></div>
        </Card>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
          <div style={{background:C.surface2,border:`1px solid ${C.border}`,borderRadius:8,padding:12,textAlign:"center",cursor:"pointer"}}><div style={{fontSize:22}}>📱</div><div style={{fontWeight:700,fontSize:12,color:C.text}}>MobilePay</div></div>
          <div style={{background:C.surface2,border:`1px solid ${C.border}`,borderRadius:8,padding:12,textAlign:"center",cursor:"pointer"}}><div style={{fontSize:22}}>💳</div><div style={{fontWeight:700,fontSize:12,color:C.text}}>Kort</div></div>
        </div>
        {(()=>{
          const cls=selClass||sel.classes.filter(c=>myEligible.includes(c))[0]||"";
          if(classFull(sel,cls))return <div style={{background:`${C.red}11`,border:`1px solid ${C.red}44`,borderRadius:8,padding:12,textAlign:"center",color:C.red,fontWeight:700,fontSize:13}}>⚠️ Klassen er fuld – tilmelding ikke mulig</div>;
          const kc=kartCheck(cls);
          if(!kc.ok)return <div style={{background:`${C.red}11`,border:`1px solid ${C.red}44`,borderRadius:8,padding:12,textAlign:"center",color:C.red,fontWeight:700,fontSize:12}}>⚠️ {kc.msg}</div>;
          return <Btn onClick={finishReg} style={{width:"100%",background:"#006633"}}>✓ BEKRÆFT & BETAL</Btn>;
        })()}
      </div>}
    </div>;
  }

  if(sel&&showOverview){
    return <div style={{padding:16,overflowY:"auto",height:"100%"}}>
      <Btn small variant="ghost" onClick={()=>setShowOverview(false)} style={{marginBottom:12}}>{t.back}</Btn>
      <EventOverview ev={sel} state={state}/>
    </div>;
  }

  if(sel){
    const evClasses=sortClassesByAge(sel.classes,state.classRules);
    return <div style={{padding:16,overflowY:"auto",height:"100%"}}>
      <Btn small variant="ghost" onClick={()=>setSel(null)} style={{marginBottom:12}}>{t.back}</Btn>
      <div style={{background:`linear-gradient(135deg,${C.redDark},#1a0003)`,borderRadius:10,padding:18,marginBottom:14}}>
        <div style={{color:"rgba(255,255,255,0.5)",fontSize:11}}>{sel.date}{sel.endDate&&sel.endDate!==sel.date?" – "+sel.endDate:""}</div>
        <div style={{fontSize:20,fontWeight:900,color:"#fff",fontFamily:"'Barlow Condensed',sans-serif"}}>{sel.name}</div>
        <div style={{color:"rgba(255,255,255,0.6)",fontSize:12}}>📍 {sel.location}</div>
        {sel.address&&<a href={`https://maps.google.com/?q=${encodeURIComponent(sel.address)}`} target="_blank" rel="noopener noreferrer" style={{color:"rgba(255,255,255,0.75)",fontSize:11,textDecoration:"underline"}}>🗺️ {sel.address}</a>}
        {sel.raceType&&<div style={{marginTop:6}}><Badge color={C.cyan} style={{fontSize:10}}>{sel.raceType}</Badge></div>}
        {!sel.registrationOpen&&<Badge color={C.orange} style={{marginTop:8}}>TILMELDING ÅBNER SENERE</Badge>}
      </div>
      {(()=>{
        const tr=(state.tracks||[]).find(x=>x.id===sel.trackId);
        if(!tr)return null;
        return <Card style={{display:"flex",gap:12,alignItems:"center",marginBottom:12}}>
          <div style={{width:56,height:56,flexShrink:0,borderRadius:8,overflow:"hidden",background:C.surface2,display:"flex",alignItems:"center",justifyContent:"center"}}>
            {tr.logoUrl?<img src={tr.logoUrl} style={{width:"100%",height:"100%",objectFit:"cover"}} alt="Bane logo"/>:<span style={{fontSize:22,opacity:0.4}}>🏁</span>}
          </div>
          <div style={{flex:1}}>
            <div style={{color:C.text,fontWeight:700,fontSize:14}}>{tr.name}</div>
            {tr.club&&<div style={{color:C.textMuted,fontSize:11}}>{tr.club}{tr.clubCode?` (${tr.clubCode})`:""}</div>}
            <div style={{display:"flex",gap:12,marginTop:4,flexWrap:"wrap"}}>
              {tr.length&&<span style={{color:C.textDim,fontSize:11}}>📏 {tr.length}</span>}
              {tr.mapLink&&<a href={tr.mapLink} target="_blank" rel="noreferrer" style={{color:C.blue,fontSize:11,textDecoration:"none"}}>🗺 Åbn kort</a>}
            </div>
          </div>
        </Card>;
      })()}
      {sel.eventPdf&&<a href={sel.eventPdf} target="_blank" rel="noreferrer" style={{textDecoration:"none"}}><Card style={{cursor:"pointer",display:"flex",gap:12,alignItems:"center",marginBottom:12}}><div style={{fontSize:22}}>📋</div><div><div style={{fontWeight:700,color:C.text,fontSize:13}}>Tillægsregler – {sel.name}</div><div style={{color:C.textMuted,fontSize:11}}>Tryk for at åbne PDF</div></div><div style={{color:C.red,marginLeft:"auto",fontSize:18}}>↓</div></Card></a>}
      {sel.generalInfo&&<Card onClick={()=>setShowInfoPopup(true)} style={{cursor:"pointer",display:"flex",gap:12,alignItems:"center",marginBottom:12}}><div style={{fontSize:22}}>ℹ️</div><div><div style={{fontWeight:700,color:C.text,fontSize:13}}>Generel information</div><div style={{color:C.textMuted,fontSize:11}}>Tryk for at læse</div></div><div style={{color:C.red,marginLeft:"auto",fontSize:18}}>→</div></Card>}
      {showInfoPopup&&<div onClick={()=>setShowInfoPopup(false)} style={{position:"fixed",inset:0,background:"#000000cc",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:16}}>
        <div onClick={e=>e.stopPropagation()} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:20,maxWidth:480,width:"100%",maxHeight:"80vh",overflowY:"auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{fontWeight:700,color:C.text,fontSize:15}}>Generel information</div>
            <button onClick={()=>setShowInfoPopup(false)} style={{background:"none",border:"none",color:C.textMuted,fontSize:20,cursor:"pointer",lineHeight:1}}>✕</button>
          </div>
          <div style={{color:C.text,fontSize:13,whiteSpace:"pre-wrap",lineHeight:1.5}}>{sel.generalInfo}</div>
        </div>
      </div>}
      <Card>{[["Tilmeldingsfrist",sel.deadline],["Gebyr",`${sel.fee} kr.`],["Tilmeldte",`${sel.registrations.length}`]].map(([k,v])=><div key={k} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:`1px solid ${C.border}`}}><span style={{color:C.textMuted,fontSize:12}}>{k}</span><span style={{color:C.text,fontWeight:600,fontSize:12}}>{v}</span></div>)}</Card>
      <div style={{marginBottom:12}}><div style={{color:C.textMuted,fontSize:10,letterSpacing:2,marginBottom:6}}>KLASSER (aldersgodkendt)</div><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{evClasses.map(c=>{const m=classLimitFor(sel,c);const n=classCount(sel,c);const full=m&&n>=m;return <Badge key={c} color={full?C.textDim:state.classRules[c]?.color||C.red}>{c}{m?` ${n}/${m}`:""}{full?" · FULD":""}</Badge>;})}</div></div>
      {(u?.isOfficial||u?.isAdmin||u?.isSubAdmin||u?.type==="official")&&(()=>{
        const amAvailable=(sel.availableOfficials||[]).some(a=>a.userId===u?.id);
        return <Card style={{borderLeft:`3px solid ${C.purple}`,marginBottom:12}}>

              <Btn small variant="ghost" onClick={()=>dispatch({type:"TOGGLE_OFFICIAL_AVAILABLE",eventId:sel.id,userId:u.id,name:u.name})} style={{width:"100%"}}>{t.admWithdraw}</Btn>

              <Btn small onClick={()=>{dispatch({type:"TOGGLE_OFFICIAL_AVAILABLE",eventId:sel.id,userId:u.id,name:u.name,note:helperNote});setHelperNote("");}} style={{width:"100%"}}>✋ Jeg kan hjælpe til dette løb</Btn>
            </div>}

      <div style={{height:12}}/>
      <Btn variant="secondary" onClick={()=>setShowOverview(true)} style={{width:"100%"}}>📋 {t.raceOverview}</Btn>
    </div>;
  }

  return <div style={{padding:16,overflowY:"auto",height:"100%"}}>
    <SH title={t.raceCalendar} sub={t.raceCalendarSub}/>
    {state.events.length>0&&<div style={{marginBottom:14}}>
      <Sel label={t.sharedRaceLabel} value={String((state.uiPrefs||{}).selectedRace||"")} onChange={v=>dispatch({type:"SET_UI_PREF",key:"selectedRace",value:v})} options={[{value:"",label:t.noneSelected},...state.events.slice().sort((a,b)=>String(a.date).localeCompare(String(b.date))).map(e=>({value:String(e.id),label:e.name}))]}/>
      <div style={{color:C.textDim,fontSize:10,marginTop:-6}}>{t.sharedRaceHint}</div>
    </div>}
    <div style={{display:"flex",gap:8,marginBottom:12}}>

// ── STANDINGS ────────────────────────────────────────────────────
function StandingsScreen({state,dispatch}){
  const t=useT();
  const series=state.raceSeries||[];
  const P=state.uiPrefs||{};
  const serId=P.stanSer!=null&&series.some(s=>String(s.id)===String(P.stanSer))?P.stanSer:series[0]?.id;
  const setSerId=v=>{dispatch({type:"SET_UI_PREF",key:"stanSer",value:v});dispatch({type:"SET_UI_PREF",key:"stanClass",value:null});};
  const standings=(state.champStandings||{})[serId];

    const ma=state.classRules[a]?.min??999,mb=state.classRules[b]?.min??999;

  });

                <th rowSpan={2} style={{padding:"6px 8px",color:C.textMuted,fontWeight:600,textAlign:"left",fontSize:10,whiteSpace:"nowrap"}}>{t.colName}</th>

              </tr>
              <tr style={{background:C.surface2}}>

            <div style={{color:C.textMuted,fontSize:11}}>Opdateret: {pdf.updated}</div>

        </div>
      </Card>
    </div>:<div style={{color:C.textMuted,textAlign:"center",padding:30,fontSize:13}}>{t.noStandings}<br/><span style={{fontSize:11,color:C.textDim}}>{t.importCsvHint}</span></div>}

// ── DOCUMENTS ────────────────────────────────────────────────────
function DocumentsScreen({state,dispatch}){
  const t=useT();
  const P=state.uiPrefs||{};
  const sharedValid=P.selectedRace&&state.events.some(e=>String(e.id)===String(P.selectedRace));
  const evF=sharedValid?String(P.selectedRace):(P.docsEv||"Alle"),cf=P.docsClass||"Alle",tf=P.docsType||"Alle";
  const setEvF=v=>{dispatch({type:"SET_UI_PREF",key:"docsEv",value:v});dispatch({type:"SET_UI_PREF",key:"docsClass",value:"Alle"});if(v!=="Alle")dispatch({type:"SET_UI_PREF",key:"selectedRace",value:v});};
  const setCf=v=>dispatch({type:"SET_UI_PREF",key:"docsClass",value:v});
  const setTf=v=>dispatch({type:"SET_UI_PREF",key:"docsType",value:v});
  // Collect documents from all events (or the selected event) + any old global documents
  const allDocs=[
    ...state.events.filter(ev=>evF==="Alle"||String(ev.id)===evF).flatMap(ev=>(ev.documents||[]).map(d=>({...d,eventName:ev.name,eventDate:ev.date}))),
    ...(evF==="Alle"?(state.documents||[]):[]),
  ];
  const classes=["Alle",...new Set(allDocs.map(d=>d.class).filter(Boolean))];
  const types=["Alle","Startgrid","Resultat","Opslagstavle"];
  const SL={kval:"Kval",heat:"Heat",prefinale:"Prefinale",finale:"Finale"};
  const filtered=allDocs.filter(d=>(cf==="Alle"||d.class===cf)&&(tf==="Alle"||d.type===tf));
  return <div style={{padding:16,overflowY:"auto",height:"100%"}}>
    <SH title={t.docs}/>
    <Sel label={t.race} value={evF} onChange={v=>{setEvF(v);setCf("Alle");}} options={[{value:"Alle",label:t.allRaces},...state.events.slice().sort((a,b)=>String(a.date).localeCompare(String(b.date))).map(e=>({value:String(e.id),label:e.name}))]}/>
    <div style={{display:"flex",gap:6,overflowX:"auto",marginBottom:6,paddingBottom:2}}>{classes.map(c=><button key={c} onClick={()=>setCf(c)} style={{background:cf===c?C.red:C.surface2,color:cf===c?"#fff":C.textMuted,border:`1px solid ${cf===c?C.red:C.border}`,borderRadius:20,padding:"4px 10px",fontSize:10,cursor:"pointer",whiteSpace:"nowrap",fontFamily:"inherit"}}>{c}</button>)}</div>
    <div style={{display:"flex",gap:6,overflowX:"auto",marginBottom:12,paddingBottom:2}}>{types.map(t=><button key={t} onClick={()=>setTf(t)} style={{background:tf===t?C.blue:C.surface2,color:tf===t?"#fff":C.textMuted,border:`1px solid ${tf===t?C.blue:C.border}`,borderRadius:20,padding:"4px 10px",fontSize:10,cursor:"pointer",whiteSpace:"nowrap",fontFamily:"inherit"}}>{t}</button>)}</div>
    {filtered.length===0&&<div style={{color:C.textDim,fontSize:12,textAlign:"center",padding:20}}>{t.noDocuments}</div>}
    {filtered.map((d,i)=>{
      const inner=<div style={{display:"flex",gap:10,alignItems:"center"}}>
        <div style={{fontSize:22}}>{d.type==="Startgrid"?"🏁":d.type==="Resultat"?"🏆":"📋"}</div>
        <div style={{flex:1}}>
          <div style={{fontWeight:700,color:C.text,fontSize:13}}>{d.title}</div>
          <div style={{display:"flex",gap:5,marginTop:3,flexWrap:"wrap"}}>
            <Badge color={d.type==="Startgrid"?C.blue:d.type==="Resultat"?C.gold:C.textMuted} style={{fontSize:10}}>{d.type}</Badge>
            {d.sessionType&&<Badge color={C.orange} style={{fontSize:10}}>{SL[d.sessionType]||d.sessionType}</Badge>}
            {d.class&&<Badge style={{fontSize:10}}>{d.class}</Badge>}
          </div>
          <div style={{color:C.textDim,fontSize:10,marginTop:2}}>{d.eventName&&evF==="Alle"?d.eventName+" · ":""}🕐 {d.time}</div>
        </div>
        <div style={{color:C.red,fontSize:16}}>{d.url&&d.url!=="#"?"↗":""}</div>
      </div>;
      return d.url&&d.url!=="#"
        ?<a key={i} href={d.url} target="_blank" rel="noreferrer" style={{textDecoration:"none"}}><Card style={{cursor:"pointer",padding:"12px 14px"}}>{inner}</Card></a>
        :<Card key={i} style={{padding:"12px 14px"}}>{inner}</Card>;
    })}
  </div>;
}

// ── PENALTIES (user) ─────────────────────────────────────────────
function PenaltiesScreen({state,dispatch}){
  const t=useT();
  const P=state.uiPrefs||{};
  const sharedValid=P.selectedRace&&state.events.some(e=>String(e.id)===String(P.selectedRace));
  const evF=sharedValid?String(P.selectedRace):(P.penEv||"Alle"),cf=P.penClass||"Alle";
  const setEvF=v=>{dispatch({type:"SET_UI_PREF",key:"penEv",value:v});dispatch({type:"SET_UI_PREF",key:"penClass",value:"Alle"});if(v!=="Alle")dispatch({type:"SET_UI_PREF",key:"selectedRace",value:v});};
  const setCf=v=>dispatch({type:"SET_UI_PREF",key:"penClass",value:v});
  const evPenalties=evF==="Alle"?state.events.flatMap(ev=>(ev.penalties||[]).map(p=>({...p,_evName:ev.name,_evId:ev.id}))):(state.events.find(e=>String(e.id)===evF)?.penalties||[]).map(p=>({...p,_evId:parseInt(evF)}));
  const allP=evPenalties;
  const classes=["Alle",...new Set(allP.map(p=>p.class))];
  const filtered=(cf==="Alle"?allP:allP.filter(p=>p.class===cf)).filter(p=>p.approved);
  // If a penalty came in with only a kart # and class, look up the registered driver's name instead
  // of leaving it blank.
  const nameForPenalty=(p)=>{
    if(p.driverName)return p.driverName;
    const kartNo=parseInt(p.kartNo);
    if(!kartNo)return "";
    const ev=state.events.find(e=>e.id===p._evId);
    const reg=(ev?.registrations||[]).find(r=>r.class===p.class&&state.users.find(u=>u.id===r.userId)?.kartNumber===kartNo);
    return reg?state.users.find(u=>u.id===reg.userId)?.name||"":"";
  };
  return <div style={{padding:16,overflowY:"auto",height:"100%"}}>
    <SH title={t.penalties} sub={t.penaltiesSub}/>
    <Sel label={t.race} value={evF} onChange={v=>{setEvF(v);setCf("Alle");}} options={[{value:"Alle",label:t.allRaces},...state.events.slice().sort((a,b)=>String(a.date).localeCompare(String(b.date))).map(e=>({value:String(e.id),label:e.name}))]}/>
    <div style={{display:"flex",gap:6,overflowX:"auto",marginBottom:12,paddingBottom:2}}>{classes.map(c=><button key={c} onClick={()=>setCf(c)} style={{background:cf===c?C.orange:C.surface2,color:cf===c?"#fff":C.textMuted,border:`1px solid ${cf===c?C.orange:C.border}`,borderRadius:20,padding:"4px 10px",fontSize:10,cursor:"pointer",whiteSpace:"nowrap",fontFamily:"inherit"}}>{c}</button>)}</div>
    {filtered.length===0&&<div style={{color:C.textMuted,textAlign:"center",padding:24}}>{t.noPenalties}</div>}
    {filtered.map((p,i)=><Card key={i} style={{borderLeft:`3px solid ${p.type==="Diskvalifikation"?C.red:C.orange}`,padding:"11px 14px"}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontWeight:700,color:C.text,fontSize:13}}>{nameForPenalty(p)}</span><Badge color={p.type==="Diskvalifikation"?C.red:p.type==="Placering sidst"?"#888":p.type==="Hurtigste tid fjernes"?C.purple:C.orange} style={{fontSize:10}}>{p.type}{p.seconds>0?` +${p.seconds}s`:""}</Badge></div>
      <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:3}}><Badge color={C.blue} style={{fontSize:10}}>#{p.kartNo}</Badge><Badge style={{fontSize:10}}>{p.class}</Badge><Badge color={C.textMuted} style={{fontSize:10}}>{p.session}</Badge>{p._evName&&evF==="Alle"&&<Badge color={C.textDim} style={{fontSize:9}}>{p._evName}</Badge>}</div>
      <div style={{color:C.textMuted,fontSize:11}}>{p.reason}</div>
    </Card>)}
  </div>;
}

// ── NOTIFICATIONS (user) ─────────────────────────────────────────
function NotifScreen({state,dispatch}){
  const t=useT();
  const u=state.currentUser;
  const isOff=u?.isOfficial||u?.type==="official"||u?.isAdmin;
  const isAdminOrSub=u?.isAdmin||u?.isSubAdmin||u?.type==="admin";
  const P=state.uiPrefs||{};
  const sharedValid=P.selectedRace&&state.events.some(e=>String(e.id)===String(P.selectedRace));
  const evF=sharedValid?String(P.selectedRace):(P.notifEv||"Alle");
  const setEvF=v=>{dispatch({type:"SET_UI_PREF",key:"notifEv",value:v});if(v!=="Alle")dispatch({type:"SET_UI_PREF",key:"selectedRace",value:v});};
  const classF=P.notifClass||"Alle";
  const setClassF=v=>dispatch({type:"SET_UI_PREF",key:"notifClass",value:v});
  // Classes the user "belongs to": own class + any children's classes. Officials/admin see everything.
  const myClasses=new Set();
  if(u?.class)myClasses.add(u.class);
  childrenOf(state.users,u).forEach(c=>{if(c.class)myClasses.add(c.class);});
  const filterEv=evF!=="Alle"?state.events.find(e=>String(e.id)===evF):null;
  const availableClasses=(filterEv?.classes&&filterEv.classes.length)?filterEv.classes:sortClassesByAge(Object.keys(state.classRules),state.classRules);
  const visible=state.notifications
    .filter(n=>!n.adminOnly||isAdminOrSub)
    .filter(n=>!n.officialsOnly||(n.officialsOnly&&isOff))
    .filter(n=>evF==="Alle"||String(n.eventId)===evF)
    .filter(n=>classF==="Alle"||n.targetClass===classF)
    .filter(n=>isOff||!n.targetClass||n.targetClass==="Alle"||myClasses.has(n.targetClass));
  return <div style={{padding:16,overflowY:"auto",height:"100%"}}>
    <SH title={t.notifications}/>
    <Sel label={t.race} value={evF} onChange={setEvF} options={[{value:"Alle",label:t.allRaces},...state.events.slice().sort((a,b)=>String(a.date).localeCompare(String(b.date))).map(e=>({value:String(e.id),label:e.name}))]}/>
    <Sel label={t.admFieldClass} value={classF} onChange={setClassF} options={["Alle",...availableClasses]}/>
    {visible.length===0&&<div style={{color:C.textMuted,textAlign:"center",padding:24}}>{t.noNotifications}</div>}
    {visible.map(n=>{const evName=state.events.find(e=>e.id===n.eventId)?.name;return <Card key={n.id} onClick={n.docUrl?()=>window.open(n.docUrl,"_blank"):undefined} style={{borderLeft:`3px solid ${n.officialsOnly?C.purple:C.red}`,padding:"12px 14px",cursor:n.docUrl?"pointer":"default"}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>

// ── OFFICIAL WEIGHT SCREEN ────────────────────────────────────────
// Returns drivers for a session: filtered to selected groups (if groups exist),
// and always sorted by kart number (lowest first).
// Look up group assignment for a class+session, falling back to class-wide
// assignment ("<class>||*"), so groups only need to be uploaded once per class.
function resolveGroups(ev,cls,session){
  const sg=ev?.sessionGroups||{};
  if(sg[`${cls}||${session}`])return sg[`${cls}||${session}`];
  if(sg[`${cls}||*`])return sg[`${cls}||*`];
  // Fall back to whichever session's group assignment exists for this class, so groups uploaded
  // once (e.g. only tagged under "Heat 1") still apply everywhere instead of just that one session.
  const anyKey=Object.keys(sg).find(k=>k.startsWith(`${cls}||`));
  return anyKey?sg[anyKey]:null;
}

// selGroups = array of selected group letters, e.g. ["A","B"]. Empty = show all in the assignment.
function sessionDrivers(ev,cls,session,users,selGroups){
  // Always require a selected class for group view, and filter registrations to the class FIRST.
  const regs=(ev?.registrations||[]).filter(r=>!cls||r.class===cls);
  let drivers=regs.map(r=>{const u=users.find(x=>x.id===r.userId);return u?{...u,_regClass:r.class}:null;}).filter(Boolean);
  const groups=resolveGroups(ev,cls,session);
  if(groups&&cls){
    // Only drivers WHO ARE IN THIS CLASS and whose kart number is found in the group assignment.
    // (Kart numbers repeat across classes, so the class check above is essential.)
    drivers=drivers
      .filter(d=>d._regClass===cls&&groups[d.kartNumber]!=null)
      .map(d=>({...d,_group:groups[d.kartNumber]}));
    if(selGroups&&selGroups.length)drivers=drivers.filter(d=>selGroups.includes(d._group));
  }
  drivers.sort((a,b)=>(a.kartNumber||99999)-(b.kartNumber||99999));
  return drivers;
}

// Which group letters exist for a class+session? (for checkbox display)
function sessionGroupLetters(ev,cls,session){
  const groups=resolveGroups(ev,cls,session);
  if(!groups)return [];
  return [...new Set(Object.values(groups))].sort();
}

// All group letters ever configured for a class, across ANY session — used where the same grouping
// should apply no matter which session is selected (e.g. Indrapportering), unlike sessionGroupLetters
// which is intentionally session-specific for stations like Vægt/Front fairing.
function classGroupLetters(ev,cls){
  const sg=ev?.sessionGroups||{};
  const letters=new Set();
  Object.keys(sg).forEach(key=>{
    const c=key.split("||")[0];
    if(c===cls)Object.values(sg[key]).forEach(g=>letters.add(g));
  });
  return [...letters].sort();
}
