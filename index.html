function AdminDocuments({state,dispatch,seriesScope}){
  const scopedEvs=eventsInScope(state.events,seriesScope);
  const selEv=getAdminSelEv(state,scopedEvs);
  const setSelEv=v=>setAdminSelEv(dispatch,v);
  const [form,setForm]=useState({title:"",type:"Startgrid",sessionType:"kval",class:"Alle",notify:true});
  const [file,setFile]=useState(null);
  const [titleTouched,setTitleTouched]=useState(false);
  const [busy,setBusy]=useState(false);
  const [msg,setMsg]=useState("");
  const fileRef=useRef();
  const isBoard=form.type==="Opslagstavle";

  const pickFile=(f)=>{
    setFile(f||null);
    // Auto-titel fra filnavn (uden endelse) hvis brugeren ikke selv har skrevet en
    if(f&&!titleTouched){
      // Fjern filendelse. Erstat kun "-"/"_" der bruges som ord-adskiller (ingen mellemrum omkring),
      // så fx "Heat 1 - 3" beholder sin bindestreg, mens "min-fil_navn" bliver til "min fil navn".
      const base=f.name.replace(/\.[^.]+$/,"").replace(/(?<=\S)[_-](?=\S)/g," ").replace(/\s+/g," ").trim();
      setForm(o=>({...o,title:base}));
    }
  };

  const upload=async()=>{
    setMsg("");
    if(!file){setMsg("Vælg en fil");return;}
    if(!form.title){setMsg("Titel mangler");return;}
    if(!selEv){setMsg("Vælg et løb");return;}
    if(!sb){setMsg("Supabase er ikke konfigureret");return;}
    setBusy(true);
    try{
      let url="#";
      const ext=file.name.split(".").pop();
      const path=`event-${selEv}/${Date.now()}-${Math.random().toString(36).slice(2,7)}.${ext}`;
      const {error:upErr}=await sb.storage.from("documents").upload(path,file,{cacheControl:"3600",upsert:false});
      if(upErr){setMsg("Upload fejlede: "+upErr.message);setBusy(false);return;}
      const {data:pub}=sb.storage.from("documents").getPublicUrl(path);
      url=pub.publicUrl;
      const evId=parseInt(selEv);
      const docSession=isBoard?null:form.sessionType;
      dispatch({type:"ADD_EVENT_DOCUMENT",eventId:evId,payload:{id:Date.now(),title:form.title,type:form.type,sessionType:docSession,class:form.class,time:new Date().toLocaleString("da-DK"),url}});
      // Startgrid, Resultat og Opslagstavle sender ALTID notifikation; andre kun hvis notify er slået til
      const alwaysNotify=isBoard||form.type==="Startgrid"||form.type==="Resultat";
      const shouldNotify=alwaysNotify||form.notify;
      if(shouldNotify){
        const evName=state.events.find(e=>e.id===evId)?.name||"";
        const icon=isBoard?"📌":form.type==="Startgrid"?"🏁":form.type==="Resultat"?"🏆":"📄";
        const notifTitle=isBoard?`📌 Opslagstavle: ${form.title}`:`${icon} ${form.type}: ${form.title}`;
        const notifBody=isBoard
          ?`Nyt opslag${form.class!=="Alle"?" for "+form.class:""}${evName?" · "+evName:""}.`
          :`${form.type}${docSession?" · "+(SESSION_TYPES.find(s=>s.value===docSession)?.label||docSession):""} er lagt op${form.class!=="Alle"?" for "+form.class:""}${evName?" · "+evName:""}.`;
        dispatch({type:"ADD_NOTIFICATION",payload:{
          id:Date.now()+1,eventId:evId,title:notifTitle,body:notifBody,
          targetClass:form.class,officialsOnly:false,time:new Date().toLocaleString("da-DK"),docUrl:url,
        }});
        // Push til de relevante modtagere
        sendPushNotification({title:notifTitle,body:notifBody,url:url||".",userIds:resolveNotifRecipients(state.users,{targetClass:form.class,officialsOnly:false})});
      }
      setMsg(shouldNotify?"Dokument uploadet og notifikation sendt":"Dokument uploadet");
      setForm(f=>({...f,title:""}));setFile(null);setTitleTouched(false);
    }catch(e){setMsg(String(e.message||e));}
    setBusy(false);
  };

  const ev=state.events.find(e=>String(e.id)===String(selEv));
  const docs=ev?.documents||[];

  return <div>
    <SH title="Dokumenter" sub="Upload til Supabase – synligt under løbet"/>
    {msg&&<div style={{background:`${C.green}22`,border:`1px solid ${C.green}44`,borderRadius:8,padding:10,marginBottom:10,color:C.green,fontSize:12,fontWeight:600}}>{msg}</div>}
    <Card style={{borderLeft:`3px solid ${C.red}`}}>
      <Sel label="Løb" value={selEv} onChange={setSelEv} options={eventsInScope(state.events,seriesScope).map(e=>({value:String(e.id),label:e.name}))}/>
      <div style={{display:"grid",gridTemplateColumns:isBoard?"1fr":"1fr 1fr",gap:8}}>
        <Sel label="Type" value={form.type} onChange={v=>setForm(f=>({...f,type:v}))} options={["Startgrid","Resultat","Opslagstavle"]}/>
        {!isBoard&&<Sel label="Session" value={form.sessionType} onChange={v=>setForm(f=>({...f,sessionType:v}))} options={SESSION_TYPES}/>}
      </div>
      <Sel label="Klasse" value={form.class} onChange={v=>setForm(f=>({...f,class:v}))} options={["Alle",...sortClassesByAge(Object.keys(state.classRules),state.classRules)]}/>
      <input ref={fileRef} type="file" accept="application/pdf,.pdf,image/*" style={{display:"none"}} onChange={e=>pickFile(e.target.files[0])}/>
      <div onClick={()=>fileRef.current?.click()} style={{border:`2px dashed ${file?C.green:C.border}`,borderRadius:6,padding:12,textAlign:"center",marginBottom:10,cursor:"pointer"}}>
        <div style={{fontSize:20}}>📎</div>
        <div style={{color:file?C.green:C.textMuted,fontSize:12,fontWeight:file?700:400}}>{file?file.name:"Vælg PDF eller billede"}</div>
      </div>
      <Input label="Titel (udfyldes automatisk fra filnavn)" value={form.title} onChange={v=>{setTitleTouched(true);setForm(f=>({...f,title:v}));}} placeholder="Vælg en fil, så sættes titlen"/>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",margin:"4px 0 12px"}}>
        <span style={{color:C.text,fontSize:12,fontWeight:600}}>🔔 Send notifikation {form.class==="Alle"?"til alle":"til "+form.class}</span>
        {(isBoard||form.type==="Startgrid"||form.type==="Resultat")
          ?<span style={{background:`${C.green}33`,border:`1px solid ${C.green}`,borderRadius:20,padding:"4px 12px",color:C.green,fontSize:11,fontWeight:700}}>✓ ALTID</span>
          :<button onClick={()=>setForm(f=>({...f,notify:!f.notify}))} style={{background:form.notify?`${C.green}33`:C.surface2,border:`1px solid ${form.notify?C.green:C.border}`,borderRadius:20,padding:"4px 12px",color:form.notify?C.green:C.textMuted,cursor:"pointer",fontSize:11,fontFamily:"inherit",fontWeight:700}}>{form.notify?"✓ JA":"NEJ"}</button>}
      </div>
      {(isBoard||form.type==="Startgrid"||form.type==="Resultat")&&<div style={{color:C.textDim,fontSize:11,marginBottom:10,marginTop:-6}}>{isBoard?"Opslag på opslagstavlen":form.type} sender altid en notifikation.</div>}
      <Btn onClick={upload} disabled={busy} style={{width:"100%"}}>{busy?"Uploader...":"⬆ UPLOAD"}</Btn>
    </Card>
    <div style={{color:C.textMuted,fontSize:10,letterSpacing:2,margin:"4px 0 8px"}}>DOKUMENTER PÅ {ev?.name?.toUpperCase()||"LØB"} ({docs.length})</div>
    {docs.length===0&&<div style={{color:C.textDim,fontSize:12}}>Ingen dokumenter på dette løb endnu</div>}
    {docs.map(d=><Card key={d.id} style={{padding:"10px 14px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><div style={{fontWeight:700,color:C.text,fontSize:12}}>{d.title}</div><div style={{display:"flex",gap:4,marginTop:3}}><Badge color={d.type==="Startgrid"?C.blue:d.type==="Resultat"?C.gold:C.textMuted} style={{fontSize:9}}>{d.type}</Badge>{d.sessionType&&<Badge color={C.orange} style={{fontSize:9}}>{SESSION_TYPES.find(s=>s.value===d.sessionType)?.label||d.sessionType}</Badge>}<Badge style={{fontSize:9}}>{d.class}</Badge></div></div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          {d.url&&d.url!=="#"&&<a href={d.url} target="_blank" rel="noreferrer" style={{color:C.blue,fontSize:11,fontWeight:700}}>Åbn ↗</a>}
          <button onClick={()=>dispatch({type:"REMOVE_EVENT_DOCUMENT",eventId:ev.id,docId:d.id})} style={{background:"none",border:"none",color:C.red,cursor:"pointer",fontSize:16,fontFamily:"inherit"}}>×</button>
        </div>
      </div>
    </Card>)}
  </div>;
}

function AdminPenalties({state,dispatch,seriesScope}){
  const t=useT();
  const scopedEvs=eventsInScope(state.events,seriesScope);
  const selEv=getAdminSelEv(state,scopedEvs);
  const setSelEv=v=>setAdminSelEv(dispatch,v);
  const [cf,setCf]=useState("Alle");const [sf,setSf]=useState("Alle");
  const [showApproved,setShowApproved]=useState(false);
  const [form,setForm]=useState({kartNo:"",driverName:"",class:"Rotax Junior",session:"Heat 1",type:"Tidsstraf",seconds:"5",reason:""});
  const [editP,setEditP]=useState(null);
  const [editForm,setEditForm]=useState({});
  const [prevCount,setPrevCount]=useState(0);
  const [newAlert,setNewAlert]=useState(false);
  const [copiedIdx,setCopiedIdx]=useState(null);
  const ev=state.events.find(e=>e.id===parseInt(selEv));
  const allP=ev?.penalties||[];
  const pending=allP.filter(p=>!p.approved);
  const approved=allP.filter(p=>p.approved);
  const shown=showApproved?approved:pending;
  const classes=["Alle",...new Set(allP.map(p=>p.class))];
  const sessions=["Alle",...new Set(allP.map(p=>p.session).filter(Boolean))];
  const filtered=shown.filter(p=>(cf==="Alle"||p.class===cf)&&(sf==="Alle"||p.session===sf));

  useEffect(()=>{if(allP.length>prevCount&&prevCount>0){setNewAlert(true);setTimeout(()=>setNewAlert(false),5000);}setPrevCount(allP.length);},[allP.length]);

  const add=()=>{
    if(!form.kartNo)return;
    dispatch({type:"ADD_PENALTY",eventId:parseInt(selEv),payload:{...form,kartNo:parseInt(form.kartNo)||0,seconds:parseInt(form.seconds)||0,time:new Date().toLocaleString("da-DK"),source:"manual",approved:true}});
    setForm(f=>({...f,driverName:"",kartNo:"",reason:""}));
  };

  const approvePenalty=p=>dispatch({type:"UPDATE_PENALTY",eventId:parseInt(selEv),penaltyId:p.id,penaltyIdx:allP.indexOf(p),payload:{...p,approved:true}});
  const deletePenalty=p=>dispatch({type:"DELETE_PENALTY",eventId:parseInt(selEv),penaltyId:p.id,penaltyIdx:allP.indexOf(p)});
  const openEdit=p=>{setEditP(p);setEditForm({kartNo:p.kartNo,driverName:p.driverName||"",class:p.class,session:p.session,type:p.type,seconds:String(p.seconds||0),reason:p.reason||""});};
  const saveEdit=()=>{dispatch({type:"UPDATE_PENALTY",eventId:parseInt(selEv),penaltyId:editP.id,penaltyIdx:allP.indexOf(editP),payload:{...editP,...editForm,kartNo:parseInt(editForm.kartNo)||0,seconds:parseInt(editForm.seconds)||0}});setEditP(null);};

  const doExport=()=>exportCSV(
    filtered.map(p=>({"Kart #":p.kartNo||"","Kører":p.driverName||"","Klasse":p.class||"","Session":p.session||"","Type":p.type||"","Sekunder":p.seconds||0,"Årsag":p.reason||"","Godkendt":p.approved?"Ja":"Nej"})),
    ["Kart #","Kører","Klasse","Session","Type","Sekunder","Årsag","Godkendt"],
    "straffe"
  );

  if(editP)return <div style={{padding:0}}>
    <Btn small variant="ghost" onClick={()=>setEditP(null)} style={{marginBottom:12}}>← Tilbage</Btn>
    <SH title="Rediger straf"/>
    <Card style={{borderLeft:`3px solid ${C.orange}`}}>
      <div style={{display:"grid",gridTemplateColumns:"80px 1fr",gap:8}}>
        <Input label="Kart # *" value={String(editForm.kartNo||"")} onChange={v=>setEditForm(f=>({...f,kartNo:v}))} placeholder="98"/>
        <Input label="Kørernavn" value={editForm.driverName} onChange={v=>setEditForm(f=>({...f,driverName:v}))} placeholder="Valgfrit"/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <Sel label="Klasse" value={editForm.class} onChange={v=>setEditForm(f=>({...f,class:v}))} options={sortClassesByAge(Object.keys(state.classRules),state.classRules)}/>
        <Sel label="Session" value={editForm.session} onChange={v=>setEditForm(f=>({...f,session:v}))} options={(state.sessions||[]).map(s=>s.name)}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <Sel label="Straftype" value={editForm.type} onChange={v=>setEditForm(f=>({...f,type:v}))} options={["Tidsstraf","Advarsel","Sortflag","Diskvalifikation","Placering sidst","Hurtigste tid fjernes"]}/>
        {editForm.type==="Tidsstraf"&&<Input label="Sekunder" value={editForm.seconds} onChange={v=>setEditForm(f=>({...f,seconds:v}))} placeholder="5"/>}
      </div>
      <Input label="Årsag" value={editForm.reason} onChange={v=>setEditForm(f=>({...f,reason:v}))} placeholder="Beskriv forseelsen..."/>
      <div style={{display:"flex",gap:8}}>
        <Btn onClick={saveEdit} style={{flex:1}}>Gem</Btn>
        <Btn variant="danger" onClick={()=>{if(confirm("Slet denne straf? Handlingen kan ikke fortrydes."))(deletePenalty(editP),setEditP(null));}} style={{flex:1}}>Slet</Btn>
      </div>
    </Card>
  </div>;

  return <div>
    <SH title="Straffe"/>
    {newAlert&&<div style={{background:`${C.orange}22`,border:`1px solid ${C.orange}`,borderRadius:8,padding:"10px 14px",marginBottom:10,display:"flex",gap:8,alignItems:"center"}}>
      <div style={{position:"relative",width:14,height:14,flexShrink:0}}>
        <div style={{position:"absolute",inset:0,borderRadius:"50%",background:C.orange,animation:"ping 1s infinite"}}/>
        <div style={{position:"absolute",inset:0,borderRadius:"50%",background:C.orange}}/>
      </div>
      <span style={{color:C.orange,fontWeight:700,fontSize:13}}>NY STRAF MODTAGET!</span>
    </div>}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
      <button onClick={()=>setShowApproved(false)} style={{background:!showApproved?`${C.orange}22`:C.surface2,border:`2px solid ${!showApproved?C.orange:C.border}`,borderRadius:8,padding:"10px",cursor:"pointer",textAlign:"center",fontFamily:"inherit"}}>
        <div style={{color:!showApproved?C.orange:C.textMuted,fontWeight:900,fontSize:20,fontFamily:"'Barlow Condensed',sans-serif"}}>{pending.length}</div>
        <div style={{color:!showApproved?C.orange:C.textMuted,fontSize:10,letterSpacing:1}}>AFVENTER</div>
      </button>
      <button onClick={()=>setShowApproved(true)} style={{background:showApproved?`${C.green}22`:C.surface2,border:`2px solid ${showApproved?C.green:C.border}`,borderRadius:8,padding:"10px",cursor:"pointer",textAlign:"center",fontFamily:"inherit"}}>
        <div style={{color:showApproved?C.green:C.textMuted,fontWeight:900,fontSize:20,fontFamily:"'Barlow Condensed',sans-serif"}}>{approved.length}</div>
        <div style={{color:showApproved?C.green:C.textMuted,fontSize:10,letterSpacing:1}}>GODKENDT</div>
      </button>
    </div>
    <Sel label="Løb" value={selEv} onChange={v=>{setSelEv(v);setCf("Alle");setSf("Alle");}} options={eventsInScope(state.events,seriesScope).map(e=>({value:String(e.id),label:e.name}))}/>
    <Card style={{borderLeft:`3px solid ${C.orange}`}}>
      <div style={{color:C.textMuted,fontSize:10,letterSpacing:2,marginBottom:8}}>NY STRAF – Kun kart # er obligatorisk</div>
      <div style={{display:"grid",gridTemplateColumns:"80px 1fr",gap:8}}>
        <Input label="Kart # *" value={form.kartNo} onChange={v=>setForm(f=>({...f,kartNo:v}))} placeholder="98"/>

      </div>

              <div style={{display:"flex",alignItems:"center",gap:6}}>

                {p.driverName&&<span style={{color:C.text,fontSize:13}}>{p.driverName}</span>}
              </div>
              <Badge color={p.type==="Diskvalifikation"?C.red:C.orange} style={{fontSize:9}}>{p.type}{p.seconds>0?" +"+p.seconds+"s":""}</Badge>
            </div>
            <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:4}}>
              <Badge style={{fontSize:9}}>{p.class}</Badge>
              <Badge color={C.blue} style={{fontSize:9}}>{p.session}</Badge>
              <Badge color={showApproved?C.green:C.orange} style={{fontSize:9}}>{showApproved?"SYNLIG":"AFVENTER"}</Badge>
            </div>
            {p.reason&&<div style={{color:C.textMuted,fontSize:11,marginBottom:6}}>{p.reason}</div>}

            <div style={{display:"flex",gap:6}}>
              {!showApproved&&<button onClick={()=>approvePenalty(p)} style={{flex:1,background:`${C.green}22`,border:`1px solid ${C.green}44`,borderRadius:6,padding:"7px",color:C.green,fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>GODKEND OG FRIGIV</button>}
              <button onClick={()=>openEdit(p)} style={{background:C.surface2,border:`1px solid ${C.border}`,borderRadius:6,padding:"7px 12px",color:C.textMuted,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>Ret</button>
              <button onClick={()=>{if(confirm("Slet denne straf? Handlingen kan ikke fortrydes."))deletePenalty(p);}} style={{background:"#400010",border:"1px solid #FF446644",borderRadius:6,padding:"7px 12px",color:"#FF4466",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>Slet</button>
            </div>
          </Card>)}
        </div>
        {/* HØJRE: Orbits-tekst */}
        <div>
          <div style={{color:C.cyan,fontSize:10,letterSpacing:2,marginBottom:8}}>📋 TIL ORBITS</div>
          {filtered.length===0&&<div style={{color:C.textMuted,textAlign:"center",padding:20}}>Ingen straffe</div>}
          {filtered.map((p,i)=><div key={i} style={{background:C.surface,border:`1px solid ${C.border}`,borderLeft:`3px solid ${C.cyan}`,borderRadius:6,padding:"9px 12px",marginBottom:6,display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
            <div style={{minWidth:0}}>
              <div style={{fontFamily:"monospace",fontSize:13,color:C.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{orbitsLine(p)}</div>
              <div style={{display:"flex",gap:4,marginTop:3}}><Badge style={{fontSize:8}}>{p.class}</Badge><Badge color={C.blue} style={{fontSize:8}}>{p.session}</Badge></div>
            </div>
            <button onClick={()=>{navigator.clipboard&&navigator.clipboard.writeText(orbitsLine(p));setCopiedIdx(i);setTimeout(()=>setCopiedIdx(null),1500);}} style={{background:copiedIdx===i?`${C.green}33`:C.surface2,border:`1px solid ${copiedIdx===i?C.green:C.border}`,borderRadius:6,padding:"6px 12px",color:copiedIdx===i?C.green:C.cyan,fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit",flexShrink:0}}>{copiedIdx===i?"✓ Kopieret":"Kopiér"}</button>
          </div>)}
        </div>
      </div>;
    })()}
  </div>;
}

function AdminGroups({state,dispatch,seriesScope}){
  const scoped=eventsInScope(state.events,seriesScope);
  const selEv=getAdminSelEv(state,scoped);
  const setSelEv=v=>setAdminSelEv(dispatch,v);
  const ev=state.events.find(e=>String(e.id)===selEv);
  const classes=ev?sortClassesByAge(ev.classes||Object.keys(state.classRules),state.classRules):[];
  const sessions=(state.sessions||[]).map(s=>s.name);
  const [selClass,setSelClass]=useState("");
  const [selSession,setSelSession]=useState("*");
  const [preview,setPreview]=useState(null);
  const [msg,setMsg]=useState("");
  const fileRef=useRef();

  const activeClass=classes.includes(selClass)?selClass:classes[0]||"";
  const ALL_SESSIONS="*"; // klasse-dækkende: gælder alle heats/sessioner
  const sessionOpts=[{value:ALL_SESSIONS,label:"🔁 Alle sessioner (hele dagen)"},...sessions.map(s=>({value:s,label:s}))];
  const activeSession=(selSession===ALL_SESSIONS||sessions.includes(selSession))?selSession:ALL_SESSIONS;
  const key=`${activeClass}||${activeSession}`;
  const existing=ev?.sessionGroups?.[key];
  const sessionLabel=activeSession===ALL_SESSIONS?"alle sessioner":activeSession;

  const onFile=(file)=>{
    setMsg("");setPreview(null);
    const reader=new FileReader();
    reader.onload=()=>{setPreview(parseGroupCsv(reader.result));};
    reader.readAsArrayBuffer(file);
  };
  const save=()=>{
    if(!preview||!preview.rows?.length)return;
    const groups={};
    preview.rows.forEach(r=>{groups[r.kart]=r.group;});
    dispatch({type:"SET_SESSION_GROUPS",eventId:ev.id,key,groups});
    setMsg(`✓ ${preview.rows.length} kørere fordelt i ${preview.groups.length} grupper for ${activeClass} · ${sessionLabel}`);
    setPreview(null);
  };
  const clear=()=>{
    if(!confirm(`Slet gruppeinddelingen for ${activeClass} · ${sessionLabel}?`))return;
    dispatch({type:"CLEAR_SESSION_GROUPS",eventId:ev.id,key});
    setMsg("Gruppeinddeling slettet.");
  };

  return <div>
    <SH title="Grupper" sub="Upload gruppeinddeling – gælder som standard alle sessioner"/>
    {scoped.length===0
      ?<div style={{color:C.textMuted,textAlign:"center",padding:30}}>Opret et løb først.</div>
      :<>
      <Sel label="Løb" value={selEv} onChange={v=>{setSelEv(v);setPreview(null);setMsg("");}} options={scoped.map(e=>({value:String(e.id),label:e.name}))}/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <Sel label="Klasse" value={activeClass} onChange={v=>{setSelClass(v);setPreview(null);}} options={classes.map(c=>({value:c,label:c}))}/>
        <Sel label="Gælder" value={activeSession} onChange={v=>{setSelSession(v);setPreview(null);}} options={sessionOpts}/>
      </div>
      {activeSession==="*"&&<div style={{color:C.textDim,fontSize:11,marginBottom:6}}>Grupperne gælder alle heats/sessioner for {activeClass}. Vælg en bestemt session i stedet, hvis en enkelt session har en anden inddeling.</div>}
      <Card style={{borderLeft:`3px solid ${C.cyan}`,marginTop:6}}>
        <div style={{color:C.textMuted,fontSize:10,letterSpacing:2,marginBottom:6}}>UPLOAD GRUPPE-CSV</div>
        <div style={{color:C.textDim,fontSize:11,marginBottom:10}}>Filen skal have kolonnerne <b>KartNr</b> og <b>Grp</b> (og gerne Navn). Fx: 27, Kasper..., A</div>
        {existing&&!preview&&<div style={{background:`${C.green}11`,border:`1px solid ${C.green}44`,borderRadius:8,padding:10,marginBottom:10}}>
          <div style={{color:C.green,fontSize:12,fontWeight:700}}>✓ Gruppeinddeling findes ({Object.keys(existing).length} kørere)</div>
          <div style={{color:C.textMuted,fontSize:11,marginTop:2}}>Grupper: {[...new Set(Object.values(existing))].sort().join(", ")}</div>
          <div style={{marginTop:8}}><Btn small variant="danger" onClick={clear}>Slet inddeling</Btn></div>
        </div>}
        <input ref={fileRef} type="file" accept=".csv" style={{display:"none"}} onChange={e=>e.target.files[0]&&onFile(e.target.files[0])}/>
        <Btn small onClick={()=>fileRef.current.click()}>📥 Vælg CSV-fil</Btn>
        {msg&&<div style={{color:C.green,fontSize:12,marginTop:8}}>{msg}</div>}
        {preview&&preview.error&&<div style={{color:C.orange,fontSize:12,marginTop:8}}>⚠️ {preview.error}</div>}
        {preview&&!preview.error&&<div style={{marginTop:10}}>
          <div style={{color:C.text,fontSize:12,fontWeight:700,marginBottom:6}}>Forhåndsvisning: {preview.rows.length} kørere i {preview.groups.length} grupper</div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:8}}>
            {preview.groups.map(g=>{const n=preview.rows.filter(r=>r.group===g).length;return <Badge key={g} color={C.cyan} style={{fontSize:11}}>{g}: {n}</Badge>;})}
          </div>
          <div style={{maxHeight:180,overflowY:"auto",border:`1px solid ${C.border}`,borderRadius:6}}>
            {preview.rows.slice(0,40).map(r=><div key={r.kart} style={{display:"flex",gap:8,padding:"4px 8px",borderBottom:`1px solid ${C.border}`,fontSize:12}}>
              <span style={{color:C.textMuted,minWidth:40}}>#{r.kart}</span>
              <span style={{flex:1,color:C.text}}>{r.name}</span>
              <Badge color={C.cyan} style={{fontSize:10}}>{r.group}</Badge>
            </div>)}
            {preview.rows.length>40&&<div style={{color:C.textDim,fontSize:11,padding:"4px 8px"}}>...og {preview.rows.length-40} mere</div>}
          </div>
          <div style={{display:"flex",gap:8,marginTop:10}}>
            <Btn small onClick={save}>Gem inddeling til {activeClass} · {sessionLabel}</Btn>
            <Btn small variant="ghost" onClick={()=>setPreview(null)}>Annuller</Btn>
          </div>
        </div>}
      </Card>
      </>}
  </div>;
}

function AdminRegulations({state,dispatch}){
  const [title,setTitle]=useState("");

  const [busy,setBusy]=useState(false);
  const [msg,setMsg]=useState("");
  const fileRef=useRef();
  const regs=state.regulations||[];
  const upload=async()=>{
    if(!title.trim()||!file){setMsg("Udfyld titel og vælg en PDF.");return;}
    setBusy(true);setMsg("");
    try{
      let url=null;
      if(sb){
        const ext=(file.name.split(".").pop()||"pdf").toLowerCase();
        const path=`regulations/${Date.now()}_${title.trim().replace(/[^a-z0-9]/gi,"_")}.${ext}`;
        const {error:upErr}=await sb.storage.from("documents").upload(path,file,{contentType:file.type||"application/pdf",upsert:false});
        if(upErr){setMsg("Upload fejlede: "+upErr.message);setBusy(false);return;}
        const {data:pub}=sb.storage.from("documents").getPublicUrl(path);
        url=pub.publicUrl;
      }
      dispatch({type:"ADD_REGULATION",payload:{title:title.trim(),url,file:file.name,updated:new Date().toISOString().slice(0,10)}});
      setTitle("");setFile(null);if(fileRef.current)fileRef.current.value="";
      setMsg("✓ Reglement uploadet");
    }catch(e){setMsg(String(e.message||e));}
    setBusy(false);

    <Card style={{marginBottom:12,borderLeft:`3px solid ${C.red}`}}>

      {msg&&<div style={{color:msg.startsWith("✓")?C.green:C.orange,fontSize:12,marginTop:8}}>{msg}</div>}
    </Card>
    <div style={{color:C.textMuted,fontSize:10,letterSpacing:2,marginBottom:8}}>REGLEMENTER ({regs.length})</div>

function AdminKartRegister({state,dispatch}){
  const t=useT();
  const reg=state.kartRegister||{ranges:{},numbers:{}};
  const classes=sortClassesByAge(Object.keys(state.classRules||{}),state.classRules);
  const [cls,setCls]=useState(classes[0]||"");
  const activeCls=classes.includes(cls)?cls:classes[0]||"";
  const range=kartRange(reg,activeCls);
  const [rStart,setRStart]=useState(range?.start||"");
  const [rEnd,setREnd]=useState(range?.end||"");
  const [sel,setSel]=useState(null); // valgt nummer {num,owner}
  const [reassignId,setReassignId]=useState("");
  const [relDate,setRelDate]=useState(reg.releaseDate||"");
  const [renewDate,setRenewDate]=useState(reg.renewOpenDate||"");
  const [msg,setMsg]=useState("");
  const csvRef=useRef();

  // Opdater interval-felter når klasse skifter
  useEffect(()=>{const r=kartRange(reg,activeCls);setRStart(r?.start||"");setREnd(r?.end||"");setSel(null);},[activeCls]);

  const saveRange=()=>{
    const s=parseInt(rStart),e=parseInt(rEnd);
    if(!s||!e||s>e){setMsg("Ugyldigt interval");return;}
    dispatch({type:"SET_KART_RANGE",className:activeCls,start:s,end:e});
    setMsg(`Interval for ${activeCls}: ${s}–${e}`);
  };
  const saveDates=()=>{
    dispatch({type:"SET_KART_DATES",releaseDate:relDate||"",renewOpenDate:renewDate||""});
    setMsg("Datoer gemt");
  };

  const release=(num)=>{dispatch({type:"RELEASE_KART",className:activeCls,number:num});setSel(null);};
  const reassign=(num)=>{
    if(!reassignId)return;
    const usr=state.users.find(x=>String(x.id)===String(reassignId));
    if(!usr)return;
    dispatch({type:"CLAIM_KART",className:activeCls,number:num,ownerId:usr.id,ownerName:usr.name,ownerLicense:usr.license||""});
    setReassignId("");setSel(null);setMsg(`#${num} tildelt ${usr.name}`);
  };
  const toggleRenew=(num,owner)=>{
    // admin kan manuelt markere/afmarkere fornyelse
    if(owner.renewed)dispatch({type:"CLAIM_KART",className:activeCls,number:num,ownerId:owner.ownerId,ownerName:owner.ownerName,ownerLicense:owner.ownerLicense});
    else dispatch({type:"RENEW_KART",className:activeCls,number:num,ownerId:owner.ownerId});
    setSel(null);
  };

  const runAnnual=()=>{
    const cnt=Object.values(reg.numbers||{}).reduce((a,nums)=>a+Object.values(nums).filter(i=>!i.renewed).length,0);
    const renewed=Object.values(reg.numbers||{}).reduce((a,nums)=>a+Object.values(nums).filter(i=>i.renewed).length,0);
    if(!window.confirm(`Kør årlig frigivelse?\n\nDette frigiver ${cnt} ikke-fornyet nummer(e). ${renewed} fornyet nummer(e) beholdes (og nulstilles til næste sæson).\n\nHandlingen kan ikke fortrydes.`))return;
    dispatch({type:"RUN_ANNUAL_RELEASE"});
    setMsg(`Årlig frigivelse kørt – ${cnt} frigivet, ${renewed} beholdt`);
  };

  // ── CSV import (ID-nummer + kartnummer) ──
  const onCsv=(file)=>{
    if(!file)return;
    const reader=new FileReader();
    reader.onload=()=>{
      const buf=new Uint8Array(reader.result);
      let text;
      if(buf[0]===0xFF&&buf[1]===0xFE)text=new TextDecoder("utf-16le").decode(buf);
      else if(buf[0]===0xFE&&buf[1]===0xFF)text=new TextDecoder("utf-16be").decode(buf);
      else text=new TextDecoder("utf-8").decode(buf);
      text=text.replace(/^\uFEFF/,"");
      const split=(l)=>l.includes(";")?l.split(";"):l.split(",");
      const lines=text.split(/\r?\n/).filter(l=>l.trim());
      if(lines.length<2){setMsg("Tom CSV");return;}
      const head=split(lines[0]).map(h=>h.trim().toLowerCase());
      // Kart-kolonne først (mere specifik), så ID-kolonne
      let ki=head.findIndex(h=>h.includes("kart"));
      if(ki<0)ki=head.findIndex(h=>h==="nr"||h==="nr."||h==="nummer");
      let idi=head.findIndex((h,i)=>i!==ki&&(h.includes("id")||h.includes("licens")));
      if(idi<0||ki<0){setMsg("Kunne ikke finde ID- og kartnummer-kolonner");return;}
      const entries=[];
      lines.slice(1).forEach(l=>{
        const f=split(l);
        const id=(f[idi]||"").trim();
        const num=parseInt((f[ki]||"").replace(/\D/g,""));
        if(!id||!num)return;
        // find matchende profil via licens/ID
        const usr=state.users.find(x=>x.license&&String(x.license).replace(/\D/g,"")===id.replace(/\D/g,""));
        entries.push({className:activeCls,number:num,ownerId:usr?.id||null,ownerName:usr?.name||("ID "+id),ownerLicense:id});
      });
      dispatch({type:"IMPORT_KART_NUMBERS",entries});
      setMsg(`${entries.length} kartnumre importeret til ${activeCls}`);
    };
    reader.readAsArrayBuffer(file);
  };

  const exportCsv=()=>{
    let csv="\uFEFFKlasse;Kartnummer;Ejer;Licens/ID;Frigives\n";
    Object.entries(reg.numbers||{}).forEach(([c,nums])=>{
      Object.entries(nums).sort((a,b)=>a[0]-b[0]).forEach(([num,info])=>{
        csv+=`${c};${num};"${info.ownerName||""}";${info.ownerLicense||""};${info.releaseDate||""}\n`;
      });
    });
    const a=document.createElement("a");
    a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8"}));
    a.download="kartnummer_register_"+new Date().toISOString().slice(0,10)+".csv";
    a.click();
  };

  const nums=reg.numbers?.[activeCls]||{};
  const takenCount=Object.keys(nums).length;
  const total=range?(range.end-range.start+1):0;

  return <div>
    <SH title="Kartnummer-register" sub="Intervaller, tildeling og frigivelse pr. klasse"/>
    {msg&&<div style={{background:`${C.green}22`,border:`1px solid ${C.green}44`,borderRadius:8,padding:10,marginBottom:10,color:C.green,fontSize:12,fontWeight:600}}>{msg}</div>}

    <div style={{display:"flex",gap:6,overflowX:"auto",marginBottom:12,paddingBottom:4}}>
      {classes.map(c=><button key={c} onClick={()=>setCls(c)} style={{background:activeCls===c?state.classRules[c]?.color||C.red:C.surface2,color:activeCls===c?"#fff":C.textMuted,border:`1px solid ${activeCls===c?state.classRules[c]?.color||C.red:C.border}`,borderRadius:20,padding:"5px 14px",fontSize:12,cursor:"pointer",whiteSpace:"nowrap",fontFamily:"inherit",fontWeight:activeCls===c?700:400}}>{c}</button>)}
    </div>

    {/* Globale datoer */}
    <Card style={{borderLeft:`3px solid ${C.orange}`}}>
      <div style={{color:C.textMuted,fontSize:10,letterSpacing:2,marginBottom:8}}>ÅRLIGE DATOER (gælder alle klasser)</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <Input label="Fornyelse åbner" value={renewDate} onChange={setRenewDate} placeholder="2026-12-18"/>
        <Input label="Frigivelsesdato" value={relDate} onChange={setRelDate} placeholder="2027-01-01"/>

// ── CSV IMPORT (MESTERSKABSSTILLING) ──────────────────────────────
// Parser CSV eksporteret fra RMC beregnings-værktøjet.
// Format: Pl.,Nr.,Navn, [Afd.N Kval,Afd.N Heats,Afd.N Pre,Afd.N Finale]... ,Total[,Med fratræk]
function parseStandingsCsv(arrayBuffer,fileName){
  const buf=new Uint8Array(arrayBuffer);
  let text;
  if(buf[0]===0xFF&&buf[1]===0xFE)text=new TextDecoder("utf-16le").decode(buf);
  else if(buf[0]===0xFE&&buf[1]===0xFF)text=new TextDecoder("utf-16be").decode(buf);
  else text=new TextDecoder("utf-8").decode(buf);
  text=text.replace(/^\uFEFF/,"");
  const splitLine=(line)=>{
    const out=[];let cur="";let inQ=false;
    for(let i=0;i<line.length;i++){
      const ch=line[i];
      if(ch==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
      else if(ch===","&&!inQ){out.push(cur);cur="";}
      else cur+=ch;
    }
    out.push(cur);return out;
  };
  const lines=text.split(/\r?\n/).filter(l=>l.trim().length>0);
  if(lines.length<2)return{error:"Filen indeholder ingen datarækker"};
  const header=splitLine(lines[0]).map(h=>h.trim());
  // Find afdelinger ud fra "Afd.N Kval"-kolonner
  const rounds=[];
  header.forEach(h=>{const m=h.match(/^Afd\.(\d+)\s+Kval$/i);if(m)rounds.push(parseInt(m[1]));});
  if(header[0].toLowerCase().indexOf("pl")!==0||!rounds.length)
    return{error:"Ukendt format – forventede en mesterskabs-CSV fra beregningsværktøjet (Pl., Nr., Navn, Afd.1 Kval ...)"};
  const hasDrop=header[header.length-1].toLowerCase().includes("fratræk")||header[header.length-1].toLowerCase().includes("fratraek");
  // Klassenavn: udled fra filnavnet (RMC_DK_2026_Rotax_Junior.csv → "Rotax Junior")
  let className=(fileName||"").replace(/\.csv$/i,"");
  className=className.replace(/^RMC[_ ]?DK[_ ]?\d{0,4}[_ ]?/i,"");
  className=className.replace(/plus/gi,"+").replace(/_/g," ").trim();
  if(!className)className="Ukendt klasse";
  const rows=lines.slice(1).map(line=>{
    const f=splitLine(line);
    const segs={};
    rounds.forEach((rn,ri)=>{
      const base=3+ri*4;
      segs[rn]={kval:f[base]||"",heats:f[base+1]||"",pre:f[base+2]||"",finale:f[base+3]||""};
    });
    const totalIdx=3+rounds.length*4;
    return{
      pos:parseInt(f[0])||null,
      nr:(f[1]||"").trim(),
      name:(f[2]||"").trim(),
      segs,
      total:(f[totalIdx]||"").trim(),
      drop:hasDrop?(f[totalIdx+1]||"").trim():null,
    };
  }).filter(r=>r.name);
  return{error:null,className,rounds,hasDrop,rows};
}


// Robust tekst-afkodning: prøver UTF-16, UTF-8, og til sidst Windows-1252 (Excel/ANSI).
function decodeCsvBytes(arrayBuffer){
  const buf=new Uint8Array(arrayBuffer);
  if(buf[0]===0xFF&&buf[1]===0xFE)return new TextDecoder("utf-16le").decode(buf).replace(/^\uFEFF/,"");
  if(buf[0]===0xFE&&buf[1]===0xFF)return new TextDecoder("utf-16be").decode(buf).replace(/^\uFEFF/,"");
  try{return new TextDecoder("utf-8",{fatal:true}).decode(buf).replace(/^\uFEFF/,"");}
  catch(e){return new TextDecoder("windows-1252").decode(buf).replace(/^\uFEFF/,"");}
}

// Læs gruppe-CSV: KartNr, Navn, Grp. Returnerer {rows:[{kart,name,group}], groups, error}.
function parseGroupCsv(arrayBuffer){
  let text;
  try{text=decodeCsvBytes(arrayBuffer);}catch(e){return{rows:[],error:"Kunne ikke læse filen"};}
  const splitLine=(line)=>{
    const sep=(line.split(";").length>line.split(",").length)?";":",";
    if(!line.includes('"'))return line.split(sep);
    const out=[];let cur="";let inQ=false;
    for(let i=0;i<line.length;i++){const ch=line[i];
      if(ch==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
      else if(ch===sep&&!inQ){out.push(cur);cur="";}
      else cur+=ch;}
    out.push(cur);return out;
  };
  const lines=text.split(/\r?\n/).filter(l=>l.trim().length>0);
  if(lines.length<2)return{rows:[],error:"Filen indeholder ingen datarækker"};
  const headers=splitLine(lines[0]).map(h=>h.trim().toLowerCase());
  const findCol=(names)=>{for(const n of names){const i=headers.findIndex(h=>h.replace(/\s/g,"")===n);if(i>=0)return i;}return -1;};
  const ki=findCol(["kartnr","kartnummer","kart","nr","no","no."]);
  const gi=findCol(["grp","gruppe","group"]);
  const ni=findCol(["navn","name"]);
  if(ki<0||gi<0)return{rows:[],error:'Mangler kolonner. Filen skal have "KartNr" og "Grp".'};
  const rows=[];const seen=new Set();
  lines.slice(1).forEach(line=>{
    const f=splitLine(line);
    const kart=parseInt((f[ki]||"").trim());
    const group=(f[gi]||"").trim().toUpperCase();
    const name=ni>=0?(f[ni]||"").trim():"";
    if(!kart||!group)return;
    if(seen.has(kart))return;
    seen.add(kart);
    rows.push({kart,group,name});
  });
  const groups=[...new Set(rows.map(r=>r.group))].sort();
  return{rows,groups,error:rows.length?null:"Ingen gyldige rækker fundet"};
}

function parseDasuCsv(arrayBuffer,appClasses){
  // appClasses = liste af klassenavne brugeren har oprettet i appen (til smart matching)
  const buf=new Uint8Array(arrayBuffer);
  let text;
  if(buf[0]===0xFF&&buf[1]===0xFE)text=new TextDecoder("utf-16le").decode(buf);
  else if(buf[0]===0xFE&&buf[1]===0xFF)text=new TextDecoder("utf-16be").decode(buf);
  else text=new TextDecoder("utf-8").decode(buf);
  text=text.replace(/^\uFEFF/,"");
  const splitLine=(line)=>{
    if(!line.includes('"'))return line.split(";");
    const out=[];let cur="";let inQ=false;
    for(let i=0;i<line.length;i++){
      const ch=line[i];
      if(ch==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
      else if(ch===";"&&!inQ){out.push(cur);cur="";}
      else cur+=ch;
    }
    out.push(cur);return out;
  };
  const lines=text.split(/\r?\n/).filter(l=>l.trim().length>0);
  if(lines.length<2)return{error:"Filen indeholder ingen datarækker",rows:[]};
  const headers=splitLine(lines[0]).map(h=>h.trim().toLowerCase());
  const col=(names)=>{for(const n of names){const i=headers.indexOf(n.toLowerCase());if(i>=0)return i;}return -1;};
  const ci={
    name:col(["Navn"]),license:col(["ID-nummer","ID nummer","Licensnummer"]),dob:col(["Fødselsdag","Foedselsdag"]),
    club:col(["Klubnavn"]),phone:col(["Telefon"]),email:col(["E-mailadresse","Email","E-mail"]),
    cls:col(["Klasse"]),licenseType:col(["Licenstype"]),licenseOk:col(["Licens OK"]),
    transponder:col(["Transponder"]),kartNo:col(["KartNr","Kart Nr","Kartnummer"]),
    country:col(["Land","Nationalitet","Country"]),
    engineMake:col(["Motorfabrikat"]),kartMake:col(["Kartfabrikat"]),
    address:col(["Adresse"]),zip:col(["Postnummer"]),city:col(["By"]),clubCode:col(["Klubkode"]),
    guardian:col(["Værges navn","Vaerges navn"]),paid:col(["Betaling modtaget"]),
  };
  if(ci.name<0||ci.cls<0)return{error:"Kunne ikke finde kolonnerne 'Navn' og 'Klasse' – er det en DASU-deltagerliste?",rows:[]};
  // Smart klasse-matching: sammenlign DASU-klassen med brugerens EGNE oprettede klasser.
  const canon=(s)=>(s||"")
    .toLowerCase()
    .replace(/\s*\(.*?\)\s*/g,"")   // fjern parenteser, fx "(32+)"
    .replace(/[^a-z0-9+]/g,"")       // kun bogstaver/tal/plus (så mellemrum/bindestreg ignoreres)
    .trim();
  const classList=(appClasses&&appClasses.length?appClasses:Object.keys(DEFAULT_CLASSES));
  const canonMap=classList.map(name=>({name,key:canon(name)}));
  const normClass=(c)=>{
    const raw=c.replace(/\s*\(.*\)\s*/g,"").trim();
    const key=canon(c);
    if(!key)return raw;
    const hasPlus=key.endsWith("+");
    // Kun kandidater med samme +/- status (så "Master" og "Master+" ikke forveksles)
    const sameplus=canonMap.filter(x=>x.key.endsWith("+")===hasPlus);
    const pool=sameplus.length?sameplus:canonMap;
    // 1) eksakt match
    let hit=pool.find(x=>x.key===key);
    if(hit)return hit.name;
    // 2) Find bedste delvise match: den kandidat hvis nøgle deler flest tegn med DASU-klassen.
    //    Vi foretrækker den LÆNGSTE kandidat-nøgle, der er indeholdt i (eller indeholder) DASU-nøglen,
    //    så "Rotax DD2 Master" vinder over "Rotax DD2".
    let best=null,bestLen=0;
    for(const x of pool){
      const contained=key.includes(x.key)||x.key.includes(key);
      if(contained){
        const score=Math.min(x.key.length,key.length);
        if(score>bestLen){bestLen=score;best=x;}
      }
    }
    if(best)return best.name;
    // 3) intet match – behold rå DASU-navn (giver "findes ikke på løbet"-advarsel)
    return raw;
  };
  const normDate=(d)=>{const m=(d||"").trim().match(/^(\d{2})-(\d{2})-(\d{4})$/);return m?`${m[3]}-${m[2]}-${m[1]}`:(d||"").trim();};
  // Oversæt landenavn (dansk/engelsk) til ISO-kode. Tom/ukendt → "" (behandles som dansk).
  const normCountry=(name)=>{
    const x=(name||"").trim();
    if(!x)return "";
    if(x.length===2)return x.toUpperCase(); // allerede en kode
    const low=x.toLowerCase();
    const hit=(typeof COUNTRIES!=="undefined"?COUNTRIES:[]).find(c=>c.da.toLowerCase()===low||c.en.toLowerCase()===low);
    return hit?hit.code:"";
  };
  const g=(f,i)=>ci[i]>=0?(f[ci[i]]||"").trim():"";
  const rows=lines.slice(1).map(line=>{
    const f=splitLine(line);
    const rawClass=g(f,"cls");
    const onsite=/betal tilmeldingsgebyret/i.test(rawClass);
    return{
      name:g(f,"name"),license:g(f,"license"),dob:normDate(g(f,"dob")),club:g(f,"club"),
      phone:g(f,"phone"),email:g(f,"email"),class:normClass(rawClass),licenseType:g(f,"licenseType"),
      licenseOk:g(f,"licenseOk").toLowerCase()==="ja",transponder:g(f,"transponder"),
      country:normCountry(g(f,"country")),
      engineMake:g(f,"engineMake"),kartMake:g(f,"kartMake"),
      address:g(f,"address"),zip:g(f,"zip"),city:g(f,"city"),clubCode:g(f,"clubCode"),
      kartNo:parseInt(g(f,"kartNo"))||null,guardian:g(f,"guardian"),
      paid:g(f,"paid").toUpperCase()==="ACCEPTED",onsite,
    };
  }).filter(r=>r.name);
  return{error:null,rows};
}

function AdminImport({state,dispatch,seriesScope}){
  const scopedEvs=eventsInScope(state.events,seriesScope);
  const selEv=getAdminSelEv(state,scopedEvs);
  const setSelEv=v=>setAdminSelEv(dispatch,v);
  const [parsed,setParsed]=useState(null);
  const [fileName,setFileName]=useState("");
  const [importedMsg,setImportedMsg]=useState("");
  const fileRef=useRef();
  const ev=state.events.find(e=>e.id===parseInt(selEv));

  const onFile=(file)=>{
    if(!file)return;
    setFileName(file.name);setImportedMsg("");
    const reader=new FileReader();
    reader.onload=()=>setParsed(parseDasuCsv(reader.result,Object.keys(state.classRules||{})));
    reader.readAsArrayBuffer(file);
  };

  const doImport=()=>{
    if(!parsed||!parsed.rows.length||!ev)return;
    const batchId="import-"+Date.now();
    dispatch({type:"IMPORT_PARTICIPANTS",eventId:ev.id,batchId,rows:parsed.rows});
    setImportedMsg(`${parsed.rows.length} deltagere importeret til ${ev.name}`);
    setParsed(null);setFileName("");
  };

  // Eksisterende import-batches (på tværs af alle løb)
  const batches={};
  state.events.forEach(e=>(e.registrations||[]).forEach(r=>{
    if(r.importBatch){
      if(!batches[r.importBatch])batches[r.importBatch]={count:0,events:new Set()};
      batches[r.importBatch].count++;batches[r.importBatch].events.add(e.name);
    }
  }));
  const batchList=Object.entries(batches);

  const evClasses=sortClassesByAge(ev?.classes||Object.keys(state.classRules),state.classRules);
  const classCounts={};const warnings=[];
  if(parsed&&!parsed.error){
    parsed.rows.forEach(r=>{classCounts[r.class]=(classCounts[r.class]||0)+1;});
    const unknown=[...new Set(parsed.rows.filter(r=>!evClasses.includes(r.class)).map(r=>r.class))];
    if(unknown.length)warnings.push(`Klasser der ikke findes på løbet: ${unknown.join(", ")}`);
    const noKart=parsed.rows.filter(r=>!r.kartNo).length;
    if(noKart)warnings.push(`${noKart} deltager(e) uden kartnummer`);
    const dup={};
    parsed.rows.forEach(r=>{if(r.kartNo){const k=r.class+"#"+r.kartNo;dup[k]=(dup[k]||0)+1;}});
    const dups=Object.entries(dup).filter(([,n])=>n>1).map(([k])=>k);
    if(dups.length)warnings.push(`Dublerede kartnumre i samme klasse: ${dups.join(", ")}`);
    Object.entries(classCounts).forEach(([cls,n])=>{
      const m=classLimitFor(ev,cls);
      if(m&&(classCount(ev,cls)+n)>m)warnings.push(`${cls}: import giver ${classCount(ev,cls)+n} tilmeldte – maks er ${m}`);
    });
  }

  return <div>
    <SH title="CSV Import" sub="Testimport af deltagerliste fra DASU"/>
    <div style={{background:`${C.blue}11`,border:`1px solid ${C.blue}44`,borderRadius:6,padding:8,marginBottom:10,fontSize:11,color:C.blue}}>
      Importér en deltagerliste (CSV) fra DASU-tilmeldingssystemet, så systemet kan testes live sideløbende – uden at deltagerne skal tilmelde sig her. Der oprettes kørerprofiler og tilmeldinger på det valgte løb. Alt kan fjernes igen med ét klik.
    </div>
    {importedMsg&&<div style={{background:`${C.green}22`,border:`1px solid ${C.green}44`,borderRadius:8,padding:12,marginBottom:10,color:C.green,fontWeight:700,textAlign:"center"}}>✅ {importedMsg}</div>}
    <Card style={{borderLeft:`3px solid ${C.red}`}}>
      <Sel label="Importér til løb" value={selEv} onChange={setSelEv} options={eventsInScope(state.events,seriesScope).map(e=>({value:String(e.id),label:e.name}))}/>
      <input type="file" accept=".csv,text/csv" style={{display:"none"}} ref={fileRef} onChange={e=>{onFile(e.target.files[0]);e.target.value="";}}/>
      <div onClick={()=>fileRef.current?.click()} style={{textAlign:"center",padding:"16px",background:C.bg,borderRadius:6,border:`2px dashed ${C.border}`,cursor:"pointer",marginBottom:10}}>
        <div style={{fontSize:22}}>📥</div>
        <div style={{color:C.text,fontSize:13,fontWeight:700}}>{fileName||"Vælg CSV-fil fra DASU"}</div>
        <div style={{color:C.textMuted,fontSize:11}}>Semikolon-separeret · UTF-8 eller UTF-16</div>
      </div>
      {parsed&&parsed.error&&<div style={{background:`${C.red}11`,border:`1px solid ${C.red}44`,borderRadius:6,padding:10,color:C.red,fontSize:12,fontWeight:700}}>⚠️ {parsed.error}</div>}
      {parsed&&!parsed.error&&<div>
        <div style={{color:C.textMuted,fontSize:10,letterSpacing:2,marginBottom:6}}>FORHÅNDSVISNING – {parsed.rows.length} DELTAGERE</div>
        <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:8}}>
          {Object.entries(classCounts).map(([cls,n])=><Badge key={cls} color={evClasses.includes(cls)?state.classRules[cls]?.color||C.red:C.orange} style={{fontSize:10}}>{cls}: {n}</Badge>)}
        </div>
        {warnings.map((w,i)=><div key={i} style={{background:`${C.orange}11`,border:`1px solid ${C.orange}44`,borderRadius:6,padding:8,marginBottom:6,fontSize:11,color:C.orange}}>⚠️ {w}</div>)}
        <div style={{maxHeight:260,overflowY:"auto",border:`1px solid ${C.border}`,borderRadius:6,marginBottom:10}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
            <thead><tr style={{background:C.surface2,position:"sticky",top:0}}>{["Kart","Navn","Klasse","Licens","Klub","Betalt"].map(h=><th key={h} style={{padding:"6px 8px",color:C.textMuted,fontWeight:600,textAlign:"left",fontSize:9,letterSpacing:1}}>{h}</th>)}</tr></thead>
            <tbody>{parsed.rows.map((r,i)=><tr key={i} style={{borderBottom:`1px solid ${C.border}`}}>
              <td style={{padding:"5px 8px",fontFamily:"monospace",color:C.textMuted}}>{r.kartNo?"#"+r.kartNo:"—"}</td>
              <td style={{padding:"5px 8px",fontWeight:700,color:C.text}}>{r.name}</td>
              <td style={{padding:"5px 8px",color:evClasses.includes(r.class)?C.textMuted:C.orange}}>{r.class}</td>
              <td style={{padding:"5px 8px",color:r.licenseOk?C.green:C.textDim}}>{r.license}{r.licenseOk?" ✓":""}</td>
              <td style={{padding:"5px 8px",color:C.textMuted}}>{r.club}</td>
              <td style={{padding:"5px 8px",color:r.paid?C.green:C.orange}}>{r.paid?"✓ Betalt":"På banen"}</td>
            </tr>)}</tbody>
          </table>
        </div>
        <Btn onClick={doImport} style={{width:"100%"}} disabled={!parsed.rows.length}>📥 IMPORTÉR {parsed.rows.length} DELTAGERE TIL {ev?.name?.toUpperCase()||"LØB"}</Btn>
      </div>}
    </Card>
    {/* Eksisterende importer */}
    {batchList.length>0&&<Card style={{borderLeft:`3px solid ${C.orange}`}}>
      <div style={{color:C.textMuted,fontSize:10,letterSpacing:2,marginBottom:8}}>IMPORTEREDE TESTDATA ({batchList.length})</div>
      {batchList.map(([bid,info])=><div key={bid} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 0",borderBottom:`1px solid ${C.border}`}}>
        <div style={{flex:1}}>
          <div style={{fontWeight:700,color:C.text,fontSize:12}}>{[...info.events].join(", ")}</div>
          <div style={{color:C.textMuted,fontSize:10}}>{info.count} tilmeldinger · {new Date(parseInt(bid.replace("import-","")))?.toLocaleString?.("da-DK")||bid}</div>
        </div>
        <Btn small variant="danger" onClick={()=>dispatch({type:"REMOVE_IMPORT_BATCH",batchId:bid})}>Fjern import</Btn>
      </div>)}
      <div style={{color:C.textDim,fontSize:10,marginTop:6}}>Fjerner både tilmeldinger og de kørerprofiler der blev oprettet ved importen.</div>
    </Card>}
  </div>;
}

// Filtrer løb til en sub-admins serier. scope=null → alle løb (hoved-admin).
function eventsInScope(events,scope){
  if(!scope)return events;
  const set=new Set(scope.map(Number));
  return (events||[]).filter(e=>set.has(Number(e.seriesId)));
}

function getAdminSelEv(state,scopedEvents){
  const raw=state.uiPrefs?.adminEv;
  if(raw&&raw!=="Alle"&&scopedEvents.some(e=>String(e.id)===String(raw)))return String(raw);
  return scopedEvents[0]?String(scopedEvents[0].id):"";
}
function setAdminSelEv(dispatch,value){
  dispatch({type:"SET_UI_PREF",key:"adminEv",value});
}

// Grov landsdels-inddeling ud fra postnummer (vejledende, ikke en officiel opslagstabel).
function zipToRegion(zip){
  const z=parseInt(zip);
  if(!z||isNaN(z))return null;
  if(z>=900&&z<=999)return "Hovedstaden (Bornholm)";
  if(z>=1000&&z<=3699)return "Hovedstaden";
  if(z>=3700&&z<=3799)return "Hovedstaden (Bornholm)";
  if(z>=4000&&z<=4999)return "Sjælland";
  if(z>=5000&&z<=5999)return "Syddanmark (Fyn)";
  if(z>=6000&&z<=6999)return "Syddanmark (Sydjylland)";
  if(z>=7000&&z<=7599)return "Midtjylland (Vest)";
  if(z>=7600&&z<=7999)return "Midtjylland (Nord)";
  if(z>=8000&&z<=8999)return "Midtjylland (Øst)";
  if(z>=9000&&z<=9999)return "Nordjylland";
  return null;
}
// Klub- og landsdelsfordeling for en liste af tilmeldinger, sorteret efter antal.
function regDistribution(regs,users){
  const clubCount={},regionCount={};
  (regs||[]).forEach(r=>{
    const u=(users||[]).find(u=>u.id===r.userId);
    const club=u?.club||"Ukendt klub";
    clubCount[club]=(clubCount[club]||0)+1;
    const region=zipToRegion(u?.zip)||"Ukendt";
    regionCount[region]=(regionCount[region]||0)+1;
  });
  return{
    total:(regs||[]).length,
    topClubs:Object.entries(clubCount).sort((a,b)=>b[1]-a[1]),
    topRegions:Object.entries(regionCount).sort((a,b)=>b[1]-a[1]),
  };
}
// Simpel vandret bar-liste til statistik-kort.
function StatBarList({data,total,color=C.red,limit=6}){
  if(!data||data.length===0)return <div style={{color:C.textDim,fontSize:11}}>Ingen data endnu</div>;
  return <div>
    {data.slice(0,limit).map(([label,count])=><div key={label} style={{marginBottom:6}}>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:2}}>
        <span style={{color:C.text}}>{label}</span>
        <span style={{color:C.textMuted}}>{count} ({total?Math.round((count/total)*100):0}%)</span>
      </div>
      <div style={{background:C.bg,borderRadius:4,height:5,overflow:"hidden"}}>
        <div style={{width:`${total?(count/total)*100:0}%`,height:"100%",background:color,borderRadius:4}}/>
      </div>
    </div>)}
    {data.length>limit&&<div style={{color:C.textDim,fontSize:10}}>+{data.length-limit} flere</div>}
  </div>;
}

function App(){
  const [state,dispatch]=useReducer(reducer,initialState);
  const [sync,setSync]=useState(sb?"loading":"local");
  const skipNextSave=useRef(true);
  const lastSaved=useRef("");
  const loaded=useRef(false);
  const notifCount=useRef(null);
  const audioCtxRef=useRef(null);

  // Registrér service worker (nødvendig for push-notifikationer)
  useEffect(()=>{ if(pushSupported())registerServiceWorker(); },[]);

  // Afspil lyd når der kommer en ny notifikation (efter første indlæsning)
  useEffect(()=>{
    try{
      const u=state.currentUser;
      const isOff=u?.isOfficial||u?.type==="official"||u?.isAdmin;
      const isAdminOrSub=u?.isAdmin||u?.isSubAdmin||u?.type==="admin";
      const myClasses=new Set();
      if(u?.class)myClasses.add(u.class);
      childrenOf(state.users,u).forEach(c=>{if(c.class)myClasses.add(c.class);});
      const relevant=(state.notifications||[]).filter(n=>(!n.adminOnly||isAdminOrSub)&&(!n.officialsOnly||isOff)&&(isOff||!n.targetClass||n.targetClass==="Alle"||myClasses.has(n.targetClass)));
      const count=relevant.length;
      if(notifCount.current===null){notifCount.current=count;return;}
      if(count>notifCount.current&&u){
        try{
          if(!audioCtxRef.current)audioCtxRef.current=new (window.AudioContext||window.webkitAudioContext)();
          const ctx=audioCtxRef.current;
          if(ctx.state==="suspended")ctx.resume();
          [[880,0],[1174,0.12]].forEach(([freq,tOff])=>{
            const osc=ctx.createOscillator(),gain=ctx.createGain();
            osc.type="sine";osc.frequency.value=freq;
            osc.connect(gain);gain.connect(ctx.destination);
            gain.gain.setValueAtTime(0.001,ctx.currentTime+tOff);
            gain.gain.exponentialRampToValueAtTime(0.25,ctx.currentTime+tOff+0.02);
            gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+tOff+0.18);
            osc.start(ctx.currentTime+tOff);osc.stop(ctx.currentTime+tOff+0.2);
          });
        }catch(e){/* lyd ikke tilgængelig */}
      }
      notifCount.current=count;
    }catch(e){/* aldrig crash på lyd */}
  },[state.notifications,state.currentUser]);

  // 1) Hent gemt tilstand + profiler ved opstart, genopret evt. login
  useEffect(()=>{
    if(!sb){return;}
    let channel,profChannel;
    (async()=>{
      // Hent Auth-profiler
      const profiles=await loadProfiles();
      dispatch({type:"SET_PROFILES",payload:profiles});

      // Hent app-tilstand
      const {data,error}=await sb.from("app_state").select("data").eq("id",1).maybeSingle();
      if(error){console.error("Supabase load:",error);setSync("error");}
      else if(data&&data.data){
        skipNextSave.current=true;
        lastSaved.current=JSON.stringify(stripLocal({...initialState,...data.data}));
        dispatch({type:"HYDRATE",payload:data.data});
        setSync("synced");
      }else{
        const seed=stripLocal(initialState);
        const {error:insErr}=await sb.from("app_state").insert({id:1,data:seed,client:CLIENT_ID});
        if(insErr){console.error("Supabase seed:",insErr);setSync("error");}
        else{lastSaved.current=JSON.stringify(seed);setSync("synced");}
      }

      // Genopret login hvis Auth-session findes
      const {data:sess}=await sb.auth.getSession();
      const uid=sess?.session?.user?.id;
      let loggedInProfile=null;
      if(uid){
        const {data:prof}=await sb.from("profiles").select("*").eq("id",uid).maybeSingle();
        if(prof){loggedInProfile=prof;dispatch({type:"LOGIN",payload:rowToUser(prof)});}
      }
      loaded.current=true;

      // Vej A: Ryd front fairing-billeder ældre end 30 dage (kun når en admin åbner appen)
      if(loggedInProfile?.is_admin){
        try{
          const cutoff=Date.now()-30*24*60*60*1000;
          const {data:files}=await sb.storage.from("documents").list("nose-photos",{limit:1000});
          // undermapper pr. løb
          if(files){
            for(const folder of files){
              if(folder.id)continue; // en fil, ikke mappe
              const {data:sub}=await sb.storage.from("documents").list("nose-photos/"+folder.name,{limit:1000});
              const toDelete=(sub||[]).filter(f=>new Date(f.created_at||f.updated_at||0).getTime()<cutoff).map(f=>`nose-photos/${folder.name}/${f.name}`);
              if(toDelete.length)await sb.storage.from("documents").remove(toDelete);
            }
          }
        }catch(e){console.warn("Front fairing-oprydning:",e);}
      }

      // Realtime: app-tilstand
      channel=sb.channel("app_state_sync")
        .on("postgres_changes",{event:"UPDATE",schema:"public",table:"app_state",filter:"id=eq.1"},async(payload)=>{
          if(payload.new?.client===CLIENT_ID)return;
          const {data:row}=await sb.from("app_state").select("data").eq("id",1).maybeSingle();
          if(row?.data){
            skipNextSave.current=true;
            lastSaved.current=JSON.stringify(stripLocal({...initialState,...row.data}));
            dispatch({type:"HYDRATE",payload:row.data});
          }
        })
        .subscribe();

      // Realtime: profiler (nye brugere / ændringer fra andre enheder)
      profChannel=sb.channel("profiles_sync")
        .on("postgres_changes",{event:"*",schema:"public",table:"profiles"},async()=>{
          const fresh=await loadProfiles();
          dispatch({type:"SET_PROFILES",payload:fresh});
        })
        .subscribe();
    })();
    return()=>{if(channel)sb.removeChannel(channel);if(profChannel)sb.removeChannel(profChannel);};
  },[]);

  // Genhent data når vinduet får fokus / bliver synligt igen (fanger evt. mistede realtime-opdateringer)
  useEffect(()=>{
    if(!sb)return;
    const refresh=async()=>{
      if(document.hidden)return;
      try{
        const fresh=await loadProfiles();
        dispatch({type:"SET_PROFILES",payload:fresh});
        const {data:row}=await sb.from("app_state").select("data,client").eq("id",1).maybeSingle();
        if(row?.data&&row.client!==CLIENT_ID){
          skipNextSave.current=true;
          lastSaved.current=JSON.stringify(stripLocal({...initialState,...row.data}));
          dispatch({type:"HYDRATE",payload:row.data});
        }
      }catch(e){/* ignorér */}
    };
    window.addEventListener("focus",refresh);
    document.addEventListener("visibilitychange",refresh);
    return()=>{window.removeEventListener("focus",refresh);document.removeEventListener("visibilitychange",refresh);};
  },[]);

  // 2) Gem app-tilstand (debounced) – ekskl. profiler
  useEffect(()=>{
    if(!sb||!loaded.current)return;
    if(skipNextSave.current){skipNextSave.current=false;return;}
    const rest=stripLocal(state);
    const json=JSON.stringify(rest);
    if(json===lastSaved.current)return;
    setSync("saving");
    const t=setTimeout(async()=>{
      const {error}=await sb.from("app_state").update({data:rest,client:CLIENT_ID,updated_at:new Date().toISOString()}).eq("id",1);
      if(error){console.error("Supabase save:",error);setSync("error");}
      else{lastSaved.current=json;setSync("synced");}
    },800);
    return()=>clearTimeout(t);
  },[state]);

  // Wrappet dispatch: profil-ændringer skrives også til profiles-tabellen
  const wrappedDispatch=React.useCallback((action)=>{
    dispatch(action);
    if(!sb)return;
    const isAuthId=(id)=>typeof id==="string"&&!String(id).startsWith("imp-")&&!String(id).startsWith("child-");
    if(action.type==="UPDATE_USER"&&isAuthId(action.payload?.id)){
      (async()=>{
        const {data:existing}=await sb.from("profiles").select("*").eq("id",action.payload.id).maybeSingle();
        if(existing){
          const merged=rowToUser(existing);
          const row=userToRow({...merged,...action.payload});
          await sb.from("profiles").update(row).eq("id",action.payload.id);
        }
      })();
    }
    if(action.type==="ADD_CHILD"&&isAuthId(action.parentId)&&action._newChildIds){
      // Persistér forælderens opdaterede childIds (ChildManager sender listen med)
      sb.from("profiles").update({child_ids:action._newChildIds}).eq("id",action.parentId);
    }
    if(action.type==="UPDATE_OFFICIAL_EVENTS"&&isAuthId(action.userId)){
      sb.from("profiles").update({approved_events:action.events}).eq("id",action.userId);
    }
  },[]);

  const u=state.currentUser;
  const logout=async()=>{if(sb)await sb.auth.signOut();dispatch({type:"LOGOUT"});};
  const dispatchWithLogout=React.useCallback((action)=>{
    if(action.type==="LOGOUT"){logout();return;}
    wrappedDispatch(action);
  },[wrappedDispatch]);

  return <LangCtx.Provider value={state.lang}>
    <div style={{width:"100%",height:"100vh",overflow:"hidden"}}>
      {(u?.isAdmin||u?.type==="admin"||u?.isSubAdmin)?<AdminApp state={state} dispatch={dispatchWithLogout}/>:<UserApp state={state} dispatch={dispatchWithLogout}/>}
      <SyncBadge status={sync}/>
    </div>
  </LangCtx.Provider>;
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
