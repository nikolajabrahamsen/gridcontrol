// ── OFFICIAL TECHNICAL CONTROL SCREEN ─────────────────────────────
function OfficialTechScreen({state,dispatch}){
  const t=useT();
  const u=state.currentUser;
  const myEvents=state.events.filter(ev=>(u?.approvedEvents||[]).includes(ev.id));
  const evList=myEvents.length>0?myEvents:state.events;
  const prefs=state.uiPrefs?.techScreen||{};
  const sharedRace=state.uiPrefs?.selectedRace;
  const [selEv,setSelEv]=useState(sharedRace?Number(sharedRace):(prefs.evId?Number(prefs.evId):evList[0]?.id));
  const [selClass,setSelClass]=useState(prefs.cls||"");
  const [selSession,setSelSession]=useState(prefs.session||"Teknisk kontrol");
  const [selGroups,setSelGroups]=useState([]);
  const ev=state.events.find(e=>e.id===selEv)||state.events[0];
  const classes=sortClassesByAge(ev?.classes||[],state.classRules);
  const groupLetters=sessionGroupLetters(ev,selClass,selSession);
  const regDrivers=sessionDrivers(ev,selClass,selSession,state.users,selGroups);
  const toggleGroup=(g)=>setSelGroups(gs=>gs.includes(g)?gs.filter(x=>x!==g):[...gs,g]);
  const [techDraft,setTechDraft,clearTechDraft]=useDraft(`gc_draft_tech_${selEv}_${selClass}_${selSession}`,{photos:{},result:{},note:{},typeSel:{}});
  const photos=techDraft.photos,result=techDraft.result,note=techDraft.note,typeSel=techDraft.typeSel;
  const setPhotos=(upd)=>setTechDraft(d=>({...d,photos:typeof upd==="function"?upd(d.photos):upd}));
  const setResult=(upd)=>setTechDraft(d=>({...d,result:typeof upd==="function"?upd(d.result):upd}));
  const setNote=(upd)=>setTechDraft(d=>({...d,note:typeof upd==="function"?upd(d.note):upd}));
  const setTypeSel=(upd)=>setTechDraft(d=>({...d,typeSel:typeof upd==="function"?upd(d.typeSel):upd}));
  const techCfg=state.stationPenalties?.tech||{};
  const techTypes=(techCfg.types||[]).filter(Boolean);
  const [busy,setBusy]=useState(false);
  const [msg,setMsg]=useState("");
  const [done,setDone]=useState(false);
  const camRefs=useRef({});
  useEffect(()=>{dispatch({type:"SET_UI_PREF",key:"techScreen",value:{evId:selEv,cls:selClass,session:selSession}});dispatch({type:"SET_UI_PREF",key:"selectedRace",value:String(selEv)});},[selEv,selClass,selSession]);

  const addPhoto=(uid,file)=>{
    if(!file)return;
    const reader=new FileReader();
    reader.onload=()=>setPhotos(p=>({...p,[uid]:[...(p[uid]||[]),reader.result]}));
    reader.readAsDataURL(file);
  };
  const removePhoto=(uid,idx)=>setPhotos(p=>({...p,[uid]:(p[uid]||[]).filter((_,i)=>i!==idx)}));

  // Build a PDF of one driver's images (for email later)
  const makePdf=(d,imgs)=>{
    const jsPDF=window.jspdf?.jsPDF;
    if(!jsPDF){setMsg("PDF-bibliotek ikke indlæst endnu – prøv igen om lidt.");return null;}
    const pdf=new jsPDF({unit:"mm",format:"a4"});
    const pageW=210,pageH=297,margin=10;
    imgs.forEach((img,i)=>{
      if(i>0)pdf.addPage();
      pdf.setFontSize(14);
      pdf.text(`Teknisk kontrol – #${d.kartNumber} ${d.name}`,margin,15);
      pdf.setFontSize(10);
      pdf.text(`${selClass} · ${selSession} · ${new Date().toLocaleString("da-DK")}`,margin,21);
      // fit the image
      const maxW=pageW-2*margin, maxH=pageH-35;
      pdf.addImage(img,"JPEG",margin,28,maxW,maxH,undefined,"FAST");
    });
    return pdf;
  };
  const downloadPdf=(d)=>{
    const imgs=photos[d.id]||[];
    if(!imgs.length){setMsg("Tag mindst ét billede først.");return;}
    const pdf=makePdf(d,imgs);
    if(pdf)pdf.save(`teknisk-kontrol_${d.kartNumber}_${selClass}.pdf`);
  };

  const submitAll=async()=>{
    setMsg("");setBusy(true);
    try{
      for(const d of regDrivers){
        const res=result[d.id];
        if(!res)continue; // only those that have been assessed
        const imgs=photos[d.id]||[];
        let pdfUrl=null;
        if(imgs.length&&sb){
          const pdf=makePdf(d,imgs);
          if(pdf){
            const blob=pdf.output("blob");
            const path=`tech-control/${selEv}/${new Date().toISOString().slice(0,10)}_${d.kartNumber}_${Date.now()}.pdf`;
            const {error:upErr}=await sb.storage.from("documents").upload(path,blob,{contentType:"application/pdf",upsert:false});
            if(!upErr){const {data:pub}=sb.storage.from("documents").getPublicUrl(path);pdfUrl=pub.publicUrl;}
          }
        }
        if(pdfUrl){
          dispatch({type:"ADD_TECH_PDF",eventId:selEv,payload:{driverId:d.id,driverName:d.name,kartNumber:d.kartNumber,class:selClass||"?",session:selSession,result:res,url:pdfUrl,time:new Date().toLocaleString("da-DK"),by:u?.name}});
        }
        if(res==="fejl"){
          dispatch({type:"ADD_PENALTY",eventId:selEv,payload:{kartNo:d.kartNumber,driverName:d.name,userId:d.id,class:selClass||"?",session:selSession,type:typeSel[d.id]||techTypes[0]||"Teknisk fejl",seconds:0,reason:note[d.id]||techCfg.reason||"Teknisk kontrol – ikke godkendt",time:new Date().toLocaleString("da-DK"),source:"tech_official",approved:false,techPdfUrl:pdfUrl,photoDate:new Date().toISOString()}});
        }
      }
      dispatch({type:"SET_READY_SIGNAL",eventId:selEv,cls:selClass,session:selSession,stype:"tech",groups:selGroups,by:u?.name});
      notifyHeatDone(dispatch,state,{stationLabel:"Teknisk kontrol",icon:"🔩",eventId:selEv,cls:selClass,session:selSession,by:u?.name,adminOnly:true});
      setDone(true);
      setPhotos({});setResult({});setNote({});setTypeSel({});clearTechDraft();
    }catch(e){setMsg(String(e.message||e));}
    setBusy(false);
  };

  if(done)return <div style={{padding:16,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",gap:16}}>
    <div style={{fontSize:60}}>✅</div>
    <div style={{fontWeight:700,color:C.green,fontSize:18,textAlign:"center"}}>{selClass} – {selSession}<br/>Klar-signal sendt til tidtagning!</div>
    <Btn onClick={()=>setDone(false)}>Ny indrapportering</Btn>
  </div>;

  return <div style={{padding:16,overflowY:"auto",height:"100%"}}>
    <SH title={t.colName==="Navn"?"Teknisk kontrol":"Tech control"} sub={t.colName==="Navn"?"Foto + PDF til teknisk kontrol":"Photo + PDF for tech control"}/>
    <div style={{background:"#1a001a",border:"1px solid #9B59B644",borderRadius:6,padding:8,marginBottom:12,display:"flex",gap:6,alignItems:"center"}}>
      <span>🔒</span><span style={{color:C.purple,fontSize:11,fontWeight:700}}>{t.onlyOfficials}</span>
    </div>
    <Sel label="Løb" value={String(selEv)} onChange={v=>{setSelEv(Number(v));setSelClass("");setSelGroups([]);}} options={evList.slice().sort((a,b)=>String(a.date).localeCompare(String(b.date))).map(e=>({value:String(e.id),label:e.name}))}/>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
      <Sel label={t.classLabel} value={selClass} onChange={v=>{setSelClass(v);setSelGroups([]);}} options={[{value:"",label:t.all+" "+t.classLabel.toLowerCase()},...classes.map(c=>({value:c,label:c}))]}/>
      <Sel label={t.session} value={selSession} onChange={v=>{setSelSession(v);setSelGroups([]);}} options={(state.sessions||[]).map(s=>s.name)}/>
    </div>
    {groupLetters.length>0&&<div style={{background:`${C.cyan}11`,border:`1px solid ${C.cyan}44`,borderRadius:6,padding:"8px 10px",marginBottom:8}}>
      <div style={{color:C.cyan,fontSize:10,letterSpacing:1,marginBottom:6}}>VÆLG GRUPPER DER KØRER NU</div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
        {groupLetters.map(g=>{const on=selGroups.includes(g);const cnt=Object.values(resolveGroups(ev,selClass,selSession)||{}).filter(x=>x===g).length;return <button key={g} onClick={()=>toggleGroup(g)} style={{background:on?C.cyan:C.surface2,color:on?"#000":C.textMuted,border:`1px solid ${on?C.cyan:C.border}`,borderRadius:8,padding:"6px 14px",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{on?"✓ ":""}Gruppe {g} ({cnt})</button>;})}
      </div>
    </div>}
    {msg&&<div style={{color:msg.startsWith("✓")?C.green:C.orange,fontSize:12,margin:"8px 0"}}>{msg}</div>}
    {regDrivers.length===0?<div style={{color:C.textMuted,textAlign:"center",padding:24}}>{t.noDriversClass}</div>:<div>
      {regDrivers.map((d)=>{
        const imgs=photos[d.id]||[];
        const res=result[d.id];
        return <Card key={d.id} style={{padding:"10px 12px",marginBottom:8,borderLeft:`3px solid ${res==="ok"?C.green:res==="fejl"?C.red:C.border}`}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
            <div style={{fontWeight:900,color:C.text,fontSize:22,fontFamily:"'Barlow Condensed',sans-serif",minWidth:44}}>#{d.kartNumber}</div>
            <div style={{flex:1}}>
              <div style={{fontWeight:600,color:C.text,fontSize:13}}>{d.country?flagEmoji(d.country)+" ":""}{d.name}</div>
              <div style={{display:"flex",gap:6,alignItems:"center",marginTop:1}}>{d._group&&<Badge color={C.cyan} style={{fontSize:9}}>Gruppe {d._group}</Badge>}<span style={{color:C.textDim,fontSize:10}}>{d.class}</span></div>
            </div>
          </div>
          <input ref={el=>camRefs.current[d.id]=el} type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={e=>{addPhoto(d.id,e.target.files[0]);e.target.value="";}}/>
          {imgs.length>0&&<div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:8}}>
            {imgs.map((img,i)=><div key={i} style={{position:"relative"}}>
              <img src={img} style={{width:56,height:42,objectFit:"cover",borderRadius:4,border:`1px solid ${C.border}`}} alt={`Foto ${i+1}`}/>
              <button onClick={()=>removePhoto(d.id,i)} style={{position:"absolute",top:-6,right:-6,width:18,height:18,borderRadius:"50%",background:C.red,color:"#fff",border:"none",fontSize:11,cursor:"pointer",lineHeight:1}}>×</button>
            </div>)}
          </div>}
          <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
            <Btn small variant="secondary" onClick={()=>camRefs.current[d.id]?.click()}>📷 {imgs.length?"Tag flere":"Tag foto"}</Btn>
            {imgs.length>0&&<Btn small variant="ghost" onClick={()=>downloadPdf(d)}>📄 PDF ({imgs.length})</Btn>}
            <div style={{flex:1}}/>
            <button onClick={()=>setResult(r=>({...r,[d.id]:r[d.id]==="ok"?undefined:"ok"}))} style={{background:res==="ok"?`${C.green}33`:C.surface2,border:`2px solid ${res==="ok"?C.green:C.border}`,borderRadius:6,padding:"5px 12px",color:res==="ok"?C.green:C.textMuted,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>✓ OK</button>
            <button onClick={()=>setResult(r=>({...r,[d.id]:r[d.id]==="fejl"?undefined:"fejl"}))} style={{background:res==="fejl"?`${C.red}33`:C.surface2,border:`2px solid ${res==="fejl"?C.red:C.border}`,borderRadius:6,padding:"5px 12px",color:res==="fejl"?C.red:C.textMuted,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>✗ Fejl</button>
          </div>
          {res==="fejl"&&<>
            {techTypes.length>0&&<Sel label="Fejltype" value={typeSel[d.id]||techTypes[0]} onChange={v=>setTypeSel(s=>({...s,[d.id]:v}))} options={techTypes}/>}
            <Input label="Bemærkning" value={note[d.id]||""} onChange={v=>setNote(n=>({...n,[d.id]:v}))} placeholder="Hvad er der galt?"/>
          </>}
        </Card>;
      })}
      <Btn onClick={submitAll} disabled={busy} style={{width:"100%",background:C.green,color:"#000",fontWeight:900,marginTop:6}}>{busy?"Behandler...":"🔩 INDRAPPORTER TEKNISK KONTROL & SEND KLAR-SIGNAL"}</Btn>
    </div>}
  </div>;
}

// ── TECHNICAL CONTROL PDFS (admin, sub-admin, technical control only) ─
// Access: main admin sees everything. Sub-admin sees events in their own series. Technical control officials
// see only events where they themselves are assigned to technical control (ev.techOfficials).
function TechPdfScreen({state,dispatch,useGlobalEv=false}){
  const t=useT();
  const u=state.currentUser;
  const isFullAdmin=u?.isAdmin||u?.type==="admin";
  const isSub=!isFullAdmin&&u?.isSubAdmin;
  const mySeriesIds=(u?.adminSeriesIds||[]).map(Number);
  const accessibleEvents=(state.events||[]).filter(ev=>{
    if(isFullAdmin)return true;
    if(isSub)return mySeriesIds.includes(Number(ev.seriesId));
    return (ev.techOfficials||[]).includes(u?.id);
  });
  const [localSelEv,setLocalSelEv]=useState(String(accessibleEvents[0]?.id||""));
  const selEv=useGlobalEv?getAdminSelEv(state,accessibleEvents):localSelEv;
  const setSelEv=useGlobalEv?(v=>setAdminSelEv(dispatch,v)):setLocalSelEv;
  const ev=accessibleEvents.find(e=>String(e.id)===selEv)||accessibleEvents[0];
  const pdfs=(ev?.techPdfs||[]).slice();

  if(accessibleEvents.length===0){
    return <div style={{padding:16}}>
      <SH title={t.admTechPdfTitle} sub={t.admTechPdfSub}/>
      <div style={{color:C.textMuted,textAlign:"center",padding:24}}>{t.admNotAssignedTech}</div>
    </div>;
  }
  return <div style={{padding:16,overflowY:"auto",height:"100%"}}>
    <SH title={t.admTechPdfTitle} sub={t.admTechPdfSub}/>
    <div style={{background:"#1a001a",border:"1px solid #9B59B644",borderRadius:6,padding:8,marginBottom:12,display:"flex",gap:6,alignItems:"center"}}>
      <span>🔒</span><span style={{color:C.purple,fontSize:11,fontWeight:700}}>{t.admOnlyVisibleAdminSubTech}</span>
    </div>
    <Sel label={t.race} value={selEv} onChange={setSelEv} options={accessibleEvents.slice().sort((a,b)=>String(a.date).localeCompare(String(b.date))).map(e=>({value:String(e.id),label:e.name}))}/>
    <div style={{color:C.textMuted,fontSize:11,marginBottom:8}}>{pdfs.length} {pdfs.length===1?t.admReportSingular:t.admReportPlural}</div>
    {pdfs.length===0&&<div style={{color:C.textMuted,textAlign:"center",padding:24}}>{t.admNoPdfsYet}</div>}
    {pdfs.map(p=><Card key={p.id} style={{padding:"11px 14px",borderLeft:`3px solid ${p.result==="fejl"?C.red:C.green}`}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
        <div>
          <span style={{fontWeight:900,color:C.text,fontSize:16,fontFamily:"'Barlow Condensed',sans-serif"}}>#{p.kartNumber}</span>
          <span style={{color:C.text,fontSize:13,marginLeft:6}}>{p.driverName}</span>
        </div>
        <Badge color={p.result==="fejl"?C.red:C.green} style={{fontSize:9}}>{p.result==="fejl"?"✗ "+t.fault.toUpperCase():"✓ "+t.ok}</Badge>
      </div>
      <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:6}}>
        <Badge style={{fontSize:9}}>{p.class}</Badge>
        <Badge color={C.blue} style={{fontSize:9}}>{p.session}</Badge>
      </div>
      <div style={{color:C.textDim,fontSize:10,marginBottom:8}}>{p.time}{p.by?" · "+p.by:""}</div>
      <div style={{display:"flex",gap:8}}>
        <a href={p.url} target="_blank" rel="noreferrer" style={{display:"inline-block",background:C.surface2,border:`1px solid ${C.border}`,borderRadius:6,padding:"6px 12px",color:C.text,fontSize:12,fontWeight:700,textDecoration:"none"}}>{t.admOpenPdf}</a>
        {(isFullAdmin||isSub)&&<button onClick={()=>{if(confirm(t.admDeleteReportConfirm))dispatch({type:"DELETE_TECH_PDF",eventId:ev.id,pdfId:p.id});}} style={{background:"#400010",border:"1px solid #FF446644",borderRadius:6,padding:"6px 12px",color:"#FF4466",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>{t.delete}</button>}
      </div>
    </Card>)}
  </div>;
}

// ── OFFICIAL INSPECTION SCREEN ────────────────────────────────────
function OfficialInspectionScreen({state,dispatch}){
  const t=useT();
  const u=state.currentUser;
  const evList=state.events.filter(ev=>(u?.approvedEvents||[]).includes(ev.id));
  const useEvList=evList.length>0?evList:state.events;
  const prefsInsp=state.uiPrefs?.inspectionScreen||{};
  const sharedRace=state.uiPrefs?.selectedRace;
  const [selEv,setSelEvRaw]=useState(sharedRace?Number(sharedRace):(prefsInsp.evId?Number(prefsInsp.evId):useEvList[0]?.id));
  const setSelEv=v=>setSelEvRaw(Number(v));
  useEffect(()=>{dispatch({type:"SET_UI_PREF",key:"inspectionScreen",value:{evId:selEv}});dispatch({type:"SET_UI_PREF",key:"selectedRace",value:String(selEv)});},[selEv]);
  const [inspDraft,setInspDraft,clearInspectionDraft]=useDraft(`gc_draft_inspection_${selEv}`,{form:{class:"Rotax Junior",session:"Heat 1",groups:[],videoOk:null,trackOk:null,techOk:null,notes:""},pending:[]});
  const form=inspDraft.form,pending=inspDraft.pending;
  const setForm=(upd)=>setInspDraft(d=>({...d,form:typeof upd==="function"?upd(d.form):upd}));
  const setPending=(upd)=>setInspDraft(d=>({...d,pending:typeof upd==="function"?upd(d.pending):upd}));
  const [pForm,setPForm]=useState({kartNo:"",reasonId:"",customReason:"",penaltyId:""});
  const [done,setDone]=useState(false);
  const checks=[["videoOk","📹 "+t.video],["trackOk","🏁 "+t.track]];
  const penaltyTypes=state.penaltyTypes||[{id:1,label:"Tidsstraf +3 sek",type:"Tidsstraf",seconds:3},{id:2,label:"Tidsstraf +5 sek",type:"Tidsstraf",seconds:5},{id:3,label:"Tidsstraf +10 sek",type:"Tidsstraf",seconds:10},{id:4,label:"Advarsel",type:"Advarsel",seconds:0},{id:5,label:"Sortflag",type:"Sortflag",seconds:0},{id:6,label:"Diskvalifikation",type:"Diskvalifikation",seconds:0},{id:7,label:"Placering sidst",type:"Placering sidst",seconds:0}];
  const reasonTexts=state.reasonTexts||[];

  const addPending=()=>{
    if(!pForm.kartNo||!pForm.penaltyId)return;
    const pt=penaltyTypes.find(p=>String(p.id)===String(pForm.penaltyId));
    const rt=reasonTexts.find(r=>String(r.id)===String(pForm.reasonId));
    const combinedReason=[rt?.text,pForm.customReason.trim()].filter(Boolean).join(" – ");
    setPending(prev=>[...prev,{kartNo:pForm.kartNo,reason:combinedReason,label:pt?.label||"",type:pt?.type||"",seconds:pt?.seconds||0,id:Date.now()}]);
    setPForm({kartNo:"",reasonId:"",customReason:"",penaltyId:""});
  };

  const finish=()=>{
    pending.forEach(p=>{
      dispatch({type:"ADD_PENALTY",eventId:selEv,payload:{kartNo:parseInt(p.kartNo)||0,driverName:"",class:form.class,session:form.session,type:p.type,seconds:p.seconds,reason:p.reason,time:new Date().toLocaleString("da-DK"),source:"inspection_official",approved:false}});
    });
    dispatch({type:"ADD_INSPECTION",eventId:selEv,payload:{...form,by:u?.name,time:new Date().toLocaleString("da-DK")}});
    dispatch({type:"SET_READY_SIGNAL",eventId:selEv,cls:form.class,session:form.session,stype:"inspection",groups:form.groups,by:u?.name});
    notifyHeatDone(dispatch,state,{stationLabel:"Indrapportering",icon:"🔍",eventId:selEv,cls:form.class,session:form.session,by:u?.name,adminOnly:true});
    setPending([]);setDone(true);setTimeout(()=>setDone(false),3000);
    setForm(f=>({...f,groups:[],videoOk:null,trackOk:null,techOk:null,notes:""}));
    clearInspectionDraft();
  };

  if(done)return <div style={{padding:24,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",gap:16}}>
    <div style={{fontSize:60}}>✅</div>
    <div style={{fontWeight:700,color:C.green,fontSize:18,textAlign:"center"}}>{t.readySignalSent}<br/>{pending.length>0&&`${pending.length} ${t.penalties.toLowerCase()}`}</div>
    <Btn onClick={()=>setDone(false)}>{t.newReport}</Btn>
  </div>;

  return <div style={{padding:16,overflowY:"auto",height:"100%"}}>
    <SH title={t.navReporting} sub={t.reportingSub}/>
    <div style={{background:"#1a001a",border:"1px solid #9B59B644",borderRadius:6,padding:8,marginBottom:12,display:"flex",gap:6,alignItems:"center"}}>
      <span>🔒</span><span style={{color:C.purple,fontSize:11,fontWeight:700}}>{t.onlyOfficials}</span>
    </div>
    <Sel label={t.race} value={String(selEv)} onChange={v=>setSelEv(Number(v))} options={useEvList.slice().sort((a,b)=>String(a.date).localeCompare(String(b.date))).map(e=>({value:String(e.id),label:e.name}))}/>
    {(()=>{
      const ev=state.events.find(e=>e.id===selEv);
      const assigned=ev?.reportingOfficials||[];
      if(assigned.length>0&&!assigned.includes(u?.id)&&!u?.isAdmin)
        return <div style={{background:`${C.orange}11`,border:`1px solid ${C.orange}44`,borderRadius:8,padding:14,textAlign:"center",color:C.orange,fontSize:13,fontWeight:700}}>Du er ikke tildelt indrapportering til dette løb.<br/><span style={{fontSize:11,fontWeight:400}}>{t.contactAdmin}</span></div>;
      return null;
    })()}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
      <Sel label={t.classLabel} value={form.class} onChange={v=>setForm(f=>({...f,class:v,groups:[]}))} options={sortClassesByAge(state.events.find(e=>e.id===selEv)?.classes||Object.keys(state.classRules),state.classRules)}/>
      <Sel label={t.session} value={form.session} onChange={v=>setForm(f=>({...f,session:v,groups:[]}))} options={(state.sessions||[]).map(s=>s.name)}/>
    </div>
    {(()=>{
      const ev=state.events.find(e=>e.id===selEv);
      const groupLetters=classGroupLetters(ev,form.class);
      if(groupLetters.length===0)return null;
      return <div style={{background:`${C.cyan}11`,border:`1px solid ${C.cyan}44`,borderRadius:6,padding:"8px 10px",marginBottom:10}}>
        <div style={{color:C.cyan,fontSize:10,letterSpacing:1,marginBottom:6}}>{t.admGroupsOptional}</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {groupLetters.map(g=>{const on=form.groups.includes(g);return <button key={g} onClick={()=>setForm(f=>({...f,groups:f.groups.includes(g)?f.groups.filter(x=>x!==g):[...f.groups,g]}))} style={{background:on?C.cyan:C.surface2,color:on?"#000":C.textMuted,border:`1px solid ${on?C.cyan:C.border}`,borderRadius:8,padding:"5px 12px",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{on?"✓ ":""}Gruppe {g}</button>;})}
        </div>
      </div>;
    })()}

    {/* Straf-tilføj sektion */}
    <Card style={{borderLeft:`3px solid ${C.orange}`}}>
      <div style={{color:C.textMuted,fontSize:10,letterSpacing:2,marginBottom:8}}>{t.addPenalty.toUpperCase()} ({t.awaitingApproval})</div>
      <Input label="Kart # *" value={pForm.kartNo} onChange={v=>setPForm(f=>({...f,kartNo:v}))} placeholder="98"/>
      <Sel label={t.reason} value={pForm.reasonId} onChange={v=>setPForm(f=>({...f,reasonId:v}))} options={[{value:"",label:t.chooseReason},...reasonTexts.map(r=>({value:String(r.id),label:r.text}))]}/>
      <Input label={t.extraText+" ("+t.optional+")"} value={pForm.customReason} onChange={v=>setPForm(f=>({...f,customReason:v}))} placeholder={t.addDetails}/>
      <div style={{marginBottom:10}}>
        <div style={{color:C.textMuted,fontSize:10,letterSpacing:1,marginBottom:6,textTransform:"uppercase"}}>{t.penaltyType}</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
          {penaltyTypes.map(pt=><button key={pt.id} onClick={()=>setPForm(f=>({...f,penaltyId:String(pt.id)}))} style={{background:pForm.penaltyId===String(pt.id)?`${C.orange}33`:C.surface2,border:`1px solid ${pForm.penaltyId===String(pt.id)?C.orange:C.border}`,borderRadius:20,padding:"5px 12px",fontSize:11,cursor:"pointer",color:pForm.penaltyId===String(pt.id)?C.orange:C.textMuted,fontWeight:pForm.penaltyId===String(pt.id)?700:400,fontFamily:"inherit"}}>{pt.label}</button>)}
        </div>
      </div>
      <Btn onClick={addPending} variant="secondary" style={{width:"100%"}} disabled={!pForm.kartNo||!pForm.penaltyId}>+ {t.addToList.toUpperCase()}</Btn>
    </Card>

    {/* Ventende straffe */}
    {pending.length>0&&<Card style={{borderLeft:`3px solid ${C.red}`,marginBottom:12}}>
      <div style={{color:C.red,fontSize:10,letterSpacing:2,marginBottom:8}}>STRAFFE KLAR ({pending.length})</div>
      {pending.map((p,i)=><div key={p.id} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 0",borderBottom:i<pending.length-1?`1px solid ${C.border}`:"none"}}>
        <div style={{width:40,height:32,background:`${C.red}22`,border:`1px solid ${C.red}44`,borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
          <span style={{color:C.red,fontWeight:900,fontSize:13}}>#{p.kartNo}</span>
        </div>
        <div style={{flex:1}}>
          <div style={{color:C.text,fontSize:12,fontWeight:600}}>{p.label}</div>
          {p.reason&&<div style={{color:C.textMuted,fontSize:11}}>{p.reason}</div>}
        </div>
        <button onClick={()=>setPending(prev=>prev.filter(x=>x.id!==p.id))} style={{background:"none",border:"none",color:C.textDim,cursor:"pointer",fontSize:16,padding:4}}>✕</button>
      </div>)}
    </Card>}

    {/* Tjekliste */}
    <Card style={{borderLeft:`3px solid ${C.purple}`}}>
      <div style={{color:C.textMuted,fontSize:10,letterSpacing:2,marginBottom:10}}>{t.checklist.toUpperCase()}</div>
      {checks.map(([key,label])=><div key={key} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:`1px solid ${C.border}`}}>
        <span style={{color:C.text,fontSize:13}}>{label}</span>
        <div style={{display:"flex",gap:6}}>
          <button onClick={()=>setForm(f=>({...f,[key]:f[key]===true?null:true}))} style={{background:form[key]===true?`${C.green}33`:C.surface2,border:`1px solid ${form[key]===true?C.green:C.border}`,borderRadius:5,padding:"5px 12px",color:form[key]===true?C.green:C.textMuted,cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>✓ {t.ok}</button>
          <button onClick={()=>setForm(f=>({...f,[key]:f[key]===false?null:false}))} style={{background:form[key]===false?`${C.red}33`:C.surface2,border:`1px solid ${form[key]===false?C.red:C.border}`,borderRadius:5,padding:"5px 12px",color:form[key]===false?C.red:C.textMuted,cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>✗ {t.fault}</button>
        </div>
      </div>)}
      <textarea value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} rows={2} placeholder={t.comments} style={{width:"100%",background:C.surface2,border:`1px solid ${C.border}`,borderRadius:6,padding:"8px 12px",color:C.text,fontSize:12,boxSizing:"border-box",resize:"vertical",fontFamily:"inherit",marginTop:10}}/>
    </Card>

    <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:14,marginBottom:16}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <div style={{color:C.text,fontSize:13,fontWeight:700}}>{form.class} · {form.session}</div>
        {pending.length>0&&<Badge color={C.red} style={{fontSize:10}}>{pending.length} straf{pending.length>1?"fe":""}</Badge>}
      </div>
      <Btn onClick={finish} style={{width:"100%",background:C.green,color:"#000",fontWeight:900,fontSize:14}}>{t.admFinishHeat}</Btn>
    </div>
  </div>;
}

function OfficialNotifScreen({state,dispatch}){
  const u=state.currentUser;
  const [form,setForm,clearNotifDraft]=useDraft("gc_draft_sendnotif_official",{title:"",body:"",targetClass:"Alle",eventId:String(state.events[0]?.id),officialsOnly:false});
  const [sent,setSent]=useState(false);

  const setClass=(cls)=>{
    setForm(f=>{
      const oldPrefix=f.targetClass!=="Alle"?f.targetClass+": ":"";
      const stripped=f.title.startsWith(oldPrefix)?f.title.slice(oldPrefix.length):f.title;
      const newPrefix=cls!=="Alle"?cls+": ":"";
      return{...f,targetClass:cls,title:newPrefix+stripped};
    });
  };

  const send=()=>{
    if(!form.title)return;
    dispatch({type:"ADD_NOTIFICATION",payload:{...form,eventId:parseInt(form.eventId),time:new Date().toLocaleString("da-DK"),by:u?.name}});
    setSent(true);setTimeout(()=>setSent(false),2000);
    setForm(f=>({...f,title:"",body:""}));
    clearNotifDraft();
  };

  return <div style={{padding:16,overflowY:"auto",height:"100%"}}>
    <SH title="Send notifikation"/>
    <div style={{background:"#1a001a",border:"1px solid #9B59B644",borderRadius:6,padding:8,marginBottom:12,display:"flex",gap:6,alignItems:"center"}}>
      <span>🔒</span><span style={{color:C.purple,fontSize:11,fontWeight:700}}>Kun officials med tilladelse</span>
    </div>
    <Card style={{borderLeft:`3px solid ${C.red}`}}>
      <Sel label="Løb" value={form.eventId} onChange={v=>setForm(f=>({...f,eventId:v}))} options={state.events.slice().sort((a,b)=>String(a.date).localeCompare(String(b.date))).map(e=>({value:String(e.id),label:e.name}))}/>
      <Sel label="Klasse" value={form.targetClass} onChange={setClass} options={["Alle",...(()=>{const ev=state.events.find(e=>String(e.id)===form.eventId);return(ev?.classes&&ev.classes.length)?ev.classes:sortClassesByAge(Object.keys(state.classRules),state.classRules);})()]}/>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
        <span style={{color:C.textMuted,fontSize:11}}>Kun officials</span>
        <button onClick={()=>setForm(f=>({...f,officialsOnly:!f.officialsOnly}))} style={{background:form.officialsOnly?`${C.purple}33`:C.surface2,border:`1px solid ${form.officialsOnly?C.purple:C.border}`,borderRadius:20,padding:"3px 12px",color:form.officialsOnly?C.purple:C.textMuted,cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>{form.officialsOnly?"✓ KUN OFFICIALS":"ALLE"}</button>
      </div>
      <div style={{marginBottom:8}}>
        <div style={{color:C.textMuted,fontSize:10,letterSpacing:1,marginBottom:4,textTransform:"uppercase"}}>Overskrift</div>
        <input value={form.targetClass!=="Alle"?form.title.replace(new RegExp("^"+form.targetClass+": "),""):form.title} onChange={e=>{const prefix=form.targetClass!=="Alle"?form.targetClass+": ":"";setForm(f=>({...f,title:prefix+e.target.value}));}} placeholder="Skriv overskrift..." style={{width:"100%",background:C.surface2,border:`1px solid ${C.border}`,borderRadius:6,padding:"8px 12px",color:C.text,fontSize:13,boxSizing:"border-box",fontFamily:"inherit"}}/>
        {form.targetClass!=="Alle"&&<div style={{fontSize:10,color:C.textMuted,marginTop:3}}>Vises som: <strong style={{color:C.text}}>{form.title||form.targetClass+": ..."}</strong></div>}
      </div>
      <div style={{marginBottom:10}}>
        <div style={{color:C.textMuted,fontSize:10,letterSpacing:1,marginBottom:4,textTransform:"uppercase"}}>Besked</div>
        <textarea value={form.body} onChange={e=>setForm(f=>({...f,body:e.target.value}))} rows={2} placeholder="Beskedtekst..." style={{width:"100%",background:C.surface2,border:`1px solid ${C.border}`,borderRadius:6,padding:"8px 12px",color:C.text,fontSize:12,boxSizing:"border-box",resize:"vertical",fontFamily:"inherit"}}/>
      </div>
      {sent?<div style={{background:`${C.green}22`,border:`1px solid ${C.green}44`,borderRadius:8,padding:12,textAlign:"center",color:C.green,fontWeight:700}}>✅ Sendt!</div>:<Btn onClick={send} style={{width:"100%"}} disabled={!form.title}>📣 SEND NOTIFIKATION</Btn>}
    </Card>
  </div>;
}

function UserApp({state,dispatch}){
  const t=useT();
  const [tab,setTab]=useState("calendar");
  const [menuOpen,setMenuOpen]=useState(false);
  const [pushState,setPushState]=useState("unknown"); // unknown|on|off|unsupported|blocked
  const [bannerDismissed,setBannerDismissed]=useState(false);
  const u=state.currentUser;
  const isOff=u?.isOfficial||u?.type==="official";
  const isStandalone=(window.matchMedia&&window.matchMedia("(display-mode: standalone)").matches)||window.navigator.standalone===true;
  const isiOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  const iosNeedsInstall=isiOS&&!isStandalone;

  // Push: automatic request after login (must come before any early return – Rules of Hooks)
  useEffect(()=>{
    if(!u)return;
    if(!pushSupported()){setPushState("unsupported");return;}
    navigator.serviceWorker.ready.then(reg=>reg.pushManager.getSubscription()).then(sub=>{
      if(sub&&Notification.permission==="granted"){setPushState("on");return;}
      if(Notification.permission==="denied"){setPushState("blocked");return;}
      if(Notification.permission==="default"&&!iosNeedsInstall&&!VAPID_PUBLIC_KEY.startsWith("INDSÆT")){
        enablePush(u.id).then(()=>setPushState("on")).catch(()=>setPushState("off"));
      }else{
        setPushState("off");
      }
    }).catch(()=>setPushState("off"));
  },[u?.id]);

  // ── Unread notifications (visual marker) — computed before the early return below (Rules of Hooks) ──
  const myClasses=new Set();
  if(u?.class)myClasses.add(u.class);
  childrenOf(state.users,u).forEach(c=>{if(c.class)myClasses.add(c.class);});
  const relevantNotifs=(state.notifications||[]).filter(n=>{
    if(n.adminOnly&&!(u?.isAdmin||u?.isSubAdmin||u?.type==="admin"))return false;
    if(n.officialsOnly&&!(isOff||u?.isAdmin))return false;
    if(!(isOff||u?.isAdmin)&&n.targetClass&&n.targetClass!=="Alle"&&!myClasses.has(n.targetClass))return false;
    return true;
  });
  const lastSeen=u?.lastSeenNotif||0;
  const unreadCount=relevantNotifs.filter(n=>(n.id||0)>lastSeen).length;
  // Shows a badge with the unread count on the taskbar/dock icon (Windows, macOS, ChromeOS – installed PWA only).
  useEffect(()=>{
    if(!("setAppBadge" in navigator))return;
    if(unreadCount>0)navigator.setAppBadge(unreadCount).catch(()=>{});
    else navigator.clearAppBadge?.().catch(()=>{});
  },[unreadCount]);

  if(!u)return <LoginScreen state={state} dispatch={dispatch}/>;

  const isGuest=u?.type==="guest";

  const markNotifsSeen=()=>{
    const maxId=relevantNotifs.reduce((m,n)=>Math.max(m,n.id||0),0);
    if(maxId>lastSeen)dispatch({type:"UPDATE_USER",payload:{id:u.id,lastSeenNotif:maxId}});
  };

  const enableNow=async()=>{
    try{ await enablePush(u.id); setPushState("on"); }
    catch(e){ setPushState(e.message==="denied"?"blocked":"off"); }
  };
  const showPushBanner=!bannerDismissed&&(pushState==="off")&&!isGuest;
  // Technical control PDFs: only admin, sub-admin, or an official assigned to technical control on at least one event
  const canSeeTechPdfs=!!(u?.isAdmin||u?.isSubAdmin||u?.type==="admin"||(state.events||[]).some(ev=>(ev.techOfficials||[]).includes(u?.id)));
  const canSeeScanning=!!(u?.isAdmin||u?.isSubAdmin||u?.type==="admin"||(state.events||[]).some(ev=>(ev.scanningOfficials||[]).includes(u?.id)));

  const tabs=isGuest?[
    {id:"calendar",icon:"📅",label:t.calendar,group:"main"},
    {id:"docs",icon:"📄",label:t.docs,group:"main"},
    {id:"standings",icon:"🏆",label:t.championship,group:"main"},
    {id:"timing",icon:"⏱️",label:t.liveTimingTitle,group:"main"},
  ]:[
    {id:"calendar",icon:"📅",label:t.calendar,group:"main"},
    {id:"regs",icon:"📋",label:t.regulations,group:"main"},
    {id:"standings",icon:"🏆",label:t.championship,group:"main"},
    {divider:true,group:"main"},
    {id:"kartreg",icon:"🔢",label:t.kartNumber,group:"main"},
    {id:"profile",icon:"👤",label:t.profile,group:"main"},
    {divider:true,group:"main"},
    {id:"docs",icon:"📄",label:t.docs,group:"main"},
    {id:"penalties",icon:"⚠️",label:t.penalties,group:"main"},
    {id:"notif",icon:"🔔",label:t.notifications,group:"main"},
    {id:"timing",icon:"⏱️",label:t.liveTimingTitle,group:"main"},
    ...(isOff?[
      {id:"weight",icon:"⚖️",label:t.weight,group:"official"},
      {id:"nose",icon:"🔧",label:t.nose,group:"official"},
      {id:"reporting",icon:"🔍",label:t.navReporting,group:"official"},
      ...(u?.canSendNotif?[{id:"sendnotif",icon:"📣",label:t.navSendNotif,group:"official"}]:[]),
      ...(canSeeScanning?[{id:"scanning",icon:"📷",label:"Udstyrsscanning",group:"official",href:"scan.html"}]:[]),
      {id:"tech",icon:"🔩",label:t.colName==="Navn"?"Teknisk kontrol":"Tech control",group:"official"},
      {divider:true,group:"official"},
      {id:"licensecheck",icon:"🪪",label:t.navLicenseCheck,group:"official"},
      {id:"driverlist",icon:"👥",label:t.navDriverList,group:"official"},
      ...(canSeeTechPdfs?[{id:"techpdfs",icon:"📄",label:"Teknisk kontrol PDF'er",group:"official"}]:[]),
    ]:[]),
  ];

  const activeTab=tabs.find(tb=>tb.id===tab);

  const navigate=(id)=>{setTab(id);setMenuOpen(false);if(id==="notif")markNotifsSeen();};

  return <div style={{display:"flex",flexDirection:"column",height:"100%",background:C.bg,position:"relative"}}>
    {/* Guest banner */}
    {isGuest&&<div style={{background:"#1a1400",borderBottom:`1px solid ${C.orange}44`,padding:"7px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0,zIndex:10}}>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <span>👁</span>
        <span style={{color:C.orange,fontSize:12,fontWeight:700}}>{t.guestAccessBadge}</span>
        <span style={{color:C.textDim,fontSize:11}}>{t.guestAccessNote}</span>
      </div>
      <button onClick={()=>dispatch({type:"LOGOUT"})} style={{background:"transparent",border:`1px solid ${C.orange}44`,borderRadius:6,padding:"4px 10px",color:C.orange,fontSize:11,cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>{t.login.toUpperCase()}</button>
    </div>}
    {/* Top bar */}
    <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:"8px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0,zIndex:10}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <Logo size={26}/>
        {activeTab&&<div style={{display:"flex",alignItems:"center",gap:6}}>
          <span style={{color:C.textDim,fontSize:13}}>·</span>
          <span style={{fontSize:14}}>{activeTab.icon}</span>
          <span style={{color:C.text,fontSize:13,fontWeight:600,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:1,textTransform:"uppercase"}}>{activeTab.label}</span>
        </div>}
      </div>
      <div style={{display:"flex",gap:8,alignItems:"center"}}>
        <LangBar state={state} dispatch={dispatch}/>
        {/* Hamburger menu button */}
        <button onClick={()=>setMenuOpen(o=>!o)} style={{position:"relative",background:menuOpen?C.red:C.surface2,border:`1px solid ${menuOpen?C.red:C.border}`,borderRadius:8,width:38,height:38,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4,flexShrink:0,transition:"all 0.2s"}}>
          {menuOpen
            ? <span style={{fontSize:18,color:"#fff",lineHeight:1}}>✕</span>
            : <>{[0,1,2].map(i=><div key={i} style={{width:18,height:2,background:C.text,borderRadius:1}}/>)}</>
          }
          {!menuOpen&&unreadCount>0&&<span style={{position:"absolute",top:-5,right:-5,background:C.red,color:"#fff",borderRadius:"50%",minWidth:18,height:18,padding:"0 4px",fontSize:10,fontWeight:900,display:"flex",alignItems:"center",justifyContent:"center",border:`2px solid ${C.surface}`,boxSizing:"content-box"}}>{unreadCount>9?"9+":unreadCount}</span>}
        </button>
      </div>
    </div>

    {/* Page content */}
    <div style={{flex:1,overflowY:"auto",position:"relative"}}>
      {showPushBanner&&<div style={{background:`${C.blue}18`,borderBottom:`1px solid ${C.blue}44`,padding:"10px 14px",display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:18}}>🔔</span>
        <div style={{flex:1,minWidth:0}}>
          <div style={{color:C.text,fontSize:12,fontWeight:700}}>{t.colName==="Navn"?"Slå notifikationer til":"Enable notifications"}</div>
          <div style={{color:C.textMuted,fontSize:11}}>
            {iosNeedsInstall
              ?(t.colName==="Navn"?"Føj appen til hjemmeskærmen først (Del → Føj til hjemmeskærm), så kan du slå notifikationer til.":"Add the app to your home screen first (Share → Add to Home Screen) to enable notifications.")
              :(t.colName==="Navn"?"Få besked om straffe, dokumenter og vigtige beskeder – også når appen er lukket.":"Get alerts about penalties, documents and important messages – even when the app is closed.")}

// Reusable status card for one event (ready signals + registration bar).
function EventStatusCard({ev,state}){
  const t=useT();
  const sigs=ev.readySignals||[];
  const byClass={};
  sigs.forEach(s=>{if(!byClass[s.class])byClass[s.class]=[];byClass[s.class].push(s);});
  return <Card style={{padding:"12px 14px"}}>
    <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
      <div><div style={{fontWeight:700,color:C.text,fontSize:13}}>{ev.name}</div><div style={{color:C.textMuted,fontSize:11}}>📅 {ev.date} · 📍 {ev.location}</div></div>
      <Badge color={ev.registrationOpen?C.green:C.orange} style={{fontSize:10}}>{ev.registrationOpen?t.admOpenLabel:t.admClosed}</Badge>
    </div>
    {Object.keys(byClass).length>0&&<div style={{marginBottom:6}}>
      <div style={{color:C.textMuted,fontSize:9,letterSpacing:1,marginBottom:4}}>KLAR-SIGNALER</div>
      {Object.entries(byClass).map(([cls,signals])=>{
        const stypes=["weight","nose","inspection"];
        return <div key={cls} style={{background:C.bg,borderRadius:4,padding:"5px 8px",marginBottom:3,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{color:C.text,fontSize:11,fontWeight:700}}>{cls}</span>
          <div style={{display:"flex",gap:3}}>
            {stypes.map(st=>{
              const done=signals.some(s=>s.stype===st);
              const icons={weight:"⚖️",nose:"🔧",inspection:"🔍"};
              return <span key={st} style={{fontSize:11,opacity:done?1:0.2}}>{icons[st]}</span>;
            })}
          </div>
        </div>;
      })}
    </div>}
    <div style={{background:C.bg,borderRadius:4,height:5,overflow:"hidden"}}><div style={{width:`${Math.min(100,(ev.registrations.length/120)*100)}%`,height:"100%",background:C.red,borderRadius:4}}/></div>
    <div style={{color:C.textMuted,fontSize:10,marginTop:3}}>{ev.registrations.length} tilmeldte</div>
  </Card>;
}

// Detailed list of ready signals received (with timestamp), like on the Reporting page.
const READY_SIGNAL_LABELS={weight:"Weight done",nose:"Front Fairing done",tech:"Technical control done"};
function ReadySignalsCard({ev,dispatch}){
  const t=useT();
  const readySignals=ev?.readySignals||[];
  if(readySignals.length===0)return null;
  const checks=[["videoOk",t.video],["trackOk",t.track]];
  return <Card style={{borderLeft:`3px solid ${C.cyan}`,marginBottom:12}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
      <div style={{color:C.cyan,fontSize:11,fontWeight:700}}>{t.admReadySignalsReceived}</div>
      {dispatch&&<button onClick={()=>{if(confirm(`${t.admClearAllConfirmA}${readySignals.length}${t.admClearAllConfirmB}`))dispatch({type:"CLEAR_ALL_READY_SIGNALS",eventId:ev.id});}} style={{background:"#400010",border:"1px solid #FF446644",borderRadius:6,padding:"3px 9px",color:"#FF4466",fontSize:10,cursor:"pointer",fontFamily:"inherit"}}>{t.admClearAllBtn}</button>}
    </div>
    {readySignals.slice().reverse().map((s,i)=>{
      // For inspection signals, merge submissions for this class+session+groups (taking the most recent
      // non-null value per field) instead of just the latest one — otherwise, if one official marks
      // only Video and a different official later marks only Banen, the second submission's blank
      // Video field would wipe out the first official's answer instead of the two combining. Matching
      // on groups too keeps different group selections as separate lines instead of blending together.
      const insMatch=s.stype==="inspection"?(()=>{
        const sGroupKey=(s.groups||[]).slice().sort().join(",");
        const matches=(ev.inspections||[]).filter(ins=>ins.class===s.class&&ins.session===s.session&&(ins.groups||[]).slice().sort().join(",")===sGroupKey);
        if(matches.length===0)return null;
        const merged={groups:s.groups||[],videoOk:null,trackOk:null,notes:""};
        // Only merge submissions made within a few hours of each other (using each entry's id, which is
        // a real timestamp) — not just "the last few by count". A count-based window still let old,
        // unrelated reports from a previous testing day bleed into a fresh check whenever fewer than 3
        // reports existed for a combo; a time window can't be fooled that way regardless of how much
        // history has piled up for this event.
        const sorted=matches.slice().sort((a,b)=>(a.id||0)-(b.id||0));
        const latestTime=sorted[sorted.length-1].id||0;
        const MERGE_WINDOW_MS=4*60*60*1000; // 4 hours
        sorted.filter(ins=>latestTime-(ins.id||0)<=MERGE_WINDOW_MS).forEach(ins=>{
          if(ins.videoOk!=null)merged.videoOk=ins.videoOk;
          if(ins.trackOk!=null)merged.trackOk=ins.trackOk;
          if(ins.notes)merged.notes=ins.notes;
        });
        return merged;
      })():null;
      return <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 0",borderBottom:`1px solid ${C.border}`}}>
        {(()=>{
          const displayGroups=insMatch?insMatch.groups:s.groups;
          return <div>
            <div style={{color:C.text,fontSize:12}}>{s.class} · {s.session}{displayGroups&&displayGroups.length?" "+displayGroups.join("+"):""}{!insMatch?" · "+(READY_SIGNAL_LABELS[s.stype]||s.stype):""}</div>
            {insMatch&&<div style={{display:"flex",gap:4,marginTop:3}}>{checks.map(([k,l])=><Badge key={k} color={insMatch[k]===true?C.green:insMatch[k]===false?C.red:C.textMuted} style={{fontSize:9}}>{l}: {insMatch[k]===true?"OK":insMatch[k]===false?"FEJL":"—"}</Badge>)}</div>}
            {insMatch&&insMatch.notes&&<div style={{color:C.textMuted,fontSize:10,marginTop:2}}>{insMatch.notes}</div>}
          </div>;
        })()}
        <span style={{color:C.textMuted,fontSize:10}}>{s.time}</span>
      </div>;
    })}
  </Card>;
}

  const licenseOkFor=(userId)=>!!(ev?.licenseChecks||{})[userId+"_ok"];

  const openEditReg=(r,u)=>{
    setEditUserId(r.userId);
    setEditForm({kartNumber:String(u.kartNumber||""),transponder:u.transponder||"",club:u.club||"",clubCode:u.clubCode||"",license:u.license||"",class:r.class||""});
  };
  const saveEditReg=(r)=>{
    dispatch({type:"UPDATE_USER",payload:{id:r.userId,kartNumber:parseInt(editForm.kartNumber)||undefined,transponder:editForm.transponder,club:editForm.club,clubCode:editForm.clubCode,license:editForm.license}});
    if(editForm.class&&editForm.class!==r.class)dispatch({type:"UPDATE_REGISTRATION",eventId:ev.id,userId:r.userId,payload:{class:editForm.class}});
    setEditUserId(null);
  };

  const regs=(ev?.registrations||[]).filter(r=>selClass==="Alle"||r.class===selClass);
  const exportRegs=onlyLicenseOk?regs.filter(r=>licenseOkFor(r.userId)):regs;
  const classes=["Alle",...(ev?.classes||[])];

  const rowFor=(r)=>{
    const u=state.users.find(u=>u.id===r.userId)||{};
    const paddockParts=(r.paddockSpace||"").split("×").map(s=>s.trim().replace("m",""));
    return {
      [t.admFieldName]:u.name||"",[t.admFieldEmail]:u.email||"",[t.admFieldClass]:r.class||"",
      [t.admFieldKart]:String(u.kartNumber||""),[t.admFieldTransponder]:u.transponder||"",
      [t.admFieldLicense]:u.license||"",[t.admFieldClub]:u.club||"",[t.admFieldClubCode]:clubCodeFor(u),[t.admFieldNationality]:u.country||"",[t.admFieldPhone]:u.phone||"",
      [t.admFieldPaddockL]:paddockParts[0]||"",[t.admFieldPaddockD]:paddockParts[1]||"",
      [t.admFieldSlicks]:(r.slicks||[]).join(";"),[t.admFieldWets]:(r.wets||[]).join(";"),
      [t.admFieldPaid]:r.paid?t.admYes:t.admNo,[t.admFieldLicenseOk]:u.licenseValid===true?t.admYes:u.licenseValid===false?t.admNo:"?"
    };
  };

  const doExport=()=>{
    exportCSV(exportRegs.map(rowFor),csvFields,`tilmeldinger_${ev?.name||""}`);
  };

  const doMyLapsExport=()=>{
    exportCSV(exportRegs.map(rowFor),mylapsFields,`mylaps_${ev?.name||""}`);
  };

  const toggleField=f=>setCsvFields(prev=>prev.includes(f)?prev.filter(x=>x!==f):[...prev,f]);
  const toggleMylapsField=f=>setMylapsFields(prev=>prev.includes(f)?prev.filter(x=>x!==f):[...prev,f]);

  const removeReg=(r,u)=>{
    if(window.confirm(`${t.admRemoveRegConfirm} ${u.name||"?"}?`))dispatch({type:"DELETE_REGISTRATION",eventId:ev.id,userId:r.userId});
  };

  return <div>
    <SH title={t.admTilmeldinger}/>
    <Sel label={t.race} value={selEv} onChange={setSelEv} options={eventsInScope(state.events,seriesScope).map(e=>({value:String(e.id),label:e.name}))}/>
    <div style={{display:"flex",gap:6,overflowX:"auto",marginBottom:10,paddingBottom:2}}>
      {classes.map(cls=><button key={cls} onClick={()=>setSelClass(cls)} style={{background:selClass===cls?state.classRules[cls]?.color||C.red:C.surface2,color:selClass===cls?"#fff":C.textMuted,border:`1px solid ${selClass===cls?state.classRules[cls]?.color||C.red:C.border}`,borderRadius:20,padding:"4px 10px",fontSize:10,cursor:"pointer",whiteSpace:"nowrap",fontFamily:"inherit"}}>{cls}</button>)}
    </div>
    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
      <button onClick={()=>setOnlyLicenseOk(v=>!v)} style={{background:onlyLicenseOk?`${C.green}22`:C.surface2,border:`1px solid ${onlyLicenseOk?C.green:C.border}`,borderRadius:6,padding:"6px 10px",color:onlyLicenseOk?C.green:C.textMuted,cursor:"pointer",fontSize:11,fontFamily:"inherit",fontWeight:700}}>{onlyLicenseOk?"✓ ":""}{t.admOnlyLicenseOkExport}</button>
      <span style={{color:C.textDim,fontSize:10}}>{exportRegs.length}/{regs.length}</span>
    </div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
      <span style={{color:C.textMuted,fontSize:11}}>{regs.length}{t.admRegisteredCount}</span>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",justifyContent:"flex-end"}}>
        <button onClick={()=>setShowCsvPicker(!showCsvPicker)} style={{background:C.surface2,border:`1px solid ${C.border}`,borderRadius:6,padding:"5px 10px",color:C.textMuted,fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>{t.admFieldsBtn}</button>
        <Btn small variant="secondary" onClick={doExport}>CSV</Btn>
        <button onClick={()=>setShowMylapsPicker(!showMylapsPicker)} style={{background:C.surface2,border:`1px solid ${C.border}`,borderRadius:6,padding:"5px 10px",color:C.textMuted,fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>⚙️ Orbit</button>
        <Btn small onClick={doMyLapsExport} style={{background:C.purple}}>MyLaps Orbit 5</Btn>
      </div>
    </div>
    {showCsvPicker&&<Card style={{borderLeft:`3px solid ${C.blue}`,marginBottom:10}}>
      <div style={{color:C.textMuted,fontSize:10,letterSpacing:2,marginBottom:8}}>{t.admSelectCsvFields}</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>
        {ALL_FIELDS.map(f=><button key={f} onClick={()=>toggleField(f)} style={{background:csvFields.includes(f)?`${C.blue}33`:C.surface2,border:`1px solid ${csvFields.includes(f)?C.blue:C.border}`,borderRadius:20,padding:"4px 10px",fontSize:10,cursor:"pointer",color:csvFields.includes(f)?C.blue:C.textMuted,fontFamily:"inherit"}}>{f}</button>)}
      </div>
    </Card>}
    {showMylapsPicker&&<Card style={{borderLeft:`3px solid ${C.purple}`,marginBottom:10}}>
      <div style={{color:C.textMuted,fontSize:10,letterSpacing:2,marginBottom:8}}>{t.admSelectOrbitFields}</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
        {ALL_FIELDS.map(f=><button key={f} onClick={()=>toggleMylapsField(f)} style={{background:mylapsFields.includes(f)?`${C.purple}33`:C.surface2,border:`1px solid ${mylapsFields.includes(f)?C.purple:C.border}`,borderRadius:20,padding:"4px 10px",fontSize:10,cursor:"pointer",color:mylapsFields.includes(f)?C.purple:C.textMuted,fontFamily:"inherit"}}>{f}</button>)}
      </div>
    </Card>}
    {regs.map((r,i)=>{const u=state.users.find(u=>u.id===r.userId)||{};const isEditing=editUserId===r.userId;return <Card key={i} style={{padding:"10px 14px"}}>
      {isEditing?<div>
        <div style={{fontWeight:700,color:C.text,fontSize:14,marginBottom:8}}>{u.name}</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <Input label={t.admFieldKart} value={editForm.kartNumber} onChange={v=>setEditForm(f=>({...f,kartNumber:v}))} type="number"/>
          <Input label={t.admFieldTransponder} value={editForm.transponder} onChange={v=>setEditForm(f=>({...f,transponder:v}))}/>
        </div>
        <Sel label={t.admFieldClass} value={editForm.class} onChange={v=>setEditForm(f=>({...f,class:v}))} options={(ev?.classes&&ev.classes.length?ev.classes:sortClassesByAge(Object.keys(state.classRules),state.classRules)).map(c=>({value:c,label:c}))}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <Input label={t.admFieldClub} value={editForm.club} onChange={v=>setEditForm(f=>({...f,club:v}))}/>
          <Input label={t.admFieldClubCode} value={editForm.clubCode} onChange={v=>setEditForm(f=>({...f,clubCode:v}))}/>
        </div>
        <Input label={t.admFieldLicense} value={editForm.license} onChange={v=>setEditForm(f=>({...f,license:v}))}/>
        <div style={{display:"flex",gap:8}}>
          <Btn small onClick={()=>saveEditReg(r)}>{t.save}</Btn>
          <Btn small variant="ghost" onClick={()=>setEditUserId(null)}>{t.cancel}</Btn>
        </div>
      </div>:<div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div>
          <div style={{fontWeight:700,color:C.text,fontSize:13}}>{u.name}</div>
          <div style={{color:C.textMuted,fontSize:11}}>{r.class} · #{u.kartNumber||"—"} · T:{u.transponder||"—"}</div>
          <div style={{color:C.textDim,fontSize:10}}>{r.paddockSpace||t.admNoPaddock}</div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:4,alignItems:"flex-end"}}>
          <Badge color={r.paid?C.green:C.red} style={{fontSize:10}}>{r.paid?t.admPaidBadge:t.admUnpaidBadge}</Badge>
          <Badge color={licenseOkFor(r.userId)?C.green:C.orange} style={{fontSize:9}}>{licenseOkFor(r.userId)?"LIC ✓":"LIC ?"}</Badge>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>openEditReg(r,u)} style={{background:"none",border:"none",color:C.blue,fontSize:10,cursor:"pointer",fontFamily:"inherit",textDecoration:"underline",marginTop:2}}>{t.edit}</button>
            <button onClick={()=>removeReg(r,u)} style={{background:"none",border:"none",color:C.red,fontSize:10,cursor:"pointer",fontFamily:"inherit",textDecoration:"underline",marginTop:2}}>{t.delete}</button>
          </div>
        </div>
      </div>}
    </Card>;})}
  </div>;
}

  const [pdfBusy,setPdfBusy]=useState(false);
  const [pdfMsg,setPdfMsg]=useState("");
  const [evTab,setEvTab]=useState("upcoming");
  const logoRef=useRef(null);
  const editLogoRef=useRef(null);
  const readImg=(file,cb)=>{const r=new FileReader();r.onload=e=>cb(e.target.result);r.readAsDataURL(file);};

  const uploadEventPdf=async(file,eventId)=>{
    if(!sb){setPdfMsg(t.admNotConfigured);return;}
    if(file.type!=="application/pdf"){setPdfMsg(t.admOnlyPdfAllowed);return;}
    setPdfBusy(true);setPdfMsg("");
    try{
      const path=`event-pdfs/${eventId}-${Date.now()}.pdf`;
      const {error:upErr}=await sb.storage.from("documents").upload(path,file,{cacheControl:"3600",upsert:false});
      if(upErr){setPdfMsg(t.admUploadFailed+upErr.message);setPdfBusy(false);return;}
      const {data:pub}=sb.storage.from("documents").getPublicUrl(path);
      dispatch({type:"UPDATE_EVENT",payload:{id:eventId,eventPdf:pub.publicUrl}});
      setPdfMsg("✓ PDF uploadet");
    }catch(e){setPdfMsg(String(e.message||e));}
    setPdfBusy(false);
  };

  if(evDetail){
    const ev=state.events.find(e=>e.id===evDetail.id)||evDetail;
    return <div style={{padding:0}}>
      <Btn small variant="ghost" onClick={()=>setEvDetail(null)} style={{marginBottom:12}}>← Tilbage til løb</Btn>

    setShowNew(false);

    </div>
    {showNew&&<Card style={{borderLeft:`3px solid ${C.red}`,marginBottom:12}}>
      <div style={{fontWeight:700,color:C.red,marginBottom:10,fontSize:13}}>{t.admCreateNewRace}</div>
      <Input label={t.admRaceName} value={form.name} onChange={v=>setForm(f=>({...f,name:v}))} placeholder="Rotax DM Runde 4"/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>

        <Input label={t.admEndDateOpt} value={form.endDate||""} onChange={v=>setForm(f=>({...f,endDate:v}))} type="date"/>
      </div>
      {(state.tracks||[]).length>0&&<Sel label="Bane (valgfri – udfylder Sted og Adresse)" value={form.trackId?String(form.trackId):""} onChange={v=>{const tr=(state.tracks||[]).find(x=>String(x.id)===v);if(tr)setForm(f=>({...f,location:tr.name,address:tr.address||"",trackId:tr.id}));}} options={[{value:"",label:t.admSelectTrack},...(state.tracks||[]).slice().sort((a,b)=>a.name.localeCompare(b.name,"da")).map(tr=>({value:String(tr.id),label:tr.name}))]}/>}

      <Input label={t.admFee} value={form.fee} onChange={v=>setForm(f=>({...f,fee:v}))} placeholder="750"/>

          })}

      </div>
      {(form.payMethods||["mobilepay"]).includes("mobilepay")&&<Input label="MobilePay #" value={form.payNumber||""} onChange={v=>setForm(f=>({...f,payNumber:v}))} placeholder="12345"/>}

          <div style={{marginBottom:10}}>
            <div style={{color:C.textMuted,fontSize:10,letterSpacing:1,marginBottom:6,textTransform:"uppercase"}}>{t.admSessionStructure}</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:6}}>
              <Input label={t.admTraining} value={String(editEv.trainings||1)} onChange={v=>setEditEv(f=>({...f,trainings:parseInt(v)||0}))} placeholder="1" type="number"/>
              <Input label={t.admQualShort} value={String(editEv.qualifications||1)} onChange={v=>setEditEv(f=>({...f,qualifications:parseInt(v)||0}))} placeholder="1" type="number"/>
              <Input label={t.admHeats} value={String(editEv.heats||3)} onChange={v=>setEditEv(f=>({...f,heats:parseInt(v)||0}))} placeholder="3" type="number"/>
              <Input label={t.admPrefinals} value={String(editEv.prefinaler||1)} onChange={v=>setEditEv(f=>({...f,prefinaler:parseInt(v)||0}))} placeholder="1" type="number"/>
              <Input label={t.admFinals} value={String(editEv.finaler||1)} onChange={v=>setEditEv(f=>({...f,finaler:parseInt(v)||0}))} placeholder="1" type="number"/>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
            <span style={{color:C.textMuted,fontSize:11}}>{t.admFridayTrainingOffered}</span>
            <button onClick={()=>setEditEv(f=>({...f,hasFridayTraining:!f.hasFridayTraining}))} style={{background:editEv.hasFridayTraining?`${C.blue}33`:C.surface2,border:`1px solid ${editEv.hasFridayTraining?C.blue:C.border}`,borderRadius:20,padding:"4px 12px",color:editEv.hasFridayTraining?C.blue:C.textMuted,cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>{editEv.hasFridayTraining?t.admYesUpper:t.admNoUpper}</button>

          <div style={{display:"flex",gap:8}}>
            <Btn small onClick={()=>{const mp=parseInt(editEv.maxParticipants)||undefined;const newLimits={};if(mp)(editEv.classes||ev.classes||Object.keys(state.classRules)).forEach(cls=>{newLimits[cls]={max:mp};});dispatch({type:"UPDATE_EVENT",payload:{id:ev.id,name:editEv.name,date:editEv.date,endDate:editEv.endDate||editEv.date,location:editEv.location,trackId:editEv.trackId!==undefined?editEv.trackId:ev.trackId,fee:parseInt(editEv.fee)||750,deadline:editEv.deadline,maxParticipants:mp,earlyMaxDate:editEv.earlyMaxDate||"",earlyMaxParticipants:parseInt(editEv.earlyMaxParticipants)||undefined,classes:editEv.classes||[],classLimits:newLimits,payMethods:editEv.payMethods,payNumber:editEv.payNumber,trainings:editEv.trainings,qualifications:editEv.qualifications,heats:editEv.heats,prefinaler:editEv.prefinaler,finaler:editEv.finaler,registrationOpen:editEv.registrationOpen,generalInfo:editEv.generalInfo??(ev.generalInfo||""),logo:ev.seriesId?undefined:(editEv.logo??ev.logo??null),hasFridayTraining:!!editEv.hasFridayTraining}});setEditEvId(null);}}>{t.save}</Btn>
            <Btn small variant="ghost" onClick={()=>setEditEvId(null)}>{t.cancel}</Btn>
            <Btn small variant="danger" onClick={()=>{dispatch({type:"DELETE_EVENT",id:ev.id});setEditEvId(null);}}>{t.delete}</Btn>
          </div>
        </div>:<div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
            <div>

            <button onClick={()=>{setEditEvId(ev.id);setEditEv({name:ev.name,date:ev.date,endDate:ev.endDate||ev.date,location:ev.location,fee:String(ev.fee||750),deadline:ev.deadline||"",maxParticipants:ev.maxParticipants||"",earlyMaxDate:ev.earlyMaxDate||"",earlyMaxParticipants:ev.earlyMaxParticipants||"",payMethods:ev.payMethods||[ev.paymentDestination?.type||"mobilepay"],payNumber:ev.paymentDestination?.number||"",trainings:ev.trainings||1,qualifications:ev.qualifications||1,heats:ev.heats||3,prefinaler:ev.prefinaler||1,finaler:ev.finaler||1,registrationOpen:ev.registrationOpen,classes:ev.classes||classesForSeries(state.classRules,ev.seriesId),logo:ev.logo||null,hasFridayTraining:!!ev.hasFridayTraining});}} style={{background:C.surface2,border:`1px solid ${C.border}`,borderRadius:6,padding:"6px 10px",color:C.textMuted,fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>{t.edit}</button>

        </div>}
      </Card>;
    })}

  </div>;
}

function AdminClassManager({state,dispatch}){
  const t=useT();
  const [form,setForm]=useState({name:"",min:"7",max:"99",color:C.red,seriesIds:[],byYear:false,useKartRegister:true});
  const [editName,setEditName]=useState(null);
  const [editForm,setEditForm]=useState({});
  const [filterSeries,setFilterSeries]=useState("Alle");
  const COLORS=["#E30613","#FF4466","#FF8800","#FFAA00","#FFD700","#B4E600","#00CC66","#00A86B","#00CCCC","#00AEEF","#2080FF","#3355FF","#6A5ACD","#9B59B6","#C724B1","#FF69B4","#8B4513","#A0522D","#708090","#2F4F4F"];

  const create=()=>{
    if(!form.name)return;
    dispatch({type:"ADD_CLASS",name:form.name,min:parseInt(form.min)||0,max:parseInt(form.max)||99,color:form.color,seriesIds:form.seriesIds,byYear:form.byYear,useKartRegister:form.useKartRegister});
    setForm({name:"",min:"7",max:"99",color:C.red,seriesIds:[],byYear:false,useKartRegister:true});
  };

  const saveEdit=()=>{
    dispatch({type:"UPDATE_CLASS",oldName:editName,name:editForm.name,min:parseInt(editForm.min)||0,max:parseInt(editForm.max)||99,color:editForm.color,seriesIds:editForm.seriesIds||[],byYear:editForm.byYear,useKartRegister:editForm.useKartRegister});
    setEditName(null);
  };

  const openEdit=name=>{
    const rule=state.classRules[name]||{};
    setEditName(name);
    setEditForm({name,min:String(rule.min||7),max:String(rule.max||99),color:rule.color||C.red,seriesIds:rule.seriesIds||[],byYear:!!rule.byYear,useKartRegister:rule.useKartRegister!==false});
  };

  const toggleSeries=(id,form,setF)=>{
    const arr=form.seriesIds||[];
    setF(f=>({...f,seriesIds:arr.includes(id)?arr.filter(x=>x!==id):[...arr,id]}));
  };

  const filtered=Object.entries(state.classRules).filter(([name,rule])=>{
    if(filterSeries==="Alle")return true;
    return (rule.seriesIds||[]).includes(parseInt(filterSeries));
  }).sort((a,b)=>{const ma=a[1]?.min??999,mb=b[1]?.min??999;return ma!==mb?ma-mb:a[0].localeCompare(b[0],"da");});

  return <div>
    <SH title={t.admClassesTitle}/>
    <Card style={{borderLeft:`3px solid ${C.red}`,marginBottom:12}}>
      <Input label={t.admClassName} value={form.name} onChange={v=>setForm(f=>({...f,name:v}))} placeholder="f.eks. Rotax E20"/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <Input label={t.admMinAge} value={form.min} onChange={v=>setForm(f=>({...f,min:v}))} placeholder="13" type="number"/>
        <Input label={t.admMaxAge} value={form.max} onChange={v=>setForm(f=>({...f,max:v}))} placeholder="17" type="number"/>
      </div>
      <label style={{display:"flex",alignItems:"flex-start",gap:8,marginBottom:10,cursor:"pointer"}}>
        <input type="checkbox" checked={!!form.byYear} onChange={e=>setForm(f=>({...f,byYear:e.target.checked}))} style={{marginTop:2}}/>
        <span style={{fontSize:11,color:C.textMuted,lineHeight:1.4}}>{t.admByYearHelpFull}</span>
      </label>
      <label style={{display:"flex",alignItems:"flex-start",gap:8,marginBottom:10,cursor:"pointer"}}>
        <input type="checkbox" checked={!!form.useKartRegister} onChange={e=>setForm(f=>({...f,useKartRegister:e.target.checked}))} style={{marginTop:2}}/>
        <span style={{fontSize:11,color:C.textMuted,lineHeight:1.4}}>{t.admUseKartRegisterHelp}</span>
      </label>
      <div style={{marginBottom:10}}>
        <div style={{color:C.textMuted,fontSize:10,letterSpacing:1,marginBottom:6,textTransform:"uppercase"}}>{t.admColor}</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {COLORS.map(col=><button key={col} onClick={()=>setForm(f=>({...f,color:col}))} style={{width:28,height:28,borderRadius:"50%",background:col,border:`3px solid ${form.color===col?"white":"transparent"}`,cursor:"pointer",flexShrink:0}}/>)}
        </div>
      </div>
      <div style={{marginBottom:10}}>
        <div style={{color:C.textMuted,fontSize:10,letterSpacing:1,marginBottom:6,textTransform:"uppercase"}}>{t.admParticipatesInSeries}</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
          {state.raceSeries.map(s=>{
            const active=(form.seriesIds||[]).includes(s.id);
            return <button key={s.id} onClick={()=>toggleSeries(s.id,form,setForm)} style={{background:active?`${C.blue}33`:C.surface2,border:`1px solid ${active?C.blue:C.border}`,borderRadius:20,padding:"4px 10px",color:active?C.blue:C.textMuted,cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>{active?"✓ ":""}{s.name}</button>;
          })}
        </div>
      </div>
      <Btn small onClick={create} disabled={!form.name} style={{width:"100%"}}>{t.admCreateClass}</Btn>
    </Card>
    <div style={{display:"flex",gap:6,overflowX:"auto",marginBottom:10,paddingBottom:2}}>
      <button onClick={()=>setFilterSeries("Alle")} style={{background:filterSeries==="Alle"?C.red:C.surface2,color:filterSeries==="Alle"?"#fff":C.textMuted,border:`1px solid ${filterSeries==="Alle"?C.red:C.border}`,borderRadius:20,padding:"4px 10px",fontSize:10,cursor:"pointer",whiteSpace:"nowrap",fontFamily:"inherit"}}>{t.admAllSeries}</button>
      {state.raceSeries.map(s=><button key={s.id} onClick={()=>setFilterSeries(String(s.id))} style={{background:filterSeries===String(s.id)?C.blue:C.surface2,color:filterSeries===String(s.id)?"#fff":C.textMuted,border:`1px solid ${filterSeries===String(s.id)?C.blue:C.border}`,borderRadius:20,padding:"4px 10px",fontSize:10,cursor:"pointer",whiteSpace:"nowrap",fontFamily:"inherit"}}>{s.name}</button>)}
    </div>
    {filtered.map(([name,rule])=>{
      const isEdit=editName===name;
      return <Card key={name} style={{padding:"11px 14px",borderLeft:`3px solid ${rule.color||C.red}`}}>
        {isEdit?<div>
          <Input label={t.name} value={editForm.name} onChange={v=>setEditForm(f=>({...f,name:v}))} placeholder={t.admClassName}/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <Input label={t.admMinAge} value={editForm.min} onChange={v=>setEditForm(f=>({...f,min:v}))} type="number"/>
            <Input label={t.admMaxAge} value={editForm.max} onChange={v=>setEditForm(f=>({...f,max:v}))} type="number"/>
          </div>
          <label style={{display:"flex",alignItems:"flex-start",gap:8,marginBottom:10,cursor:"pointer"}}>
            <input type="checkbox" checked={!!editForm.byYear} onChange={e=>setEditForm(f=>({...f,byYear:e.target.checked}))} style={{marginTop:2}}/>
            <span style={{fontSize:11,color:C.textMuted,lineHeight:1.4}}>{t.admByYearHelpShort}</span>
          </label>
          <label style={{display:"flex",alignItems:"flex-start",gap:8,marginBottom:10,cursor:"pointer"}}>

      </Card>;
    })}
  </div>;
}

function AdminSeries({state,dispatch}){

  const [editForm,setEditForm]=useState({name:"",logo:null});

          <div style={{marginBottom:10}}>
            {editForm.logo

                <img src={editForm.logo} style={{width:60,height:40,objectFit:"contain",borderRadius:4,border:`1px solid ${C.border}`,background:"#fff"}} alt="Logo"/>
                <button onClick={()=>setEditForm(f=>({...f,logo:null}))} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:6,padding:"4px 10px",color:C.textMuted,cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>{t.admRemove}</button>

function AdminEventRoleAssign({state,dispatch,seriesScope}){
  const t=useT();
  const scoped=eventsInScope(state.events,seriesScope);
  const selEv=getAdminSelEv(state,scoped);
  const setSelEv=v=>setAdminSelEv(dispatch,v);
  const ev=scoped.find(e=>String(e.id)===selEv)||state.events.find(e=>String(e.id)===selEv);
  const officials=state.users.filter(u=>u.isOfficial||u.type==="official").slice().sort((a,b)=>(a.name||"").localeCompare(b.name||"","da"));
  if(scoped.length===0)return null;
  const roleCard=(role,label,icon,color)=>{
    const assigned=ev?.[role]||[];
    return <div style={{marginBottom:12}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
        <span style={{color:C.text,fontSize:12,fontWeight:700}}>{icon} {label}</span>

function AdminOfficials({state,dispatch,seriesScope}){
  const t=useT();
  const officials=state.users.filter(u=>u.isOfficial||u.type==="official").slice().sort((a,b)=>(a.name||"").localeCompare(b.name||"","da"));
  const toggleEvent=(uid,evId)=>{
    const u=state.users.find(u=>u.id===uid);
    const approved=u?.approvedEvents||[];
    dispatch({type:"UPDATE_USER",payload:{id:uid,approvedEvents:approved.includes(evId)?approved.filter(id=>id!==evId):[...approved,evId]}});
  };
  const toggleNotif=(uid)=>{
    const u=state.users.find(u=>u.id===uid);
    dispatch({type:"UPDATE_USER",payload:{id:uid,canSendNotif:!u?.canSendNotif}});

  return <div>
    <SH title="Officials" sub="Godkend officials og rettigheder"/>
    <AdminEventRoleAssign state={state} dispatch={dispatch} seriesScope={seriesScope}/>

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>

          <div style={{fontWeight:700,color:C.text,fontSize:13}}>{u.name}</div>
          <div style={{color:C.textMuted,fontSize:11}}>{u.email}</div>
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <Badge color={C.purple} style={{fontSize:10}}>OFFICIAL</Badge>
        </div>
      </div>
      {/* Notification permission */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderTop:`1px solid ${C.border}`,borderBottom:`1px solid ${C.border}`,marginBottom:8}}>
        <div>
          <div style={{fontWeight:600,color:C.text,fontSize:12}}>🔔 Må sende notifikationer</div>

      </div>
      {/* Event access */}
      <div style={{color:C.textMuted,fontSize:10,letterSpacing:1,marginBottom:6}}>{t.admRaceApproval}</div>
      {state.events.map(ev=><div key={ev.id} onClick={()=>toggleEvent(u.id,ev.id)} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderBottom:`1px solid ${C.border}`,cursor:"pointer"}}>
        <div style={{width:18,height:18,borderRadius:4,background:(u.approvedEvents||[]).includes(ev.id)?C.green:C.surface2,border:`1px solid ${(u.approvedEvents||[]).includes(ev.id)?C.green:C.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,flexShrink:0,color:"#fff"}}>{(u.approvedEvents||[]).includes(ev.id)?"✓":""}</div>
        <span style={{color:C.text,fontSize:12}}>{ev.name}</span>
        <span style={{color:C.textMuted,fontSize:10,marginLeft:"auto"}}>{ev.date}</span>

function AdminNotifications({state,dispatch,seriesScope}){
  const t=useT();
  const scopedEvs=eventsInScope(state.events,seriesScope);
  const selEv=getAdminSelEv(state,scopedEvs);
  const setSelEv=v=>setAdminSelEv(dispatch,v);
  const [form,setForm]=useState({title:"",body:"",targetClass:"Alle",session:"",groups:[],officialsOnly:false});
  const ev=state.events.find(e=>e.id===parseInt(selEv));
  const groupLetters=form.targetClass!=="Alle"&&form.session?sessionGroupLetters(ev,form.targetClass,form.session):[];
  const toggleGroup=(g)=>setForm(f=>({...f,groups:f.groups.includes(g)?f.groups.filter(x=>x!==g):[...f.groups,g]}));
  // Builds the "Senior Gruppe A+B Heat 1: " style prefix from class + selected groups + session.
  const buildPrefix=(f)=>{
    if(f.targetClass==="Alle")return "";
    let p=f.targetClass;
    if(f.groups.length)p+=" Gruppe "+f.groups.join("+");
    if(f.session)p+=" "+f.session;
    return p+": ";
  };
  const [sent,setSent]=useState(false);
  // Message to all officials (independent of event)
  const [offForm,setOffForm]=useState({title:"",body:"",eventId:""});
  const [offSent,setOffSent]=useState(false);
  const sendOfficials=()=>{
    if(!offForm.title)return;
    dispatch({type:"ADD_NOTIFICATION",payload:{
      title:offForm.title,body:offForm.body,targetClass:"Alle",officialsOnly:true,
      eventId:offForm.eventId?parseInt(offForm.eventId):null,
      time:new Date().toLocaleString("da-DK"),by:"Admin",
    }});
    // Push to all officials
    sendPushNotification({title:offForm.title,body:offForm.body,userIds:resolveNotifRecipients(state.users,{officialsOnly:true})});
    setOffSent(true);setTimeout(()=>setOffSent(false),2000);
    setOffForm({title:"",body:"",eventId:""});
  };



  const send=()=>{
    if(!form.title)return;
    const fullTitle=buildPrefix(form)+form.title;
    dispatch({type:"ADD_NOTIFICATION",payload:{title:fullTitle,body:form.body,targetClass:form.targetClass,officialsOnly:form.officialsOnly,eventId:parseInt(selEv),time:new Date().toLocaleString("da-DK"),by:"Admin"}});
    sendPushNotification({title:fullTitle,body:form.body,userIds:resolveNotifRecipients(state.users,{targetClass:form.targetClass,officialsOnly:form.officialsOnly})});
    setSent(true);setTimeout(()=>setSent(false),2000);
    setForm(f=>({...f,title:"",body:""}));
  };
  const notifs=state.notifications||[];
  return <div>
    <SH title={t.notifications}/>
    {/* Besked til ALLE officials – uafhængigt af løb */}
    <Card style={{borderLeft:`3px solid ${C.purple}`}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
        <span style={{fontSize:16}}>📣</span>
        <div>
          <div style={{color:C.purple,fontSize:13,fontWeight:700}}>Besked til alle officials</div>
          <div style={{color:C.textMuted,fontSize:11}}>Sendes til alle med official-rollen – fx hvis du mangler hjælpere til et løb</div>
        </div>
      </div>
      <Sel label="Løb (valgfrit)" value={offForm.eventId} onChange={v=>setOffForm(f=>({...f,eventId:v}))} options={[{value:"",label:"Intet bestemt løb"},...eventsInScope(state.events,seriesScope).map(e=>({value:String(e.id),label:e.name}))]}/>
      <div style={{marginBottom:6}}>
        <div style={{color:C.textMuted,fontSize:10,letterSpacing:1,marginBottom:4,textTransform:"uppercase"}}>Overskrift</div>
        <input value={offForm.title} onChange={e=>setOffForm(f=>({...f,title:e.target.value}))} placeholder="fx: Mangler officials til RMCDK 2026 3" style={{width:"100%",background:C.surface2,border:`1px solid ${C.border}`,borderRadius:6,padding:"8px 12px",color:C.text,fontSize:13,boxSizing:"border-box",fontFamily:"inherit"}}/>
      </div>
      <div style={{marginBottom:10}}>
        <div style={{color:C.textMuted,fontSize:10,letterSpacing:1,marginBottom:4,textTransform:"uppercase"}}>Besked</div>
        <textarea value={offForm.body} onChange={e=>setOffForm(f=>({...f,body:e.target.value}))} rows={2} placeholder="Skriv beskeden til dine officials..." style={{width:"100%",background:C.surface2,border:`1px solid ${C.border}`,borderRadius:6,padding:"8px 12px",color:C.text,fontSize:12,boxSizing:"border-box",resize:"vertical",fontFamily:"inherit"}}/>
      </div>
      {offSent?<div style={{background:`${C.green}22`,border:`1px solid ${C.green}44`,borderRadius:8,padding:12,textAlign:"center",color:C.green,fontWeight:700}}>✅ Sendt til alle officials!</div>:<Btn onClick={sendOfficials} style={{width:"100%",background:C.purple}} disabled={!offForm.title}>📣 SEND TIL ALLE OFFICIALS</Btn>}
    </Card>

    <div style={{color:C.textMuted,fontSize:10,letterSpacing:2,margin:"8px 0 6px"}}>{t.admGeneralNotif}</div>
    <Card style={{borderLeft:`3px solid ${C.red}`}}>
      <Sel label="Løb" value={selEv} onChange={setSelEv} options={eventsInScope(state.events,seriesScope).map(e=>({value:String(e.id),label:e.name}))}/>
      <Sel label="Klasse" value={form.targetClass} onChange={cls=>setForm(f=>({...f,targetClass:cls,session:"",groups:[]}))} options={["Alle",...((ev?.classes&&ev.classes.length)?ev.classes:sortClassesByAge(Object.keys(state.classRules),state.classRules))]}/>
      {form.targetClass!=="Alle"&&<Sel label="Session (valgfri)" value={form.session} onChange={v=>setForm(f=>({...f,session:v,groups:[]}))} options={[{value:"",label:"Ingen bestemt session"},...(state.sessions||[]).map(s=>s.name)]}/>}
      {groupLetters.length>0&&<div style={{marginBottom:10}}>
        <div style={{color:C.textMuted,fontSize:10,letterSpacing:1,marginBottom:6,textTransform:"uppercase"}}>Grupper (valgfri)</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {groupLetters.map(g=>{const on=form.groups.includes(g);return <button key={g} onClick={()=>toggleGroup(g)} style={{background:on?C.cyan:C.surface2,color:on?"#000":C.textMuted,border:`1px solid ${on?C.cyan:C.border}`,borderRadius:8,padding:"5px 12px",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{on?"✓ ":""}Gruppe {g}</button>;})}

      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>

      </div>
      <div style={{marginBottom:4}}>
        <div style={{color:C.textMuted,fontSize:10,letterSpacing:1,marginBottom:4,textTransform:"uppercase"}}>Overskrift</div>
        <input value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))} placeholder="Skriv overskrift..." style={{width:"100%",background:C.surface2,border:`1px solid ${C.border}`,borderRadius:6,padding:"8px 12px",color:C.text,fontSize:13,boxSizing:"border-box",fontFamily:"inherit"}}/>
        {form.targetClass!=="Alle"&&<div style={{fontSize:10,color:C.textMuted,marginTop:3}}>Vises som: <strong style={{color:C.text}}>{buildPrefix(form)+(form.title||"...")}</strong></div>}
      </div>
      <div style={{marginBottom:10,marginTop:8}}>
        <div style={{color:C.textMuted,fontSize:10,letterSpacing:1,marginBottom:4,textTransform:"uppercase"}}>Besked</div>
        <textarea value={form.body} onChange={e=>setForm(f=>({...f,body:e.target.value}))} rows={2} placeholder="Beskedtekst..." style={{width:"100%",background:C.surface2,border:`1px solid ${C.border}`,borderRadius:6,padding:"8px 12px",color:C.text,fontSize:12,boxSizing:"border-box",resize:"vertical",fontFamily:"inherit"}}/>
