// Fields that are NOT synced to app_state
// (currentUser+lang are local per device; users/authProfiles live in the profiles table)
// Fields excluded from the shared app_state blob save:
// - currentUser/lang/uiPrefs: local per-device, never synced.
// - users/authProfiles: live in the "profiles" table.
// - importedUsers: lives in the "imported_users" table (children + CSV-imported drivers).
// - penalties/readySignals/registrations (per event) and notifications: live in their own dedicated
//   tables (penalties, ready_signals, registrations, notifications) instead of the single app_state
//   blob, specifically so that many people acting at once (officials reporting from different stations,
//   or many drivers/parents registering or creating child profiles at the same time) can never silently
//   overwrite each other's submissions the way a "whole state" save could.
const stripLocal=(s)=>{
  const {currentUser,lang,users,authProfiles,uiPrefs,notifications,importedUsers,...rest}=s;
  return {...rest,events:(rest.events||[]).map(({penalties,readySignals,registrations,...ev})=>ev)};
};

function App(){
  const [state,dispatch]=useReducer(reducer,initialState);
  // wrappedDispatch below is memoized with an empty dependency array (so its identity stays stable),
  // so it reads state via this ref instead of closing over the (stale) state variable directly.
  const stateRef=useRef(state);
  useEffect(()=>{stateRef.current=state;},[state]);
  const [sync,setSync]=useState(sb?"loading":"local");
  const skipNextSave=useRef(true);
  const lastSaved=useRef("");
  const pendingSave=useRef(false);
  const loaded=useRef(false);
  const notifCount=useRef(null);
  const audioCtxRef=useRef(null);

  // Always register the service worker (not just when push is supported) – it's a prerequisite for
  // the browser to offer "Install app" on e.g. Windows/Chrome/Edge. Fails silently if SW isn't
  // supported in the browser.
  useEffect(()=>{ registerServiceWorker(); },[]);

  // Play a sound when a new notification arrives (after the initial load)
  useEffect(()=>{
    try{
      const u=state.currentUser;
      const isOff=u?.isOfficial||u?.type==="official"||u?.isAdmin;
      const isAdminOrSub=u?.isAdmin||u?.isSubAdmin||u?.type==="admin";
      const myClasses=new Set();
      if(u?.class)myClasses.add(u.class);
      childrenOf(state.users,u).forEach(c=>{if(c.class)myClasses.add(c.class);});
      const relevant=(state.notifications||[]).filter(n=>(!n.adminOnly||isAdminOrSub)&&(!n.officialsOnly||isOff)&&(isOff||!n.targetClass||n.targetClass==="Alle"||myClasses.has(n.targetClass)));
      const count=relevant.length;
      if(notifCount.current===null){notifCount.current=count;return;}
      if(count>notifCount.current&&u){
        try{
          if(!audioCtxRef.current)audioCtxRef.current=new (window.AudioContext||window.webkitAudioContext)();
          const ctx=audioCtxRef.current;
          if(ctx.state==="suspended")ctx.resume();
          [[880,0],[1174,0.12]].forEach(([freq,tOff])=>{
            const osc=ctx.createOscillator(),gain=ctx.createGain();
            osc.type="sine";osc.frequency.value=freq;
            osc.connect(gain);gain.connect(ctx.destination);
            gain.gain.setValueAtTime(0.001,ctx.currentTime+tOff);
            gain.gain.exponentialRampToValueAtTime(0.25,ctx.currentTime+tOff+0.02);
            gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+tOff+0.18);
            osc.start(ctx.currentTime+tOff);osc.stop(ctx.currentTime+tOff+0.2);
          });
        }catch(e){/* lyd ikke tilgængelig */}
      }
      notifCount.current=count;
    }catch(e){/* aldrig crash på lyd */}
  },[state.notifications,state.currentUser]);

  // 1) Fetch saved state + profiles on startup, restore login if any
  useEffect(()=>{
    if(!sb){return;}
    let channel,profChannel,penaltyChannel,signalChannel,notifChannel,regChannel,importedChannel;
    (async()=>{
      // Fetch Auth profiles
      const profiles=await loadProfiles();
      dispatch({type:"SET_PROFILES",payload:profiles});

      // Fetch app state + the dedicated penalties/ready_signals/registrations/notifications/imported_users
      // tables in parallel (these live separately from the app_state blob – see stripLocal for why).
      const [{data,error},{data:penaltyRows},{data:signalRows},{data:notifRows},{data:regRows},{data:importedRows}]=await Promise.all([
        sb.from("app_state").select("data").eq("id",1).maybeSingle(),
        sb.from("penalties").select("*"),
        sb.from("ready_signals").select("*"),
        sb.from("notifications").select("*").order("id",{ascending:false}),
        sb.from("registrations").select("*"),
        sb.from("imported_users").select("*"),
      ]);
      if(error){console.error("Supabase load:",error);setSync("error");}
      else if(data&&data.data){
        const payload={...data.data,
          events:attachRegistrations(attachEventTables(data.data.events,penaltyRows,signalRows),regRows),
          notifications:(notifRows||[]).map(rowToNotification),
          importedUsers:(importedRows||[]).map(rowToImportedUser),
        };
        skipNextSave.current=true;
        lastSaved.current=JSON.stringify(stripLocal({...initialState,...data.data}));
        dispatch({type:"HYDRATE",payload});
        setSync("synced");
      }else{
        const seed=stripLocal(initialState);
        const {error:insErr}=await sb.from("app_state").insert({id:1,data:seed,client:CLIENT_ID});
        if(insErr){console.error("Supabase seed:",insErr);setSync("error");}
        else{lastSaved.current=JSON.stringify(seed);setSync("synced");}
      }

      // Restore login if an Auth session exists
      const {data:sess}=await sb.auth.getSession();
      const uid=sess?.session?.user?.id;
      let loggedInProfile=null;
      if(uid){
        const {data:prof}=await sb.from("profiles").select("*").eq("id",uid).maybeSingle();
        if(prof){loggedInProfile=prof;dispatch({type:"LOGIN",payload:rowToUser(prof)});}
      }
      loaded.current=true;

      // Path A: Clear front fairing images older than 30 days (only when an admin opens the app)
      if(loggedInProfile?.is_admin){
        try{
          const cutoff=Date.now()-30*24*60*60*1000;
          const {data:files}=await sb.storage.from("documents").list("nose-photos",{limit:1000});
          // subfolders per event
          if(files){
            for(const folder of files){
              if(folder.id)continue; // a file, not a folder
              const {data:sub}=await sb.storage.from("documents").list("nose-photos/"+folder.name,{limit:1000});
              const toDelete=(sub||[]).filter(f=>new Date(f.created_at||f.updated_at||0).getTime()<cutoff).map(f=>`nose-photos/${folder.name}/${f.name}`);
              if(toDelete.length)await sb.storage.from("documents").remove(toDelete);
            }
          }
        }catch(e){console.warn("Front fairing-oprydning:",e);}
      }

      // Realtime: app state
      channel=sb.channel("app_state_sync")
        .on("postgres_changes",{event:"UPDATE",schema:"public",table:"app_state",filter:"id=eq.1"},async(payload)=>{
          if(payload.new?.client===CLIENT_ID)return;
          if(pendingSave.current)return; // don't clobber an unsaved local change that's about to be written
          const {data:row}=await sb.from("app_state").select("data").eq("id",1).maybeSingle();
          if(row?.data){
            skipNextSave.current=true;
            lastSaved.current=JSON.stringify(stripLocal({...initialState,...row.data}));
            dispatch({type:"HYDRATE",payload:row.data});
          }
        })
        .subscribe();

      // Realtime: profiles (new users / changes from other devices)
      profChannel=sb.channel("profiles_sync")
        .on("postgres_changes",{event:"*",schema:"public",table:"profiles"},async()=>{
          const fresh=await loadProfiles();
          dispatch({type:"SET_PROFILES",payload:fresh});
        })
        .subscribe();

      // Realtime: penalties / ready signals / notifications – each is its own table, so different
      // officials reporting at the same time never overwrite each other (see stripLocal for why).
      penaltyChannel=sb.channel("penalties_sync")
        .on("postgres_changes",{event:"INSERT",schema:"public",table:"penalties"},payload=>{
          dispatch({type:"_RT_PENALTY_UPSERT",eventId:payload.new.event_id,penalty:rowToPenalty(payload.new)});
        })
        .on("postgres_changes",{event:"UPDATE",schema:"public",table:"penalties"},payload=>{
          dispatch({type:"_RT_PENALTY_UPSERT",eventId:payload.new.event_id,penalty:rowToPenalty(payload.new)});
        })
        .on("postgres_changes",{event:"DELETE",schema:"public",table:"penalties"},payload=>{
          dispatch({type:"_RT_PENALTY_DELETE",eventId:payload.old.event_id,penaltyId:payload.old.id});
        })
        .subscribe();

      signalChannel=sb.channel("ready_signals_sync")
        .on("postgres_changes",{event:"INSERT",schema:"public",table:"ready_signals"},payload=>{
          dispatch({type:"_RT_READY_SIGNAL_UPSERT",eventId:payload.new.event_id,signal:rowToReadySignal(payload.new)});
        })
        .on("postgres_changes",{event:"UPDATE",schema:"public",table:"ready_signals"},payload=>{
          dispatch({type:"_RT_READY_SIGNAL_UPSERT",eventId:payload.new.event_id,signal:rowToReadySignal(payload.new)});
        })
        .on("postgres_changes",{event:"DELETE",schema:"public",table:"ready_signals"},payload=>{
          if(!payload.old)return;
          dispatch({type:"_RT_READY_SIGNAL_DELETE",eventId:payload.old.event_id,signal:rowToReadySignal(payload.old)});
        })
        .subscribe();

      notifChannel=sb.channel("notifications_sync")
        .on("postgres_changes",{event:"INSERT",schema:"public",table:"notifications"},payload=>{
          dispatch({type:"_RT_NOTIFICATION_UPSERT",notification:rowToNotification(payload.new)});
        })
        .on("postgres_changes",{event:"DELETE",schema:"public",table:"notifications"},payload=>{
          dispatch({type:"_RT_NOTIFICATION_DELETE",id:payload.old.id});
        })
        .subscribe();

      regChannel=sb.channel("registrations_sync")
        .on("postgres_changes",{event:"INSERT",schema:"public",table:"registrations"},payload=>{
          dispatch({type:"_RT_REGISTRATION_UPSERT",eventId:payload.new.event_id,registration:rowToRegistration(payload.new)});
        })
        .on("postgres_changes",{event:"UPDATE",schema:"public",table:"registrations"},payload=>{
          dispatch({type:"_RT_REGISTRATION_UPSERT",eventId:payload.new.event_id,registration:rowToRegistration(payload.new)});
        })
        .on("postgres_changes",{event:"DELETE",schema:"public",table:"registrations"},payload=>{
          dispatch({type:"_RT_REGISTRATION_DELETE",eventId:payload.old.event_id,userId:payload.old.user_id});
        })
        .subscribe();

      importedChannel=sb.channel("imported_users_sync")
        .on("postgres_changes",{event:"INSERT",schema:"public",table:"imported_users"},payload=>{
          dispatch({type:"_RT_IMPORTED_USER_UPSERT",user:rowToImportedUser(payload.new)});
        })
        .on("postgres_changes",{event:"UPDATE",schema:"public",table:"imported_users"},payload=>{
          dispatch({type:"_RT_IMPORTED_USER_UPSERT",user:rowToImportedUser(payload.new)});
        })
        .on("postgres_changes",{event:"DELETE",schema:"public",table:"imported_users"},payload=>{
          dispatch({type:"_RT_IMPORTED_USER_DELETE",id:payload.old.id});
        })
        .subscribe();
    })();
    return()=>{if(channel)sb.removeChannel(channel);if(profChannel)sb.removeChannel(profChannel);if(penaltyChannel)sb.removeChannel(penaltyChannel);if(signalChannel)sb.removeChannel(signalChannel);if(notifChannel)sb.removeChannel(notifChannel);if(regChannel)sb.removeChannel(regChannel);if(importedChannel)sb.removeChannel(importedChannel);};
  },[]);

  // Refetch data when the window regains focus / becomes visible again (catches any missed realtime updates)
  useEffect(()=>{
    if(!sb)return;
    const refresh=async()=>{
      if(document.hidden)return;
      try{
        const fresh=await loadProfiles();
        dispatch({type:"SET_PROFILES",payload:fresh});
        const {data:row}=await sb.from("app_state").select("data,client").eq("id",1).maybeSingle();
        if(row?.data&&row.client!==CLIENT_ID&&!pendingSave.current){
          skipNextSave.current=true;
          lastSaved.current=JSON.stringify(stripLocal({...initialState,...row.data}));
          dispatch({type:"HYDRATE",payload:row.data});
        }
      }catch(e){/* ignorér */}
    };
    window.addEventListener("focus",refresh);
    document.addEventListener("visibilitychange",refresh);
    return()=>{window.removeEventListener("focus",refresh);document.removeEventListener("visibilitychange",refresh);};
  },[]);

  // 2) Save app state (debounced) – excl. profiles
  useEffect(()=>{
    if(!sb||!loaded.current)return;
    if(skipNextSave.current){skipNextSave.current=false;return;}
    const rest=stripLocal(state);
    const json=JSON.stringify(rest);
    if(json===lastSaved.current){pendingSave.current=false;return;}
    pendingSave.current=true;
    setSync("saving");
    const t=setTimeout(async()=>{
      const {error}=await sb.from("app_state").update({data:rest,client:CLIENT_ID,updated_at:new Date().toISOString()}).eq("id",1);
      pendingSave.current=false;
      if(error){console.error("Supabase save:",error);setSync("error");}
      else{lastSaved.current=json;setSync("synced");}
    },800);
    return()=>clearTimeout(t);
  },[state]);

  // Wrapped dispatch: profile changes are also written to the profiles table
  const wrappedDispatch=React.useCallback((action)=>{
    // Pre-assign IDs *before* dispatching, so the exact same ID/result is used both in local state
    // and in the dedicated Supabase tables (the reducer uses these instead of generating its own
    // when already set — see ADD_PENALTY/ADD_NOTIFICATION/ADD_CHILD/IMPORT_PARTICIPANTS reducer cases).
    if(action.type==="ADD_PENALTY"&&action.payload&&!action.payload.id)action.payload.id=genId();
    if(action.type==="ADD_NOTIFICATION"&&action.payload&&!action.payload.id)action.payload.id=genId();
    if(action.type==="ADD_CHILD"&&!action.childId)action.childId="child-"+genId();
    if(action.type==="ADD_MANUAL_DRIVER"&&!action.driverId)action.driverId="manual-"+genId();
    if(action.type==="IMPORT_PARTICIPANTS"&&!action._precomputed)action._precomputed=computeImportParticipants(stateRef.current,action);

    dispatch(action);
    if(!sb)return;
    const isAuthId=(id)=>typeof id==="string"&&!String(id).startsWith("imp-")&&!String(id).startsWith("child-");
    if(action.type==="UPDATE_USER"&&isAuthId(action.payload?.id)){
      (async()=>{
        const {data:existing}=await sb.from("profiles").select("*").eq("id",action.payload.id).maybeSingle();
        if(existing){
          const merged=rowToUser(existing);
          const row=userToRow({...merged,...action.payload});
          await sb.from("profiles").update(row).eq("id",action.payload.id);
        }
      })();
    }
    if(action.type==="UPDATE_USER"&&!isAuthId(action.payload?.id)){
      // Imported/child user – persist to imported_users instead of profiles.
      const existing=(stateRef.current.importedUsers||[]).find(u=>u.id===action.payload.id);
      if(existing)sb.from("imported_users").update(importedUserToRow({...existing,...action.payload})).eq("id",action.payload.id).then(({error})=>{if(error)console.error("Supabase imported_users update:",error);});
    }
    if(action.type==="ADD_CHILD"&&isAuthId(action.parentId)&&action._newChildIds){
      // Persist the parent's updated childIds (ChildManager sends the list along)
      sb.from("profiles").update({child_ids:action._newChildIds}).eq("id",action.parentId);
    }
    if(action.type==="ADD_CHILD"){
      const child={id:action.childId,type:"driver",source:"child",parentId:action.parentId,isOfficial:false,approvedEvents:[],licenseValid:null,...action.payload};
      sb.from("imported_users").insert(importedUserToRow(child)).then(({error})=>{if(error)console.error("Supabase imported_users insert:",error);});
    }
    if(action.type==="ADD_MANUAL_DRIVER"){
      const newUser={id:action.driverId,type:"driver",source:"manual",name:action.name,license:action.license||"",transponder:action.transponder||"",kartNumber:action.kartNumber||undefined,class:action.class,phone:action.phone||"",club:action.club||"",country:action.country||"",email:action.email||"",isOfficial:false,approvedEvents:[],licenseValid:action.licenseValid??null};
      sb.from("imported_users").insert(importedUserToRow(newUser)).then(({error})=>{if(error)console.error("Supabase imported_users insert (manual driver):",error);});
      sb.from("registrations").upsert(registrationToRow(action.eventId,{userId:action.driverId,class:action.class,paddockSpace:"",slicks:[],slickReserve:"",wets:[],wetReserve:"",paid:!!action.paid}),{onConflict:"event_id,user_id"}).then(({error})=>{if(error)console.error("Supabase registration insert (manual driver):",error);});
    }
    if(action.type==="RELEASE_CHILD"){
      // Auth/profiles side is already handled inline where this is dispatched from (ChildManager) –
      // here we just remove the old imported_users row and re-point their registrations to the new id.
      sb.from("imported_users").delete().eq("id",action.childId).then(({error})=>{if(error)console.error("Supabase imported_users delete (release):",error);});
      sb.from("registrations").update({user_id:action.newId}).eq("user_id",action.childId).then(({error})=>{if(error)console.error("Supabase registrations re-point (release):",error);});
    }
    if(action.type==="DELETE_USER"&&!isAuthId(action.id)){
      sb.from("imported_users").delete().eq("id",action.id).then(({error})=>{if(error)console.error("Supabase imported_users delete:",error);});
    }
    if(action.type==="UPDATE_OFFICIAL_EVENTS"&&isAuthId(action.userId)){
      sb.from("profiles").update({approved_events:action.events}).eq("id",action.userId);
    }
    if(action.type==="UPDATE_OFFICIAL_EVENTS"&&!isAuthId(action.userId)){
      sb.from("imported_users").update({approved_events:action.events}).eq("id",action.userId).then(({error})=>{if(error)console.error("Supabase imported_users approved_events:",error);});
    }

    // ── Registrations: independent insert/upsert per driver, so many people registering for the
    // same race at the same moment can never overwrite each other's sign-ups. ──
    if(action.type==="REGISTER"){
      sb.from("registrations").upsert(registrationToRow(action.eventId,action.payload),{onConflict:"event_id,user_id"}).then(({error})=>{if(error)console.error("Supabase registration insert:",error);});
    }
    if(action.type==="DELETE_REGISTRATION"){
      sb.from("registrations").delete().eq("event_id",action.eventId).eq("user_id",action.userId).then(({error})=>{if(error)console.error("Supabase registration delete:",error);});
    }
    if(action.type==="UPDATE_REGISTRATION"){
      const ev=(stateRef.current.events||[]).find(e=>e.id===action.eventId);
      const existing=(ev?.registrations||[]).find(r=>r.userId===action.userId);
      const merged={...(existing||{userId:action.userId}),...action.payload};
      sb.from("registrations").upsert(registrationToRow(action.eventId,merged),{onConflict:"event_id,user_id"}).then(({error})=>{if(error)console.error("Supabase registration update:",error);});
    }
    if(action.type==="IMPORT_PARTICIPANTS"){
      const {regs,touchedUsers}=action._precomputed;
      if(touchedUsers.length)sb.from("imported_users").upsert(touchedUsers.map(importedUserToRow)).then(({error})=>{if(error)console.error("Supabase imported_users bulk upsert:",error);});
      if(regs.length)sb.from("registrations").upsert(regs.map(r=>registrationToRow(action.eventId,r)),{onConflict:"event_id,user_id"}).then(({error})=>{if(error)console.error("Supabase registrations bulk upsert:",error);});
    }
    if(action.type==="REMOVE_IMPORT_BATCH"){
      sb.from("imported_users").delete().eq("import_batch",action.batchId).then(({error})=>{if(error)console.error("Supabase imported_users batch delete:",error);});
      sb.from("registrations").delete().eq("import_batch",action.batchId).then(({error})=>{if(error)console.error("Supabase registrations batch delete:",error);});
    }
    if(action.type==="REMOVE_ALL_CSV_IMPORTS"){
      const removedIds=(stateRef.current.importedUsers||[]).filter(u=>u.source==="csv-import").map(u=>u.id);
      sb.from("imported_users").delete().eq("source","csv-import").then(({error})=>{if(error)console.error("Supabase imported_users csv delete:",error);});
      if(removedIds.length)sb.from("registrations").delete().in("user_id",removedIds).then(({error})=>{if(error)console.error("Supabase registrations csv delete:",error);});
    }

    // ── Penalties / ready signals / notifications: written straight to their own tables, as
    // independent inserts/updates/deletes rather than through the shared app_state blob save, so two
    // officials reporting at the same moment can never silently overwrite each other's submissions. ──
    if(action.type==="ADD_PENALTY"){
      sb.from("penalties").insert(penaltyToRow(action.eventId,action.payload)).then(({error})=>{if(error)console.error("Supabase penalty insert:",error);});
    }
    if(action.type==="UPDATE_PENALTY"){
      const id=action.penaltyId??action.payload?.id;
      if(id!=null)sb.from("penalties").update(penaltyToRow(action.eventId,{...action.payload,id})).eq("id",id).then(({error})=>{if(error)console.error("Supabase penalty update:",error);});
    }
    if(action.type==="DELETE_PENALTY"&&action.penaltyId!=null){
      sb.from("penalties").delete().eq("id",action.penaltyId).then(({error})=>{if(error)console.error("Supabase penalty delete:",error);});
    }
    if(action.type==="SET_READY_SIGNAL"){
      const row=readySignalToRow(action.eventId,{class:action.cls,session:action.session,stype:action.stype,groups:(action.groups||[]).slice().sort(),by:action.by,time:new Date().toLocaleString("da-DK")});
      sb.from("ready_signals").upsert(row,{onConflict:"event_id,class,session,stype,groups"}).then(({error})=>{if(error)console.error("Supabase ready-signal upsert:",error);});
    }
    if(action.type==="CLEAR_ALL_READY_SIGNALS"){
      sb.from("ready_signals").delete().eq("event_id",action.eventId).then(({error})=>{if(error)console.error("Supabase ready-signals clear:",error);});
    }
    if(action.type==="ADD_NOTIFICATION"){
      sb.from("notifications").insert(notificationToRow(action.payload)).then(({error})=>{if(error)console.error("Supabase notification insert:",error);});
    }
    if(action.type==="DELETE_NOTIFICATION"&&action.id!=null){
      sb.from("notifications").delete().eq("id",action.id).then(({error})=>{if(error)console.error("Supabase notification delete:",error);});
    }
  },[]);

  const u=state.currentUser;
  const logout=async()=>{if(sb)await sb.auth.signOut();dispatch({type:"LOGOUT"});};
  const dispatchWithLogout=React.useCallback((action)=>{
    if(action.type==="LOGOUT"){logout();return;}
    wrappedDispatch(action);
  },[wrappedDispatch]);

  return <LangCtx.Provider value={state.lang}>
    <div style={{width:"100%",height:"100vh",overflow:"hidden"}}>
      {(u?.isAdmin||u?.type==="admin"||u?.isSubAdmin)?<AdminApp state={state} dispatch={dispatchWithLogout}/>:<UserApp state={state} dispatch={dispatchWithLogout}/>}
      <SyncBadge status={sync}/>
    </div>
  </LangCtx.Provider>;
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
